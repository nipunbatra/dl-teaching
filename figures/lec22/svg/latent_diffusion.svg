<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .vae    { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.4; rx:4; ry:4; }
      .unet   { fill:#EAD3C5; stroke:#D97757; stroke-width:1.4; rx:4; ry:4; }
      .clip   { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.4; rx:4; ry:4; }
      .latent { fill:#F6F0DF; stroke:#C9A961; stroke-width:1.3; }
      .img    { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1; }
      .ink    { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .cross  { stroke:#D97757; fill:none; stroke-width:1.8; stroke-dasharray:5 3; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="ld-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
    <marker id="ld-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#D97757"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Stable Diffusion — diffuse in a small latent space, decode once at the end</text>

  <!-- Text prompt -->
  <g transform="translate(30, 60)">
    <text x="0" y="-6" class="tag">TEXT PROMPT</text>
    <rect x="0" y="0" width="180" height="30" fill="#F0EEE5" stroke="#1F1F1E" rx="3"/>
    <text x="90" y="20" text-anchor="middle" class="mono">"a cat astronaut"</text>
  </g>

  <!-- CLIP text encoder -->
  <g transform="translate(30, 110)">
    <rect class="clip" x="0" y="0" width="180" height="50"/>
    <text x="90" y="22" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">CLIP text encoder</text>
    <text x="90" y="40" text-anchor="middle" class="mut" fill="#7B9E89">(frozen)</text>
  </g>

  <line x1="120" y1="90" x2="120" y2="110" class="ink" marker-end="url(#ld-a)"/>

  <!-- Text embedding -->
  <g transform="translate(70, 180)">
    <rect x="0" y="0" width="100" height="28" fill="#D8E3DE" stroke="#7B9E89"/>
    <text x="50" y="18" text-anchor="middle" class="mono" fill="#7B9E89">c · 77 × 768</text>
  </g>
  <line x1="120" y1="160" x2="120" y2="180" class="ink" marker-end="url(#ld-a)"/>

  <!-- Noise -->
  <g transform="translate(260, 60)">
    <text x="0" y="-6" class="tag">NOISE</text>
    <rect class="latent" x="0" y="0" width="100" height="50"/>
    <text x="50" y="22" text-anchor="middle" class="mono" fill="#C9A961">z_T</text>
    <text x="50" y="40" text-anchor="middle" class="mut" fill="#C9A961">4 × 64 × 64 (latent)</text>
  </g>

  <!-- U-Net diffuser (in latent space) -->
  <g transform="translate(290, 150)">
    <rect class="unet" x="0" y="0" width="280" height="120"/>
    <text x="140" y="26" text-anchor="middle" class="mono" fill="#D97757" font-weight="600">U-Net ε_θ (in latent space)</text>

    <!-- Show encoder-decoder arches -->
    <g stroke="#D97757" stroke-width="1" fill="none" opacity="0.6">
      <path d="M 20 50 L 60 80 L 100 90 L 140 95 L 180 90 L 220 80 L 260 50"/>
      <circle cx="20"  cy="50" r="3" fill="#D97757"/>
      <circle cx="60"  cy="80" r="3" fill="#D97757"/>
      <circle cx="100" cy="90" r="3" fill="#D97757"/>
      <circle cx="140" cy="95" r="3" fill="#D97757"/>
      <circle cx="180" cy="90" r="3" fill="#D97757"/>
      <circle cx="220" cy="80" r="3" fill="#D97757"/>
      <circle cx="260" cy="50" r="3" fill="#D97757"/>
    </g>
    <text x="140" y="110" text-anchor="middle" class="mut" fill="#D97757">encoder → bottleneck → decoder  (with skips)</text>
  </g>

  <!-- Cross-attention from text embedding into U-Net -->
  <path class="cross" marker-end="url(#ld-c)" d="M 170 194 Q 260 180 290 230"/>
  <text x="185" y="230" class="mono" fill="#D97757">cross-attention</text>

  <!-- Loop T=50 steps -->
  <path d="M 570 180 C 620 150 620 250 570 230" stroke="#C9A961" fill="none" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="640" y="200" class="mono" fill="#C9A961">× T = 50 steps</text>
  <text x="640" y="215" class="mut" fill="#C9A961">DDIM sampling</text>

  <!-- z_0 latent -->
  <g transform="translate(600, 100)">
    <rect class="latent" x="0" y="0" width="100" height="50"/>
    <text x="50" y="22" text-anchor="middle" class="mono" fill="#C9A961">z₀ (clean latent)</text>
    <text x="50" y="40" text-anchor="middle" class="mut" fill="#C9A961">4 × 64 × 64</text>
  </g>
  <path d="M 570 210 Q 600 180 600 125" class="ink" fill="none" marker-end="url(#ld-a)"/>

  <!-- VAE decoder -->
  <g transform="translate(750, 100)">
    <rect class="vae" x="0" y="0" width="120" height="50"/>
    <text x="60" y="22" text-anchor="middle" class="mono" fill="#4A6670" font-weight="600">VAE decoder</text>
    <text x="60" y="40" text-anchor="middle" class="mut" fill="#4A6670">latent → pixel</text>
  </g>
  <line x1="700" y1="125" x2="750" y2="125" class="ink" marker-end="url(#ld-a)"/>

  <!-- Final image -->
  <g transform="translate(770, 180)">
    <rect class="img" x="0" y="0" width="90" height="90"/>
    <g transform="translate(10, 10)">
      <!-- stylized astronaut-cat -->
      <ellipse cx="35" cy="25" rx="22" ry="16" fill="#D97757" opacity="0.7"/>
      <circle cx="27" cy="22" r="2.5" fill="#1F1F1E"/>
      <circle cx="43" cy="22" r="2.5" fill="#1F1F1E"/>
      <path d="M 23 18 L 22 6 L 34 18 Z" fill="#A8324B" opacity="0.7"/>
      <path d="M 47 18 L 48 6 L 36 18 Z" fill="#A8324B" opacity="0.7"/>
      <!-- Helmet -->
      <circle cx="35" cy="25" r="32" fill="none" stroke="#4A6670" stroke-width="1.2" opacity="0.5"/>
      <!-- body -->
      <rect x="22" y="44" width="26" height="22" fill="#DCE3E6" stroke="#4A6670"/>
    </g>
    <text x="45" y="108" text-anchor="middle" class="mono">512 × 512 image</text>
  </g>
  <line x1="810" y1="150" x2="810" y2="180" class="ink" marker-end="url(#ld-a)"/>

  <!-- Why latent diffusion -->
  <g transform="translate(40, 320)">
    <rect x="0" y="0" width="880" height="80" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">WHY DIFFUSE IN LATENT SPACE?</text>
    <text x="14" y="44" class="mut">VAE compresses 512×512×3 (786k dims) → 4×64×64 (16k dims) · <tspan fill="#1F1F1E" font-weight="600">48× smaller.</tspan></text>
    <text x="14" y="62" class="mut">Running 50 U-Net forwards at 64² resolution is feasible on consumer GPUs. Pixel-space diffusion would be 48× more expensive.</text>
    <text x="14" y="78" class="mut" font-style="italic">Rombach et al. 2022 — the one trick that made Stable Diffusion ship on laptops.</text>
  </g>
</svg>
