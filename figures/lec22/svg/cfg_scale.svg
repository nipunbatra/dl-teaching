<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .img    { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1; }
      .arrow  { stroke:#D97757; fill:none; stroke-width:2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Classifier-free guidance — linearly extrapolate along the prompt direction</text>

  <!-- 5 panels at CFG scales 0, 1, 3, 7, 15 -->
  <g transform="translate(30, 80)">
    <!-- w=0 (unconditional) -->
    <g transform="translate(0, 0)">
      <rect class="img" x="0" y="0" width="150" height="150"/>
      <!-- blurry nothing -->
      <rect x="20" y="20" width="110" height="110" fill="#D97757" opacity="0.15"/>
      <ellipse cx="75" cy="75" rx="40" ry="30" fill="#D97757" opacity="0.25"/>
      <text x="75" y="170" text-anchor="middle" class="mono">w = 0</text>
      <text x="75" y="186" text-anchor="middle" class="mut">unconditional</text>
    </g>

    <!-- w=1 (weak) -->
    <g transform="translate(170, 0)">
      <rect class="img" x="0" y="0" width="150" height="150"/>
      <!-- something vaguely cat-like -->
      <ellipse cx="75" cy="70" rx="38" ry="28" fill="#D97757" opacity="0.5"/>
      <circle cx="62" cy="65" r="3" fill="#1F1F1E" opacity="0.5"/>
      <circle cx="88" cy="65" r="3" fill="#1F1F1E" opacity="0.5"/>
      <text x="75" y="170" text-anchor="middle" class="mono">w = 1</text>
      <text x="75" y="186" text-anchor="middle" class="mut">weak · fuzzy</text>
    </g>

    <!-- w=3 (moderate) -->
    <g transform="translate(340, 0)">
      <rect class="img" x="0" y="0" width="150" height="150"/>
      <ellipse cx="75" cy="70" rx="40" ry="28" fill="#D97757" opacity="0.75"/>
      <circle cx="62" cy="65" r="3" fill="#1F1F1E"/>
      <circle cx="88" cy="65" r="3" fill="#1F1F1E"/>
      <path d="M 65 85 L 62 72 L 72 83 Z" fill="#A8324B" opacity="0.7"/>
      <path d="M 85 85 L 88 72 L 78 83 Z" fill="#A8324B" opacity="0.7"/>
      <path d="M 68 95 Q 75 100 82 95" stroke="#1F1F1E" fill="none" stroke-width="1.2"/>
      <text x="75" y="170" text-anchor="middle" class="mono">w = 3</text>
      <text x="75" y="186" text-anchor="middle" class="mut">moderate · good</text>
    </g>

    <!-- w=7 (strong, 2026 default) -->
    <g transform="translate(510, 0)">
      <rect class="img" x="0" y="0" width="150" height="150" stroke="#D97757" stroke-width="2"/>
      <ellipse cx="75" cy="68" rx="44" ry="32" fill="#D97757" opacity="0.9"/>
      <circle cx="60" cy="62" r="4" fill="#1F1F1E"/>
      <circle cx="90" cy="62" r="4" fill="#1F1F1E"/>
      <circle cx="60" cy="62" r="1.5" fill="#F0EEE5"/>
      <circle cx="90" cy="62" r="1.5" fill="#F0EEE5"/>
      <path d="M 58 85 L 52 68 L 68 82 Z" fill="#A8324B"/>
      <path d="M 92 85 L 98 68 L 82 82 Z" fill="#A8324B"/>
      <path d="M 65 95 Q 75 102 85 95" stroke="#1F1F1E" fill="none" stroke-width="1.5"/>
      <text x="75" y="170" text-anchor="middle" class="mono" fill="#D97757" font-weight="600">w = 7</text>
      <text x="75" y="186" text-anchor="middle" class="mut" fill="#D97757">2026 default · sharp</text>
    </g>

    <!-- w=15 (over-guided, oversaturated) -->
    <g transform="translate(680, 0)">
      <rect class="img" x="0" y="0" width="150" height="150"/>
      <!-- Saturated, ringing -->
      <ellipse cx="75" cy="68" rx="46" ry="34" fill="#A8324B" opacity="0.95"/>
      <circle cx="58" cy="62" r="5" fill="#1F1F1E"/>
      <circle cx="92" cy="62" r="5" fill="#1F1F1E"/>
      <ellipse cx="75" cy="68" rx="50" ry="38" fill="none" stroke="#A8324B" stroke-width="1.2" opacity="0.5"/>
      <ellipse cx="75" cy="68" rx="54" ry="42" fill="none" stroke="#A8324B" stroke-width="1" opacity="0.3"/>
      <text x="75" y="170" text-anchor="middle" class="mono">w = 15</text>
      <text x="75" y="186" text-anchor="middle" class="mut" fill="#A8324B">over-guided · ringing</text>
    </g>

    <!-- Arrow above -->
    <path class="arrow" d="M 0 -20 L 820 -20" marker-end="url(#cfg-end)"/>
    <text x="410" y="-30" text-anchor="middle" class="mono" fill="#D97757">more guidance →</text>
  </g>

  <defs>
    <marker id="cfg-end" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#D97757"/></marker>
  </defs>

  <!-- Formula -->
  <g transform="translate(40, 290)">
    <rect x="0" y="0" width="880" height="80" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">CLASSIFIER-FREE GUIDANCE</text>
    <text x="440" y="48" text-anchor="middle" class="mono" font-size="14">
      ε_CFG = ε_θ(x_t, ∅) &nbsp;+&nbsp; w · (ε_θ(x_t, c) − ε_θ(x_t, ∅))
    </text>
    <text x="440" y="68" text-anchor="middle" class="mut" font-style="italic">
      unconditional noise  +  w × (conditional − unconditional)  ·  w=7 is the Stable Diffusion default
    </text>
  </g>
</svg>
