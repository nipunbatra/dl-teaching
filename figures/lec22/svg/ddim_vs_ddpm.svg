<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Work Sans, system-ui, sans-serif">
  <style>
    .bg { fill: #F0EEE5; }
    .title { font-size: 17px; font-weight: 600; fill: #1F1F1E; }
    .head { font-size: 13px; font-weight: 600; fill: #1F1F1E; }
    .body { font-size: 12px; fill: #1F1F1E; }
    .caption { font-size: 11px; fill: #6B6B69; }
    .mono { font-family: "IBM Plex Mono", monospace; font-size: 11px; }
    .step { fill: #FFF3EE; stroke: #D97757; stroke-width: 1.2; rx: 3; }
    .skip { fill: #F0F5EF; stroke: #7B9E89; stroke-width: 1.5; rx: 3; }
    .noise { fill: #FDF2F6; stroke: #A8324B; stroke-width: 1.3; rx: 4; }
    .img { fill: #F7EED6; stroke: #C9A961; stroke-width: 1.3; rx: 4; }
    .arrow { stroke: #1F1F1E; stroke-width: 1.3; fill: none; }
    .dash { stroke-dasharray: 3 2; opacity: 0.3; }
  </style>
  <rect class="bg" width="960" height="380"/>
  <text x="480" y="28" class="title" text-anchor="middle">DDIM · same model, skip 95% of the steps</text>

  <!-- DDPM row -->
  <g transform="translate(40, 60)">
    <text x="0" y="0" class="head">DDPM sampling · 1000 tiny steps</text>
    <rect class="noise" x="0" y="20" width="60" height="36"/>
    <text x="30" y="43" class="body" text-anchor="middle">x_T</text>
    <!-- Show ~20 step boxes -->
    <g transform="translate(65, 25)">
      <!-- 20 step rects -->
      <rect class="step" x="0"   y="0" width="18" height="26"/>
      <rect class="step" x="22"  y="0" width="18" height="26"/>
      <rect class="step" x="44"  y="0" width="18" height="26"/>
      <rect class="step" x="66"  y="0" width="18" height="26"/>
      <rect class="step" x="88"  y="0" width="18" height="26"/>
      <rect class="step" x="110" y="0" width="18" height="26"/>
      <rect class="step" x="132" y="0" width="18" height="26"/>
      <rect class="step" x="154" y="0" width="18" height="26"/>
      <rect class="step" x="176" y="0" width="18" height="26"/>
      <rect class="step" x="198" y="0" width="18" height="26"/>
      <rect class="step" x="220" y="0" width="18" height="26"/>
      <rect class="step" x="242" y="0" width="18" height="26"/>
      <rect class="step" x="264" y="0" width="18" height="26"/>
      <rect class="step" x="286" y="0" width="18" height="26"/>
      <rect class="step" x="308" y="0" width="18" height="26"/>
      <text x="355" y="16" class="caption">...</text>
      <rect class="step" x="380" y="0" width="18" height="26"/>
      <rect class="step" x="402" y="0" width="18" height="26"/>
      <rect class="step" x="424" y="0" width="18" height="26"/>
    </g>
    <rect class="img" x="515" y="20" width="60" height="36"/>
    <text x="545" y="43" class="body" text-anchor="middle">x_0</text>

    <!-- Timeline label -->
    <path class="arrow" d="M0 68 L575 68" marker-end="url(#arr)"/>
    <text x="287" y="86" class="caption" text-anchor="middle">T=1000 · reverse-step every t → slow · ~50s for 512×512 image</text>
    <text x="700" y="50" class="body">~1000 forward passes</text>
    <text x="700" y="66" class="caption">U-Net at every step</text>
  </g>

  <!-- DDIM row -->
  <g transform="translate(40, 170)">
    <text x="0" y="0" class="head">DDIM sampling · skip to 50 steps with same training</text>
    <rect class="noise" x="0" y="20" width="60" height="36"/>
    <text x="30" y="43" class="body" text-anchor="middle">x_T</text>
    <!-- 10 larger step boxes, bigger gaps -->
    <g transform="translate(65, 20)">
      <rect class="skip" x="0"   y="0" width="34" height="36"/>
      <text x="17" y="23" class="caption" text-anchor="middle">τ₁₀</text>
      <rect class="skip" x="47"  y="0" width="34" height="36"/>
      <text x="64" y="23" class="caption" text-anchor="middle">τ₉</text>
      <rect class="skip" x="94"  y="0" width="34" height="36"/>
      <text x="111" y="23" class="caption" text-anchor="middle">τ₈</text>
      <rect class="skip" x="141" y="0" width="34" height="36"/>
      <text x="158" y="23" class="caption" text-anchor="middle">τ₇</text>
      <rect class="skip" x="188" y="0" width="34" height="36"/>
      <text x="205" y="23" class="caption" text-anchor="middle">τ₆</text>
      <rect class="skip" x="235" y="0" width="34" height="36"/>
      <text x="252" y="23" class="caption" text-anchor="middle">τ₅</text>
      <rect class="skip" x="282" y="0" width="34" height="36"/>
      <text x="299" y="23" class="caption" text-anchor="middle">τ₄</text>
      <rect class="skip" x="329" y="0" width="34" height="36"/>
      <text x="346" y="23" class="caption" text-anchor="middle">τ₃</text>
      <rect class="skip" x="376" y="0" width="34" height="36"/>
      <text x="393" y="23" class="caption" text-anchor="middle">τ₂</text>
      <rect class="skip" x="423" y="0" width="34" height="36"/>
      <text x="440" y="23" class="caption" text-anchor="middle">τ₁</text>
    </g>
    <rect class="img" x="535" y="20" width="60" height="36"/>
    <text x="565" y="43" class="body" text-anchor="middle">x_0</text>
    <path class="arrow" d="M0 68 L595 68" marker-end="url(#arr)"/>
    <text x="297" y="86" class="caption" text-anchor="middle">subset τ₁...τ_N · only N steps used · often N = 20-50</text>
    <text x="700" y="50" class="body">~50 forward passes</text>
    <text x="700" y="66" class="caption">20× fewer · same quality</text>
  </g>

  <!-- Math box -->
  <rect x="40" y="280" width="880" height="80" fill="#FFF3EE" stroke="#D97757" stroke-width="1" rx="6"/>
  <text x="55" y="303" class="head">DDIM update rule (deterministic when η=0)</text>
  <text x="55" y="324" class="mono">x_{τ_{i-1}} = √α̅_{τ_{i-1}} · pred_x_0 + √(1 - α̅_{τ_{i-1}} - σ²) · ε_θ(x_{τ_i}, τ_i) + σ · ε</text>
  <text x="55" y="345" class="caption">Same model · same α̅ schedule · just evaluate at sparse subset of timesteps. No retraining.</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#1F1F1E"/>
    </marker>
  </defs>
</svg>
