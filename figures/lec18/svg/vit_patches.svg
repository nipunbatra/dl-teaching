<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .patch    { fill:#EAD3C5; stroke:#D97757; stroke-width:0.6; }
      .proj     { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.3; rx:3; ry:3; }
      .tok      { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1; rx:2; ry:2; }
      .cls      { fill:#F6D4CC; stroke:#A8324B; stroke-width:1.5; rx:2; ry:2; }
      .trans    { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.4; rx:4; ry:4; }
      .ink      { stroke:#1F1F1E; fill:none; stroke-width:1.2; }
      .mono     { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut      { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl      { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag      { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="vt-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Vision Transformer (ViT) — treat image patches as tokens, apply Transformer</text>

  <!-- Image -->
  <g transform="translate(40, 90)">
    <text x="60" y="-10" text-anchor="middle" class="tag">IMAGE 224×224</text>
    <!-- 4x4 grid of patches -->
    <rect x="0" y="0" width="120" height="120" fill="#F0EEE5" stroke="#1F1F1E"/>
    <!-- stylized cat drawing -->
    <g transform="translate(10, 10)">
      <ellipse cx="50" cy="50" rx="40" ry="28" fill="#D97757" opacity="0.6"/>
      <circle cx="38" cy="45" r="3" fill="#1F1F1E"/>
      <circle cx="62" cy="45" r="3" fill="#1F1F1E"/>
      <path d="M 30 30 L 28 18 L 40 30 Z" fill="#A8324B" opacity="0.7"/>
      <path d="M 70 30 L 72 18 L 60 30 Z" fill="#A8324B" opacity="0.7"/>
    </g>
    <!-- patch grid overlay -->
    <g stroke="#D97757" stroke-width="1" fill="none" opacity="0.7">
      <line x1="30"  y1="0" x2="30"  y2="120"/>
      <line x1="60"  y1="0" x2="60"  y2="120"/>
      <line x1="90"  y1="0" x2="90"  y2="120"/>
      <line x1="0" y1="30"  x2="120" y2="30"/>
      <line x1="0" y1="60"  x2="120" y2="60"/>
      <line x1="0" y1="90"  x2="120" y2="90"/>
    </g>
    <text x="60" y="140" text-anchor="middle" class="mut">16 patches (16×16 each)</text>
  </g>

  <!-- Flatten + linear project each patch -->
  <g transform="translate(200, 90)">
    <rect class="proj" x="0" y="20" width="80" height="80"/>
    <text x="40" y="52" text-anchor="middle" class="mono" fill="#7B9E89">Flatten</text>
    <text x="40" y="70" text-anchor="middle" class="mono" fill="#7B9E89">Linear</text>
    <text x="40" y="86" text-anchor="middle" class="mut" fill="#7B9E89" font-size="9">16·16·3 → d</text>
  </g>
  <line x1="160" y1="150" x2="200" y2="150" class="ink" marker-end="url(#vt-a)"/>

  <!-- Sequence of tokens (patch embeddings + CLS + position) -->
  <g transform="translate(310, 110)">
    <text x="130" y="-10" text-anchor="middle" class="tag" fill="#A8324B">[CLS] + PATCH TOKENS + PE</text>

    <rect class="cls" x="0"   y="0" width="30" height="40"/>
    <text x="15"  y="18" text-anchor="middle" class="mono" fill="#A8324B">[CLS]</text>
    <text x="15"  y="32" text-anchor="middle" class="mono" fill="#A8324B" font-size="9">t₀</text>

    <rect class="tok" x="36"  y="0" width="30" height="40"/>
    <text x="51"  y="20" text-anchor="middle" class="mono">p₁</text>
    <rect class="tok" x="72"  y="0" width="30" height="40"/>
    <text x="87"  y="20" text-anchor="middle" class="mono">p₂</text>
    <rect class="tok" x="108" y="0" width="30" height="40"/>
    <text x="123" y="20" text-anchor="middle" class="mono">p₃</text>
    <rect class="tok" x="144" y="0" width="30" height="40"/>
    <text x="159" y="20" text-anchor="middle" class="mono">p₄</text>
    <text x="190" y="22" text-anchor="middle" class="mono">...</text>
    <rect class="tok" x="220" y="0" width="30" height="40"/>
    <text x="235" y="20" text-anchor="middle" class="mono">p₁₆</text>

    <!-- Positional encodings added -->
    <text x="130" y="62" text-anchor="middle" class="mut" fill="#D97757">+ learned positional embedding</text>
  </g>
  <line x1="290" y1="140" x2="310" y2="130" class="ink" marker-end="url(#vt-a)"/>

  <!-- Transformer encoder -->
  <g transform="translate(390, 230)">
    <rect class="trans" x="0" y="0" width="200" height="60"/>
    <text x="100" y="22" text-anchor="middle" class="mono" fill="#4A6670" font-weight="600">Transformer Encoder × L</text>
    <text x="100" y="42" text-anchor="middle" class="mut" fill="#4A6670">same as BERT / GPT · attention over all tokens</text>
  </g>
  <line x1="490" y1="170" x2="490" y2="230" class="ink" marker-end="url(#vt-a)"/>

  <!-- Output: take CLS token -->
  <g transform="translate(650, 90)">
    <text x="70" y="-10" text-anchor="middle" class="tag" fill="#A8324B">READ OUT [CLS] TOKEN</text>
    <rect class="cls" x="40" y="0" width="60" height="40"/>
    <text x="70" y="24" text-anchor="middle" class="mono" fill="#A8324B">[CLS] out</text>
    <text x="70" y="62" text-anchor="middle" class="mut">representation of the whole image</text>
  </g>

  <!-- Linear head -->
  <g transform="translate(650, 210)">
    <rect class="proj" x="40" y="0" width="60" height="40"/>
    <text x="70" y="24" text-anchor="middle" class="mono" fill="#7B9E89">Linear</text>
    <text x="70" y="62" text-anchor="middle" class="mut">→ K class logits</text>
  </g>

  <g class="ink" marker-end="url(#vt-a)">
    <line x1="490" y1="290" x2="720" y2="140"/>
    <line x1="720" y1="150" x2="720" y2="210"/>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 340)">
    <rect x="0" y="0" width="840" height="50" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">KEY INSIGHT</text>
    <text x="14" y="42" class="mut">
      No convolutions at all. ViT works only at <tspan fill="#1F1F1E" font-weight="600">scale</tspan> — needs 300M+ images of pretraining (JFT-300M) to beat ResNet. With self-supervised pretraining (DINO, MAE), smaller data works too.
    </text>
  </g>
</svg>
