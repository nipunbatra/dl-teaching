<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Work Sans, system-ui, sans-serif">
  <style>
    .bg { fill: #F0EEE5; }
    .title { font-size: 17px; font-weight: 600; fill: #1F1F1E; }
    .head { font-size: 13px; font-weight: 600; fill: #1F1F1E; }
    .body { font-size: 12px; fill: #1F1F1E; }
    .caption { font-size: 11px; fill: #6B6B69; }
    .patch { fill: #FFF3EE; stroke: #D97757; stroke-width: 0.8; rx: 2; }
    .token { fill: #F0F5EF; stroke: #7B9E89; stroke-width: 1; rx: 3; }
    .cls { fill: #FDF2F6; stroke: #A8324B; stroke-width: 1.4; rx: 3; }
    .arrow { stroke: #1F1F1E; stroke-width: 1.3; fill: none; }
    .dash { stroke-dasharray: 2 2; opacity: 0.4; }
  </style>
  <rect class="bg" width="960" height="380"/>
  <text x="480" y="30" class="title" text-anchor="middle">ViT · image becomes a sequence of patch tokens</text>

  <!-- Image grid on the left -->
  <g transform="translate(40, 60)">
    <text x="140" y="0" class="head" text-anchor="middle">Image · 224×224</text>
    <text x="140" y="18" class="caption" text-anchor="middle">split into 14×14 grid of patches</text>
    <rect x="0" y="30" width="280" height="280" fill="url(#imgtex)" stroke="#4A6670" stroke-width="1"/>
    <!-- Grid of patches -->
    <g>
      <!-- highlight 9 example patches with color gradation -->
      <rect class="patch" x="20" y="50" width="20" height="20" fill="#E8D6CC"/>
      <rect class="patch" x="40" y="50" width="20" height="20" fill="#DCC4B4"/>
      <rect class="patch" x="60" y="50" width="20" height="20" fill="#D0B29C"/>
      <rect class="patch" x="20" y="70" width="20" height="20" fill="#BFA796"/>
      <rect class="patch" x="40" y="70" width="20" height="20" fill="#B4978A"/>
      <rect class="patch" x="60" y="70" width="20" height="20" fill="#A68779"/>
      <rect class="patch" x="20" y="90" width="20" height="20" fill="#8F7669"/>
      <rect class="patch" x="40" y="90" width="20" height="20" fill="#A89376"/>
      <rect class="patch" x="60" y="90" width="20" height="20" fill="#C1A986"/>
    </g>
    <!-- lots of empty grid -->
    <g stroke="#CFCBBE" stroke-width="0.4">
      <path d="M0 30 h 280" transform="translate(0,20)"/>
      <path d="M0 30 h 280" transform="translate(0,40)"/>
      <path d="M0 30 h 280" transform="translate(0,60)"/>
      <path d="M0 30 h 280" transform="translate(0,80)"/>
      <path d="M0 30 h 280" transform="translate(0,100)"/>
      <path d="M0 30 h 280" transform="translate(0,120)"/>
      <path d="M0 30 h 280" transform="translate(0,140)"/>
      <path d="M0 30 h 280" transform="translate(0,160)"/>
      <path d="M0 30 h 280" transform="translate(0,180)"/>
      <path d="M0 30 h 280" transform="translate(0,200)"/>
      <path d="M0 30 h 280" transform="translate(0,220)"/>
      <path d="M0 30 h 280" transform="translate(0,240)"/>
      <path d="M0 30 h 280" transform="translate(0,260)"/>
      <path d="M20 30 v 280"/>
      <path d="M40 30 v 280"/>
      <path d="M60 30 v 280"/>
      <path d="M80 30 v 280"/>
      <path d="M100 30 v 280"/>
      <path d="M120 30 v 280"/>
      <path d="M140 30 v 280"/>
      <path d="M160 30 v 280"/>
      <path d="M180 30 v 280"/>
      <path d="M200 30 v 280"/>
      <path d="M220 30 v 280"/>
      <path d="M240 30 v 280"/>
      <path d="M260 30 v 280"/>
    </g>
    <defs>
      <pattern id="imgtex" patternUnits="userSpaceOnUse" width="12" height="12">
        <rect width="12" height="12" fill="#F7EED6"/>
        <circle cx="6" cy="6" r="4" fill="#D6C4A0" opacity="0.5"/>
      </pattern>
    </defs>
  </g>

  <!-- arrow -->
  <path class="arrow" d="M330 200 L390 200" marker-end="url(#arr)"/>
  <text x="360" y="190" class="caption" text-anchor="middle">flatten + project</text>

  <!-- Tokens sequence on the right -->
  <g transform="translate(400, 80)">
    <text x="270" y="0" class="head" text-anchor="middle">Token sequence · 197 vectors</text>
    <text x="270" y="18" class="caption" text-anchor="middle">1 [CLS] + 196 patches · each d-dim</text>

    <!-- CLS token -->
    <rect class="cls" x="0" y="40" width="50" height="30"/>
    <text x="25" y="60" class="body" text-anchor="middle">CLS</text>

    <!-- Patch tokens -->
    <rect class="token" x="60" y="40" width="40" height="30"/>
    <text x="80" y="60" class="body" text-anchor="middle">p₁</text>
    <rect class="token" x="105" y="40" width="40" height="30"/>
    <text x="125" y="60" class="body" text-anchor="middle">p₂</text>
    <rect class="token" x="150" y="40" width="40" height="30"/>
    <text x="170" y="60" class="body" text-anchor="middle">p₃</text>
    <text x="212" y="60" class="body" text-anchor="middle">...</text>
    <rect class="token" x="235" y="40" width="40" height="30"/>
    <text x="255" y="60" class="body" text-anchor="middle">p₁₉₄</text>
    <rect class="token" x="280" y="40" width="40" height="30"/>
    <text x="300" y="60" class="body" text-anchor="middle">p₁₉₅</text>
    <rect class="token" x="325" y="40" width="40" height="30"/>
    <text x="345" y="60" class="body" text-anchor="middle">p₁₉₆</text>

    <!-- positional encoding row -->
    <g transform="translate(0, 100)">
      <rect fill="#F7EED6" stroke="#C9A961" stroke-width="1" x="0" y="0" width="365" height="20" rx="3"/>
      <text x="182" y="14" class="caption" text-anchor="middle">+ learned positional embeddings (0..196)</text>
    </g>

    <!-- arrow -->
    <path class="arrow" d="M180 130 L180 150" marker-end="url(#arr)"/>

    <!-- Transformer blocks -->
    <rect fill="#FFF3EE" stroke="#D97757" stroke-width="1.4" x="0" y="150" width="365" height="66" rx="6"/>
    <text x="182" y="172" class="head" text-anchor="middle">Standard Transformer × 12 blocks</text>
    <text x="182" y="192" class="caption" text-anchor="middle">MultiHeadAttention · FFN · LayerNorm</text>
    <text x="182" y="208" class="caption" text-anchor="middle">same as L13, no convs anywhere</text>

    <path class="arrow" d="M180 220 L180 240" marker-end="url(#arr)"/>

    <!-- Output -->
    <rect fill="#FDF2F6" stroke="#A8324B" stroke-width="1.4" x="80" y="242" width="205" height="28" rx="4"/>
    <text x="182" y="261" class="body" text-anchor="middle">CLS token → classifier → logits</text>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#1F1F1E"/>
    </marker>
  </defs>
</svg>
