<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Work Sans, system-ui, sans-serif">
  <style>
    .bg { fill: #F0EEE5; }
    .title { font-size: 17px; font-weight: 600; fill: #1F1F1E; }
    .head { font-size: 13px; font-weight: 600; fill: #1F1F1E; }
    .body { font-size: 12px; fill: #1F1F1E; }
    .caption { font-size: 11px; fill: #6B6B69; }
    .cell { fill: #FFF3EE; stroke: #D97757; stroke-width: 1.3; rx: 4; }
    .gt { fill: #F0F5EF; stroke: #7B9E89; stroke-width: 1.2; rx: 3; }
    .pred { fill: #FDF2F6; stroke: #A8324B; stroke-width: 1.2; rx: 3; }
    .arrow { stroke: #1F1F1E; stroke-width: 1.3; fill: none; }
    .gt-arrow { stroke: #7B9E89; stroke-width: 1.5; fill: none; }
    .pred-arrow { stroke: #A8324B; stroke-width: 1.5; fill: none; stroke-dasharray: 3 2; }
  </style>
  <rect class="bg" width="960" height="440"/>
  <text x="480" y="28" class="title" text-anchor="middle">Teacher forcing vs autoregressive · inputs to the decoder</text>

  <!-- Teacher forcing (training) -->
  <g transform="translate(30, 60)">
    <text x="450" y="0" class="head" text-anchor="middle">Training · TEACHER FORCING · ground-truth previous token feeds next step</text>
    <!-- row of decoder cells -->
    <g transform="translate(0, 30)">
      <rect class="cell" x="0" y="60" width="80" height="40"/>
      <text x="40" y="85" class="body" text-anchor="middle">dec₁</text>
      <rect class="cell" x="115" y="60" width="80" height="40"/>
      <text x="155" y="85" class="body" text-anchor="middle">dec₂</text>
      <rect class="cell" x="230" y="60" width="80" height="40"/>
      <text x="270" y="85" class="body" text-anchor="middle">dec₃</text>
      <rect class="cell" x="345" y="60" width="80" height="40"/>
      <text x="385" y="85" class="body" text-anchor="middle">dec₄</text>
      <rect class="cell" x="460" y="60" width="80" height="40"/>
      <text x="500" y="85" class="body" text-anchor="middle">dec₅</text>
      <rect class="cell" x="575" y="60" width="80" height="40"/>
      <text x="615" y="85" class="body" text-anchor="middle">dec₆</text>

      <!-- Ground truth inputs below (feed forward) -->
      <rect class="gt" x="0" y="120" width="80" height="26"/>
      <text x="40" y="138" class="body" text-anchor="middle">&lt;s&gt;</text>
      <rect class="gt" x="115" y="120" width="80" height="26"/>
      <text x="155" y="138" class="body" text-anchor="middle">The</text>
      <rect class="gt" x="230" y="120" width="80" height="26"/>
      <text x="270" y="138" class="body" text-anchor="middle">cat</text>
      <rect class="gt" x="345" y="120" width="80" height="26"/>
      <text x="385" y="138" class="body" text-anchor="middle">sat</text>
      <rect class="gt" x="460" y="120" width="80" height="26"/>
      <text x="500" y="138" class="body" text-anchor="middle">on</text>
      <rect class="gt" x="575" y="120" width="80" height="26"/>
      <text x="615" y="138" class="body" text-anchor="middle">mat</text>

      <!-- gt → cell arrows -->
      <path class="gt-arrow" d="M40 120 L40 100" marker-end="url(#sage)"/>
      <path class="gt-arrow" d="M155 120 L155 100" marker-end="url(#sage)"/>
      <path class="gt-arrow" d="M270 120 L270 100" marker-end="url(#sage)"/>
      <path class="gt-arrow" d="M385 120 L385 100" marker-end="url(#sage)"/>
      <path class="gt-arrow" d="M500 120 L500 100" marker-end="url(#sage)"/>
      <path class="gt-arrow" d="M615 120 L615 100" marker-end="url(#sage)"/>

      <!-- targets above -->
      <rect class="pred" x="0" y="15" width="80" height="26"/>
      <text x="40" y="33" class="body" text-anchor="middle">The</text>
      <rect class="pred" x="115" y="15" width="80" height="26"/>
      <text x="155" y="33" class="body" text-anchor="middle">cat</text>
      <rect class="pred" x="230" y="15" width="80" height="26"/>
      <text x="270" y="33" class="body" text-anchor="middle">sat</text>
      <rect class="pred" x="345" y="15" width="80" height="26"/>
      <text x="385" y="33" class="body" text-anchor="middle">on</text>
      <rect class="pred" x="460" y="15" width="80" height="26"/>
      <text x="500" y="33" class="body" text-anchor="middle">the</text>
      <rect class="pred" x="575" y="15" width="80" height="26"/>
      <text x="615" y="33" class="body" text-anchor="middle">mat</text>

      <path class="arrow" d="M40 60 L40 47" marker-end="url(#arr)"/>
      <path class="arrow" d="M155 60 L155 47" marker-end="url(#arr)"/>
      <path class="arrow" d="M270 60 L270 47" marker-end="url(#arr)"/>
      <path class="arrow" d="M385 60 L385 47" marker-end="url(#arr)"/>
      <path class="arrow" d="M500 60 L500 47" marker-end="url(#arr)"/>
      <path class="arrow" d="M615 60 L615 47" marker-end="url(#arr)"/>

      <text x="750" y="80" class="caption" font-weight="600" fill="#7B9E89">✓ all steps parallelizable</text>
      <text x="750" y="96" class="caption">✓ stable gradients</text>
      <text x="750" y="112" class="caption" fill="#A8324B">✗ mismatch with inference</text>
    </g>
  </g>

  <!-- Autoregressive (inference) -->
  <g transform="translate(30, 270)">
    <text x="450" y="0" class="head" text-anchor="middle">Inference · AUTOREGRESSIVE · model's own prediction feeds next step</text>
    <g transform="translate(0, 20)">
      <rect class="cell" x="0" y="60" width="80" height="40"/>
      <text x="40" y="85" class="body" text-anchor="middle">dec₁</text>
      <rect class="cell" x="115" y="60" width="80" height="40"/>
      <text x="155" y="85" class="body" text-anchor="middle">dec₂</text>
      <rect class="cell" x="230" y="60" width="80" height="40"/>
      <text x="270" y="85" class="body" text-anchor="middle">dec₃</text>
      <rect class="cell" x="345" y="60" width="80" height="40"/>
      <text x="385" y="85" class="body" text-anchor="middle">dec₄</text>
      <rect class="cell" x="460" y="60" width="80" height="40"/>
      <text x="500" y="85" class="body" text-anchor="middle">dec₅</text>
      <rect class="cell" x="575" y="60" width="80" height="40"/>
      <text x="615" y="85" class="body" text-anchor="middle">dec₆</text>

      <!-- Predictions fed back -->
      <rect class="gt" x="0" y="120" width="80" height="26"/>
      <text x="40" y="138" class="body" text-anchor="middle">&lt;s&gt;</text>
      <rect class="pred" x="115" y="120" width="80" height="26"/>
      <text x="155" y="138" class="body" text-anchor="middle">Þe</text>
      <rect class="pred" x="230" y="120" width="80" height="26"/>
      <text x="270" y="138" class="body" text-anchor="middle">cut</text>
      <rect class="pred" x="345" y="120" width="80" height="26"/>
      <text x="385" y="138" class="body" text-anchor="middle">set</text>
      <rect class="pred" x="460" y="120" width="80" height="26"/>
      <text x="500" y="138" class="body" text-anchor="middle">at</text>
      <rect class="pred" x="575" y="120" width="80" height="26"/>
      <text x="615" y="138" class="body" text-anchor="middle">mid</text>

      <path class="arrow" d="M40 120 L40 100" marker-end="url(#arr)"/>
      <!-- feedback from prediction to next cell (curved, wine color) -->
      <path class="pred-arrow" d="M40 41 Q 100 10 155 41" marker-end="url(#wine)"/>
      <path class="pred-arrow" d="M155 41 Q 215 10 270 41" marker-end="url(#wine)"/>
      <path class="pred-arrow" d="M270 41 Q 330 10 385 41" marker-end="url(#wine)"/>
      <path class="pred-arrow" d="M385 41 Q 445 10 500 41" marker-end="url(#wine)"/>
      <path class="pred-arrow" d="M500 41 Q 560 10 615 41" marker-end="url(#wine)"/>

      <rect class="pred" x="0" y="15" width="80" height="26"/>
      <text x="40" y="33" class="body" text-anchor="middle">Þe</text>
      <rect class="pred" x="115" y="15" width="80" height="26"/>
      <text x="155" y="33" class="body" text-anchor="middle">cut</text>
      <rect class="pred" x="230" y="15" width="80" height="26"/>
      <text x="270" y="33" class="body" text-anchor="middle">set</text>
      <rect class="pred" x="345" y="15" width="80" height="26"/>
      <text x="385" y="33" class="body" text-anchor="middle">at</text>
      <rect class="pred" x="460" y="15" width="80" height="26"/>
      <text x="500" y="33" class="body" text-anchor="middle">mid</text>
      <rect class="pred" x="575" y="15" width="80" height="26"/>
      <text x="615" y="33" class="body" text-anchor="middle">dle</text>

      <path class="arrow" d="M40 60 L40 47" marker-end="url(#arr)"/>

      <text x="750" y="80" class="caption" font-weight="600" fill="#A8324B">✗ errors cascade</text>
      <text x="750" y="96" class="caption">✗ serialized inference</text>
      <text x="750" y="112" class="caption" fill="#7B9E89">✓ same as deployment</text>
    </g>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#1F1F1E"/>
    </marker>
    <marker id="sage" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#7B9E89"/>
    </marker>
    <marker id="wine" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#A8324B"/>
    </marker>
  </defs>
</svg>
