<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .node      { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1; rx:2; ry:2; }
      .beam      { fill:#EAD3C5; stroke:#D97757; stroke-width:1.6; rx:2; ry:2; }
      .pruned    { fill:#F0EEE5; stroke:#C9C4B5; stroke-width:0.7; opacity:0.45; rx:2; ry:2; }
      .winner    { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.8; rx:2; ry:2; }
      .ink       { stroke:#6B6A65; fill:none; stroke-width:0.8; }
      .beam-edge { stroke:#D97757; fill:none; stroke-width:1.4; }
      .mono      { font-family:'JetBrains Mono', monospace; font-size:10px; fill:#1F1F1E; }
      .mut       { fill:#6B6A65; font-size:10px; font-family:Inter, sans-serif; }
      .ttl       { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag       { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Beam search (k=2) · keep the two best partial hypotheses at every step</text>

  <!-- Root -->
  <g transform="translate(480, 70)">
    <rect class="beam" x="-30" y="0" width="60" height="26"/>
    <text x="0" y="17" text-anchor="middle" class="mono" fill="#D97757">&lt;s&gt;</text>
  </g>

  <!-- Step 1: expand to 4 candidates, keep top 2 -->
  <g transform="translate(180, 140)">
    <rect class="beam" x="0" y="0" width="80" height="26"/>
    <text x="40" y="17" text-anchor="middle" class="mono" fill="#D97757">The  -0.4</text>

    <rect class="pruned" x="120" y="0" width="80" height="26"/>
    <text x="160" y="17" text-anchor="middle" class="mono">A    -1.1</text>
  </g>
  <g transform="translate(580, 140)">
    <rect class="beam" x="0" y="0" width="80" height="26"/>
    <text x="40" y="17" text-anchor="middle" class="mono" fill="#D97757">An  -0.7</text>

    <rect class="pruned" x="120" y="0" width="80" height="26"/>
    <text x="160" y="17" text-anchor="middle" class="mono">On   -2.3</text>
  </g>

  <!-- Step 2: each beam expands -->
  <g transform="translate(40, 230)">
    <rect class="beam"   x="0"   y="0" width="100" height="26"/>
    <text x="50"  y="17" text-anchor="middle" class="mono" fill="#D97757">cat   -0.9</text>

    <rect class="pruned" x="120" y="0" width="100" height="26"/>
    <text x="170" y="17" text-anchor="middle" class="mono">dog   -1.2</text>

    <rect class="pruned" x="240" y="0" width="100" height="26"/>
    <text x="290" y="17" text-anchor="middle" class="mono">old   -1.8</text>
  </g>

  <g transform="translate(470, 230)">
    <rect class="beam"   x="0"   y="0" width="100" height="26"/>
    <text x="50"  y="17" text-anchor="middle" class="mono" fill="#D97757">old   -0.8</text>

    <rect class="pruned" x="120" y="0" width="100" height="26"/>
    <text x="170" y="17" text-anchor="middle" class="mono">eng.  -1.4</text>

    <rect class="pruned" x="240" y="0" width="100" height="26"/>
    <text x="290" y="17" text-anchor="middle" class="mono">apple -2.0</text>
  </g>

  <!-- Step 3: the final expansion — candidates + one winner -->
  <g transform="translate(40, 310)">
    <rect class="winner" x="0"   y="0" width="100" height="26"/>
    <text x="50"  y="17" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">sits. -1.3</text>

    <rect class="pruned" x="120" y="0" width="100" height="26"/>
    <text x="170" y="17" text-anchor="middle" class="mono">runs. -1.6</text>

    <rect class="pruned" x="240" y="0" width="100" height="26"/>
    <text x="290" y="17" text-anchor="middle" class="mono">sat.  -1.9</text>
  </g>

  <g transform="translate(470, 310)">
    <rect class="pruned" x="0"   y="0" width="100" height="26"/>
    <text x="50"  y="17" text-anchor="middle" class="mono">man.  -1.5</text>

    <rect class="pruned" x="120" y="0" width="100" height="26"/>
    <text x="170" y="17" text-anchor="middle" class="mono">lady. -1.8</text>

    <rect class="pruned" x="240" y="0" width="100" height="26"/>
    <text x="290" y="17" text-anchor="middle" class="mono">era.  -2.4</text>
  </g>

  <!-- Edges -->
  <g class="beam-edge">
    <!-- Root to step 1 beams -->
    <line x1="470" y1="96" x2="230" y2="140"/>
    <line x1="490" y1="96" x2="610" y2="140"/>
  </g>
  <g class="ink">
    <line x1="475" y1="96" x2="350" y2="140" stroke-opacity="0.4"/>
    <line x1="485" y1="96" x2="720" y2="140" stroke-opacity="0.4"/>
  </g>

  <!-- Step 1 to step 2 (each beam expands; keep 2 overall) -->
  <g class="beam-edge">
    <line x1="220" y1="166" x2="90" y2="230"/>
    <line x1="620" y1="166" x2="520" y2="230"/>
  </g>
  <g class="ink" stroke-opacity="0.4">
    <line x1="220" y1="166" x2="170" y2="230"/>
    <line x1="220" y1="166" x2="290" y2="230"/>
    <line x1="620" y1="166" x2="590" y2="230"/>
    <line x1="620" y1="166" x2="710" y2="230"/>
  </g>

  <!-- Step 2 to step 3 -->
  <g class="beam-edge">
    <line x1="90"  y1="256" x2="90" y2="310"/>
  </g>
  <g class="ink" stroke-opacity="0.4">
    <line x1="90"  y1="256" x2="170" y2="310"/>
    <line x1="90"  y1="256" x2="290" y2="310"/>
    <line x1="520" y1="256" x2="520" y2="310"/>
    <line x1="520" y1="256" x2="590" y2="310"/>
    <line x1="520" y1="256" x2="710" y2="310"/>
  </g>

  <!-- Winner annotation -->
  <g transform="translate(40, 360)">
    <text x="90" y="0" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">winner</text>
    <text x="0" y="20" class="mut">"The cat sits."</text>
  </g>
</svg>
