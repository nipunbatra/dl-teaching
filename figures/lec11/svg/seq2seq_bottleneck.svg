<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .enc    { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.3; rx:3; ry:3; }
      .dec    { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:3; ry:3; }
      .context{ fill:#F6D4CC; stroke:#A8324B; stroke-width:1.6; rx:4; ry:4; }
      .ink    { stroke:#1F1F1E; fill:none; stroke-width:1.2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="sb-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Seq2Seq — encoder compresses everything into one vector; decoder generates from it</text>

  <!-- ENCODER: left half -->
  <g transform="translate(40, 80)">
    <text x="0" y="-8" class="tag">ENCODER · processes source sentence</text>

    <!-- tokens -->
    <text x="40" y="20" text-anchor="middle" class="mono">"The"</text>
    <text x="110" y="20" text-anchor="middle" class="mono">"animal"</text>
    <text x="180" y="20" text-anchor="middle" class="mono">"didn't"</text>
    <text x="250" y="20" text-anchor="middle" class="mono">"cross"</text>
    <text x="320" y="20" text-anchor="middle" class="mono">"because"</text>
    <text x="390" y="20" text-anchor="middle" class="mono">"it"</text>

    <!-- encoder cells -->
    <g>
      <rect class="enc" x="20"  y="40" width="40" height="40"/>
      <text x="40"  y="64" text-anchor="middle" class="mono">RNN</text>
      <rect class="enc" x="90"  y="40" width="40" height="40"/>
      <text x="110" y="64" text-anchor="middle" class="mono">RNN</text>
      <rect class="enc" x="160" y="40" width="40" height="40"/>
      <text x="180" y="64" text-anchor="middle" class="mono">RNN</text>
      <rect class="enc" x="230" y="40" width="40" height="40"/>
      <text x="250" y="64" text-anchor="middle" class="mono">RNN</text>
      <rect class="enc" x="300" y="40" width="40" height="40"/>
      <text x="320" y="64" text-anchor="middle" class="mono">RNN</text>
      <rect class="enc" x="370" y="40" width="40" height="40"/>
      <text x="390" y="64" text-anchor="middle" class="mono">RNN</text>
    </g>

    <g class="ink" marker-end="url(#sb-a)">
      <line x1="40" y1="26" x2="40" y2="40"/>
      <line x1="110" y1="26" x2="110" y2="40"/>
      <line x1="180" y1="26" x2="180" y2="40"/>
      <line x1="250" y1="26" x2="250" y2="40"/>
      <line x1="320" y1="26" x2="320" y2="40"/>
      <line x1="390" y1="26" x2="390" y2="40"/>
    </g>

    <!-- hidden state chain -->
    <g stroke="#4A6670" fill="none" stroke-width="1.6" marker-end="url(#sb-a)">
      <line x1="60"  y1="60" x2="90"  y2="60"/>
      <line x1="130" y1="60" x2="160" y2="60"/>
      <line x1="200" y1="60" x2="230" y2="60"/>
      <line x1="270" y1="60" x2="300" y2="60"/>
      <line x1="340" y1="60" x2="370" y2="60"/>
    </g>
  </g>

  <!-- CONTEXT VECTOR (middle) -->
  <g transform="translate(460, 120)">
    <rect class="context" x="0" y="0" width="60" height="60"/>
    <text x="30" y="30" text-anchor="middle" class="mono" fill="#A8324B" font-weight="600">c</text>
    <text x="30" y="44" text-anchor="middle" class="mut" fill="#A8324B" font-size="9">512-d</text>
    <text x="30" y="76" text-anchor="middle" class="mono" fill="#A8324B">context</text>
  </g>
  <line x1="450" y1="140" x2="460" y2="140" class="ink" marker-end="url(#sb-a)"/>

  <!-- Warning arrow -->
  <text x="300" y="230" text-anchor="middle" class="mono" fill="#A8324B" font-size="13" font-weight="600">
    ⚠ all source info must fit into c
  </text>

  <!-- DECODER -->
  <g transform="translate(560, 80)">
    <text x="0" y="-8" class="tag" fill="#D97757">DECODER · generates target one token at a time</text>

    <!-- decoder cells -->
    <g>
      <rect class="dec" x="20"  y="40" width="40" height="40"/>
      <text x="40"  y="64" text-anchor="middle" class="mono">RNN</text>
      <rect class="dec" x="90"  y="40" width="40" height="40"/>
      <text x="110" y="64" text-anchor="middle" class="mono">RNN</text>
      <rect class="dec" x="160" y="40" width="40" height="40"/>
      <text x="180" y="64" text-anchor="middle" class="mono">RNN</text>
      <rect class="dec" x="230" y="40" width="40" height="40"/>
      <text x="250" y="64" text-anchor="middle" class="mono">RNN</text>
      <rect class="dec" x="300" y="40" width="40" height="40"/>
      <text x="320" y="64" text-anchor="middle" class="mono">RNN</text>
    </g>

    <!-- outputs -->
    <text x="40"  y="110" text-anchor="middle" class="mono">"L'animal"</text>
    <text x="110" y="110" text-anchor="middle" class="mono">"n'a"</text>
    <text x="180" y="110" text-anchor="middle" class="mono">"pas"</text>
    <text x="250" y="110" text-anchor="middle" class="mono">"traversé"</text>
    <text x="320" y="110" text-anchor="middle" class="mono">"..."</text>

    <g class="ink" marker-end="url(#sb-a)">
      <line x1="40" y1="80" x2="40" y2="95"/>
      <line x1="110" y1="80" x2="110" y2="95"/>
      <line x1="180" y1="80" x2="180" y2="95"/>
      <line x1="250" y1="80" x2="250" y2="95"/>
      <line x1="320" y1="80" x2="320" y2="95"/>
    </g>

    <g stroke="#D97757" fill="none" stroke-width="1.6" marker-end="url(#sb-a)">
      <line x1="60"  y1="60" x2="90"  y2="60"/>
      <line x1="130" y1="60" x2="160" y2="60"/>
      <line x1="200" y1="60" x2="230" y2="60"/>
      <line x1="270" y1="60" x2="300" y2="60"/>
    </g>
  </g>

  <!-- Bottom: the bottleneck problem -->
  <g transform="translate(60, 300)">
    <rect x="0" y="0" width="840" height="80" fill="#F6D4CC" stroke="#A8324B"/>
    <text x="14" y="22" class="tag" fill="#A8324B">THE BOTTLENECK PROBLEM</text>
    <text x="14" y="42" class="mut">Every word of the source must be encoded into a <tspan class="mono" fill="#1F1F1E">512-dim vector c</tspan>.</text>
    <text x="14" y="60" class="mut">Short sentences — fine. 50-word sentences — you lose detail. 500-word paragraphs — forget it.</text>
    <text x="14" y="78" class="mut" font-style="italic" fill="#A8324B">Performance of Seq2Seq degrades roughly linearly with source length.</text>
  </g>
</svg>
