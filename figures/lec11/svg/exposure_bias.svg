<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .good   { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.3; rx:3; ry:3; }
      .bad    { fill:#F6D4CC; stroke:#A8324B; stroke-width:1.3; rx:3; ry:3; }
      .ink    { stroke:#6B6A65; fill:none; stroke-width:1; }
      .err    { stroke:#A8324B; fill:none; stroke-width:2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="eb-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#A8324B"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Exposure bias · one bad token at inference cascades into gibberish</text>

  <!-- Inference trajectories: good (top) vs cascading errors (bottom) -->
  <g transform="translate(40, 80)">
    <text x="0" y="-6" class="tag" fill="#7B9E89">GOOD ROLLOUT · every step stays on the data manifold</text>

    <rect class="good" x="0"   y="10" width="100" height="30"/>
    <text x="50" y="30" text-anchor="middle" class="mono">"The"</text>

    <rect class="good" x="120" y="10" width="100" height="30"/>
    <text x="170" y="30" text-anchor="middle" class="mono">"cat"</text>

    <rect class="good" x="240" y="10" width="100" height="30"/>
    <text x="290" y="30" text-anchor="middle" class="mono">"sat"</text>

    <rect class="good" x="360" y="10" width="100" height="30"/>
    <text x="410" y="30" text-anchor="middle" class="mono">"on"</text>

    <rect class="good" x="480" y="10" width="100" height="30"/>
    <text x="530" y="30" text-anchor="middle" class="mono">"the"</text>

    <rect class="good" x="600" y="10" width="100" height="30"/>
    <text x="650" y="30" text-anchor="middle" class="mono">"mat."</text>

    <g class="ink" marker-end="url(#eb-a)" stroke="#7B9E89">
      <line x1="100" y1="25" x2="120" y2="25"/>
      <line x1="220" y1="25" x2="240" y2="25"/>
      <line x1="340" y1="25" x2="360" y2="25"/>
      <line x1="460" y1="25" x2="480" y2="25"/>
      <line x1="580" y1="25" x2="600" y2="25"/>
    </g>
  </g>

  <!-- BAD rollout -->
  <g transform="translate(40, 180)">
    <text x="0" y="-6" class="tag" fill="#A8324B">BAD ROLLOUT · a wrong token drives the decoder off-distribution</text>

    <rect class="good" x="0"   y="10" width="100" height="30"/>
    <text x="50" y="30" text-anchor="middle" class="mono">"The"</text>

    <rect class="bad" x="120" y="10" width="100" height="30"/>
    <text x="170" y="30" text-anchor="middle" class="mono" fill="#A8324B">"cut"</text>
    <text x="170" y="-4" text-anchor="middle" class="mono" fill="#A8324B">typo!</text>

    <rect class="bad" x="240" y="10" width="100" height="30"/>
    <text x="290" y="30" text-anchor="middle" class="mono" fill="#A8324B">"was"</text>

    <rect class="bad" x="360" y="10" width="100" height="30"/>
    <text x="410" y="30" text-anchor="middle" class="mono" fill="#A8324B">"about"</text>

    <rect class="bad" x="480" y="10" width="100" height="30"/>
    <text x="530" y="30" text-anchor="middle" class="mono" fill="#A8324B">"to"</text>

    <rect class="bad" x="600" y="10" width="100" height="30"/>
    <text x="650" y="30" text-anchor="middle" class="mono" fill="#A8324B">"enter."</text>

    <g class="err" marker-end="url(#eb-a)">
      <line x1="100" y1="25" x2="120" y2="25"/>
      <line x1="220" y1="25" x2="240" y2="25"/>
      <line x1="340" y1="25" x2="360" y2="25"/>
      <line x1="460" y1="25" x2="480" y2="25"/>
      <line x1="580" y1="25" x2="600" y2="25"/>
    </g>

    <text x="350" y="75" text-anchor="middle" class="mut" fill="#A8324B">model has never seen "The cut" in training · subsequent tokens are sampled under distribution shift</text>
  </g>

  <!-- Mitigations box -->
  <g transform="translate(40, 300)">
    <rect x="0" y="0" width="880" height="60" fill="#F6F0DF" stroke="#C9A961"/>
    <text x="14" y="22" class="tag" fill="#C9A961">MITIGATIONS</text>
    <text x="14" y="42" class="mut">• Scheduled sampling · probabilistically feed model's own predictions during late training (Bengio 2015)</text>
    <text x="14" y="58" class="mut">• Large-scale pretraining · GPT-3+ rarely exhibits exposure bias because the training distribution is that broad</text>
  </g>
</svg>
