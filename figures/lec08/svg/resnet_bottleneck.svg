<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box    { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:4; ry:4; }
      .box-a  { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:4; ry:4; }
      .box-s  { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.3; rx:4; ry:4; }
      .ink    { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .acc    { stroke:#D97757; fill:none; stroke-width:2.2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:12px; fill:#1F1F1E; }
      .lbl    { fill:#1F1F1E; font-size:13px; font-weight:600; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="rb-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
    <marker id="rb-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#D97757"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">ResNet bottleneck — squeeze, convolve, expand · stack this 50× for ResNet-50</text>

  <!-- LEFT: basic residual block (from L2) -->
  <g transform="translate(80, 70)">
    <text x="140" y="-10" text-anchor="middle" class="tag">BASIC BLOCK  ·  2 × (3×3)</text>

    <rect class="box" x="100" y="0" width="80" height="30"/>
    <text x="140" y="20" text-anchor="middle" class="mono">x · 256-ch</text>

    <rect class="box-a" x="80" y="60" width="120" height="34"/>
    <text x="140" y="82" text-anchor="middle" class="mono">3×3 conv → 256</text>

    <rect class="box-a" x="80" y="110" width="120" height="34"/>
    <text x="140" y="132" text-anchor="middle" class="mono">3×3 conv → 256</text>

    <circle cx="140" cy="180" r="14" fill="#EAD3C5" stroke="#D97757"/>
    <text x="140" y="185" text-anchor="middle" class="mono">+</text>

    <rect class="box" x="100" y="220" width="80" height="30"/>
    <text x="140" y="240" text-anchor="middle" class="mono">y</text>

    <g class="ink" marker-end="url(#rb-a)">
      <line x1="140" y1="30" x2="140" y2="60"/>
      <line x1="140" y1="94" x2="140" y2="110"/>
      <line x1="140" y1="144" x2="140" y2="166"/>
      <line x1="140" y1="194" x2="140" y2="220"/>
    </g>
    <path class="acc" marker-end="url(#rb-acc)" d="M 180 15 L 230 15 L 230 180 L 156 180"/>

    <!-- param count -->
    <rect x="50" y="275" width="180" height="45" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="140" y="293" text-anchor="middle" class="mono">2 × (3·3·256·256)</text>
    <text x="140" y="310" text-anchor="middle" class="mono" fill="#A8324B" font-weight="600">≈ 1.2 M params</text>
  </g>

  <!-- MIDDLE: arrow + comparison -->
  <text x="480" y="220" text-anchor="middle" class="mono" font-size="20" fill="#D97757">→</text>
  <text x="480" y="240" text-anchor="middle" class="mut">bottleneck form</text>

  <!-- RIGHT: bottleneck block -->
  <g transform="translate(620, 70)">
    <text x="140" y="-10" text-anchor="middle" class="tag" fill="#D97757">BOTTLENECK  ·  1×1 → 3×3 → 1×1</text>

    <rect class="box" x="100" y="0" width="80" height="30"/>
    <text x="140" y="20" text-anchor="middle" class="mono">x · 256-ch</text>

    <rect class="box-s" x="80" y="60" width="120" height="34"/>
    <text x="140" y="78" text-anchor="middle" class="mono" fill="#7B9E89">1×1 → 64</text>
    <text x="140" y="91" text-anchor="middle" class="mut" font-size="9" fill="#7B9E89">(squeeze)</text>

    <rect class="box-a" x="80" y="110" width="120" height="34"/>
    <text x="140" y="128" text-anchor="middle" class="mono">3×3 → 64</text>
    <text x="140" y="141" text-anchor="middle" class="mut" font-size="9">(process)</text>

    <rect class="box-s" x="80" y="160" width="120" height="34"/>
    <text x="140" y="178" text-anchor="middle" class="mono" fill="#7B9E89">1×1 → 256</text>
    <text x="140" y="191" text-anchor="middle" class="mut" font-size="9" fill="#7B9E89">(expand)</text>

    <circle cx="140" cy="220" r="14" fill="#EAD3C5" stroke="#D97757"/>
    <text x="140" y="225" text-anchor="middle" class="mono">+</text>

    <rect class="box" x="100" y="250" width="80" height="30"/>
    <text x="140" y="270" text-anchor="middle" class="mono">y</text>

    <g class="ink" marker-end="url(#rb-a)">
      <line x1="140" y1="30"  x2="140" y2="60"/>
      <line x1="140" y1="94"  x2="140" y2="110"/>
      <line x1="140" y1="144" x2="140" y2="160"/>
      <line x1="140" y1="194" x2="140" y2="206"/>
      <line x1="140" y1="234" x2="140" y2="250"/>
    </g>
    <path class="acc" marker-end="url(#rb-acc)" d="M 180 15 L 240 15 L 240 220 L 156 220"/>

    <rect x="50" y="300" width="180" height="45" fill="#F6D4CC" stroke="#A8324B"/>
    <text x="140" y="318" text-anchor="middle" class="mono">256·64 + 3·3·64·64 + 64·256</text>
    <text x="140" y="335" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">≈ 70 K params · 17× cheaper</text>
  </g>

  <g transform="translate(60, 395)">
    <text x="420" y="0" text-anchor="middle" class="mut" font-style="italic">
      Same residual topology, <tspan fill="#D97757" font-weight="600">17× fewer parameters per block</tspan> — lets you stack 50 blocks in ResNet-50.
    </text>
  </g>
</svg>
