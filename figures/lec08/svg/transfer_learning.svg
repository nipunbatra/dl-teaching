<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box       { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:4; ry:4; }
      .box-frozen{ fill:#DCE3E6; stroke:#4A6670; stroke-width:1.4; rx:4; ry:4; }
      .box-tune  { fill:#EAD3C5; stroke:#D97757; stroke-width:1.4; rx:4; ry:4; }
      .box-new   { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.4; rx:4; ry:4; }
      .ink       { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .mono      { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut       { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl       { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag       { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="tl-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Transfer learning — three recipes, pick by how much new-domain data you have</text>

  <!-- Pretrained column (same for all three) -->
  <g transform="translate(40, 70)">
    <text x="70" y="-10" text-anchor="middle" class="tag">PRETRAINED ON IMAGENET</text>

    <rect class="box-frozen" x="20" y="0" width="100" height="30"/>
    <text x="70" y="20" text-anchor="middle" class="mono" fill="#4A6670">conv 1</text>
    <rect class="box-frozen" x="20" y="35" width="100" height="30"/>
    <text x="70" y="55" text-anchor="middle" class="mono" fill="#4A6670">conv 2</text>
    <rect class="box-frozen" x="20" y="70" width="100" height="30"/>
    <text x="70" y="90" text-anchor="middle" class="mono" fill="#4A6670">conv 3</text>
    <rect class="box-frozen" x="20" y="105" width="100" height="30"/>
    <text x="70" y="125" text-anchor="middle" class="mono" fill="#4A6670">conv 4</text>
    <rect class="box-frozen" x="20" y="140" width="100" height="30"/>
    <text x="70" y="160" text-anchor="middle" class="mono" fill="#4A6670">conv 5</text>
    <rect class="box-frozen" x="20" y="175" width="100" height="30"/>
    <text x="70" y="195" text-anchor="middle" class="mono" fill="#4A6670">FC (1000 classes)</text>
  </g>

  <text x="170" y="180" class="mono" font-size="20" fill="#D97757">→</text>

  <!-- Scenario 1: feature extractor -->
  <g transform="translate(220, 70)">
    <text x="70" y="-10" text-anchor="middle" class="tag" fill="#4A6670">1 · FEATURE EXTRACT</text>
    <text x="70" y="6" text-anchor="middle" class="mut" fill="#4A6670">(~100 examples)</text>

    <rect class="box-frozen" x="20" y="20" width="100" height="30"/>
    <text x="70" y="40" text-anchor="middle" class="mono" fill="#4A6670">conv 1 🔒</text>
    <rect class="box-frozen" x="20" y="55" width="100" height="30"/>
    <text x="70" y="75" text-anchor="middle" class="mono" fill="#4A6670">conv 2 🔒</text>
    <rect class="box-frozen" x="20" y="90" width="100" height="30"/>
    <text x="70" y="110" text-anchor="middle" class="mono" fill="#4A6670">conv 3 🔒</text>
    <rect class="box-frozen" x="20" y="125" width="100" height="30"/>
    <text x="70" y="145" text-anchor="middle" class="mono" fill="#4A6670">conv 4 🔒</text>
    <rect class="box-frozen" x="20" y="160" width="100" height="30"/>
    <text x="70" y="180" text-anchor="middle" class="mono" fill="#4A6670">conv 5 🔒</text>
    <rect class="box-new" x="20" y="195" width="100" height="30"/>
    <text x="70" y="215" text-anchor="middle" class="mono" fill="#7B9E89">new FC (N)</text>

    <text x="70" y="250" text-anchor="middle" class="mut">train only last layer</text>
    <text x="70" y="266" text-anchor="middle" class="mut">LR: 1e-3</text>
  </g>

  <!-- Scenario 2: fine-tune top layers -->
  <g transform="translate(400, 70)">
    <text x="70" y="-10" text-anchor="middle" class="tag" fill="#D97757">2 · FINE-TUNE TOP</text>
    <text x="70" y="6" text-anchor="middle" class="mut" fill="#D97757">(~1k - 10k examples)</text>

    <rect class="box-frozen" x="20" y="20" width="100" height="30"/>
    <text x="70" y="40" text-anchor="middle" class="mono" fill="#4A6670">conv 1 🔒</text>
    <rect class="box-frozen" x="20" y="55" width="100" height="30"/>
    <text x="70" y="75" text-anchor="middle" class="mono" fill="#4A6670">conv 2 🔒</text>
    <rect class="box-frozen" x="20" y="90" width="100" height="30"/>
    <text x="70" y="110" text-anchor="middle" class="mono" fill="#4A6670">conv 3 🔒</text>
    <rect class="box-tune" x="20" y="125" width="100" height="30"/>
    <text x="70" y="145" text-anchor="middle" class="mono" fill="#D97757">conv 4 ✎</text>
    <rect class="box-tune" x="20" y="160" width="100" height="30"/>
    <text x="70" y="180" text-anchor="middle" class="mono" fill="#D97757">conv 5 ✎</text>
    <rect class="box-new" x="20" y="195" width="100" height="30"/>
    <text x="70" y="215" text-anchor="middle" class="mono" fill="#7B9E89">new FC (N)</text>

    <text x="70" y="250" text-anchor="middle" class="mut">last 3 layers unfrozen</text>
    <text x="70" y="266" text-anchor="middle" class="mut">LR: 1e-4 (10× smaller)</text>
  </g>

  <!-- Scenario 3: fine-tune all -->
  <g transform="translate(580, 70)">
    <text x="70" y="-10" text-anchor="middle" class="tag" fill="#7B9E89">3 · FINE-TUNE ALL</text>
    <text x="70" y="6" text-anchor="middle" class="mut" fill="#7B9E89">(100k+ examples)</text>

    <rect class="box-tune" x="20" y="20" width="100" height="30"/>
    <text x="70" y="40" text-anchor="middle" class="mono" fill="#D97757">conv 1 ✎</text>
    <rect class="box-tune" x="20" y="55" width="100" height="30"/>
    <text x="70" y="75" text-anchor="middle" class="mono" fill="#D97757">conv 2 ✎</text>
    <rect class="box-tune" x="20" y="90" width="100" height="30"/>
    <text x="70" y="110" text-anchor="middle" class="mono" fill="#D97757">conv 3 ✎</text>
    <rect class="box-tune" x="20" y="125" width="100" height="30"/>
    <text x="70" y="145" text-anchor="middle" class="mono" fill="#D97757">conv 4 ✎</text>
    <rect class="box-tune" x="20" y="160" width="100" height="30"/>
    <text x="70" y="180" text-anchor="middle" class="mono" fill="#D97757">conv 5 ✎</text>
    <rect class="box-new" x="20" y="195" width="100" height="30"/>
    <text x="70" y="215" text-anchor="middle" class="mono" fill="#7B9E89">new FC (N)</text>

    <text x="70" y="250" text-anchor="middle" class="mut">all layers unfrozen</text>
    <text x="70" y="266" text-anchor="middle" class="mut">discriminative LR</text>
  </g>

  <!-- Legend -->
  <g transform="translate(760, 95)">
    <rect class="box-frozen" x="0" y="0" width="18" height="14"/>
    <text x="22" y="11" class="mono" font-size="10">frozen · 🔒</text>
    <rect class="box-tune"   x="0" y="20" width="18" height="14"/>
    <text x="22" y="31" class="mono" font-size="10">fine-tune · ✎</text>
    <rect class="box-new"    x="0" y="40" width="18" height="14"/>
    <text x="22" y="51" class="mono" font-size="10">new · random init</text>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 360)">
    <rect x="0" y="0" width="840" height="30" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="420" y="18" text-anchor="middle" class="mut" font-style="italic">
      Decision rule · <tspan fill="#D97757" font-weight="600">more data → unfreeze more layers</tspan>; always use a smaller LR for the pretrained layers.
    </text>
  </g>
</svg>
