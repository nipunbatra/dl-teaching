<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box    { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:4; ry:4; }
      .box-a  { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:4; ry:4; }
      .box-s  { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.3; rx:4; ry:4; }
      .channel{ fill:#F0EEE5; stroke:#1F1F1E; stroke-width:0.8; }
      .channel-a{ fill:#EAD3C5; stroke:#D97757; stroke-width:1.2; }
      .channel-s{ fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.2; }
      .ink    { stroke:#1F1F1E; fill:none; stroke-width:1.2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="ds-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Depthwise separable — split spatial mixing from channel mixing</text>

  <!-- TOP ROW: standard conv -->
  <g transform="translate(60, 70)">
    <text x="0" y="-8" class="tag">STANDARD 3×3 CONV  ·  mixes spatial AND channels together</text>

    <!-- Input: 3 channels -->
    <rect class="channel"   x="0"  y="10" width="40" height="40"/>
    <rect class="channel-a" x="10" y="20" width="40" height="40"/>
    <rect class="channel-s" x="20" y="30" width="40" height="40"/>
    <text x="30" y="94" text-anchor="middle" class="mono">input · 3 ch</text>

    <line x1="100" y1="50" x2="150" y2="50" class="ink" marker-end="url(#ds-a)"/>
    <text x="125" y="42" text-anchor="middle" class="mut">3×3 kernel</text>

    <!-- Output: 3 channels, each touches all input channels -->
    <g transform="translate(170, 20)">
      <rect x="0" y="0" width="120" height="60" fill="#F6D4CC" stroke="#A8324B" rx="4"/>
      <text x="60" y="24" text-anchor="middle" class="mono" fill="#A8324B">single op</text>
      <text x="60" y="40" text-anchor="middle" class="mono" fill="#A8324B">spatial + channels</text>
      <text x="60" y="54" text-anchor="middle" class="mut" fill="#A8324B" font-style="italic">expensive</text>
    </g>

    <line x1="300" y1="50" x2="340" y2="50" class="ink" marker-end="url(#ds-a)"/>

    <!-- Output -->
    <rect class="channel"   x="350" y="10" width="40" height="40"/>
    <rect class="channel-a" x="360" y="20" width="40" height="40"/>
    <rect class="channel-s" x="370" y="30" width="40" height="40"/>
    <text x="380" y="94" text-anchor="middle" class="mono">output · 3 ch</text>

    <!-- Param count -->
    <g transform="translate(470, 25)">
      <rect x="0" y="0" width="360" height="50" fill="#F6D4CC" stroke="#A8324B"/>
      <text x="14" y="20" class="tag" fill="#A8324B">PARAMS</text>
      <text x="14" y="40" class="mono">D_K² · C_in · C_out  =  3·3·C·C  =  9 C²</text>
    </g>
  </g>

  <!-- BOTTOM ROW: depthwise separable (TWO steps) -->
  <g transform="translate(60, 180)">
    <text x="0" y="-8" class="tag" fill="#7B9E89">DEPTHWISE SEPARABLE  ·  spatial first, THEN channels</text>

    <!-- Input -->
    <rect class="channel"   x="0"  y="10" width="40" height="40"/>
    <rect class="channel-a" x="10" y="20" width="40" height="40"/>
    <rect class="channel-s" x="20" y="30" width="40" height="40"/>
    <text x="30" y="94" text-anchor="middle" class="mono">input · 3 ch</text>

    <line x1="100" y1="50" x2="130" y2="50" class="ink" marker-end="url(#ds-a)"/>

    <!-- Step 1: depthwise -->
    <g transform="translate(140, 20)">
      <rect x="0" y="0" width="120" height="60" fill="#D8E3DE" stroke="#7B9E89" rx="4"/>
      <text x="60" y="20" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">depthwise</text>
      <text x="60" y="38" text-anchor="middle" class="mono" fill="#7B9E89">3×3 per channel</text>
      <text x="60" y="52" text-anchor="middle" class="mut" fill="#7B9E89">(no channel mix)</text>
    </g>

    <line x1="270" y1="50" x2="310" y2="50" class="ink" marker-end="url(#ds-a)"/>

    <!-- Intermediate (same 3 channels, spatial-only) -->
    <rect class="channel"   x="320" y="10" width="40" height="40"/>
    <rect class="channel-a" x="330" y="20" width="40" height="40"/>
    <rect class="channel-s" x="340" y="30" width="40" height="40"/>

    <line x1="410" y1="50" x2="440" y2="50" class="ink" marker-end="url(#ds-a)"/>

    <!-- Step 2: pointwise 1x1 -->
    <g transform="translate(450, 20)">
      <rect x="0" y="0" width="120" height="60" fill="#EAD3C5" stroke="#D97757" rx="4"/>
      <text x="60" y="20" text-anchor="middle" class="mono" fill="#D97757" font-weight="600">pointwise</text>
      <text x="60" y="38" text-anchor="middle" class="mono" fill="#D97757">1×1 conv</text>
      <text x="60" y="52" text-anchor="middle" class="mut" fill="#D97757">(mixes channels)</text>
    </g>

    <line x1="580" y1="50" x2="620" y2="50" class="ink" marker-end="url(#ds-a)"/>

    <!-- Output -->
    <rect class="channel"   x="630" y="10" width="40" height="40"/>
    <rect class="channel-a" x="640" y="20" width="40" height="40"/>
    <rect class="channel-s" x="650" y="30" width="40" height="40"/>

    <!-- Param count -->
    <g transform="translate(730, 25)">
      <rect x="0" y="0" width="180" height="50" fill="#D8E3DE" stroke="#7B9E89"/>
      <text x="14" y="20" class="tag" fill="#7B9E89">PARAMS</text>
      <text x="14" y="40" class="mono">9C  +  C²  ≈  C² (for large C)</text>
    </g>
  </g>

  <!-- Speedup table -->
  <g transform="translate(60, 300)">
    <rect x="0" y="0" width="840" height="80" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">COST COMPARISON  (C = 128)</text>
    <g class="mono" font-size="13">
      <text x="14"  y="48">Standard 3×3</text>
      <text x="200" y="48" fill="#A8324B">9 · 128² ≈ 147 K params</text>
      <text x="14"  y="68">Depthwise separable</text>
      <text x="200" y="68" fill="#7B9E89">9·128 + 128² ≈ 17 K params</text>
      <text x="460" y="48" fill="#A8324B" font-weight="600">→ 9× cheaper</text>
      <text x="460" y="68" fill="#1F1F1E">almost no accuracy loss</text>
    </g>
  </g>
</svg>
