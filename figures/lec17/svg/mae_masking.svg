<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .patch    { fill:#EAD3C5; stroke:#D97757; stroke-width:0.8; }
      .patch-m  { fill:#1F1F1E; stroke:none; }
      .enc      { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.4; rx:4; ry:4; }
      .dec      { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.4; rx:4; ry:4; }
      .ink      { stroke:#1F1F1E; fill:none; stroke-width:1.2; }
      .mono     { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut      { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl      { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag      { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="ma-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Masked Autoencoder (MAE) — mask 75% of patches, reconstruct from 25%</text>

  <!-- Original image (8x8 patch grid) -->
  <g transform="translate(40, 80)">
    <text x="60" y="-10" text-anchor="middle" class="tag">ORIGINAL · 8×8 patches</text>
    <g>
      <!-- generate 8x8 grid, all full -->
      <rect class="patch" x="0"   y="0"   width="15" height="15"/>
      <rect class="patch" x="15"  y="0"   width="15" height="15"/>
      <rect class="patch" x="30"  y="0"   width="15" height="15"/>
      <rect class="patch" x="45"  y="0"   width="15" height="15"/>
      <rect class="patch" x="60"  y="0"   width="15" height="15"/>
      <rect class="patch" x="75"  y="0"   width="15" height="15"/>
      <rect class="patch" x="90"  y="0"   width="15" height="15"/>
      <rect class="patch" x="105" y="0"   width="15" height="15"/>
      <!-- 7 more rows -->
      <g transform="translate(0, 15)">
        <rect class="patch" x="0"   y="0" width="15" height="15"/><rect class="patch" x="15" y="0" width="15" height="15"/><rect class="patch" x="30" y="0" width="15" height="15"/><rect class="patch" x="45" y="0" width="15" height="15"/><rect class="patch" x="60" y="0" width="15" height="15"/><rect class="patch" x="75" y="0" width="15" height="15"/><rect class="patch" x="90" y="0" width="15" height="15"/><rect class="patch" x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 30)">
        <rect class="patch" x="0"   y="0" width="15" height="15"/><rect class="patch" x="15" y="0" width="15" height="15"/><rect class="patch" x="30" y="0" width="15" height="15"/><rect class="patch" x="45" y="0" width="15" height="15"/><rect class="patch" x="60" y="0" width="15" height="15"/><rect class="patch" x="75" y="0" width="15" height="15"/><rect class="patch" x="90" y="0" width="15" height="15"/><rect class="patch" x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 45)">
        <rect class="patch" x="0"   y="0" width="15" height="15"/><rect class="patch" x="15" y="0" width="15" height="15"/><rect class="patch" x="30" y="0" width="15" height="15"/><rect class="patch" x="45" y="0" width="15" height="15"/><rect class="patch" x="60" y="0" width="15" height="15"/><rect class="patch" x="75" y="0" width="15" height="15"/><rect class="patch" x="90" y="0" width="15" height="15"/><rect class="patch" x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 60)">
        <rect class="patch" x="0"   y="0" width="15" height="15"/><rect class="patch" x="15" y="0" width="15" height="15"/><rect class="patch" x="30" y="0" width="15" height="15"/><rect class="patch" x="45" y="0" width="15" height="15"/><rect class="patch" x="60" y="0" width="15" height="15"/><rect class="patch" x="75" y="0" width="15" height="15"/><rect class="patch" x="90" y="0" width="15" height="15"/><rect class="patch" x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 75)">
        <rect class="patch" x="0"   y="0" width="15" height="15"/><rect class="patch" x="15" y="0" width="15" height="15"/><rect class="patch" x="30" y="0" width="15" height="15"/><rect class="patch" x="45" y="0" width="15" height="15"/><rect class="patch" x="60" y="0" width="15" height="15"/><rect class="patch" x="75" y="0" width="15" height="15"/><rect class="patch" x="90" y="0" width="15" height="15"/><rect class="patch" x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 90)">
        <rect class="patch" x="0"   y="0" width="15" height="15"/><rect class="patch" x="15" y="0" width="15" height="15"/><rect class="patch" x="30" y="0" width="15" height="15"/><rect class="patch" x="45" y="0" width="15" height="15"/><rect class="patch" x="60" y="0" width="15" height="15"/><rect class="patch" x="75" y="0" width="15" height="15"/><rect class="patch" x="90" y="0" width="15" height="15"/><rect class="patch" x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 105)">
        <rect class="patch" x="0"   y="0" width="15" height="15"/><rect class="patch" x="15" y="0" width="15" height="15"/><rect class="patch" x="30" y="0" width="15" height="15"/><rect class="patch" x="45" y="0" width="15" height="15"/><rect class="patch" x="60" y="0" width="15" height="15"/><rect class="patch" x="75" y="0" width="15" height="15"/><rect class="patch" x="90" y="0" width="15" height="15"/><rect class="patch" x="105" y="0" width="15" height="15"/>
      </g>
    </g>
  </g>

  <!-- Masked (75% black) -->
  <g transform="translate(200, 80)">
    <text x="60" y="-10" text-anchor="middle" class="tag" fill="#D97757">MASK 75% RANDOMLY</text>
    <g>
      <!-- Same 8x8 grid, ~75% masked -->
      <g transform="translate(0, 0)">
        <rect class="patch-m" x="0"   y="0" width="15" height="15"/>
        <rect class="patch"   x="15"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="30"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="45"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="60"  y="0" width="15" height="15"/>
        <rect class="patch"   x="75"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="90"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 15)">
        <rect class="patch-m" x="0"   y="0" width="15" height="15"/>
        <rect class="patch-m" x="15"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="30"  y="0" width="15" height="15"/>
        <rect class="patch"   x="45"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="60"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="75"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="90"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 30)">
        <rect class="patch-m" x="0"   y="0" width="15" height="15"/>
        <rect class="patch-m" x="15"  y="0" width="15" height="15"/>
        <rect class="patch"   x="30"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="45"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="60"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="75"  y="0" width="15" height="15"/>
        <rect class="patch"   x="90"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 45)">
        <rect class="patch-m" x="0"   y="0" width="15" height="15"/>
        <rect class="patch-m" x="15"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="30"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="45"  y="0" width="15" height="15"/>
        <rect class="patch"   x="60"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="75"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="90"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 60)">
        <rect class="patch"   x="0"   y="0" width="15" height="15"/>
        <rect class="patch-m" x="15"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="30"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="45"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="60"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="75"  y="0" width="15" height="15"/>
        <rect class="patch"   x="90"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 75)">
        <rect class="patch-m" x="0"   y="0" width="15" height="15"/>
        <rect class="patch-m" x="15"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="30"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="45"  y="0" width="15" height="15"/>
        <rect class="patch"   x="60"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="75"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="90"  y="0" width="15" height="15"/>
        <rect class="patch"   x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 90)">
        <rect class="patch"   x="0"   y="0" width="15" height="15"/>
        <rect class="patch-m" x="15"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="30"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="45"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="60"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="75"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="90"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="105" y="0" width="15" height="15"/>
      </g>
      <g transform="translate(0, 105)">
        <rect class="patch-m" x="0"   y="0" width="15" height="15"/>
        <rect class="patch-m" x="15"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="30"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="45"  y="0" width="15" height="15"/>
        <rect class="patch"   x="60"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="75"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="90"  y="0" width="15" height="15"/>
        <rect class="patch-m" x="105" y="0" width="15" height="15"/>
      </g>
    </g>
  </g>

  <!-- Encoder: sees ONLY visible patches -->
  <g transform="translate(380, 120)">
    <rect class="enc" x="0" y="0" width="130" height="60"/>
    <text x="65" y="22" text-anchor="middle" class="mono" fill="#4A6670" font-weight="600">Encoder (ViT)</text>
    <text x="65" y="40" text-anchor="middle" class="mut" fill="#4A6670">only 25% visible</text>
    <text x="65" y="56" text-anchor="middle" class="mut" fill="#4A6670">(fast!)</text>
  </g>

  <!-- Decoder: sees encoded + mask tokens -->
  <g transform="translate(560, 120)">
    <rect class="dec" x="0" y="0" width="130" height="60"/>
    <text x="65" y="22" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">Decoder</text>
    <text x="65" y="40" text-anchor="middle" class="mut" fill="#7B9E89">lightweight</text>
    <text x="65" y="56" text-anchor="middle" class="mut" fill="#7B9E89">+ mask tokens</text>
  </g>

  <!-- Reconstruction -->
  <g transform="translate(760, 80)">
    <text x="60" y="-10" text-anchor="middle" class="tag" fill="#7B9E89">RECONSTRUCTION</text>
    <g opacity="0.85">
      <rect class="patch" x="0" y="0" width="120" height="120" fill="#EAD3C5" opacity="0.4"/>
      <ellipse cx="60" cy="60" rx="36" ry="24" fill="#D97757" opacity="0.6"/>
      <circle cx="50" cy="55" r="3" fill="#1F1F1E"/>
      <circle cx="70" cy="55" r="3" fill="#1F1F1E"/>
    </g>
    <text x="60" y="138" text-anchor="middle" class="mono">ŷ</text>
    <text x="60" y="155" text-anchor="middle" class="mut">MSE loss on masked patches only</text>
  </g>

  <!-- Arrows -->
  <g class="ink" marker-end="url(#ma-a)">
    <line x1="330" y1="150" x2="380" y2="150"/>
    <line x1="510" y1="150" x2="560" y2="150"/>
    <line x1="690" y1="150" x2="760" y2="150"/>
  </g>

  <!-- Key insight -->
  <g transform="translate(60, 290)">
    <rect x="0" y="0" width="840" height="60" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">KEY INSIGHT</text>
    <text x="14" y="42" class="mut">
      Masking 75% (aggressive!) forces the encoder to learn <tspan fill="#1F1F1E" font-weight="600">semantic</tspan> features, not pixel-level cues.
    </text>
    <text x="14" y="58" class="mut" font-style="italic">
      He et al. 2021 · ViT-Huge MAE pretraining matches supervised ImageNet on downstream tasks. Used in DINOv2, video understanding.
    </text>
  </g>
</svg>
