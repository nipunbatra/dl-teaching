<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box    { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:4; ry:4; }
      .enc    { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.4; rx:4; ry:4; }
      .proj   { fill:#EAD3C5; stroke:#D97757; stroke-width:1.4; rx:4; ry:4; }
      .pos    { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.4; rx:20; ry:20; }
      .neg    { fill:#F6D4CC; stroke:#A8324B; stroke-width:1.2; rx:20; ry:20; }
      .aug    { fill:#F6F0DF; stroke:#C9A961; stroke-width:1.3; rx:4; ry:4; }
      .ink    { stroke:#1F1F1E; fill:none; stroke-width:1.2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="sc-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">SimCLR — augment one image twice, pull representations together, push others apart</text>

  <!-- One image -->
  <g transform="translate(40, 80)">
    <rect class="box" x="0" y="20" width="80" height="80"/>
    <g transform="translate(10, 30)">
      <ellipse cx="30" cy="25" rx="22" ry="16" fill="#D97757" opacity="0.7"/>
      <circle cx="22" cy="22" r="2.5" fill="#1F1F1E"/>
      <circle cx="38" cy="22" r="2.5" fill="#1F1F1E"/>
      <ellipse cx="30" cy="55" rx="18" ry="8" fill="#D97757" opacity="0.6"/>
    </g>
    <text x="40" y="120" text-anchor="middle" class="mono">image x</text>
  </g>

  <!-- Augmentation fork -->
  <g transform="translate(170, 50)">
    <rect class="aug" x="0" y="0" width="90" height="36"/>
    <text x="45" y="22" text-anchor="middle" class="mono" fill="#C9A961">augment</text>
    <rect class="aug" x="0" y="100" width="90" height="36"/>
    <text x="45" y="122" text-anchor="middle" class="mono" fill="#C9A961">augment</text>
  </g>
  <g class="ink" marker-end="url(#sc-a)">
    <line x1="120" y1="120" x2="170" y2="68"/>
    <line x1="120" y1="140" x2="170" y2="118"/>
  </g>

  <!-- Two views -->
  <g transform="translate(290, 40)">
    <rect class="box" x="0" y="0" width="60" height="60"/>
    <g transform="translate(5, 5)">
      <ellipse cx="25" cy="20" rx="18" ry="12" fill="#D97757" opacity="0.7"/>
      <circle cx="18" cy="18" r="2" fill="#1F1F1E"/>
      <circle cx="32" cy="18" r="2" fill="#1F1F1E"/>
    </g>
    <text x="30" y="78" text-anchor="middle" class="mono">x̃₁</text>
  </g>
  <g transform="translate(290, 130)">
    <rect class="box" x="0" y="0" width="60" height="60"/>
    <g transform="translate(0, -5) rotate(-15, 30, 30)">
      <ellipse cx="25" cy="30" rx="18" ry="12" fill="#7B9E89" opacity="0.7"/>
      <circle cx="18" cy="28" r="2" fill="#1F1F1E"/>
      <circle cx="32" cy="28" r="2" fill="#1F1F1E"/>
    </g>
    <text x="30" y="168" text-anchor="middle" class="mono">x̃₂</text>
  </g>

  <!-- Shared encoder -->
  <g transform="translate(400, 40)">
    <rect class="enc" x="0" y="0" width="80" height="60"/>
    <text x="40" y="28" text-anchor="middle" class="mono" fill="#4A6670">Encoder</text>
    <text x="40" y="44" text-anchor="middle" class="mut" fill="#4A6670">ResNet</text>
    <text x="40" y="58" text-anchor="middle" class="mut" fill="#4A6670" font-size="9">(shared)</text>
  </g>
  <g transform="translate(400, 130)">
    <rect class="enc" x="0" y="0" width="80" height="60"/>
    <text x="40" y="28" text-anchor="middle" class="mono" fill="#4A6670">Encoder</text>
    <text x="40" y="44" text-anchor="middle" class="mut" fill="#4A6670">ResNet</text>
    <text x="40" y="58" text-anchor="middle" class="mut" fill="#4A6670" font-size="9">(same weights!)</text>
  </g>

  <!-- Projection heads -->
  <g transform="translate(520, 50)">
    <rect class="proj" x="0" y="0" width="80" height="40"/>
    <text x="40" y="24" text-anchor="middle" class="mono" fill="#D97757">Projector g</text>
  </g>
  <g transform="translate(520, 140)">
    <rect class="proj" x="0" y="0" width="80" height="40"/>
    <text x="40" y="24" text-anchor="middle" class="mono" fill="#D97757">Projector g</text>
  </g>

  <!-- Embeddings -->
  <circle class="pos" cx="660" cy="70" r="22"/>
  <text x="660" y="74" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">z₁</text>
  <circle class="pos" cx="660" cy="160" r="22"/>
  <text x="660" y="164" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">z₂</text>

  <!-- Arrows -->
  <g class="ink" marker-end="url(#sc-a)">
    <line x1="350" y1="70"  x2="400" y2="70"/>
    <line x1="350" y1="160" x2="400" y2="160"/>
    <line x1="480" y1="70"  x2="520" y2="70"/>
    <line x1="480" y1="160" x2="520" y2="160"/>
    <line x1="600" y1="70"  x2="638" y2="70"/>
    <line x1="600" y1="160" x2="638" y2="160"/>
  </g>

  <!-- Positive pair bracket -->
  <g>
    <path d="M 700 70 Q 740 115 700 160" fill="none" stroke="#7B9E89" stroke-width="2"/>
    <text x="755" y="120" class="mono" fill="#7B9E89" font-weight="600">pull together</text>
  </g>

  <!-- Negatives (other images in batch) -->
  <g transform="translate(820, 40)">
    <text x="0" y="-6" class="tag" fill="#A8324B">NEGATIVES</text>
    <circle class="neg" cx="14" cy="10" r="12"/>
    <text x="14" y="14" text-anchor="middle" class="mono" font-size="9" fill="#A8324B">z'</text>
    <circle class="neg" cx="14" cy="40" r="12"/>
    <text x="14" y="44" text-anchor="middle" class="mono" font-size="9" fill="#A8324B">z'</text>
    <circle class="neg" cx="14" cy="70" r="12"/>
    <text x="14" y="74" text-anchor="middle" class="mono" font-size="9" fill="#A8324B">z'</text>
    <text x="14" y="100" class="mut" fill="#A8324B">2N−2</text>
    <text x="14" y="114" class="mut" fill="#A8324B">other</text>
    <text x="14" y="128" class="mut" fill="#A8324B">images</text>
  </g>

  <!-- Push-apart arrow -->
  <path d="M 690 90 Q 780 60 820 50" stroke="#A8324B" stroke-width="1.5" fill="none" stroke-dasharray="4 2"/>
  <text x="770" y="80" class="mono" fill="#A8324B">push apart</text>

  <!-- NT-Xent formula -->
  <g transform="translate(40, 290)">
    <rect x="0" y="0" width="880" height="110" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">NT-XENT LOSS (normalized temperature-scaled cross-entropy)</text>
    <text x="440" y="56" text-anchor="middle" class="mono" font-size="14">
      ℒ_{i,j} = −log  exp(sim(z_i, z_j) / τ)  /  Σ_{k≠i} exp(sim(z_i, z_k) / τ)
    </text>
    <text x="440" y="80" text-anchor="middle" class="mut" font-style="italic">
      numerator · the ONE positive pair  ·  denominator · all 2N−1 other pairs
    </text>
    <text x="440" y="98" text-anchor="middle" class="mut" font-style="italic">
      sim(a, b) = a·b / (∥a∥ ∥b∥)  ·  τ ≈ 0.1  ·  larger batch → more negatives → better
    </text>
  </g>
</svg>
