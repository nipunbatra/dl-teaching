<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .cell   { fill:#F0EEE5; stroke:#6B6A65; stroke-width:0.5; }
      .cell-a { fill:#EAD3C5; stroke:#D97757; stroke-width:1; }
      .cell-b { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1; }
      .mask   { fill:#1F1F1E; stroke:none; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Attention masks · BERT sees everything, GPT sees only the past</text>

  <!-- BERT (encoder-only, MLM) -->
  <g transform="translate(80, 80)">
    <text x="140" y="-10" text-anchor="middle" class="tag" fill="#7B9E89">BERT · bidirectional · MLM</text>
    <rect x="0" y="0" width="280" height="250" fill="#F0EEE5" stroke="#C9C4B5"/>

    <!-- 8x8 grid all filled (no mask) -->
    <g transform="translate(40, 20)">
      <!-- Column headers (source positions) -->
      <text x="15"  y="-6" text-anchor="middle" class="mono" font-size="9">t₁</text>
      <text x="40"  y="-6" text-anchor="middle" class="mono" font-size="9">t₂</text>
      <text x="65"  y="-6" text-anchor="middle" class="mono" font-size="9">t₃</text>
      <text x="90"  y="-6" text-anchor="middle" class="mono" font-size="9">t₄</text>
      <text x="115" y="-6" text-anchor="middle" class="mono" font-size="9">t₅</text>
      <text x="140" y="-6" text-anchor="middle" class="mono" font-size="9">t₆</text>
      <text x="165" y="-6" text-anchor="middle" class="mono" font-size="9">t₇</text>
      <text x="190" y="-6" text-anchor="middle" class="mono" font-size="9">t₈</text>

      <!-- 8x8 grid -->
      <g>
        <!-- Row y₁ -->
        <rect class="cell-b" x="0"   y="0"   width="25" height="25"/>
        <rect class="cell-b" x="25"  y="0"   width="25" height="25"/>
        <rect class="cell-b" x="50"  y="0"   width="25" height="25"/>
        <rect class="cell-b" x="75"  y="0"   width="25" height="25"/>
        <rect class="cell-b" x="100" y="0"   width="25" height="25"/>
        <rect class="cell-b" x="125" y="0"   width="25" height="25"/>
        <rect class="cell-b" x="150" y="0"   width="25" height="25"/>
        <rect class="cell-b" x="175" y="0"   width="25" height="25"/>
        <text x="-15" y="18" text-anchor="end" class="mono" font-size="9">y₁</text>
        <!-- Row y₂..y₈ -->
        <rect class="cell-b" x="0"   y="25"  width="200" height="25"/>
        <text x="-15" y="43" text-anchor="end" class="mono" font-size="9">y₂</text>
        <rect class="cell-b" x="0"   y="50"  width="200" height="25"/>
        <text x="-15" y="68" text-anchor="end" class="mono" font-size="9">y₃</text>
        <rect class="cell-b" x="0"   y="75"  width="200" height="25"/>
        <text x="-15" y="93" text-anchor="end" class="mono" font-size="9">y₄</text>
        <rect class="cell-b" x="0"   y="100" width="200" height="25"/>
        <text x="-15" y="118" text-anchor="end" class="mono" font-size="9">y₅</text>
        <rect class="cell-b" x="0"   y="125" width="200" height="25"/>
        <text x="-15" y="143" text-anchor="end" class="mono" font-size="9">y₆</text>
        <rect class="cell-b" x="0"   y="150" width="200" height="25"/>
        <text x="-15" y="168" text-anchor="end" class="mono" font-size="9">y₇</text>
        <rect class="cell-b" x="0"   y="175" width="200" height="25"/>
        <text x="-15" y="193" text-anchor="end" class="mono" font-size="9">y₈</text>

        <!-- Grid lines inside -->
        <g stroke="#6B6A65" stroke-width="0.5" fill="none">
          <line x1="0" y1="0" x2="200" y2="0"/>
          <line x1="0" y1="25" x2="200" y2="25"/>
          <line x1="0" y1="50" x2="200" y2="50"/>
          <line x1="0" y1="75" x2="200" y2="75"/>
          <line x1="0" y1="100" x2="200" y2="100"/>
          <line x1="0" y1="125" x2="200" y2="125"/>
          <line x1="0" y1="150" x2="200" y2="150"/>
          <line x1="0" y1="175" x2="200" y2="175"/>
          <line x1="0" y1="200" x2="200" y2="200"/>
          <line x1="0" y1="0" x2="0" y2="200"/>
          <line x1="25" y1="0" x2="25" y2="200"/>
          <line x1="50" y1="0" x2="50" y2="200"/>
          <line x1="75" y1="0" x2="75" y2="200"/>
          <line x1="100" y1="0" x2="100" y2="200"/>
          <line x1="125" y1="0" x2="125" y2="200"/>
          <line x1="150" y1="0" x2="150" y2="200"/>
          <line x1="175" y1="0" x2="175" y2="200"/>
          <line x1="200" y1="0" x2="200" y2="200"/>
        </g>
      </g>
    </g>

    <text x="140" y="240" text-anchor="middle" class="mut">every token attends to every other</text>
  </g>

  <!-- GPT (decoder-only, causal) -->
  <g transform="translate(520, 80)">
    <text x="140" y="-10" text-anchor="middle" class="tag" fill="#D97757">GPT · causal · CLM</text>
    <rect x="0" y="0" width="280" height="250" fill="#F0EEE5" stroke="#C9C4B5"/>

    <g transform="translate(40, 20)">
      <!-- Column headers -->
      <text x="15"  y="-6" text-anchor="middle" class="mono" font-size="9">t₁</text>
      <text x="40"  y="-6" text-anchor="middle" class="mono" font-size="9">t₂</text>
      <text x="65"  y="-6" text-anchor="middle" class="mono" font-size="9">t₃</text>
      <text x="90"  y="-6" text-anchor="middle" class="mono" font-size="9">t₄</text>
      <text x="115" y="-6" text-anchor="middle" class="mono" font-size="9">t₅</text>
      <text x="140" y="-6" text-anchor="middle" class="mono" font-size="9">t₆</text>
      <text x="165" y="-6" text-anchor="middle" class="mono" font-size="9">t₇</text>
      <text x="190" y="-6" text-anchor="middle" class="mono" font-size="9">t₈</text>

      <!-- Row by row: lower triangle filled, upper blocked -->
      <!-- Row y₁ -->
      <rect class="cell-a" x="0" y="0" width="25" height="25"/>
      <rect class="mask"   x="25" y="0" width="175" height="25"/>
      <text x="-15" y="18" text-anchor="end" class="mono" font-size="9">y₁</text>
      <!-- Row y₂ -->
      <rect class="cell-a" x="0" y="25" width="50" height="25"/>
      <rect class="mask"   x="50" y="25" width="150" height="25"/>
      <text x="-15" y="43" text-anchor="end" class="mono" font-size="9">y₂</text>
      <!-- Row y₃ -->
      <rect class="cell-a" x="0" y="50" width="75" height="25"/>
      <rect class="mask"   x="75" y="50" width="125" height="25"/>
      <text x="-15" y="68" text-anchor="end" class="mono" font-size="9">y₃</text>
      <!-- Row y₄ -->
      <rect class="cell-a" x="0" y="75" width="100" height="25"/>
      <rect class="mask"   x="100" y="75" width="100" height="25"/>
      <text x="-15" y="93" text-anchor="end" class="mono" font-size="9">y₄</text>
      <!-- Row y₅ -->
      <rect class="cell-a" x="0" y="100" width="125" height="25"/>
      <rect class="mask"   x="125" y="100" width="75" height="25"/>
      <text x="-15" y="118" text-anchor="end" class="mono" font-size="9">y₅</text>
      <!-- Row y₆ -->
      <rect class="cell-a" x="0" y="125" width="150" height="25"/>
      <rect class="mask"   x="150" y="125" width="50" height="25"/>
      <text x="-15" y="143" text-anchor="end" class="mono" font-size="9">y₆</text>
      <!-- Row y₇ -->
      <rect class="cell-a" x="0" y="150" width="175" height="25"/>
      <rect class="mask"   x="175" y="150" width="25" height="25"/>
      <text x="-15" y="168" text-anchor="end" class="mono" font-size="9">y₇</text>
      <!-- Row y₈ -->
      <rect class="cell-a" x="0" y="175" width="200" height="25"/>
      <text x="-15" y="193" text-anchor="end" class="mono" font-size="9">y₈</text>

      <!-- Grid lines -->
      <g stroke="#6B6A65" stroke-width="0.5" fill="none">
        <line x1="0" y1="0" x2="200" y2="0"/>
        <line x1="0" y1="25" x2="200" y2="25"/>
        <line x1="0" y1="50" x2="200" y2="50"/>
        <line x1="0" y1="75" x2="200" y2="75"/>
        <line x1="0" y1="100" x2="200" y2="100"/>
        <line x1="0" y1="125" x2="200" y2="125"/>
        <line x1="0" y1="150" x2="200" y2="150"/>
        <line x1="0" y1="175" x2="200" y2="175"/>
        <line x1="0" y1="200" x2="200" y2="200"/>
        <line x1="0" y1="0" x2="0" y2="200"/>
        <line x1="25" y1="0" x2="25" y2="200"/>
        <line x1="50" y1="0" x2="50" y2="200"/>
        <line x1="75" y1="0" x2="75" y2="200"/>
        <line x1="100" y1="0" x2="100" y2="200"/>
        <line x1="125" y1="0" x2="125" y2="200"/>
        <line x1="150" y1="0" x2="150" y2="200"/>
        <line x1="175" y1="0" x2="175" y2="200"/>
        <line x1="200" y1="0" x2="200" y2="200"/>
      </g>
    </g>

    <text x="140" y="240" text-anchor="middle" class="mut">token t only attends to t and before</text>
  </g>

  <!-- Bottom -->
  <g transform="translate(60, 360)">
    <text x="420" y="0" text-anchor="middle" class="mut" font-style="italic">
      <tspan fill="#7B9E89" font-weight="600">BERT</tspan> predicts masked-out tokens with full context (MLM).
      <tspan fill="#D97757" font-weight="600">GPT</tspan> predicts the next token given only the past (CLM).
      Same Transformer; different masks → different objectives.
    </text>
  </g>
</svg>
