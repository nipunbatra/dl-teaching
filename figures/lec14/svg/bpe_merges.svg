<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .tok    { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.1; rx:2; ry:2; }
      .merged { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:3; ry:3; }
      .final  { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.4; rx:3; ry:3; }
      .ink    { stroke:#6B6A65; fill:none; stroke-width:0.9; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">BPE · greedy merges of the most frequent adjacent pair</text>

  <!-- Step 0: characters -->
  <g transform="translate(40, 60)">
    <text x="0" y="-6" class="tag">STEP 0 · start from characters</text>
    <text x="0" y="24" class="mono">corpus · "lowered loudly"</text>
    <g transform="translate(0, 40)">
      <rect class="tok" x="0"   y="0" width="20" height="24"/>
      <text x="10"  y="16" text-anchor="middle" class="mono">l</text>
      <rect class="tok" x="24"  y="0" width="20" height="24"/>
      <text x="34"  y="16" text-anchor="middle" class="mono">o</text>
      <rect class="tok" x="48"  y="0" width="20" height="24"/>
      <text x="58"  y="16" text-anchor="middle" class="mono">w</text>
      <rect class="tok" x="72"  y="0" width="20" height="24"/>
      <text x="82"  y="16" text-anchor="middle" class="mono">e</text>
      <rect class="tok" x="96"  y="0" width="20" height="24"/>
      <text x="106" y="16" text-anchor="middle" class="mono">r</text>
      <rect class="tok" x="120" y="0" width="20" height="24"/>
      <text x="130" y="16" text-anchor="middle" class="mono">e</text>
      <rect class="tok" x="144" y="0" width="20" height="24"/>
      <text x="154" y="16" text-anchor="middle" class="mono">d</text>
      <rect class="tok" x="170" y="0" width="20" height="24"/>
      <text x="180" y="16" text-anchor="middle" class="mono" fill="#6B6A65">·</text>
      <rect class="tok" x="196" y="0" width="20" height="24"/>
      <text x="206" y="16" text-anchor="middle" class="mono">l</text>
      <rect class="tok" x="220" y="0" width="20" height="24"/>
      <text x="230" y="16" text-anchor="middle" class="mono">o</text>
      <rect class="tok" x="244" y="0" width="20" height="24"/>
      <text x="254" y="16" text-anchor="middle" class="mono">u</text>
      <rect class="tok" x="268" y="0" width="20" height="24"/>
      <text x="278" y="16" text-anchor="middle" class="mono">d</text>
      <rect class="tok" x="292" y="0" width="20" height="24"/>
      <text x="302" y="16" text-anchor="middle" class="mono">l</text>
      <rect class="tok" x="316" y="0" width="20" height="24"/>
      <text x="326" y="16" text-anchor="middle" class="mono">y</text>
    </g>
  </g>

  <!-- Step 1: merge 'l o' (most common adjacent) -->
  <g transform="translate(40, 140)">
    <text x="0" y="-6" class="tag" fill="#D97757">STEP 1 · most frequent pair = (l, o) · merge → "lo"</text>
    <g transform="translate(0, 10)">
      <rect class="merged" x="0"   y="0" width="38" height="24"/>
      <text x="19"  y="16" text-anchor="middle" class="mono" fill="#D97757">lo</text>
      <rect class="tok" x="42"  y="0" width="20" height="24"/>
      <text x="52"  y="16" text-anchor="middle" class="mono">w</text>
      <rect class="tok" x="66"  y="0" width="20" height="24"/>
      <text x="76"  y="16" text-anchor="middle" class="mono">e</text>
      <rect class="tok" x="90"  y="0" width="20" height="24"/>
      <text x="100" y="16" text-anchor="middle" class="mono">r</text>
      <rect class="tok" x="114" y="0" width="20" height="24"/>
      <text x="124" y="16" text-anchor="middle" class="mono">e</text>
      <rect class="tok" x="138" y="0" width="20" height="24"/>
      <text x="148" y="16" text-anchor="middle" class="mono">d</text>
      <rect class="tok" x="164" y="0" width="20" height="24"/>
      <text x="174" y="16" text-anchor="middle" class="mono" fill="#6B6A65">·</text>
      <rect class="merged" x="190" y="0" width="38" height="24"/>
      <text x="209" y="16" text-anchor="middle" class="mono" fill="#D97757">lo</text>
      <rect class="tok" x="232" y="0" width="20" height="24"/>
      <text x="242" y="16" text-anchor="middle" class="mono">u</text>
      <rect class="tok" x="256" y="0" width="20" height="24"/>
      <text x="266" y="16" text-anchor="middle" class="mono">d</text>
      <rect class="tok" x="280" y="0" width="20" height="24"/>
      <text x="290" y="16" text-anchor="middle" class="mono">l</text>
      <rect class="tok" x="304" y="0" width="20" height="24"/>
      <text x="314" y="16" text-anchor="middle" class="mono">y</text>
    </g>
  </g>

  <!-- Step 2: merge 'l y' -->
  <g transform="translate(40, 210)">
    <text x="0" y="-6" class="tag" fill="#D97757">STEP 2 · next most frequent = (l, y) · merge → "ly"</text>
    <g transform="translate(0, 10)">
      <rect class="merged" x="0"   y="0" width="38" height="24"/>
      <text x="19"  y="16" text-anchor="middle" class="mono" fill="#D97757">lo</text>
      <rect class="tok" x="42"  y="0" width="20" height="24"/>
      <text x="52"  y="16" text-anchor="middle" class="mono">w</text>
      <rect class="tok" x="66"  y="0" width="20" height="24"/>
      <text x="76"  y="16" text-anchor="middle" class="mono">e</text>
      <rect class="tok" x="90"  y="0" width="20" height="24"/>
      <text x="100" y="16" text-anchor="middle" class="mono">r</text>
      <rect class="tok" x="114" y="0" width="20" height="24"/>
      <text x="124" y="16" text-anchor="middle" class="mono">e</text>
      <rect class="tok" x="138" y="0" width="20" height="24"/>
      <text x="148" y="16" text-anchor="middle" class="mono">d</text>
      <rect class="tok" x="164" y="0" width="20" height="24"/>
      <text x="174" y="16" text-anchor="middle" class="mono" fill="#6B6A65">·</text>
      <rect class="merged" x="190" y="0" width="38" height="24"/>
      <text x="209" y="16" text-anchor="middle" class="mono" fill="#D97757">lo</text>
      <rect class="tok" x="232" y="0" width="20" height="24"/>
      <text x="242" y="16" text-anchor="middle" class="mono">u</text>
      <rect class="tok" x="256" y="0" width="20" height="24"/>
      <text x="266" y="16" text-anchor="middle" class="mono">d</text>
      <rect class="merged" x="280" y="0" width="38" height="24"/>
      <text x="299" y="16" text-anchor="middle" class="mono" fill="#D97757">ly</text>
    </g>
  </g>

  <!-- Step 3: merge 'e d' (frequent morphological suffix) -->
  <g transform="translate(40, 280)">
    <text x="0" y="-6" class="tag" fill="#D97757">STEP 3 · next = (e, d) · merge → "ed" · picks up past-tense suffix</text>
    <g transform="translate(0, 10)">
      <rect class="merged" x="0"   y="0" width="38" height="24"/>
      <text x="19"  y="16" text-anchor="middle" class="mono" fill="#D97757">lo</text>
      <rect class="tok" x="42"  y="0" width="20" height="24"/>
      <text x="52"  y="16" text-anchor="middle" class="mono">w</text>
      <rect class="tok" x="66"  y="0" width="20" height="24"/>
      <text x="76"  y="16" text-anchor="middle" class="mono">e</text>
      <rect class="tok" x="90"  y="0" width="20" height="24"/>
      <text x="100" y="16" text-anchor="middle" class="mono">r</text>
      <rect class="merged" x="114" y="0" width="38" height="24"/>
      <text x="133" y="16" text-anchor="middle" class="mono" fill="#D97757">ed</text>
      <rect class="tok" x="158" y="0" width="20" height="24"/>
      <text x="168" y="16" text-anchor="middle" class="mono" fill="#6B6A65">·</text>
      <rect class="merged" x="184" y="0" width="38" height="24"/>
      <text x="203" y="16" text-anchor="middle" class="mono" fill="#D97757">lo</text>
      <rect class="tok" x="226" y="0" width="20" height="24"/>
      <text x="236" y="16" text-anchor="middle" class="mono">u</text>
      <rect class="tok" x="250" y="0" width="20" height="24"/>
      <text x="260" y="16" text-anchor="middle" class="mono">d</text>
      <rect class="merged" x="274" y="0" width="38" height="24"/>
      <text x="293" y="16" text-anchor="middle" class="mono" fill="#D97757">ly</text>
    </g>
  </g>

  <!-- Step k: final -->
  <g transform="translate(40, 350)">
    <text x="0" y="-6" class="tag" fill="#7B9E89">AFTER K MERGES (K = typical 30,000 for GPT-2)</text>
    <g transform="translate(0, 10)">
      <rect class="final" x="0"   y="0" width="80" height="28"/>
      <text x="40"  y="18" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">lowered</text>
      <rect class="tok" x="90"  y="0" width="20" height="28"/>
      <text x="100" y="18" text-anchor="middle" class="mono" fill="#6B6A65">·</text>
      <rect class="final" x="120" y="0" width="80" height="28"/>
      <text x="160" y="18" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">loudly</text>
    </g>
  </g>

  <!-- Right side annotation -->
  <g transform="translate(520, 130)">
    <rect x="0" y="0" width="400" height="180" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">KEY PROPERTIES</text>
    <text x="14" y="44" class="mut">• Starts from individual characters (or bytes)</text>
    <text x="14" y="62" class="mut">• Greedy merge of most frequent adjacent pair</text>
    <text x="14" y="80" class="mut">• Stops at target vocab size (typically 30k–100k)</text>
    <text x="14" y="98" class="mut">• Frequent words become one token ("the", "is")</text>
    <text x="14" y="116" class="mut">• Rare words split into subwords ("untreatable"</text>
    <text x="14" y="132" class="mut">  → "un" + "treat" + "able")</text>
    <text x="14" y="156" class="mut">• <tspan fill="#1F1F1E" font-weight="600">No OOV</tspan> — any new word tokenizable as bytes</text>
  </g>
</svg>
