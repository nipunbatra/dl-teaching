<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .axis  { stroke:#1F1F1E; stroke-width:1; fill:none; }
      .bar-h { fill:#A8324B; }
      .bar-s { fill:#D97757; }
      .bar-e { fill:#7B9E89; opacity:0.35; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .big   { fill:#1F1F1E; font-size:28px; font-family:Fraunces; font-weight:600; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Label smoothing — soft targets instead of one-hot</text>

  <!-- LEFT: hard one-hot -->
  <g transform="translate(40, 80)">
    <text x="150" y="-10" text-anchor="middle" class="tag" fill="#A8324B">HARD LABEL (one-hot)</text>
    <rect x="0" y="0" width="300" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0" y1="190" x2="300" y2="190" class="axis"/>

    <!-- 5 classes: cat = 1.0, rest = 0 -->
    <rect class="bar-h" x="20"  y="10"  width="40" height="180"/>
    <text x="40"  y="5" text-anchor="middle" class="mono">1.00</text>
    <text x="40"  y="210" text-anchor="middle" class="mut">cat ←</text>

    <rect class="bar-h" x="80"  y="190" width="40" height="0"/>
    <text x="100" y="185" text-anchor="middle" class="mono">0</text>
    <text x="100" y="210" text-anchor="middle" class="mut">dog</text>

    <rect class="bar-h" x="140" y="190" width="40" height="0"/>
    <text x="160" y="185" text-anchor="middle" class="mono">0</text>
    <text x="160" y="210" text-anchor="middle" class="mut">car</text>

    <rect class="bar-h" x="200" y="190" width="40" height="0"/>
    <text x="220" y="185" text-anchor="middle" class="mono">0</text>
    <text x="220" y="210" text-anchor="middle" class="mut">bird</text>

    <rect class="bar-h" x="260" y="190" width="40" height="0"/>
    <text x="280" y="185" text-anchor="middle" class="mono">0</text>
    <text x="280" y="210" text-anchor="middle" class="mut">fish</text>
  </g>

  <!-- arrow -->
  <text x="370" y="180" text-anchor="middle" class="big">→</text>
  <text x="370" y="200" text-anchor="middle" class="mono" fill="#D97757" font-size="10">smooth α=0.1</text>

  <!-- RIGHT: smoothed -->
  <g transform="translate(400, 80)">
    <text x="150" y="-10" text-anchor="middle" class="tag" fill="#D97757">SMOOTHED  ·  α = 0.1</text>
    <rect x="0" y="0" width="300" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0" y1="190" x2="300" y2="190" class="axis"/>

    <!-- cat = 0.92, others = 0.02 each -->
    <rect class="bar-s" x="20"  y="24"  width="40" height="166"/>
    <text x="40"  y="18" text-anchor="middle" class="mono">0.92</text>
    <text x="40"  y="210" text-anchor="middle" class="mut">cat ←</text>

    <rect class="bar-e" x="80"  y="186" width="40" height="4"/>
    <text x="100" y="180" text-anchor="middle" class="mono">0.02</text>
    <text x="100" y="210" text-anchor="middle" class="mut">dog</text>

    <rect class="bar-e" x="140" y="186" width="40" height="4"/>
    <text x="160" y="180" text-anchor="middle" class="mono">0.02</text>
    <text x="160" y="210" text-anchor="middle" class="mut">car</text>

    <rect class="bar-e" x="200" y="186" width="40" height="4"/>
    <text x="220" y="180" text-anchor="middle" class="mono">0.02</text>
    <text x="220" y="210" text-anchor="middle" class="mut">bird</text>

    <rect class="bar-e" x="260" y="186" width="40" height="4"/>
    <text x="280" y="180" text-anchor="middle" class="mono">0.02</text>
    <text x="280" y="210" text-anchor="middle" class="mut">fish</text>
  </g>

  <!-- formula + why -->
  <g transform="translate(750, 80)">
    <rect x="0" y="0" width="180" height="200" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="24" class="tag">FORMULA</text>
    <text x="14" y="46" class="mono">y_smooth =</text>
    <text x="14" y="62" class="mono">  (1−α)·y_hard</text>
    <text x="14" y="78" class="mono">  + α/K</text>
    <text x="14" y="108" class="tag">WHY</text>
    <text x="14" y="128" class="mut">• prevents overconfidence</text>
    <text x="14" y="146" class="mut">• better calibration</text>
    <text x="14" y="164" class="mut">• slight test-acc boost</text>
    <text x="14" y="182" class="mut">• free · 1 line of code</text>
  </g>

  <!-- PyTorch code -->
  <g transform="translate(40, 315)">
    <rect x="0" y="0" width="880" height="50" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">PYTORCH (since 1.10)</text>
    <text x="14" y="40" class="mono" font-size="13">criterion = nn.CrossEntropyLoss(label_smoothing=0.1)    # that's the entire API change</text>
  </g>
</svg>
