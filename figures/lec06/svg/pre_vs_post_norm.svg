<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box   { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:4; ry:4; }
      .box-a { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:4; ry:4; }
      .box-s { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.3; rx:4; ry:4; }
      .box-n { fill:#F6F0DF; stroke:#C9A961; stroke-width:1.3; rx:4; ry:4; }
      .ink   { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .acc   { stroke:#D97757; fill:none; stroke-width:2.2; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:12px; fill:#1F1F1E; }
      .lbl   { fill:#1F1F1E; font-size:13px; font-weight:600; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="pn-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
    <marker id="pn-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#D97757"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Pre-norm vs post-norm — where LayerNorm sits inside a Transformer block</text>

  <!-- LEFT: post-norm (original) -->
  <g transform="translate(90, 70)">
    <text x="130" y="-10" text-anchor="middle" class="tag">POST-NORM · original (Vaswani 2017)</text>

    <!-- x input -->
    <rect class="box" x="110" y="0" width="40" height="30"/>
    <text x="130" y="20" text-anchor="middle" class="mono">x</text>

    <!-- Sublayer (attn or FFN) -->
    <rect class="box-s" x="90" y="50" width="80" height="40"/>
    <text x="130" y="76" text-anchor="middle" class="mono">Sublayer</text>

    <!-- add -->
    <circle cx="130" cy="120" r="14" fill="#EAD3C5" stroke="#D97757" stroke-width="1.3"/>
    <text x="130" y="124" text-anchor="middle" class="mono" font-weight="600">+</text>

    <!-- Norm after -->
    <rect class="box-n" x="90" y="160" width="80" height="40"/>
    <text x="130" y="186" text-anchor="middle" class="mono" fill="#C9A961">LayerNorm</text>

    <!-- output y -->
    <rect class="box" x="110" y="220" width="40" height="30"/>
    <text x="130" y="240" text-anchor="middle" class="mono">y</text>

    <g class="ink" marker-end="url(#pn-a)">
      <line x1="130" y1="30"  x2="130" y2="50"/>
      <line x1="130" y1="90"  x2="130" y2="106"/>
      <line x1="130" y1="134" x2="130" y2="160"/>
      <line x1="130" y1="200" x2="130" y2="220"/>
    </g>

    <!-- skip -->
    <path class="acc" marker-end="url(#pn-b)" d="M 150 15 L 200 15 L 200 120 L 144 120"/>
    <text x="210" y="70" class="mono" fill="#D97757">skip</text>

    <!-- caption -->
    <rect x="-10" y="280" width="280" height="80" fill="#F6D4CC" stroke="#A8324B"/>
    <text x="0" y="300" class="mut" fill="#A8324B">
      <tspan x="0" dy="0">Norm is AFTER residual addition.</tspan>
      <tspan x="0" dy="14">Gradient through residual is modulated</tspan>
      <tspan x="0" dy="14">by LayerNorm — can vanish at depth.</tspan>
      <tspan x="0" dy="14">Needs careful warmup.</tspan>
    </text>
  </g>

  <!-- divider -->
  <line x1="480" y1="70" x2="480" y2="380" stroke="#C9C4B5" stroke-dasharray="3 3"/>

  <!-- RIGHT: pre-norm -->
  <g transform="translate(570, 70)">
    <text x="130" y="-10" text-anchor="middle" class="tag" fill="#D97757">PRE-NORM · modern (GPT-2, Llama)</text>

    <rect class="box" x="110" y="0" width="40" height="30"/>
    <text x="130" y="20" text-anchor="middle" class="mono">x</text>

    <!-- Norm first -->
    <rect class="box-n" x="90" y="50" width="80" height="40"/>
    <text x="130" y="76" text-anchor="middle" class="mono" fill="#C9A961">LayerNorm</text>

    <!-- Sublayer -->
    <rect class="box-s" x="90" y="110" width="80" height="40"/>
    <text x="130" y="136" text-anchor="middle" class="mono">Sublayer</text>

    <!-- add -->
    <circle cx="130" cy="180" r="14" fill="#EAD3C5" stroke="#D97757" stroke-width="1.3"/>
    <text x="130" y="184" text-anchor="middle" class="mono" font-weight="600">+</text>

    <!-- output y -->
    <rect class="box" x="110" y="220" width="40" height="30"/>
    <text x="130" y="240" text-anchor="middle" class="mono">y</text>

    <g class="ink" marker-end="url(#pn-a)">
      <line x1="130" y1="30"  x2="130" y2="50"/>
      <line x1="130" y1="90"  x2="130" y2="110"/>
      <line x1="130" y1="150" x2="130" y2="166"/>
      <line x1="130" y1="194" x2="130" y2="220"/>
    </g>

    <!-- skip (unmodulated) -->
    <path class="acc" marker-end="url(#pn-b)" d="M 150 15 L 220 15 L 220 180 L 144 180"/>
    <text x="230" y="100" class="mono" fill="#D97757">skip unbroken</text>

    <!-- caption -->
    <rect x="-10" y="280" width="280" height="80" fill="#D8E3DE" stroke="#7B9E89"/>
    <text x="0" y="300" class="mut" fill="#7B9E89">
      <tspan x="0" dy="0">Norm is INSIDE the sublayer branch.</tspan>
      <tspan x="0" dy="14">Residual gradient has direct path —</tspan>
      <tspan x="0" dy="14">scales cleanly to very deep models.</tspan>
      <tspan x="0" dy="14">Needs less warmup.</tspan>
    </text>
  </g>

  <!-- Footer -->
  <text x="480" y="405" text-anchor="middle" class="mut" font-style="italic">
    Everything modern (GPT-2+, Llama, Claude, Gemini) uses <tspan fill="#D97757" font-weight="600">pre-norm</tspan>. Only the 2017 original Transformer used post-norm.
  </text>
</svg>
