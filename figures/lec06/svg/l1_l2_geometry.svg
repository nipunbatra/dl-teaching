<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="EB Garamond, Georgia, serif">
  <style>
    .bg { fill: #F7F3E9; }
    .title { font-size: 17px; font-weight: 600; fill: #161513; }
    .head { font-size: 13px; font-weight: 600; fill: #161513; }
    .body { font-size: 12px; fill: #161513; }
    .caption { font-size: 11px; fill: #5F5C54; font-style: italic; }
    .axis { stroke: #161513; stroke-width: 1; fill: none; }
    .grid { stroke: #B5AE9B; stroke-width: 0.4; opacity: 0.5; fill: none; }
    .contour { fill: none; stroke: #37535F; stroke-width: 1.4; }
    .l1 { fill: none; stroke: #B85A3E; stroke-width: 2.5; }
    .l2 { fill: none; stroke: #B85A3E; stroke-width: 2.5; }
    .opt { fill: #161513; }
  </style>
  <rect class="bg" width="960" height="400"/>
  <text x="480" y="28" class="title" text-anchor="middle">L1 vs L2 · the geometry of "where the loss-ellipse touches the constraint"</text>

  <!-- Panel 1: L1 -->
  <g transform="translate(60, 70)">
    <text x="180" y="0" class="head" text-anchor="middle">L1 · diamond → corner solution → sparse</text>
    <rect x="0" y="20" width="360" height="280" fill="white" stroke="#161513" stroke-width="1"/>
    <!-- axes -->
    <line x1="180" y1="20" x2="180" y2="300" class="axis"/>
    <line x1="0" y1="160" x2="360" y2="160" class="axis"/>
    <text x="350" y="178" class="caption">w₁</text>
    <text x="195" y="35" class="caption">w₂</text>

    <!-- Loss contours · ellipses around the unconstrained optimum (245, 90) -->
    <ellipse class="contour" cx="245" cy="90" rx="30" ry="20"/>
    <ellipse class="contour" cx="245" cy="90" rx="55" ry="36"/>
    <ellipse class="contour" cx="245" cy="90" rx="80" ry="52"/>
    <ellipse class="contour" cx="245" cy="90" rx="105" ry="68"/>
    <text x="270" y="80" class="caption" fill="#37535F">unconstrained optimum</text>

    <!-- L1 diamond -->
    <polygon class="l1" points="180,90 250,160 180,230 110,160"/>

    <!-- Touch point at corner (250, 160) -->
    <circle class="opt" cx="250" cy="160" r="5"/>
    <text x="260" y="178" class="caption" fill="#B85A3E">w₂ = 0 ← sparse!</text>
  </g>

  <!-- Panel 2: L2 -->
  <g transform="translate(540, 70)">
    <text x="180" y="0" class="head" text-anchor="middle">L2 · circle → rounded touch → both small</text>
    <rect x="0" y="20" width="360" height="280" fill="white" stroke="#161513" stroke-width="1"/>
    <line x1="180" y1="20" x2="180" y2="300" class="axis"/>
    <line x1="0" y1="160" x2="360" y2="160" class="axis"/>
    <text x="350" y="178" class="caption">w₁</text>
    <text x="195" y="35" class="caption">w₂</text>

    <!-- Loss contours · same ellipses -->
    <ellipse class="contour" cx="245" cy="90" rx="30" ry="20"/>
    <ellipse class="contour" cx="245" cy="90" rx="55" ry="36"/>
    <ellipse class="contour" cx="245" cy="90" rx="80" ry="52"/>
    <ellipse class="contour" cx="245" cy="90" rx="105" ry="68"/>

    <!-- L2 circle of radius 70 around origin (180, 160) -->
    <circle class="l2" cx="180" cy="160" r="70"/>

    <!-- Touch point on circle along line from origin to optimum · roughly (245, 110) -->
    <circle class="opt" cx="244" cy="113" r="5"/>
    <text x="255" y="115" class="caption" fill="#B85A3E">both w small ← shrunk</text>
  </g>

  <text x="480" y="385" class="caption" text-anchor="middle">L1's diamond corners hit the axes → coordinates become exactly 0. L2's circle has no corners → coords just shrink.</text>
</svg>
