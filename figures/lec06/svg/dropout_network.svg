<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .node   { fill:#EAD3C5; stroke:#D97757; stroke-width:1.2; }
      .dead   { fill:#C9C4B5; stroke:#6B6A65; stroke-width:1.2; opacity:0.4; }
      .ink    { stroke:#6B6A65; fill:none; stroke-width:0.7; opacity:0.5; }
      .ink-d  { stroke:#6B6A65; fill:none; stroke-width:0.7; opacity:0.1; stroke-dasharray:2 2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Dropout — randomly silence p × N neurons per batch, effectively training an ensemble</text>

  <!-- LEFT: full network -->
  <g transform="translate(60, 70)">
    <text x="150" y="-10" text-anchor="middle" class="tag">FULL NETWORK · all neurons alive</text>

    <!-- 3 layers x 6 neurons -->
    <g>
      <circle cx="30" cy="40"  r="10" class="node"/>
      <circle cx="30" cy="80"  r="10" class="node"/>
      <circle cx="30" cy="120" r="10" class="node"/>
      <circle cx="30" cy="160" r="10" class="node"/>
      <circle cx="30" cy="200" r="10" class="node"/>
      <circle cx="30" cy="240" r="10" class="node"/>

      <circle cx="150" cy="40"  r="10" class="node"/>
      <circle cx="150" cy="80"  r="10" class="node"/>
      <circle cx="150" cy="120" r="10" class="node"/>
      <circle cx="150" cy="160" r="10" class="node"/>
      <circle cx="150" cy="200" r="10" class="node"/>
      <circle cx="150" cy="240" r="10" class="node"/>

      <circle cx="270" cy="80"  r="10" class="node"/>
      <circle cx="270" cy="140" r="10" class="node"/>
      <circle cx="270" cy="200" r="10" class="node"/>
    </g>

    <!-- edges (sample) -->
    <g class="ink">
      <line x1="40" y1="40"  x2="140" y2="40"/>
      <line x1="40" y1="40"  x2="140" y2="80"/>
      <line x1="40" y1="80"  x2="140" y2="80"/>
      <line x1="40" y1="80"  x2="140" y2="120"/>
      <line x1="40" y1="120" x2="140" y2="160"/>
      <line x1="40" y1="120" x2="140" y2="80"/>
      <line x1="40" y1="160" x2="140" y2="200"/>
      <line x1="40" y1="160" x2="140" y2="120"/>
      <line x1="40" y1="200" x2="140" y2="240"/>
      <line x1="40" y1="240" x2="140" y2="200"/>
      <line x1="40" y1="240" x2="140" y2="240"/>

      <line x1="160" y1="40" x2="260" y2="80"/>
      <line x1="160" y1="80" x2="260" y2="80"/>
      <line x1="160" y1="80" x2="260" y2="140"/>
      <line x1="160" y1="120" x2="260" y2="140"/>
      <line x1="160" y1="160" x2="260" y2="140"/>
      <line x1="160" y1="200" x2="260" y2="200"/>
      <line x1="160" y1="240" x2="260" y2="200"/>
    </g>

    <text x="150" y="280" text-anchor="middle" class="mut">full capacity</text>
  </g>

  <!-- RIGHT: dropout mask -->
  <g transform="translate(540, 70)">
    <text x="150" y="-10" text-anchor="middle" class="tag" fill="#D97757">WITH DROPOUT · p = 0.5 · random batch mask</text>

    <g>
      <!-- mix live / dead -->
      <circle cx="30" cy="40"  r="10" class="dead"/>
      <circle cx="30" cy="80"  r="10" class="node"/>
      <circle cx="30" cy="120" r="10" class="node"/>
      <circle cx="30" cy="160" r="10" class="dead"/>
      <circle cx="30" cy="200" r="10" class="node"/>
      <circle cx="30" cy="240" r="10" class="dead"/>

      <circle cx="150" cy="40"  r="10" class="node"/>
      <circle cx="150" cy="80"  r="10" class="dead"/>
      <circle cx="150" cy="120" r="10" class="node"/>
      <circle cx="150" cy="160" r="10" class="node"/>
      <circle cx="150" cy="200" r="10" class="dead"/>
      <circle cx="150" cy="240" r="10" class="node"/>

      <circle cx="270" cy="80"  r="10" class="node"/>
      <circle cx="270" cy="140" r="10" class="node"/>
      <circle cx="270" cy="200" r="10" class="dead"/>
    </g>

    <!-- edges: solid for both-live, ghost for either-dead -->
    <g class="ink-d">
      <line x1="40" y1="40"  x2="140" y2="40"/>
      <line x1="40" y1="40"  x2="140" y2="80"/>
      <line x1="40" y1="160" x2="140" y2="200"/>
      <line x1="40" y1="240" x2="140" y2="240"/>
      <line x1="160" y1="80" x2="260" y2="80"/>
      <line x1="160" y1="80" x2="260" y2="140"/>
      <line x1="160" y1="200" x2="260" y2="200"/>
      <line x1="160" y1="240" x2="260" y2="200"/>
    </g>
    <g class="ink">
      <line x1="40" y1="80"  x2="140" y2="40"/>
      <line x1="40" y1="80"  x2="140" y2="120"/>
      <line x1="40" y1="120" x2="140" y2="120"/>
      <line x1="40" y1="120" x2="140" y2="160"/>
      <line x1="40" y1="200" x2="140" y2="160"/>
      <line x1="40" y1="200" x2="140" y2="240"/>

      <line x1="160" y1="40" x2="260" y2="80"/>
      <line x1="160" y1="120" x2="260" y2="80"/>
      <line x1="160" y1="120" x2="260" y2="140"/>
      <line x1="160" y1="160" x2="260" y2="140"/>
      <line x1="160" y1="240" x2="260" y2="140"/>
    </g>

    <text x="150" y="280" text-anchor="middle" class="mut">different random mask every batch</text>
  </g>

  <!-- Bottom -->
  <g transform="translate(60, 330)">
    <rect x="0" y="0" width="840" height="50" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="420" y="22" text-anchor="middle" class="mono" font-size="13">
      training ·  h ← (h ⊙ mask) / p        eval ·  h unchanged (dropout off)
    </text>
    <text x="420" y="40" text-anchor="middle" class="mut" font-style="italic">
      "Inverted dropout" keeps the expected activation constant between train and eval.
    </text>
  </g>
</svg>
