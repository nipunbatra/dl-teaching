<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Work Sans, system-ui, sans-serif">
  <style>
    .bg { fill: #F0EEE5; }
    .title { font-size: 17px; font-weight: 600; fill: #1F1F1E; }
    .head { font-size: 13px; font-weight: 600; fill: #1F1F1E; }
    .body { font-size: 12px; fill: #1F1F1E; }
    .caption { font-size: 11px; fill: #6B6B69; }
    .on { fill: #FFF3EE; stroke: #D97757; stroke-width: 1.2; rx: 4; }
    .off { fill: #E8EDEF; stroke: #C9C4B5; stroke-width: 0.8; rx: 4; opacity: 0.4; }
    .line { stroke: #4A6670; stroke-width: 0.8; }
    .line-off { stroke: #C9C4B5; stroke-width: 0.5; opacity: 0.4; }
  </style>
  <rect class="bg" width="960" height="380"/>
  <text x="480" y="28" class="title" text-anchor="middle">Dropout · different mask every forward pass · implicit ensembling</text>

  <!-- Three versions of the same network -->
  <g transform="translate(40, 60)">
    <text x="140" y="0" class="head" text-anchor="middle">Forward pass 1 · p=0.3 drop</text>
    <!-- 4 input neurons -->
    <circle cx="30" cy="50" r="10" class="on"/>
    <circle cx="30" cy="100" r="10" class="on"/>
    <circle cx="30" cy="150" r="10" class="on"/>
    <circle cx="30" cy="200" r="10" class="on"/>
    <!-- hidden layer -->
    <circle cx="140" cy="40" r="10" class="on"/>
    <circle cx="140" cy="80" r="10" class="off"/>
    <circle cx="140" cy="120" r="10" class="on"/>
    <circle cx="140" cy="160" r="10" class="on"/>
    <circle cx="140" cy="200" r="10" class="off"/>
    <circle cx="140" cy="240" r="10" class="on"/>
    <!-- output -->
    <circle cx="250" cy="100" r="10" class="on"/>
    <circle cx="250" cy="150" r="10" class="on"/>
    <!-- lines only for active neurons -->
    <g>
      <line x1="30" y1="50" x2="140" y2="40" class="line"/>
      <line x1="30" y1="50" x2="140" y2="80" class="line-off"/>
      <line x1="30" y1="50" x2="140" y2="120" class="line"/>
      <line x1="30" y1="50" x2="140" y2="160" class="line"/>
      <line x1="30" y1="50" x2="140" y2="200" class="line-off"/>
      <line x1="30" y1="50" x2="140" y2="240" class="line"/>
      <line x1="30" y1="100" x2="140" y2="40" class="line"/>
      <line x1="30" y1="100" x2="140" y2="120" class="line"/>
      <line x1="30" y1="100" x2="140" y2="240" class="line"/>
      <line x1="30" y1="150" x2="140" y2="40" class="line"/>
      <line x1="30" y1="150" x2="140" y2="120" class="line"/>
      <line x1="30" y1="200" x2="140" y2="160" class="line"/>
      <line x1="30" y1="200" x2="140" y2="240" class="line"/>
      <line x1="140" y1="40" x2="250" y2="100" class="line"/>
      <line x1="140" y1="120" x2="250" y2="100" class="line"/>
      <line x1="140" y1="160" x2="250" y2="150" class="line"/>
      <line x1="140" y1="240" x2="250" y2="150" class="line"/>
    </g>
  </g>

  <g transform="translate(350, 60)">
    <text x="140" y="0" class="head" text-anchor="middle">Forward pass 2 · different mask</text>
    <circle cx="30" cy="50" r="10" class="on"/>
    <circle cx="30" cy="100" r="10" class="on"/>
    <circle cx="30" cy="150" r="10" class="on"/>
    <circle cx="30" cy="200" r="10" class="on"/>
    <!-- different dropout -->
    <circle cx="140" cy="40" r="10" class="off"/>
    <circle cx="140" cy="80" r="10" class="on"/>
    <circle cx="140" cy="120" r="10" class="on"/>
    <circle cx="140" cy="160" r="10" class="off"/>
    <circle cx="140" cy="200" r="10" class="on"/>
    <circle cx="140" cy="240" r="10" class="on"/>
    <circle cx="250" cy="100" r="10" class="on"/>
    <circle cx="250" cy="150" r="10" class="on"/>
    <g>
      <line x1="30" y1="50" x2="140" y2="80" class="line"/>
      <line x1="30" y1="50" x2="140" y2="120" class="line"/>
      <line x1="30" y1="50" x2="140" y2="200" class="line"/>
      <line x1="30" y1="100" x2="140" y2="80" class="line"/>
      <line x1="30" y1="100" x2="140" y2="200" class="line"/>
      <line x1="30" y1="150" x2="140" y2="120" class="line"/>
      <line x1="30" y1="150" x2="140" y2="240" class="line"/>
      <line x1="30" y1="200" x2="140" y2="80" class="line"/>
      <line x1="30" y1="200" x2="140" y2="240" class="line"/>
      <line x1="140" y1="80" x2="250" y2="100" class="line"/>
      <line x1="140" y1="120" x2="250" y2="100" class="line"/>
      <line x1="140" y1="200" x2="250" y2="150" class="line"/>
      <line x1="140" y1="240" x2="250" y2="150" class="line"/>
    </g>
  </g>

  <g transform="translate(660, 60)">
    <text x="140" y="0" class="head" text-anchor="middle">Inference · no drop, rescale</text>
    <circle cx="30" cy="50" r="10" class="on"/>
    <circle cx="30" cy="100" r="10" class="on"/>
    <circle cx="30" cy="150" r="10" class="on"/>
    <circle cx="30" cy="200" r="10" class="on"/>
    <!-- all on -->
    <circle cx="140" cy="40" r="10" class="on"/>
    <circle cx="140" cy="80" r="10" class="on"/>
    <circle cx="140" cy="120" r="10" class="on"/>
    <circle cx="140" cy="160" r="10" class="on"/>
    <circle cx="140" cy="200" r="10" class="on"/>
    <circle cx="140" cy="240" r="10" class="on"/>
    <circle cx="250" cy="100" r="10" class="on"/>
    <circle cx="250" cy="150" r="10" class="on"/>
    <g>
      <line x1="30" y1="50" x2="140" y2="40" class="line"/>
      <line x1="30" y1="50" x2="140" y2="80" class="line"/>
      <line x1="30" y1="50" x2="140" y2="120" class="line"/>
      <line x1="30" y1="50" x2="140" y2="160" class="line"/>
      <line x1="30" y1="50" x2="140" y2="200" class="line"/>
      <line x1="30" y1="50" x2="140" y2="240" class="line"/>
      <line x1="30" y1="100" x2="140" y2="40" class="line"/>
      <line x1="30" y1="100" x2="140" y2="120" class="line"/>
      <line x1="30" y1="100" x2="140" y2="200" class="line"/>
      <line x1="30" y1="150" x2="140" y2="80" class="line"/>
      <line x1="30" y1="150" x2="140" y2="160" class="line"/>
      <line x1="30" y1="150" x2="140" y2="240" class="line"/>
      <line x1="30" y1="200" x2="140" y2="40" class="line"/>
      <line x1="30" y1="200" x2="140" y2="120" class="line"/>
      <line x1="30" y1="200" x2="140" y2="200" class="line"/>
      <line x1="140" y1="40" x2="250" y2="100" class="line"/>
      <line x1="140" y1="80" x2="250" y2="100" class="line"/>
      <line x1="140" y1="120" x2="250" y2="150" class="line"/>
      <line x1="140" y1="160" x2="250" y2="100" class="line"/>
      <line x1="140" y1="200" x2="250" y2="150" class="line"/>
      <line x1="140" y1="240" x2="250" y2="150" class="line"/>
    </g>
  </g>

  <!-- Footer -->
  <rect x="40" y="320" width="880" height="50" fill="#FFF3EE" stroke="#D97757" stroke-width="1" rx="6"/>
  <text x="480" y="342" class="body" text-anchor="middle"><tspan font-weight="600">Each forward pass</tspan> trains a different sub-network · ensemble of 2^n models averaged at inference.</text>
  <text x="480" y="360" class="caption" text-anchor="middle">Inverted-dropout · at train, divide by (1−p); at test, use full network as-is. Implemented in one line.</text>
</svg>
