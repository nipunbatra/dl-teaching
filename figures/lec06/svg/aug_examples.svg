<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box   { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.2; }
      .cat   { fill:#D97757; }
      .ear   { fill:#A8324B; }
      .eye   { fill:#1F1F1E; }
      .nose  { fill:#A8324B; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <!-- Re-usable cat symbol -->
  <defs>
    <symbol id="cat" viewBox="0 0 100 100">
      <path d="M 20 80 L 30 40 L 40 50 L 50 35 L 60 50 L 70 40 L 80 80 L 70 90 L 30 90 Z" fill="#D97757"/>
      <path d="M 30 40 L 32 25 L 38 45 Z" fill="#A8324B"/>
      <path d="M 70 40 L 68 25 L 62 45 Z" fill="#A8324B"/>
      <circle cx="40" cy="55" r="3" fill="#1F1F1E"/>
      <circle cx="60" cy="55" r="3" fill="#1F1F1E"/>
      <circle cx="50" cy="67" r="2" fill="#A8324B"/>
      <path d="M 48 70 Q 50 74 52 70" stroke="#1F1F1E" fill="none" stroke-width="1"/>
    </symbol>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Data augmentation — same label, more training examples, built for free</text>

  <!-- Row 1: original -->
  <g transform="translate(40, 60)">
    <rect class="box" x="0" y="0" width="120" height="120"/>
    <use href="#cat" x="10" y="10" width="100" height="100"/>
    <text x="60" y="138" text-anchor="middle" class="mono">original</text>
    <text x="60" y="154" text-anchor="middle" class="mut">label = "cat"</text>
  </g>

  <!-- flip horizontal -->
  <g transform="translate(180, 60)">
    <rect class="box" x="0" y="0" width="120" height="120"/>
    <g transform="translate(120, 10) scale(-1, 1)">
      <use href="#cat" x="0" y="0" width="100" height="100"/>
    </g>
    <text x="60" y="138" text-anchor="middle" class="mono">horizontal flip</text>
    <text x="60" y="154" text-anchor="middle" class="mut">label unchanged</text>
  </g>

  <!-- random crop -->
  <g transform="translate(320, 60)">
    <rect class="box" x="0" y="0" width="120" height="120"/>
    <g transform="translate(-5, -15) scale(1.25)">
      <use href="#cat" x="10" y="10" width="100" height="100"/>
    </g>
    <rect x="0" y="0" width="120" height="120" fill="none" stroke="#D97757" stroke-dasharray="3 2"/>
    <text x="60" y="138" text-anchor="middle" class="mono">random crop</text>
    <text x="60" y="154" text-anchor="middle" class="mut">scale + translate</text>
  </g>

  <!-- rotate -->
  <g transform="translate(460, 60)">
    <rect class="box" x="0" y="0" width="120" height="120"/>
    <g transform="rotate(12, 60, 60) translate(10, 10)">
      <use href="#cat" x="0" y="0" width="100" height="100"/>
    </g>
    <text x="60" y="138" text-anchor="middle" class="mono">rotate ±15°</text>
    <text x="60" y="154" text-anchor="middle" class="mut">orientation-invariant</text>
  </g>

  <!-- color jitter -->
  <g transform="translate(600, 60)">
    <rect class="box" x="0" y="0" width="120" height="120"/>
    <g opacity="0.7" transform="translate(10, 10)">
      <path d="M 20 80 L 30 40 L 40 50 L 50 35 L 60 50 L 70 40 L 80 80 L 70 90 L 30 90 Z" fill="#C9A961"/>
      <path d="M 30 40 L 32 25 L 38 45 Z" fill="#7B9E89"/>
      <path d="M 70 40 L 68 25 L 62 45 Z" fill="#7B9E89"/>
      <circle cx="40" cy="55" r="3" fill="#1F1F1E"/>
      <circle cx="60" cy="55" r="3" fill="#1F1F1E"/>
    </g>
    <text x="60" y="138" text-anchor="middle" class="mono">color jitter</text>
    <text x="60" y="154" text-anchor="middle" class="mut">hue · brightness · saturation</text>
  </g>

  <!-- cutout -->
  <g transform="translate(740, 60)">
    <rect class="box" x="0" y="0" width="120" height="120"/>
    <use href="#cat" x="10" y="10" width="100" height="100"/>
    <rect x="40" y="45" width="40" height="35" fill="#1F1F1E"/>
    <text x="60" y="138" text-anchor="middle" class="mono">cutout</text>
    <text x="60" y="154" text-anchor="middle" class="mut">force reliance on partial info</text>
  </g>

  <!-- Code strip -->
  <g transform="translate(40, 240)">
    <rect x="0" y="0" width="880" height="100" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">PYTORCH · torchvision.transforms</text>
    <g class="mono" font-size="12">
      <text x="14" y="44">train_tfm = transforms.Compose([</text>
      <text x="14" y="62">    transforms.RandomResizedCrop(224),   transforms.RandomHorizontalFlip(),</text>
      <text x="14" y="80">    transforms.ColorJitter(0.2, 0.2, 0.2), transforms.ToTensor(),</text>
      <text x="14" y="98">    transforms.RandomErasing(p=0.25),   transforms.Normalize(mean, std)])</text>
    </g>
  </g>

  <text x="480" y="360" text-anchor="middle" class="mut" font-style="italic">
    Key idea · every augmentation should <tspan fill="#D97757" font-weight="600">preserve the label</tspan>.
    A flipped cat is still a cat; a flipped "6" is a "9" (so don't flip MNIST).
  </text>
</svg>
