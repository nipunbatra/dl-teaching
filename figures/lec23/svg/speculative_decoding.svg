<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Work Sans, system-ui, sans-serif">
  <style>
    .bg { fill: #F0EEE5; }
    .title { font-size: 17px; font-weight: 600; fill: #1F1F1E; }
    .head { font-size: 13px; font-weight: 600; fill: #1F1F1E; }
    .body { font-size: 12px; fill: #1F1F1E; }
    .caption { font-size: 11px; fill: #6B6B69; }
    .draft { fill: #F0F5EF; stroke: #7B9E89; stroke-width: 1.2; rx: 4; }
    .big { fill: #FFF3EE; stroke: #D97757; stroke-width: 1.2; rx: 4; }
    .accept { fill: #D4E8D6; stroke: #7B9E89; stroke-width: 1.4; rx: 3; }
    .reject { fill: #F4D6DB; stroke: #A8324B; stroke-width: 1.4; rx: 3; }
    .time { fill: #E8EDEF; stroke: #4A6670; stroke-width: 1; rx: 2; }
  </style>
  <rect class="bg" width="960" height="420"/>
  <text x="480" y="28" class="title" text-anchor="middle">Speculative decoding · draft with a small model, verify with the big one</text>

  <!-- Naive baseline -->
  <g transform="translate(40, 70)">
    <text x="0" y="0" class="head">Naive · big LLM generates one token at a time</text>
    <g transform="translate(0, 18)">
      <rect class="big" x="0" y="0" width="55" height="34"/>
      <text x="27" y="22" class="body" text-anchor="middle">tok 1</text>
      <rect class="big" x="60" y="0" width="55" height="34"/>
      <text x="87" y="22" class="body" text-anchor="middle">tok 2</text>
      <rect class="big" x="120" y="0" width="55" height="34"/>
      <text x="147" y="22" class="body" text-anchor="middle">tok 3</text>
      <rect class="big" x="180" y="0" width="55" height="34"/>
      <text x="207" y="22" class="body" text-anchor="middle">tok 4</text>
      <rect class="big" x="240" y="0" width="55" height="34"/>
      <text x="267" y="22" class="body" text-anchor="middle">tok 5</text>
      <rect class="big" x="300" y="0" width="55" height="34"/>
      <text x="327" y="22" class="body" text-anchor="middle">tok 6</text>
      <!-- time axis -->
      <g transform="translate(0, 52)">
        <line x1="0" y1="0" x2="355" y2="0" stroke="#4A6670" stroke-width="1.2" marker-end="url(#arr)"/>
        <text x="180" y="18" class="caption" text-anchor="middle">time · 6 forward passes of 70B model</text>
      </g>
    </g>
  </g>

  <!-- Speculative -->
  <g transform="translate(40, 180)">
    <text x="0" y="0" class="head">Speculative · draft 4 tokens with small model, verify all in parallel with big model</text>
    <!-- Step 1: draft (small model, sequential but fast) -->
    <text x="0" y="22" class="caption">1. Small draft model predicts 4 tokens sequentially (fast · small model):</text>
    <g transform="translate(0, 28)">
      <rect class="draft" x="0" y="0" width="50" height="30"/>
      <text x="25" y="20" class="body" text-anchor="middle">d₁</text>
      <rect class="draft" x="55" y="0" width="50" height="30"/>
      <text x="80" y="20" class="body" text-anchor="middle">d₂</text>
      <rect class="draft" x="110" y="0" width="50" height="30"/>
      <text x="135" y="20" class="body" text-anchor="middle">d₃</text>
      <rect class="draft" x="165" y="0" width="50" height="30"/>
      <text x="190" y="20" class="body" text-anchor="middle">d₄</text>
      <text x="235" y="20" class="caption">draft time ≪ big model time</text>
    </g>

    <!-- Step 2: big model runs once on all 4 in parallel -->
    <text x="0" y="85" class="caption">2. Big model evaluates all 4 candidates in one forward pass (parallel · same latency as 1 token):</text>
    <g transform="translate(0, 93)">
      <rect class="big" x="0" y="0" width="240" height="36" rx="5"/>
      <text x="120" y="22" class="body" text-anchor="middle">Big model · one forward pass over d₁d₂d₃d₄</text>
    </g>

    <!-- Step 3: accept/reject -->
    <text x="0" y="155" class="caption">3. Compare probabilities · accept prefix where they agree, reject on first disagreement:</text>
    <g transform="translate(0, 163)">
      <rect class="accept" x="0" y="0" width="50" height="26"/>
      <text x="25" y="18" class="body" text-anchor="middle">d₁ ✓</text>
      <rect class="accept" x="55" y="0" width="50" height="26"/>
      <text x="80" y="18" class="body" text-anchor="middle">d₂ ✓</text>
      <rect class="accept" x="110" y="0" width="50" height="26"/>
      <text x="135" y="18" class="body" text-anchor="middle">d₃ ✓</text>
      <rect class="reject" x="165" y="0" width="50" height="26"/>
      <text x="190" y="18" class="body" text-anchor="middle">d₄ ✗</text>
      <rect class="big" x="220" y="0" width="50" height="26"/>
      <text x="245" y="18" class="body" text-anchor="middle">→ tok_new</text>
      <text x="285" y="18" class="caption">3 accepted + 1 replaced</text>
    </g>

    <!-- time axis -->
    <g transform="translate(0, 200)">
      <line x1="0" y1="0" x2="550" y2="0" stroke="#4A6670" stroke-width="1.2" marker-end="url(#arr)"/>
      <text x="275" y="18" class="caption" text-anchor="middle">time · 1 big-model pass per chunk · effective ~3× speedup when accept rate is high</text>
    </g>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#4A6670"/>
    </marker>
  </defs>
</svg>
