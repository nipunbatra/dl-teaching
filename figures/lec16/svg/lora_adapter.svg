<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .frozen { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.4; rx:3; ry:3; }
      .lora-a { fill:#EAD3C5; stroke:#D97757; stroke-width:1.4; rx:3; ry:3; }
      .lora-b { fill:#F6F0DF; stroke:#C9A961; stroke-width:1.4; rx:3; ry:3; }
      .sum    { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.4; rx:3; ry:3; }
      .ink    { stroke:#1F1F1E; fill:none; stroke-width:1.2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:12px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="lo-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">LoRA — train a low-rank update alongside a frozen base matrix</text>

  <!-- Input x -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="80" height="40" fill="#F0EEE5" stroke="#1F1F1E" rx="3"/>
    <text x="40" y="22" text-anchor="middle" class="mono">input x</text>
    <text x="40" y="34" text-anchor="middle" class="mut" font-size="9">(d)</text>
  </g>

  <!-- Top path: frozen W -->
  <g transform="translate(240, 70)">
    <rect class="frozen" x="0" y="0" width="140" height="80"/>
    <text x="70" y="24" text-anchor="middle" class="mono" fill="#4A6670" font-weight="600">W₀ · (d × d)</text>
    <text x="70" y="42" text-anchor="middle" class="mut" fill="#4A6670">FROZEN</text>
    <text x="70" y="58" text-anchor="middle" class="mut" fill="#4A6670">70B params</text>
    <text x="70" y="72" text-anchor="middle" class="mut" fill="#4A6670" font-style="italic">no gradient</text>
  </g>

  <!-- Bottom path: LoRA B·A -->
  <g transform="translate(220, 240)">
    <rect class="lora-b" x="0" y="0" width="80" height="70"/>
    <text x="40" y="22" text-anchor="middle" class="mono" fill="#C9A961" font-weight="600">A</text>
    <text x="40" y="40" text-anchor="middle" class="mono" fill="#C9A961">(d × r)</text>
    <text x="40" y="56" text-anchor="middle" class="mut" fill="#C9A961" font-size="9">init N(0, σ²)</text>

    <rect class="lora-a" x="120" y="0" width="80" height="70"/>
    <text x="160" y="22" text-anchor="middle" class="mono" fill="#D97757" font-weight="600">B</text>
    <text x="160" y="40" text-anchor="middle" class="mono" fill="#D97757">(r × d)</text>
    <text x="160" y="56" text-anchor="middle" class="mut" fill="#D97757" font-size="9">init zero</text>

    <text x="120" y="95" text-anchor="middle" class="tag" fill="#D97757">RANK  r = 8</text>

    <text x="100" y="40" text-anchor="middle" class="mono" fill="#1F1F1E">·</text>
  </g>

  <!-- Scale by alpha -->
  <g transform="translate(470, 265)">
    <rect class="lora-a" x="0" y="0" width="80" height="40"/>
    <text x="40" y="18" text-anchor="middle" class="mono" fill="#D97757">× α/r</text>
    <text x="40" y="32" text-anchor="middle" class="mut" fill="#D97757" font-size="9">scale</text>
  </g>

  <!-- Sum -->
  <g transform="translate(630, 170)">
    <circle cx="40" cy="40" r="22" class="sum"/>
    <text x="40" y="46" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600" font-size="16">+</text>
    <text x="40" y="80" text-anchor="middle" class="mut" fill="#7B9E89">y = W₀x + (α/r)·B·A·x</text>
  </g>

  <!-- Output y -->
  <g transform="translate(820, 180)">
    <rect x="0" y="0" width="80" height="40" fill="#F0EEE5" stroke="#1F1F1E" rx="3"/>
    <text x="40" y="22" text-anchor="middle" class="mono">output y</text>
    <text x="40" y="34" text-anchor="middle" class="mut" font-size="9">(d)</text>
  </g>

  <!-- Arrows -->
  <g class="ink" marker-end="url(#lo-a)">
    <!-- x → W -->
    <line x1="160" y1="200" x2="240" y2="110"/>
    <!-- W → sum -->
    <line x1="380" y1="110" x2="630" y2="200"/>

    <!-- x → A -->
    <line x1="160" y1="200" x2="220" y2="275"/>
    <!-- A → B -->
    <line x1="300" y1="275" x2="340" y2="275"/>
    <!-- B → scale -->
    <line x1="420" y1="275" x2="470" y2="285"/>
    <!-- scale → sum -->
    <line x1="550" y1="285" x2="630" y2="220"/>

    <!-- sum → y -->
    <line x1="670" y1="200" x2="820" y2="200"/>
  </g>

  <!-- Bottom panel: why it works -->
  <g transform="translate(40, 360)">
    <rect x="0" y="0" width="880" height="70" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">PARAMETER COUNT</text>
    <text x="14" y="44" class="mono" font-size="13">
      Base W₀ · d² = 70B (frozen)     ·     LoRA A, B · 2·d·r = <tspan fill="#D97757" font-weight="600">0.1–1% of base</tspan>
    </text>
    <text x="14" y="62" class="mut" font-style="italic">With r = 8, d = 4096: W₀ has 16M params; A·B has 64k · 500× smaller to train, 500× smaller to save as adapter.</text>
  </g>
</svg>
