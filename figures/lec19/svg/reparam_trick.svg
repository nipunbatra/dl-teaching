<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box     { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:3; ry:3; }
      .enc     { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.4; rx:4; ry:4; }
      .dec     { fill:#EAD3C5; stroke:#D97757; stroke-width:1.4; rx:4; ry:4; }
      .stoch   { fill:#F6D4CC; stroke:#A8324B; stroke-width:1.4; }
      .det     { fill:#F6F0DF; stroke:#C9A961; stroke-width:1.4; rx:3; ry:3; }
      .noise   { fill:#C9A961; }
      .ink     { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .grad    { stroke:#D97757; fill:none; stroke-width:2.2; stroke-dasharray:5 3; }
      .xmark   { fill:#A8324B; font-size:26px; font-weight:700; }
      .mono    { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut     { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl     { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag     { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="rp-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
    <marker id="rp-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#D97757"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Reparameterization trick · move randomness off the gradient path</text>

  <!-- TOP: naive (broken) path -->
  <g transform="translate(40, 70)">
    <text x="0" y="-6" class="tag" fill="#A8324B">NAIVE · sampling blocks the gradient</text>

    <rect class="box" x="0" y="10" width="60" height="36"/>
    <text x="30" y="32" text-anchor="middle" class="mono">x</text>

    <rect class="enc" x="90" y="10" width="120" height="36"/>
    <text x="150" y="32" text-anchor="middle" class="mono" fill="#4A6670">Encoder → μ, σ</text>

    <circle class="stoch" cx="270" cy="28" r="22"/>
    <text x="270" y="22" text-anchor="middle" class="mono" fill="#A8324B">z ~ N(μ, σ²)</text>
    <text x="270" y="36" text-anchor="middle" class="mut" fill="#A8324B" font-size="9">stochastic node</text>

    <rect class="dec" x="320" y="10" width="120" height="36"/>
    <text x="380" y="32" text-anchor="middle" class="mono" fill="#D97757">Decoder</text>

    <rect class="box" x="470" y="10" width="60" height="36"/>
    <text x="500" y="32" text-anchor="middle" class="mono">ℒ</text>

    <!-- forward arrows -->
    <g class="ink" marker-end="url(#rp-a)">
      <line x1="60" y1="28" x2="90" y2="28"/>
      <line x1="210" y1="28" x2="248" y2="28"/>
      <line x1="292" y1="28" x2="320" y2="28"/>
      <line x1="440" y1="28" x2="470" y2="28"/>
    </g>

    <!-- backward gradient dashed -->
    <path class="grad" d="M 470 55 L 440 55 L 320 55" marker-end="url(#rp-g)"/>
    <text x="290" y="72" class="xmark">✗</text>
    <text x="310" y="72" class="mono" fill="#A8324B">gradient stops here</text>
    <text x="310" y="88" class="mut" fill="#A8324B">can't backprop through a sample</text>
  </g>

  <!-- BOTTOM: reparameterized (working) path -->
  <g transform="translate(40, 220)">
    <text x="0" y="-6" class="tag" fill="#7B9E89">REPARAMETERIZED · z = μ + σ·ε moves ε off the gradient path</text>

    <rect class="box" x="0" y="30" width="60" height="36"/>
    <text x="30" y="52" text-anchor="middle" class="mono">x</text>

    <rect class="enc" x="90" y="30" width="120" height="36"/>
    <text x="150" y="52" text-anchor="middle" class="mono" fill="#4A6670">Encoder → μ, σ</text>

    <!-- μ and σ as deterministic outputs -->
    <rect class="det" x="230" y="0" width="40" height="28"/>
    <text x="250" y="18" text-anchor="middle" class="mono" fill="#C9A961">μ</text>
    <rect class="det" x="230" y="68" width="40" height="28"/>
    <text x="250" y="86" text-anchor="middle" class="mono" fill="#C9A961">σ</text>

    <!-- ε from fixed noise -->
    <circle class="noise" cx="250" cy="130" r="14"/>
    <text x="250" y="134" text-anchor="middle" class="mono" fill="#F0EEE5">ε</text>
    <text x="250" y="158" text-anchor="middle" class="mut" fill="#C9A961">ε ~ N(0, I)</text>
    <text x="250" y="172" text-anchor="middle" class="mut" fill="#C9A961" font-style="italic">fixed, no params</text>

    <!-- z node: deterministic combiner -->
    <rect class="det" x="310" y="30" width="70" height="36"/>
    <text x="345" y="46" text-anchor="middle" class="mono" fill="#C9A961">μ + σ·ε</text>
    <text x="345" y="60" text-anchor="middle" class="mut" fill="#C9A961">= z</text>

    <rect class="dec" x="410" y="30" width="120" height="36"/>
    <text x="470" y="52" text-anchor="middle" class="mono" fill="#D97757">Decoder</text>

    <rect class="box" x="560" y="30" width="60" height="36"/>
    <text x="590" y="52" text-anchor="middle" class="mono">ℒ</text>

    <!-- forward arrows -->
    <g class="ink" marker-end="url(#rp-a)">
      <line x1="60" y1="48" x2="90" y2="48"/>
      <line x1="210" y1="48" x2="230" y2="16"/>
      <line x1="210" y1="48" x2="230" y2="80"/>
      <line x1="270" y1="16" x2="310" y2="42"/>
      <line x1="270" y1="80" x2="310" y2="54"/>
      <line x1="264" y1="130" x2="320" y2="60"/>
      <line x1="380" y1="48" x2="410" y2="48"/>
      <line x1="530" y1="48" x2="560" y2="48"/>
    </g>

    <!-- backward gradient flows all the way back -->
    <path class="grad" d="M 560 80 L 410 80 L 345 80 L 345 66 L 250 85 L 210 85 L 150 85" marker-end="url(#rp-g)"/>
    <text x="400" y="110" class="mono" fill="#D97757">✓ gradient flows to μ and σ</text>
    <text x="400" y="126" class="mut" fill="#D97757">encoder gets updated</text>
  </g>
</svg>
