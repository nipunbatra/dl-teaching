<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .axis   { stroke:#1F1F1E; stroke-width:1.1; fill:none; }
      .grid   { stroke:#C9C4B5; stroke-width:0.4; opacity:0.5; }
      .p      { fill:#4A6670; opacity:0.65; }
      .q-bad  { fill:#A8324B; opacity:0.55; }
      .q-good { fill:#7B9E89; opacity:0.7; }
      .ink    { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">ELBO geometry · KL pulls the approximate posterior q(z|x) toward the true prior p(z)</text>

  <!-- LEFT panel: without KL (no structure) -->
  <g transform="translate(40, 80)">
    <text x="180" y="-10" text-anchor="middle" class="tag" fill="#A8324B">WITHOUT KL · q(z|x) wherever it wants</text>
    <rect x="0" y="0" width="360" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>

    <!-- prior p(z) = N(0, I) — faint central Gaussian -->
    <g class="grid">
      <line x1="0" y1="120" x2="360" y2="120"/>
      <line x1="180" y1="0" x2="180" y2="240"/>
    </g>
    <circle cx="180" cy="120" r="60" class="p"/>
    <text x="180" y="54" text-anchor="middle" class="mono" fill="#4A6670">p(z) = N(0, I)</text>

    <!-- q distributions scattered -->
    <ellipse cx="60"  cy="60"  rx="18" ry="14" class="q-bad"/>
    <text x="60"  y="46" text-anchor="middle" class="mono" fill="#A8324B">q(z|x₁)</text>
    <ellipse cx="300" cy="80"  rx="16" ry="12" class="q-bad"/>
    <text x="300" y="66" text-anchor="middle" class="mono" fill="#A8324B">q(z|x₂)</text>
    <ellipse cx="320" cy="200" rx="14" ry="18" class="q-bad"/>
    <text x="320" y="226" text-anchor="middle" class="mono" fill="#A8324B">q(z|x₃)</text>
    <ellipse cx="60"  cy="210" rx="18" ry="14" class="q-bad"/>
    <text x="60"  y="234" text-anchor="middle" class="mono" fill="#A8324B">q(z|x₄)</text>

    <text x="180" y="260" text-anchor="middle" class="mut" fill="#A8324B">sample z ~ N(0, I) → decoder sees garbage</text>
  </g>

  <!-- RIGHT panel: with KL (structured) -->
  <g transform="translate(560, 80)">
    <text x="180" y="-10" text-anchor="middle" class="tag" fill="#7B9E89">WITH KL · q(z|x) pulled toward p(z)</text>
    <rect x="0" y="0" width="360" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>

    <g class="grid">
      <line x1="0" y1="120" x2="360" y2="120"/>
      <line x1="180" y1="0" x2="180" y2="240"/>
    </g>
    <circle cx="180" cy="120" r="60" class="p"/>
    <text x="180" y="54" text-anchor="middle" class="mono" fill="#4A6670">p(z) = N(0, I)</text>

    <!-- Q distributions inside the prior, but distinct -->
    <ellipse cx="150" cy="100" rx="18" ry="14" class="q-good"/>
    <text x="150" y="86" text-anchor="middle" class="mono" fill="#7B9E89">q(z|x₁)</text>
    <ellipse cx="210" cy="105" rx="16" ry="12" class="q-good"/>
    <text x="210" y="91" text-anchor="middle" class="mono" fill="#7B9E89">q(z|x₂)</text>
    <ellipse cx="205" cy="145" rx="14" ry="16" class="q-good"/>
    <text x="205" y="172" text-anchor="middle" class="mono" fill="#7B9E89">q(z|x₃)</text>
    <ellipse cx="155" cy="145" rx="18" ry="14" class="q-good"/>
    <text x="155" y="172" text-anchor="middle" class="mono" fill="#7B9E89">q(z|x₄)</text>

    <text x="180" y="260" text-anchor="middle" class="mut" fill="#7B9E89">sample z ~ N(0, I) → lands in some q's support → valid output</text>
  </g>

  <!-- ELBO decomposition -->
  <g transform="translate(40, 340)">
    <rect x="0" y="0" width="880" height="50" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="440" y="22" text-anchor="middle" class="mono" font-size="14">
      ELBO = <tspan fill="#4A6670" font-weight="600">E_{q(z|x)}[log p(x|z)]</tspan>  −  <tspan fill="#7B9E89" font-weight="600">KL(q(z|x) ∥ p(z))</tspan>
    </text>
    <text x="440" y="42" text-anchor="middle" class="mut">
      maximize <tspan fill="#4A6670">reconstruction</tspan> · minimize <tspan fill="#7B9E89">divergence from prior</tspan> · two competing objectives
    </text>
  </g>
</svg>
