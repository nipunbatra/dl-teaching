<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .enc    { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.4; rx:4; ry:4; }
      .dec    { fill:#EAD3C5; stroke:#D97757; stroke-width:1.4; rx:4; ry:4; }
      .latent { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.4; rx:20; ry:20; }
      .box    { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1; rx:3; ry:3; }
      .ink    { stroke:#1F1F1E; fill:none; stroke-width:1.2; }
      .mu     { stroke:#7B9E89; stroke-width:1.5; fill:none; }
      .noise  { fill:#C9A961; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="vs-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Autoencoder vs VAE — a deterministic point vs a distribution in latent space</text>

  <!-- AE (top) -->
  <g transform="translate(40, 70)">
    <text x="0" y="-6" class="tag">AUTOENCODER (deterministic)</text>

    <rect class="box" x="0" y="30" width="60" height="60"/>
    <text x="30" y="64" text-anchor="middle" class="mono">x</text>

    <rect class="enc" x="90" y="35" width="80" height="50"/>
    <text x="130" y="58" text-anchor="middle" class="mono" fill="#4A6670">Encoder</text>
    <text x="130" y="74" text-anchor="middle" class="mut" fill="#4A6670">q(z|x)</text>

    <circle class="latent" cx="230" cy="60" r="22"/>
    <text x="230" y="65" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">z</text>
    <text x="230" y="98" text-anchor="middle" class="mut" fill="#7B9E89">one point</text>

    <rect class="dec" x="290" y="35" width="80" height="50"/>
    <text x="330" y="58" text-anchor="middle" class="mono" fill="#D97757">Decoder</text>
    <text x="330" y="74" text-anchor="middle" class="mut" fill="#D97757">p(x|z)</text>

    <rect class="box" x="400" y="30" width="60" height="60"/>
    <text x="430" y="64" text-anchor="middle" class="mono">x̂</text>

    <g class="ink" marker-end="url(#vs-a)">
      <line x1="60" y1="60" x2="90" y2="60"/>
      <line x1="170" y1="60" x2="208" y2="60"/>
      <line x1="252" y1="60" x2="290" y2="60"/>
      <line x1="370" y1="60" x2="400" y2="60"/>
    </g>

    <!-- Loss -->
    <text x="500" y="50" class="mono">ℒ = ‖x − x̂‖²</text>
    <text x="500" y="68" class="mut">(reconstruction only)</text>

    <!-- Problem -->
    <rect x="700" y="20" width="220" height="80" fill="#F6D4CC" stroke="#A8324B"/>
    <text x="710" y="38" class="tag" fill="#A8324B">PROBLEM</text>
    <text x="710" y="58" class="mut" fill="#A8324B">Latent space is irregular —</text>
    <text x="710" y="72" class="mut" fill="#A8324B">sampling random z doesn't</text>
    <text x="710" y="86" class="mut" fill="#A8324B">produce meaningful outputs.</text>
  </g>

  <!-- Divider -->
  <line x1="30" y1="180" x2="930" y2="180" stroke="#C9C4B5" stroke-dasharray="3 3"/>

  <!-- VAE (bottom) -->
  <g transform="translate(40, 210)">
    <text x="0" y="-6" class="tag" fill="#D97757">VAE (probabilistic)</text>

    <rect class="box" x="0" y="30" width="60" height="60"/>
    <text x="30" y="64" text-anchor="middle" class="mono">x</text>

    <!-- Encoder outputs μ and σ -->
    <rect class="enc" x="90" y="35" width="100" height="50"/>
    <text x="140" y="58" text-anchor="middle" class="mono" fill="#4A6670">Encoder</text>
    <text x="140" y="74" text-anchor="middle" class="mut" fill="#4A6670">→ μ, log σ²</text>

    <!-- μ and σ branches -->
    <g transform="translate(210, 20)">
      <rect class="box" x="0" y="0" width="40" height="26"/>
      <text x="20" y="18" text-anchor="middle" class="mono" fill="#7B9E89">μ</text>
      <rect class="box" x="0" y="50" width="40" height="26"/>
      <text x="20" y="68" text-anchor="middle" class="mono" fill="#C9A961">σ</text>
    </g>

    <!-- Reparameterization: z = μ + σ·ε -->
    <g transform="translate(280, 40)">
      <circle class="noise" cx="10" cy="-10" r="14"/>
      <text x="10" y="-5" text-anchor="middle" class="mono" fill="#F0EEE5" font-size="10">ε</text>
      <text x="10" y="-30" text-anchor="middle" class="mut">ε ~ N(0,1)</text>

      <circle cx="50" cy="20" r="16" fill="#F6F0DF" stroke="#C9A961" stroke-width="1.5"/>
      <text x="50" y="24" text-anchor="middle" class="mono" fill="#C9A961">⊛</text>
      <text x="50" y="50" text-anchor="middle" class="mut">reparam trick</text>
    </g>

    <!-- z -->
    <circle class="latent" cx="380" cy="60" r="22"/>
    <text x="380" y="65" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">z</text>
    <text x="380" y="98" text-anchor="middle" class="mut" fill="#7B9E89">sampled</text>

    <rect class="dec" x="440" y="35" width="80" height="50"/>
    <text x="480" y="58" text-anchor="middle" class="mono" fill="#D97757">Decoder</text>
    <text x="480" y="74" text-anchor="middle" class="mut" fill="#D97757">p(x|z)</text>

    <rect class="box" x="550" y="30" width="60" height="60"/>
    <text x="580" y="64" text-anchor="middle" class="mono">x̂</text>

    <g class="ink" marker-end="url(#vs-a)">
      <line x1="60" y1="60" x2="90" y2="60"/>
      <line x1="190" y1="45" x2="210" y2="40"/>
      <line x1="190" y1="75" x2="210" y2="80"/>
      <line x1="250" y1="40" x2="290" y2="50"/>
      <line x1="250" y1="80" x2="290" y2="60"/>
      <line x1="340" y1="60" x2="358" y2="60"/>
      <line x1="402" y1="60" x2="440" y2="60"/>
      <line x1="520" y1="60" x2="550" y2="60"/>
    </g>

    <!-- Loss: ELBO = recon + KL -->
    <rect x="650" y="20" width="270" height="90" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="660" y="38" class="tag">ELBO LOSS</text>
    <text x="785" y="62" text-anchor="middle" class="mono">ℒ = −E[log p(x|z)] + KL(q||p)</text>
    <text x="785" y="82" text-anchor="middle" class="mut">reconstruction  +  regularization</text>
    <text x="785" y="100" text-anchor="middle" class="mut" font-style="italic">KL keeps q(z|x) close to N(0, I)</text>
  </g>

  <!-- Footer -->
  <g transform="translate(40, 400)">
    <text x="440" y="0" text-anchor="middle" class="mut" font-style="italic">
      VAE's KL term <tspan fill="#7B9E89" font-weight="600">regularizes the latent space</tspan> toward a standard normal → sampling random z produces valid outputs → <tspan fill="#D97757" font-weight="600">you can generate</tspan>.
    </text>
  </g>
</svg>
