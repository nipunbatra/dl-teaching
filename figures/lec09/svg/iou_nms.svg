<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .ink    { stroke:#1F1F1E; fill:none; stroke-width:1.4; }
      .gt     { fill:none; stroke:#7B9E89; stroke-width:2.5; stroke-dasharray:5 3; }
      .pred   { fill:none; stroke:#D97757; stroke-width:2.2; }
      .intersect{ fill:#EAD3C5; fill-opacity:0.5; stroke:none; }
      .union   { fill:#D8E3DE; fill-opacity:0.2; stroke:none; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:12px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">IoU and NMS — the two building blocks every detector needs</text>

  <!-- LEFT: IoU -->
  <g transform="translate(40, 70)">
    <text x="200" y="-10" text-anchor="middle" class="tag">INTERSECTION OVER UNION</text>
    <rect x="0" y="0" width="400" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>

    <!-- Union (both boxes combined, faint shaded) -->
    <path class="union" d="M 60 60 L 240 60 L 240 90 L 320 90 L 320 190 L 140 190 L 140 160 L 60 160 Z"/>

    <!-- Intersection rectangle -->
    <rect class="intersect" x="140" y="90" width="100" height="70"/>

    <!-- Ground truth box (sage, dashed) -->
    <rect class="gt" x="60" y="60" width="180" height="100"/>
    <text x="65" y="54" class="mono" fill="#7B9E89" font-weight="600">ground truth</text>

    <!-- Predicted box (rust, solid) -->
    <rect class="pred" x="140" y="90" width="180" height="100"/>
    <text x="220" y="210" class="mono" fill="#D97757" font-weight="600">prediction</text>

    <!-- Intersection label -->
    <text x="190" y="130" text-anchor="middle" class="mono" fill="#1F1F1E">∩</text>

    <!-- Formula -->
    <g transform="translate(30, 240)">
      <rect x="0" y="0" width="340" height="60" fill="#EEEBDF" stroke="#C9C4B5"/>
      <text x="14" y="22" class="mono" font-size="13">IoU = Area(∩) / Area(∪)</text>
      <text x="14" y="42" class="mono" font-size="12">= 7000 / 25400  ≈  0.28</text>
      <text x="14" y="56" class="mut" font-style="italic">typical threshold: 0.5 for detection</text>
    </g>
  </g>

  <!-- RIGHT: NMS -->
  <g transform="translate(480, 70)">
    <text x="200" y="-10" text-anchor="middle" class="tag" fill="#D97757">NON-MAX SUPPRESSION</text>
    <rect x="0" y="0" width="400" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>

    <!-- Before: 5 overlapping boxes on one object -->
    <g>
      <rect class="pred" x="80" y="40" width="200" height="140" stroke-width="1.2" stroke="#D97757" opacity="0.5"/>
      <text x="80" y="36" class="mono" font-size="10" fill="#D97757">0.92</text>

      <rect class="pred" x="100" y="55" width="200" height="140" stroke-width="1.2" stroke="#D97757" opacity="0.5"/>
      <text x="100" y="51" class="mono" font-size="10" fill="#D97757">0.87</text>

      <rect class="pred" x="70" y="60" width="190" height="130" stroke-width="1.2" stroke="#D97757" opacity="0.5"/>
      <text x="70" y="56" class="mono" font-size="10" fill="#D97757">0.78</text>

      <rect class="pred" x="90" y="50" width="210" height="145" stroke-width="1.2" stroke="#D97757" opacity="0.5"/>
      <text x="90" y="46" class="mono" font-size="10" fill="#D97757">0.65</text>
    </g>

    <!-- After (winning box highlighted) -->
    <rect x="80" y="40" width="200" height="140" fill="none" stroke="#1F1F1E" stroke-width="3"/>
    <text x="180" y="220" text-anchor="middle" class="mono" fill="#1F1F1E" font-weight="600">keep: highest score (0.92)</text>

    <!-- Algorithm steps -->
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="400" height="60" fill="#F6D4CC" stroke="#A8324B"/>
      <text x="14" y="20" class="mono" font-size="12" fill="#A8324B">① sort by score (desc)</text>
      <text x="14" y="36" class="mono" font-size="12" fill="#A8324B">② keep top, discard any overlap (IoU &gt; 0.5)</text>
      <text x="14" y="52" class="mono" font-size="12" fill="#A8324B">③ repeat on remaining</text>
    </g>
  </g>

  <!-- Bottom: why both matter -->
  <g transform="translate(60, 370)">
    <text x="420" y="0" text-anchor="middle" class="mut" font-style="italic">
      <tspan fill="#7B9E89" font-weight="600">IoU</tspan> measures bbox quality ·
      <tspan fill="#D97757" font-weight="600">NMS</tspan> collapses redundant predictions on the same object.
      Together they turn hundreds of raw boxes into one clean detection per object.
    </text>
  </g>
</svg>
