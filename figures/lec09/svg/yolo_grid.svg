<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .cell   { fill:#F0EEE5; stroke:#6B6A65; stroke-width:0.5; }
      .cell-hit { fill:#EAD3C5; stroke:#D97757; stroke-width:1.5; }
      .bbox   { fill:none; stroke:#D97757; stroke-width:2; }
      .bbox2  { fill:none; stroke:#7B9E89; stroke-width:2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">YOLO — one forward pass predicts every box on an S×S grid</text>

  <!-- LEFT: image + grid -->
  <g transform="translate(40, 70)">
    <text x="200" y="-10" text-anchor="middle" class="tag">S × S GRID · S = 7</text>

    <!-- 7x7 grid over 400x280 area -->
    <g>
      <rect class="cell" x="0"   y="0"   width="400" height="280"/>
      <!-- grid lines -->
      <g stroke="#6B6A65" stroke-width="0.5">
        <line x1="57"  y1="0" x2="57"  y2="280"/>
        <line x1="114" y1="0" x2="114" y2="280"/>
        <line x1="171" y1="0" x2="171" y2="280"/>
        <line x1="228" y1="0" x2="228" y2="280"/>
        <line x1="285" y1="0" x2="285" y2="280"/>
        <line x1="342" y1="0" x2="342" y2="280"/>
        <line x1="0" y1="40"  x2="400" y2="40"/>
        <line x1="0" y1="80"  x2="400" y2="80"/>
        <line x1="0" y1="120" x2="400" y2="120"/>
        <line x1="0" y1="160" x2="400" y2="160"/>
        <line x1="0" y1="200" x2="400" y2="200"/>
        <line x1="0" y1="240" x2="400" y2="240"/>
      </g>

      <!-- Stylized "cat" centre -->
      <g transform="translate(120, 120)">
        <ellipse cx="60" cy="40" rx="70" ry="45" fill="#D97757" opacity="0.7"/>
        <path d="M 25 18 L 20 0 L 40 15 Z" fill="#D97757" opacity="0.7"/>
        <path d="M 95 18 L 100 0 L 80 15 Z" fill="#D97757" opacity="0.7"/>
        <circle cx="40" cy="35" r="4" fill="#1F1F1E"/>
        <circle cx="80" cy="35" r="4" fill="#1F1F1E"/>
      </g>

      <!-- "Hit" cell: center of object -->
      <rect class="cell-hit" x="171" y="160" width="57" height="40" fill-opacity="0.35"/>
      <text x="200" y="184" text-anchor="middle" class="mono" fill="#D97757">hit</text>

      <!-- Predicted bbox from that cell -->
      <rect class="bbox" x="60" y="85" width="260" height="180"/>

      <!-- Anchor 2 (different aspect) -->
      <rect class="bbox2" x="110" y="60" width="180" height="230" stroke-dasharray="4 2" opacity="0.5"/>
    </g>
  </g>

  <!-- RIGHT: what each cell predicts -->
  <g transform="translate(480, 70)">
    <text x="200" y="-10" text-anchor="middle" class="tag">WHAT EACH CELL OUTPUTS</text>
    <rect x="0" y="0" width="400" height="280" fill="#F0EEE5" stroke="#C9C4B5"/>

    <g transform="translate(20, 20)">
      <text x="0" y="0" class="mono" font-weight="600">For each of B anchors:</text>
      <g class="mono" font-size="11" fill="#4A6670">
        <text x="14" y="22">(x, y)       — offset within cell</text>
        <text x="14" y="42">(w, h)       — box width / height</text>
        <text x="14" y="62">confidence   — is there any object?</text>
      </g>
      <text x="0" y="95" class="mono" font-weight="600">Plus for the whole cell:</text>
      <g class="mono" font-size="11" fill="#4A6670">
        <text x="14" y="117">p(cat) · p(dog) · p(car) · ...</text>
        <text x="14" y="135">= K class probabilities</text>
      </g>

      <text x="0" y="170" class="mono" font-weight="600">Total output shape</text>
      <text x="0" y="192" class="mono" fill="#D97757">S × S × (B · 5 + K)</text>
      <text x="0" y="212" class="mut">e.g. 7 × 7 × (2 · 5 + 20) = 7 × 7 × 30</text>
      <text x="0" y="236" class="mut" font-style="italic">…predicted in ONE forward pass</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 370)">
    <text x="420" y="0" text-anchor="middle" class="mut" font-style="italic">
      YOLO · "you only look once" — reshape detection into a single regression problem on a grid. Real-time inference, all modern versions (v3–v11).
    </text>
  </g>
</svg>
