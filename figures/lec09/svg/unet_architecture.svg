<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box-enc { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.4; rx:2; ry:2; }
      .box-dec { fill:#EAD3C5; stroke:#D97757; stroke-width:1.4; rx:2; ry:2; }
      .bridge  { fill:#F6F0DF; stroke:#C9A961; stroke-width:1.4; rx:2; ry:2; }
      .skip    { stroke:#7B9E89; stroke-width:2; fill:none; stroke-dasharray:4 3; }
      .down    { stroke:#1F1F1E; fill:none; stroke-width:1.4; }
      .up      { stroke:#1F1F1E; fill:none; stroke-width:1.4; }
      .mono    { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut     { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl     { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag     { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="un-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
    <marker id="un-s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7B9E89"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">U-Net — encoder-decoder with skip connections · the standard for segmentation</text>

  <!-- Encoder column (left) -->
  <g>
    <rect class="box-enc" x="60"  y="80"  width="120" height="40"/>
    <text x="120" y="104" text-anchor="middle" class="mono">64 · 128²</text>
    <rect class="box-enc" x="80"  y="140" width="100" height="40"/>
    <text x="130" y="164" text-anchor="middle" class="mono">128 · 64²</text>
    <rect class="box-enc" x="100" y="200" width="80"  height="40"/>
    <text x="140" y="224" text-anchor="middle" class="mono">256 · 32²</text>
    <rect class="box-enc" x="120" y="260" width="60"  height="40"/>
    <text x="150" y="284" text-anchor="middle" class="mono">512 · 16²</text>

    <!-- Bridge -->
    <rect class="bridge" x="140" y="320" width="40" height="40"/>
    <text x="160" y="344" text-anchor="middle" class="mono">1024 · 8²</text>
  </g>

  <!-- Decoder column (right) -->
  <g>
    <rect class="box-dec" x="780" y="80"  width="120" height="40"/>
    <text x="840" y="104" text-anchor="middle" class="mono">64 · 128²</text>
    <rect class="box-dec" x="760" y="140" width="100" height="40"/>
    <text x="810" y="164" text-anchor="middle" class="mono">128 · 64²</text>
    <rect class="box-dec" x="740" y="200" width="80"  height="40"/>
    <text x="780" y="224" text-anchor="middle" class="mono">256 · 32²</text>
    <rect class="box-dec" x="720" y="260" width="60"  height="40"/>
    <text x="750" y="284" text-anchor="middle" class="mono">512 · 16²</text>
  </g>

  <!-- Input -->
  <rect x="10" y="92" width="40" height="16" fill="#EAE7DC" stroke="#6B6A65"/>
  <text x="30" y="104" text-anchor="middle" class="mono">x</text>
  <text x="30" y="124" text-anchor="middle" class="mut">image</text>

  <!-- Output -->
  <rect x="910" y="92" width="40" height="16" fill="#D8E3DE" stroke="#7B9E89"/>
  <text x="930" y="104" text-anchor="middle" class="mono">ŷ</text>
  <text x="930" y="124" text-anchor="middle" class="mut">mask</text>

  <!-- Down arrows (encoder) -->
  <g class="down" marker-end="url(#un-a)">
    <line x1="120" y1="120" x2="120" y2="140"/>
    <line x1="130" y1="180" x2="130" y2="200"/>
    <line x1="140" y1="240" x2="140" y2="260"/>
    <line x1="150" y1="300" x2="150" y2="320"/>
  </g>

  <!-- Bridge arrow to decoder -->
  <line x1="180" y1="340" x2="720" y2="340" class="down" marker-end="url(#un-a)"/>
  <text x="450" y="334" text-anchor="middle" class="mut">bottleneck · smallest spatial, richest semantic</text>

  <!-- Up arrows (decoder) -->
  <g class="up" marker-end="url(#un-a)">
    <line x1="750" y1="260" x2="750" y2="300"/>
    <line x1="780" y1="200" x2="780" y2="260"/>
    <line x1="810" y1="140" x2="810" y2="200"/>
    <line x1="840" y1="80"  x2="840" y2="140"/>
  </g>

  <!-- Input → encoder -->
  <line x1="50" y1="100" x2="60" y2="100" class="down" marker-end="url(#un-a)"/>
  <!-- Decoder → output -->
  <line x1="900" y1="100" x2="910" y2="100" class="down" marker-end="url(#un-a)"/>

  <!-- SKIPS (green dashed) - encoder block to decoder block at same resolution -->
  <g class="skip" marker-end="url(#un-s)">
    <path d="M 180 100 Q 480 60 780 100"/>
    <path d="M 180 160 Q 480 120 760 160"/>
    <path d="M 180 220 Q 480 180 740 220"/>
    <path d="M 180 280 Q 480 240 720 280"/>
  </g>

  <!-- Legend -->
  <g transform="translate(320, 60)">
    <rect class="box-enc" x="0" y="0" width="18" height="12"/>
    <text x="24" y="10" class="mono" font-size="10">encoder (downsample)</text>
    <rect class="box-dec" x="140" y="0" width="18" height="12"/>
    <text x="164" y="10" class="mono" font-size="10">decoder (upsample)</text>
    <line x1="300" y1="6" x2="320" y2="6" class="skip"/>
    <text x="326" y="10" class="mono" font-size="10" fill="#7B9E89">skip (concat)</text>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 385)">
    <text x="420" y="0" text-anchor="middle" class="mut" font-style="italic">
      Ronneberger 2015 · skip connections <tspan fill="#7B9E89" font-weight="600">bring back fine spatial detail</tspan> that downsampling lost.
      Still the default for medical, satellite, and diffusion U-Nets (L21–22).
    </text>
  </g>
</svg>
