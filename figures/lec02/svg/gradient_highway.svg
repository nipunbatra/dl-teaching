<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .ink    { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .acc    { stroke:#D97757; fill:none; stroke-width:2.4; }
      .box    { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.2; rx:3; ry:3; }
      .box-a  { fill:#EAD3C5; stroke:#D97757; stroke-width:1.2; rx:3; ry:3; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6B6A65"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#D97757"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">The skip connection is a gradient highway</text>

  <!-- PLAIN -->
  <g transform="translate(40, 80)">
    <text x="0"  y="-4" class="tag">PLAIN · gradient passes through every block</text>
    <g>
      <rect class="box" x="0"   y="20" width="90"  height="40"/>
      <rect class="box" x="110" y="20" width="90"  height="40"/>
      <rect class="box" x="220" y="20" width="90"  height="40"/>
      <rect class="box" x="330" y="20" width="90"  height="40"/>
      <rect class="box" x="440" y="20" width="90"  height="40"/>
      <rect class="box" x="550" y="20" width="90"  height="40"/>
      <rect class="box" x="660" y="20" width="90"  height="40"/>
      <rect class="box" x="770" y="20" width="90"  height="40"/>
      <text x="45"  y="45" text-anchor="middle" class="mono">layer 1</text>
      <text x="155" y="45" text-anchor="middle" class="mono">layer 2</text>
      <text x="265" y="45" text-anchor="middle" class="mono">layer 3</text>
      <text x="375" y="45" text-anchor="middle" class="mono">layer 4</text>
      <text x="485" y="45" text-anchor="middle" class="mono">...</text>
      <text x="595" y="45" text-anchor="middle" class="mono">layer L−2</text>
      <text x="705" y="45" text-anchor="middle" class="mono">layer L−1</text>
      <text x="815" y="45" text-anchor="middle" class="mono">layer L</text>
    </g>
    <!-- backward arrow with fading magnitude -->
    <path class="ink" d="M 800 80 L 50 80" marker-end="url(#a1)" opacity="0.8" stroke-dasharray="5 3"/>
    <text x="800" y="102" text-anchor="end" class="mono">∂ℒ/∂h_L = 1</text>
    <text x="620" y="102" text-anchor="middle" class="mono" opacity="0.8">× 0.4</text>
    <text x="440" y="102" text-anchor="middle" class="mono" opacity="0.55">× 0.4</text>
    <text x="260" y="102" text-anchor="middle" class="mono" opacity="0.3">× 0.4</text>
    <text x="80"  y="102" text-anchor="middle" class="mono" opacity="0.15" fill="#A8324B" font-weight="600">≈ 0</text>
    <text x="430" y="128" text-anchor="middle" class="mut" font-style="italic">product of small Jacobians → <tspan fill="#A8324B" font-weight="600">vanishing gradient</tspan></text>
  </g>

  <!-- RESNET -->
  <g transform="translate(40, 220)">
    <text x="0"  y="-4" class="tag" fill="#D97757">RESNET · gradient has a direct shortcut to every layer</text>
    <g>
      <rect class="box-a" x="0"   y="20" width="90"  height="40"/>
      <rect class="box-a" x="110" y="20" width="90"  height="40"/>
      <rect class="box-a" x="220" y="20" width="90"  height="40"/>
      <rect class="box-a" x="330" y="20" width="90"  height="40"/>
      <rect class="box-a" x="440" y="20" width="90"  height="40"/>
      <rect class="box-a" x="550" y="20" width="90"  height="40"/>
      <rect class="box-a" x="660" y="20" width="90"  height="40"/>
      <rect class="box-a" x="770" y="20" width="90"  height="40"/>
      <text x="45"  y="45" text-anchor="middle" class="mono">block 1</text>
      <text x="155" y="45" text-anchor="middle" class="mono">block 2</text>
      <text x="265" y="45" text-anchor="middle" class="mono">block 3</text>
      <text x="375" y="45" text-anchor="middle" class="mono">block 4</text>
      <text x="485" y="45" text-anchor="middle" class="mono">...</text>
      <text x="595" y="45" text-anchor="middle" class="mono">block L−2</text>
      <text x="705" y="45" text-anchor="middle" class="mono">block L−1</text>
      <text x="815" y="45" text-anchor="middle" class="mono">block L</text>
    </g>
    <!-- skip arcs -->
    <g class="acc" opacity="0.6" stroke-dasharray="3 2">
      <path d="M 0 20 Q 55 0 110 20"/>
      <path d="M 110 20 Q 165 0 220 20"/>
      <path d="M 220 20 Q 275 0 330 20"/>
      <path d="M 330 20 Q 385 0 440 20"/>
      <path d="M 440 20 Q 495 0 550 20"/>
      <path d="M 550 20 Q 605 0 660 20"/>
      <path d="M 660 20 Q 715 0 770 20"/>
      <path d="M 770 20 Q 825 0 860 20"/>
    </g>

    <!-- backward highway -->
    <path class="acc" d="M 800 85 L 50 85" marker-end="url(#a2)"/>
    <text x="800" y="102" text-anchor="end" class="mono" fill="#D97757">∂ℒ/∂h_L = 1</text>
    <text x="430" y="102" text-anchor="middle" class="mono" fill="#D97757">the "+ I" term always carries gradient</text>
    <text x="60"  y="102" text-anchor="middle" class="mono" fill="#D97757" font-weight="600">≠ 0</text>
  </g>

  <!-- footer insight -->
  <text x="480" y="345" text-anchor="middle" class="mut">
    Precisely: <tspan font-family="'JetBrains Mono'" fill="#1F1F1E">∂y/∂x = ∂F/∂x + I</tspan>.
    The identity term never shrinks — it's a parallel path, not a per-block multiplier.
  </text>
</svg>
