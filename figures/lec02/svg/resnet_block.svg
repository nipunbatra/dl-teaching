<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box    { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:4; ry:4; }
      .box-a  { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:4; ry:4; }
      .ink    { stroke:#1F1F1E; fill:none; stroke-width:1.5; }
      .acc    { stroke:#D97757; fill:none; stroke-width:2.2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:12px; fill:#1F1F1E; }
      .lbl    { fill:#1F1F1E; font-size:13px; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97757"/>
    </marker>
  </defs>

  <text x="480" y="30" text-anchor="middle" class="ttl">A residual block — learn the <tspan fill="#D97757" font-style="italic">update</tspan>, not the whole mapping</text>

  <!-- LEFT: plain block -->
  <g transform="translate(60, 80)">
    <text x="140" y="-10" text-anchor="middle" class="tag">PLAIN BLOCK</text>
    <rect x="105" y="10"  width="70" height="34" class="box"/>
    <text x="140" y="32" text-anchor="middle" class="mono">x</text>

    <rect x="90" y="70"  width="100" height="34" class="box"/>
    <text x="140" y="92" text-anchor="middle" class="mono">Linear + BN</text>

    <rect x="90" y="125" width="100" height="34" class="box"/>
    <text x="140" y="147" text-anchor="middle" class="mono">ReLU</text>

    <rect x="90" y="180" width="100" height="34" class="box"/>
    <text x="140" y="202" text-anchor="middle" class="mono">Linear + BN</text>

    <rect x="90" y="235" width="100" height="34" class="box"/>
    <text x="140" y="257" text-anchor="middle" class="mono">ReLU</text>

    <rect x="105" y="295" width="70" height="34" class="box"/>
    <text x="140" y="317" text-anchor="middle" class="mono">H(x)</text>

    <g class="ink" marker-end="url(#arrR)">
      <line x1="140" y1="44"  x2="140" y2="70"/>
      <line x1="140" y1="104" x2="140" y2="125"/>
      <line x1="140" y1="159" x2="140" y2="180"/>
      <line x1="140" y1="214" x2="140" y2="235"/>
      <line x1="140" y1="269" x2="140" y2="295"/>
    </g>

    <text x="140" y="355" text-anchor="middle" class="mut">The block learns</text>
    <text x="140" y="370" text-anchor="middle" class="mono" font-weight="600">H(x)  directly</text>
  </g>

  <!-- divider -->
  <line x1="340" y1="80" x2="340" y2="380" stroke="#C9C4B5" stroke-dasharray="3 3"/>

  <!-- MIDDLE: residual block -->
  <g transform="translate(380, 80)">
    <text x="160" y="-10" text-anchor="middle" class="tag" fill="#D97757">RESIDUAL BLOCK</text>

    <rect x="125" y="10"  width="70" height="34" class="box"/>
    <text x="160" y="32" text-anchor="middle" class="mono">x</text>

    <rect x="110" y="70"  width="100" height="34" class="box-a"/>
    <text x="160" y="92" text-anchor="middle" class="mono">Linear + BN</text>

    <rect x="110" y="125" width="100" height="34" class="box-a"/>
    <text x="160" y="147" text-anchor="middle" class="mono">ReLU</text>

    <rect x="110" y="180" width="100" height="34" class="box-a"/>
    <text x="160" y="202" text-anchor="middle" class="mono">Linear + BN</text>

    <!-- the + node -->
    <circle cx="160" cy="250" r="16" fill="#EAD3C5" stroke="#D97757" stroke-width="1.3"/>
    <text x="160" y="255" text-anchor="middle" class="mono" font-weight="600">+</text>

    <rect x="110" y="290" width="100" height="34" class="box"/>
    <text x="160" y="312" text-anchor="middle" class="mono">ReLU</text>

    <rect x="125" y="350" width="70" height="28" class="box"/>
    <text x="160" y="370" text-anchor="middle" class="mono">y</text>

    <g class="ink" marker-end="url(#arrR)">
      <line x1="160" y1="44"  x2="160" y2="70"/>
      <line x1="160" y1="104" x2="160" y2="125"/>
      <line x1="160" y1="159" x2="160" y2="180"/>
    </g>
    <g class="ink">
      <line x1="160" y1="214" x2="160" y2="234"/>
      <line x1="160" y1="266" x2="160" y2="290"/>
      <line x1="160" y1="324" x2="160" y2="350"/>
    </g>

    <!-- skip connection -->
    <path class="acc" marker-end="url(#arrA)" d="M 195 27 L 260 27 L 260 250 L 176 250"/>
    <text x="270" y="125" class="mono" fill="#D97757" font-weight="600">skip / identity</text>
    <text x="270" y="143" class="mut" fill="#D97757">x bypasses the block</text>

    <!-- F label -->
    <rect x="220" y="150" width="60" height="24" fill="#F6F0DF" stroke="#C9A961"/>
    <text x="250" y="166" text-anchor="middle" class="mono" fill="#C9A961" font-weight="600">F(x)</text>
    <path d="M 210 150 Q 220 140 218 130" stroke="#C9A961" stroke-width="1" fill="none"/>
  </g>

  <!-- RIGHT: the math -->
  <g transform="translate(720, 80)">
    <text x="120" y="-10" text-anchor="middle" class="tag">WHY IT WORKS</text>
    <rect x="0" y="10" width="230" height="300" fill="#F0EEE5" stroke="#C9C4B5"/>
    <text x="15" y="40" class="lbl" font-weight="600">Forward:</text>
    <text x="15" y="62" class="mono">y = F(x) + x</text>

    <text x="15" y="100" class="lbl" font-weight="600">Jacobian:</text>
    <text x="15" y="122" class="mono">∂y/∂x = ∂F/∂x + I</text>

    <text x="15" y="160" class="lbl" font-weight="600">Consequence:</text>
    <text x="15" y="180" class="mut">even if ∂F/∂x collapses to 0,</text>
    <text x="15" y="196" class="mut">the identity term <tspan fill="#D97757" font-weight="600">I</tspan> still carries</text>
    <text x="15" y="212" class="mut">gradient back to early layers.</text>

    <text x="15" y="248" class="lbl" font-weight="600">If the optimum ≈ identity:</text>
    <text x="15" y="266" class="mut">only need F ≈ 0 (easy).</text>
    <text x="15" y="282" class="mut">vs. learning H ≈ identity</text>
    <text x="15" y="298" class="mut">through nonlinearities (hard).</text>
  </g>
</svg>
