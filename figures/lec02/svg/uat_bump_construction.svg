<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .axis  { stroke:#1F1F1E; stroke-width:1; }
      .grid  { stroke:#C9C4B5; stroke-width:0.5; }
      .r1    { stroke:#4A6670; stroke-width:1.8; fill:none; }
      .r2    { stroke:#D97757; stroke-width:1.8; fill:none; }
      .sum   { stroke:#1F1F1E; stroke-width:2.2; fill:none; }
      .fill  { fill:#EAD3C5; opacity:0.4; stroke:none; }
      .lbl   { fill:#1F1F1E; font-size:13px; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#4A6670; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Two ReLUs = one bump. Many bumps = any curve.</text>

  <!-- Panel 1: single ReLU -->
  <g transform="translate(40, 70)">
    <text x="130" y="-10" text-anchor="middle" class="tag">STEP 1 · one ReLU</text>
    <rect x="0" y="0" width="260" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0"   y1="170" x2="260" y2="170" class="axis"/>
    <line x1="130" y1="10"  x2="130" y2="190" class="axis"/>
    <!-- ReLU: max(0, x-0.2) ish -->
    <path class="r1" d="M 0 170 L 130 170 L 260 40"/>
    <text x="150" y="145" class="mono">max(0, w·x + b)</text>
    <text x="130" y="195" text-anchor="middle" class="mut">a "half-plane" kink</text>
  </g>

  <!-- Panel 2: two ReLUs -->
  <g transform="translate(330, 70)">
    <text x="130" y="-10" text-anchor="middle" class="tag">STEP 2 · subtract another ReLU</text>
    <rect x="0" y="0" width="260" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0"   y1="170" x2="260" y2="170" class="axis"/>
    <line x1="130" y1="10"  x2="130" y2="190" class="axis"/>
    <!-- ReLU 1 (blue, goes up) -->
    <path class="r1" d="M 0 170 L 80 170 L 260 40"/>
    <!-- ReLU 2 (rust, goes up then cancels) -->
    <path class="r2" d="M 0 170 L 180 170 L 260 110"/>
    <text x="50"  y="145" class="mono" fill="#4A6670">+ ReLU₁</text>
    <text x="150" y="195" text-anchor="middle" class="mono" fill="#D97757">− ReLU₂</text>
  </g>

  <!-- Panel 3: sum — bump -->
  <g transform="translate(620, 70)">
    <text x="130" y="-10" text-anchor="middle" class="tag">STEP 3 · a localized bump</text>
    <rect x="0" y="0" width="260" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0"   y1="170" x2="260" y2="170" class="axis"/>
    <line x1="130" y1="10"  x2="130" y2="190" class="axis"/>
    <!-- shaded bump -->
    <polygon class="fill" points="80,170 130,170 190,60 240,170"/>
    <polyline class="sum" points="0,170 80,170 140,80 180,90 240,170 260,170" />
    <text x="180" y="70" class="mono" fill="#1F1F1E">bump(x)</text>
  </g>

  <!-- bottom row: N bumps approximating a target -->
  <g transform="translate(40, 290)">
    <text x="0" y="0" class="tag">TAKEAWAY</text>
    <text x="0" y="24" class="mut" font-size="13" font-style="italic" fill="#1F1F1E">
      Place <tspan fill="#D97757" font-weight="600">N bumps</tspan> along the x-axis, weight them by <tspan font-family="'JetBrains Mono'" fill="#4A6670">αᵢ</tspan>, and you can get ε-close to any continuous function.
    </text>
    <text x="0" y="48" class="mut">
      In <tspan font-style="italic">d</tspan> dimensions: need ~O(1/ε<tspan baseline-shift="super" font-size="9">d/2</tspan>) bumps — the curse of dimensionality (why we need depth, coming up).
    </text>
  </g>
</svg>
