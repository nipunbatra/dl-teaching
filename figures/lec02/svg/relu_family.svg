<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .axis  { stroke:#1F1F1E; stroke-width:1; fill:none; }
      .grid  { stroke:#C9C4B5; stroke-width:0.4; opacity:0.6; }
      .relu  { stroke:#A8324B; stroke-width:2.2; fill:none; }
      .lrelu { stroke:#D97757; stroke-width:2.2; fill:none; }
      .gelu  { stroke:#4A6670; stroke-width:2.2; fill:none; }
      .silu  { stroke:#7B9E89; stroke-width:2.2; fill:none; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">The ReLU family — four shapes, same "let positive signal through" idea</text>

  <!-- Panel 1: ReLU -->
  <g transform="translate(40, 70)">
    <text x="100" y="-8" text-anchor="middle" class="tag" fill="#A8324B">RELU</text>
    <rect x="0" y="0" width="200" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>
    <g class="grid">
      <line x1="0" y1="50"  x2="200" y2="50"/>
      <line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="0" y1="150" x2="200" y2="150"/>
      <line x1="50"  y1="0" x2="50"  y2="200"/>
      <line x1="150" y1="0" x2="150" y2="200"/>
    </g>
    <line x1="0" y1="150" x2="200" y2="150" class="axis"/>
    <line x1="100" y1="0" x2="100" y2="200" class="axis"/>
    <!-- ReLU: 0 for z<0, z for z>0 -->
    <path class="relu" d="M 0 150 L 100 150 L 200 10"/>
    <text x="110" y="120" class="mono" fill="#A8324B">max(0,z)</text>
  </g>

  <!-- Panel 2: Leaky ReLU -->
  <g transform="translate(260, 70)">
    <text x="100" y="-8" text-anchor="middle" class="tag" fill="#D97757">LEAKY RELU</text>
    <rect x="0" y="0" width="200" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>
    <g class="grid">
      <line x1="0" y1="50"  x2="200" y2="50"/>
      <line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="0" y1="150" x2="200" y2="150"/>
      <line x1="50"  y1="0" x2="50"  y2="200"/>
      <line x1="150" y1="0" x2="150" y2="200"/>
    </g>
    <line x1="0" y1="150" x2="200" y2="150" class="axis"/>
    <line x1="100" y1="0" x2="100" y2="200" class="axis"/>
    <path class="lrelu" d="M 0 160 L 100 150 L 200 10"/>
    <text x="110" y="120" class="mono" fill="#D97757">max(αz,z)</text>
    <text x="15" y="175" class="mono" fill="#D97757" font-size="9">slope α = 0.01</text>
  </g>

  <!-- Panel 3: GELU -->
  <g transform="translate(480, 70)">
    <text x="100" y="-8" text-anchor="middle" class="tag" fill="#4A6670">GELU</text>
    <rect x="0" y="0" width="200" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>
    <g class="grid">
      <line x1="0" y1="50"  x2="200" y2="50"/>
      <line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="0" y1="150" x2="200" y2="150"/>
      <line x1="50"  y1="0" x2="50"  y2="200"/>
      <line x1="150" y1="0" x2="150" y2="200"/>
    </g>
    <line x1="0" y1="150" x2="200" y2="150" class="axis"/>
    <line x1="100" y1="0" x2="100" y2="200" class="axis"/>
    <!-- GELU: smooth S-shaped, slight negative dip near 0 -->
    <path class="gelu" d="M 0 152 C 50 152 80 160 100 150 C 120 135 150 80 200 10"/>
    <text x="110" y="120" class="mono" fill="#4A6670">z · Φ(z)</text>
    <text x="15" y="175" class="mono" fill="#4A6670" font-size="9">BERT, GPT-2/3</text>
  </g>

  <!-- Panel 4: SiLU / Swish -->
  <g transform="translate(700, 70)">
    <text x="100" y="-8" text-anchor="middle" class="tag" fill="#7B9E89">SILU / SWISH</text>
    <rect x="0" y="0" width="200" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>
    <g class="grid">
      <line x1="0" y1="50"  x2="200" y2="50"/>
      <line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="0" y1="150" x2="200" y2="150"/>
      <line x1="50"  y1="0" x2="50"  y2="200"/>
      <line x1="150" y1="0" x2="150" y2="200"/>
    </g>
    <line x1="0" y1="150" x2="200" y2="150" class="axis"/>
    <line x1="100" y1="0" x2="100" y2="200" class="axis"/>
    <path class="silu" d="M 0 151 C 50 151 80 162 100 150 C 120 133 150 82 200 10"/>
    <text x="110" y="120" class="mono" fill="#7B9E89">z · σ(z)</text>
    <text x="15" y="175" class="mono" fill="#7B9E89" font-size="9">Llama, modern LLMs</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(60, 310)">
    <rect x="0" y="0" width="840" height="60" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="24" class="tag">ALL FOUR SHARE</text>
    <text x="14" y="44" class="mut">✓ gradient = 1 on the active side → no vanishing with depth</text>
    <text x="430" y="24" class="tag">HOW THEY DIFFER</text>
    <text x="430" y="44" class="mut">smoothness near 0 (matters for optimization on Transformers)</text>
  </g>
</svg>
