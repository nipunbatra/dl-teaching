<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .leaf  { fill:#EAE7DC; stroke:#6B6A65; stroke-width:1; }
      .xor   { fill:#EAD3C5; stroke:#D97757; stroke-width:1.4; }
      .shallow { fill:#F6D4CC; stroke:#A8324B; stroke-width:1.3; }
      .ink   { stroke:#1F1F1E; fill:none; stroke-width:1.1; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:12px; fill:#1F1F1E; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .good  { fill:#7B9E89; font-weight:600; }
      .bad   { fill:#A8324B; font-weight:600; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Parity of n bits · depth matches the recursion → O(n) neurons; shallow → O(2ⁿ)</text>

  <!-- LEFT: deep XOR tree for n=8 -->
  <g transform="translate(40, 70)">
    <text x="210" y="-10" text-anchor="middle" class="tag" fill="#7B9E89">DEEP TREE · log₂(8) = 3 layers, 7 XOR gates</text>

    <!-- Leaves: x1..x8 -->
    <g>
      <circle cx="20"  cy="20" r="14" class="leaf"/><text x="20"  y="25" text-anchor="middle" class="mono">x₁</text>
      <circle cx="80"  cy="20" r="14" class="leaf"/><text x="80"  y="25" text-anchor="middle" class="mono">x₂</text>
      <circle cx="140" cy="20" r="14" class="leaf"/><text x="140" y="25" text-anchor="middle" class="mono">x₃</text>
      <circle cx="200" cy="20" r="14" class="leaf"/><text x="200" y="25" text-anchor="middle" class="mono">x₄</text>
      <circle cx="260" cy="20" r="14" class="leaf"/><text x="260" y="25" text-anchor="middle" class="mono">x₅</text>
      <circle cx="320" cy="20" r="14" class="leaf"/><text x="320" y="25" text-anchor="middle" class="mono">x₆</text>
      <circle cx="380" cy="20" r="14" class="leaf"/><text x="380" y="25" text-anchor="middle" class="mono">x₇</text>
      <circle cx="440" cy="20" r="14" class="leaf"/><text x="440" y="25" text-anchor="middle" class="mono">x₈</text>
    </g>
    <!-- Layer 1: 4 XORs of pairs -->
    <g>
      <rect class="xor" x="30"  y="80" width="40" height="26" rx="3"/>
      <text x="50"  y="98" text-anchor="middle" class="mono" fill="#D97757">⊕</text>
      <rect class="xor" x="150" y="80" width="40" height="26" rx="3"/>
      <text x="170" y="98" text-anchor="middle" class="mono" fill="#D97757">⊕</text>
      <rect class="xor" x="270" y="80" width="40" height="26" rx="3"/>
      <text x="290" y="98" text-anchor="middle" class="mono" fill="#D97757">⊕</text>
      <rect class="xor" x="390" y="80" width="40" height="26" rx="3"/>
      <text x="410" y="98" text-anchor="middle" class="mono" fill="#D97757">⊕</text>
    </g>
    <!-- Layer 2: 2 XORs -->
    <g>
      <rect class="xor" x="90"  y="160" width="40" height="26" rx="3"/>
      <text x="110" y="178" text-anchor="middle" class="mono" fill="#D97757">⊕</text>
      <rect class="xor" x="330" y="160" width="40" height="26" rx="3"/>
      <text x="350" y="178" text-anchor="middle" class="mono" fill="#D97757">⊕</text>
    </g>
    <!-- Layer 3: final XOR -->
    <rect class="xor" x="210" y="240" width="40" height="26" rx="3"/>
    <text x="230" y="258" text-anchor="middle" class="mono" fill="#D97757">⊕</text>

    <!-- edges -->
    <g class="ink">
      <line x1="20" y1="34"  x2="45" y2="80"/>
      <line x1="80" y1="34"  x2="55" y2="80"/>
      <line x1="140" y1="34" x2="165" y2="80"/>
      <line x1="200" y1="34" x2="175" y2="80"/>
      <line x1="260" y1="34" x2="285" y2="80"/>
      <line x1="320" y1="34" x2="295" y2="80"/>
      <line x1="380" y1="34" x2="405" y2="80"/>
      <line x1="440" y1="34" x2="415" y2="80"/>

      <line x1="50"  y1="106" x2="105" y2="160"/>
      <line x1="170" y1="106" x2="115" y2="160"/>
      <line x1="290" y1="106" x2="345" y2="160"/>
      <line x1="410" y1="106" x2="355" y2="160"/>

      <line x1="110" y1="186" x2="220" y2="240"/>
      <line x1="350" y1="186" x2="240" y2="240"/>
    </g>

    <text x="230" y="290" text-anchor="middle" class="mut">output · 1 if odd number of 1s</text>
    <text x="230" y="307" text-anchor="middle" class="good">7 gates · depth 3</text>
  </g>

  <!-- RIGHT: shallow = enumerate all 2^n patterns -->
  <g transform="translate(540, 70)">
    <text x="200" y="-10" text-anchor="middle" class="tag" fill="#A8324B">SHALLOW · enumerate all 2⁸ = 256 patterns</text>

    <!-- Inputs -->
    <g>
      <circle cx="20"  cy="20" r="14" class="leaf"/><text x="20"  y="25" text-anchor="middle" class="mono">x₁</text>
      <circle cx="80"  cy="20" r="14" class="leaf"/><text x="80"  y="25" text-anchor="middle" class="mono">x₂</text>
      <circle cx="140" cy="20" r="14" class="leaf"/><text x="140" y="25" text-anchor="middle" class="mono">…</text>
      <circle cx="200" cy="20" r="14" class="leaf"/><text x="200" y="25" text-anchor="middle" class="mono">x₇</text>
      <circle cx="260" cy="20" r="14" class="leaf"/><text x="260" y="25" text-anchor="middle" class="mono">x₈</text>
    </g>

    <!-- Hidden: 256 detectors (stylized as many small circles) -->
    <g>
      <text x="200" y="80" text-anchor="middle" class="mut" fill="#A8324B">256 hidden units (one per pattern)</text>
      <!-- densely packed circles -->
      <g opacity="0.9">
        <circle cx="0"   cy="110" r="3.5" class="shallow"/>
        <circle cx="12"  cy="110" r="3.5" class="shallow"/>
        <circle cx="24"  cy="110" r="3.5" class="shallow"/>
        <circle cx="36"  cy="110" r="3.5" class="shallow"/>
        <circle cx="48"  cy="110" r="3.5" class="shallow"/>
        <circle cx="60"  cy="110" r="3.5" class="shallow"/>
        <circle cx="72"  cy="110" r="3.5" class="shallow"/>
        <circle cx="84"  cy="110" r="3.5" class="shallow"/>
        <circle cx="96"  cy="110" r="3.5" class="shallow"/>
        <circle cx="108" cy="110" r="3.5" class="shallow"/>
        <circle cx="120" cy="110" r="3.5" class="shallow"/>
        <circle cx="132" cy="110" r="3.5" class="shallow"/>
        <circle cx="144" cy="110" r="3.5" class="shallow"/>
        <circle cx="156" cy="110" r="3.5" class="shallow"/>
        <circle cx="168" cy="110" r="3.5" class="shallow"/>
        <circle cx="180" cy="110" r="3.5" class="shallow"/>
        <circle cx="192" cy="110" r="3.5" class="shallow"/>
        <circle cx="204" cy="110" r="3.5" class="shallow"/>
        <circle cx="216" cy="110" r="3.5" class="shallow"/>
        <circle cx="228" cy="110" r="3.5" class="shallow"/>
        <circle cx="240" cy="110" r="3.5" class="shallow"/>
        <circle cx="252" cy="110" r="3.5" class="shallow"/>
        <circle cx="264" cy="110" r="3.5" class="shallow"/>
        <circle cx="276" cy="110" r="3.5" class="shallow"/>
        <circle cx="288" cy="110" r="3.5" class="shallow"/>
        <circle cx="300" cy="110" r="3.5" class="shallow"/>
        <circle cx="312" cy="110" r="3.5" class="shallow"/>
        <circle cx="324" cy="110" r="3.5" class="shallow"/>
        <circle cx="336" cy="110" r="3.5" class="shallow"/>
        <circle cx="348" cy="110" r="3.5" class="shallow"/>
        <circle cx="360" cy="110" r="3.5" class="shallow"/>
        <circle cx="372" cy="110" r="3.5" class="shallow"/>
        <circle cx="384" cy="110" r="3.5" class="shallow"/>
        <circle cx="396" cy="110" r="3.5" class="shallow"/>

        <circle cx="0"   cy="122" r="3.5" class="shallow"/>
        <circle cx="12"  cy="122" r="3.5" class="shallow"/>
        <circle cx="24"  cy="122" r="3.5" class="shallow"/>
        <circle cx="36"  cy="122" r="3.5" class="shallow"/>
        <circle cx="48"  cy="122" r="3.5" class="shallow"/>
        <circle cx="60"  cy="122" r="3.5" class="shallow"/>
        <circle cx="72"  cy="122" r="3.5" class="shallow"/>
        <circle cx="84"  cy="122" r="3.5" class="shallow"/>
        <circle cx="96"  cy="122" r="3.5" class="shallow"/>
        <circle cx="108" cy="122" r="3.5" class="shallow"/>
        <circle cx="120" cy="122" r="3.5" class="shallow"/>
        <circle cx="132" cy="122" r="3.5" class="shallow"/>
        <circle cx="144" cy="122" r="3.5" class="shallow"/>
        <circle cx="156" cy="122" r="3.5" class="shallow"/>
        <circle cx="168" cy="122" r="3.5" class="shallow"/>
        <circle cx="180" cy="122" r="3.5" class="shallow"/>
        <circle cx="192" cy="122" r="3.5" class="shallow"/>
        <circle cx="204" cy="122" r="3.5" class="shallow"/>
        <circle cx="216" cy="122" r="3.5" class="shallow"/>
        <circle cx="228" cy="122" r="3.5" class="shallow"/>
        <circle cx="240" cy="122" r="3.5" class="shallow"/>
        <circle cx="252" cy="122" r="3.5" class="shallow"/>
        <circle cx="264" cy="122" r="3.5" class="shallow"/>
        <circle cx="276" cy="122" r="3.5" class="shallow"/>
        <circle cx="288" cy="122" r="3.5" class="shallow"/>
        <circle cx="300" cy="122" r="3.5" class="shallow"/>
        <circle cx="312" cy="122" r="3.5" class="shallow"/>
        <circle cx="324" cy="122" r="3.5" class="shallow"/>
        <circle cx="336" cy="122" r="3.5" class="shallow"/>
        <circle cx="348" cy="122" r="3.5" class="shallow"/>
        <circle cx="360" cy="122" r="3.5" class="shallow"/>
        <circle cx="372" cy="122" r="3.5" class="shallow"/>
        <circle cx="384" cy="122" r="3.5" class="shallow"/>
        <circle cx="396" cy="122" r="3.5" class="shallow"/>

        <text x="200" y="142" text-anchor="middle" class="mut" font-size="10">...and more... (total 256)</text>
      </g>
    </g>

    <!-- output -->
    <rect class="xor" x="180" y="170" width="40" height="26" rx="3"/>
    <text x="200" y="188" text-anchor="middle" class="mono" fill="#D97757">Σ</text>

    <text x="200" y="230" text-anchor="middle" class="mut">output · sum of detectors matching odd-count patterns</text>
    <text x="200" y="247" text-anchor="middle" class="bad">256 units · depth 1</text>
  </g>

  <!-- Bottom comparison -->
  <g transform="translate(60, 345)">
    <text x="420" y="0" text-anchor="middle" class="mut" font-style="italic">
      For n = 20: deep needs <tspan class="good">~20 gates</tspan>; shallow needs <tspan class="bad">~10⁶ units</tspan>.
      Depth is how you <tspan fill="#D97757" font-weight="600">match structure to structure</tspan>.
    </text>
  </g>
</svg>
