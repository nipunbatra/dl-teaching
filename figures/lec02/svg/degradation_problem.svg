<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .axis  { stroke:#1F1F1E; stroke-width:1.1; }
      .grid  { stroke:#C9C4B5; stroke-width:0.5; }
      .p20   { stroke:#4A6670; stroke-width:2.2; fill:none; }
      .p56   { stroke:#A8324B; stroke-width:2.2; fill:none; }
      .r20   { stroke:#7B9E89; stroke-width:2.2; fill:none; stroke-dasharray:4 2; }
      .r56   { stroke:#D97757; stroke-width:2.4; fill:none; }
      .lbl   { fill:#1F1F1E; font-size:12px; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">The degradation problem — deeper plain nets train <tspan font-style="italic">worse</tspan></text>

  <!-- Left panel: plain -->
  <g transform="translate(70, 80)">
    <text x="180" y="-10" text-anchor="middle" class="tag">PLAIN NETWORK · CIFAR (He et al. 2015)</text>
    <rect x="0" y="0" width="360" height="220" fill="#F0EEE5" stroke="#C9C4B5"/>

    <!-- grid -->
    <g class="grid">
      <line x1="0" y1="40"  x2="360" y2="40"/>
      <line x1="0" y1="80"  x2="360" y2="80"/>
      <line x1="0" y1="120" x2="360" y2="120"/>
      <line x1="0" y1="160" x2="360" y2="160"/>
      <line x1="60"  y1="0" x2="60"  y2="200"/>
      <line x1="140" y1="0" x2="140" y2="200"/>
      <line x1="220" y1="0" x2="220" y2="200"/>
      <line x1="300" y1="0" x2="300" y2="200"/>
    </g>

    <line x1="0" y1="200" x2="360" y2="200" class="axis"/>
    <line x1="0" y1="0"   x2="0"   y2="200" class="axis"/>

    <!-- 20-layer curve (goes lower) -->
    <path class="p20" d="M 10 180 Q 80 100 200 60 T 360 40"/>
    <text x="300" y="55" class="lbl" fill="#4A6670" font-weight="600">20 layers</text>

    <!-- 56-layer curve (higher — worse!) -->
    <path class="p56" d="M 10 180 Q 80 140 200 120 T 360 110"/>
    <text x="300" y="125" class="lbl" fill="#A8324B" font-weight="600">56 layers ← worse</text>

    <text x="180" y="218" text-anchor="middle" class="mut">training iterations →</text>
    <text x="-10" y="110" transform="rotate(-90 -10 110)" text-anchor="middle" class="mut">training error →</text>
  </g>

  <!-- Right panel: ResNet -->
  <g transform="translate(540, 80)">
    <text x="180" y="-10" text-anchor="middle" class="tag" fill="#D97757">RESNET · same depths</text>
    <rect x="0" y="0" width="360" height="220" fill="#F0EEE5" stroke="#C9C4B5"/>

    <g class="grid">
      <line x1="0" y1="40"  x2="360" y2="40"/>
      <line x1="0" y1="80"  x2="360" y2="80"/>
      <line x1="0" y1="120" x2="360" y2="120"/>
      <line x1="0" y1="160" x2="360" y2="160"/>
      <line x1="60"  y1="0" x2="60"  y2="200"/>
      <line x1="140" y1="0" x2="140" y2="200"/>
      <line x1="220" y1="0" x2="220" y2="200"/>
      <line x1="300" y1="0" x2="300" y2="200"/>
    </g>

    <line x1="0" y1="200" x2="360" y2="200" class="axis"/>
    <line x1="0" y1="0"   x2="0"   y2="200" class="axis"/>

    <!-- 20-layer curve -->
    <path class="r20" d="M 10 180 Q 80 100 200 60 T 360 45"/>
    <text x="280" y="68" class="lbl" fill="#7B9E89" font-weight="600">20 layers</text>

    <!-- 56-layer curve (LOWER — deeper is better!) -->
    <path class="r56" d="M 10 180 Q 80 90 200 45 T 360 30"/>
    <text x="280" y="30" class="lbl" fill="#D97757" font-weight="600">56 layers ← better</text>

    <text x="180" y="218" text-anchor="middle" class="mut">training iterations →</text>
  </g>

  <!-- insight strip -->
  <g transform="translate(70, 315)">
    <text x="400" y="0" text-anchor="middle" class="mut" font-style="italic" font-size="13">
      Not overfitting — <tspan font-weight="600" fill="#1F1F1E">training</tspan> error got worse. An optimization problem, fixed by adding a skip path.
    </text>
  </g>
</svg>
