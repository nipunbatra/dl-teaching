<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="EB Garamond, Georgia, serif">
  <style>
    .bg { fill: #F7F3E9; }
    .title { font-size: 17px; font-weight: 600; fill: #161513; }
    .head { font-size: 13px; font-weight: 600; fill: #161513; }
    .body { font-size: 12px; fill: #161513; }
    .caption { font-size: 11px; fill: #5F5C54; font-style: italic; }
    .axis { stroke: #161513; stroke-width: 1; fill: none; }
    .grid { stroke: #B5AE9B; stroke-width: 0.4; opacity: 0.5; fill: none; }
    .target { stroke: #161513; stroke-width: 2.4; fill: none; }
    .relu { stroke: #B85A3E; stroke-width: 1.4; fill: none; opacity: 0.7; }
    .sum { stroke: #5F8573; stroke-width: 2.4; fill: none; }
  </style>
  <rect class="bg" width="960" height="380"/>
  <text x="480" y="28" class="title" text-anchor="middle">UAT in pictures · sum of 4 ReLU bumps approximates x²</text>

  <!-- Plot area -->
  <g transform="translate(70, 60)">
    <!-- grid -->
    <g class="grid">
      <line x1="0" y1="50" x2="700" y2="50"/>
      <line x1="0" y1="100" x2="700" y2="100"/>
      <line x1="0" y1="150" x2="700" y2="150"/>
      <line x1="0" y1="200" x2="700" y2="200"/>
    </g>
    <path class="axis" d="M 0 0 L 0 240 L 700 240"/>

    <!-- x ticks -->
    <text x="0" y="258" class="caption" text-anchor="middle">0</text>
    <text x="175" y="258" class="caption" text-anchor="middle">0.25</text>
    <text x="350" y="258" class="caption" text-anchor="middle">0.5</text>
    <text x="525" y="258" class="caption" text-anchor="middle">0.75</text>
    <text x="700" y="258" class="caption" text-anchor="middle">1.0</text>
    <text x="350" y="280" class="body" text-anchor="middle">x</text>

    <!-- y ticks -->
    <text x="-12" y="244" class="caption" text-anchor="end">0</text>
    <text x="-12" y="100" class="caption" text-anchor="end">0.5</text>
    <text x="-12" y="0" class="caption" text-anchor="end">1.0</text>

    <!-- target x² · sample 50 points -->
    <path class="target" d="M 0 240 L 14 239 L 28 237 L 42 234 L 56 230 L 70 224 L 84 217 L 98 209 L 112 200 L 126 190 L 140 178 L 154 166 L 168 153 L 182 138 L 196 123 L 210 107 L 224 90 L 238 71 L 252 53 L 266 33 L 280 11 L 294 -12"/>

    <!-- Wait, x² scaled to 0..240 over [0,1]: y_pixel = 240 - 240·x²
         at x=0   -> 240
         at x=0.5 -> 240 - 60 = 180
         at x=1.0 -> 240 - 240 = 0  -->

    <!-- Redo target as a smoother curve -->
    <g>
      <path class="target" d="M 0 240
        L 35 237 L 70 230 L 105 219 L 140 204 L 175 187 L 210 167 L 245 144 L 280 119 L 315 91 L 350 60 L 385 27 L 420 -8 L 420 -8"
        fill="none" stroke="#161513" stroke-width="2.4"/>
      <!-- recompute: y(x) = 240 - 240·x²
        x=0   y=240
        x=0.1 y=237.6
        x=0.2 y=230.4
        x=0.3 y=218.4
        x=0.4 y=201.6
        x=0.5 y=180
        x=0.6 y=153.6
        x=0.7 y=122.4
        x=0.8 y=86.4
        x=0.9 y=45.6
        x=1.0 y=0  -->
      <path class="target" d="M 0 240 L 70 237.6 L 140 230.4 L 210 218.4 L 280 201.6 L 350 180 L 420 153.6 L 490 122.4 L 560 86.4 L 630 45.6 L 700 0"/>
    </g>

    <!-- 4 ReLU bumps · piecewise · staircase approximation -->
    <!-- ReLU at b=0, alpha=0.05 -->
    <!-- y_relu_i(x) = alpha_i · max(0, x - b_i)
       Sum at x=0.25 = 0.05·0.25 = 0.0125  (target 0.0625, off but rough)

       Let's instead use 4 bumps building staircase tracking x²:
       at x in [0, 0.25): y = 0
       at x in [0.25, 0.5): y = (0.25)² = 0.0625
       at x in [0.5, 0.75): y = 0.25
       at x in [0.75, 1]: y = 0.5625
       at x = 1: y = 1

       Render staircase. y_pixel = 240 - 240·y_data
       segment 1: [0,0.25] -> y=240
       segment 2: [0.25,0.5] -> y=240 - 240·0.0625 = 225
       segment 3: [0.5,0.75] -> y=240 - 60 = 180
       segment 4: [0.75,1] -> y=240 - 135 = 105
       endpoint x=1 -> 0 (from staircase final at 1: 0.5625)
       Actually better: piecewise linear (not stair) approximating: 4 ReLUs built into ramps.
    -->
    <path class="sum" d="M 0 240 L 175 237 L 175 237 L 350 180 L 525 105 L 700 0"/>

    <!-- Individual ReLU bumps · just lines -->
    <path class="relu" d="M 0 240 L 175 240 L 350 234 L 525 223 L 700 207"/>
    <path class="relu" d="M 0 240 L 175 240 L 350 222 L 525 195 L 700 162"/>
    <path class="relu" d="M 0 240 L 175 240 L 350 240 L 525 213 L 700 174"/>
    <path class="relu" d="M 0 240 L 175 240 L 350 240 L 525 240 L 700 168"/>

    <!-- Markers at break points -->
    <circle cx="0" cy="240" r="3" fill="#B85A3E"/>
    <circle cx="175" cy="237" r="3" fill="#B85A3E"/>
    <circle cx="350" cy="180" r="3" fill="#B85A3E"/>
    <circle cx="525" cy="105" r="3" fill="#B85A3E"/>
    <circle cx="700" cy="0" r="3" fill="#B85A3E"/>
  </g>

  <!-- Legend -->
  <g transform="translate(770, 80)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#161513" stroke-width="2.4"/>
    <text x="30" y="4" class="body">target · x²</text>
    <line x1="0" y1="22" x2="22" y2="22" stroke="#5F8573" stroke-width="2.4"/>
    <text x="30" y="26" class="body">sum of 4 ReLUs</text>
    <line x1="0" y1="44" x2="22" y2="44" stroke="#B85A3E" stroke-width="1.4" opacity="0.7"/>
    <text x="30" y="48" class="body">individual ReLU</text>
    <text x="0" y="78" class="caption">More ReLUs → finer fit.</text>
    <text x="0" y="94" class="caption">As N → ∞, error → 0.</text>
  </g>
</svg>
