<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box-m { fill:#EAD3C5; stroke:#D97757; stroke-width:1.4; rx:6; ry:6; }
      .box-p { fill:#F6D4CC; stroke:#A8324B; stroke-width:1.2; rx:4; ry:4; }
      .box-b { fill:#F6F0DF; stroke:#C9A961; stroke-width:1.2; rx:4; ry:4; }
      .box-c { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.2; rx:4; ry:4; }
      .ink   { stroke:#1F1F1E; fill:none; stroke-width:1.1; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mono-b{ font-family:'JetBrains Mono', monospace; font-size:12px; fill:#1F1F1E; font-weight:600; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="nm-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Inside `nn.Module` — what `parameters()`, `.to()`, `state_dict()` actually track</text>

  <!-- LEFT: code -->
  <g transform="translate(30, 70)">
    <text x="0" y="-8" class="tag">YOUR CODE</text>
    <rect x="0" y="0" width="400" height="290" fill="#EEEBDF" stroke="#C9C4B5"/>
    <g class="mono">
      <text x="14" y="26">class MyModel(nn.Module):</text>
      <text x="14" y="46">    def __init__(self):</text>
      <text x="14" y="66">        super().__init__()</text>
      <text x="14" y="90" fill="#A8324B">        self.fc1 = nn.Linear(784, 256)  # ← Parameter</text>
      <text x="14" y="110" fill="#A8324B">        self.fc2 = nn.Linear(256, 10)   # ← Parameter</text>
      <text x="14" y="134" fill="#A8324B">        self.scale = nn.Parameter(torch.ones(1))</text>
      <text x="14" y="158" fill="#C9A961">        self.register_buffer('mean',</text>
      <text x="14" y="174" fill="#C9A961">                             torch.zeros(784))  # ← Buffer</text>
      <text x="14" y="202" fill="#7B9E89">        self.bn = nn.BatchNorm1d(256)   # ← submodule</text>
      <text x="14" y="230">    def forward(self, x):</text>
      <text x="14" y="250">        return self.fc2(F.relu(self.fc1(x)))</text>
    </g>
  </g>

  <!-- RIGHT: model tree -->
  <g transform="translate(470, 70)">
    <text x="0" y="-8" class="tag">INTERNAL REGISTRY · what PyTorch stores</text>

    <!-- root -->
    <rect class="box-m" x="90" y="10" width="200" height="40"/>
    <text x="190" y="28" text-anchor="middle" class="mono-b" fill="#D97757">MyModel  (nn.Module)</text>
    <text x="190" y="42" text-anchor="middle" class="mut" fill="#D97757">_parameters · _buffers · _modules</text>

    <!-- branches -->
    <g class="ink">
      <line x1="150" y1="50" x2="70"  y2="90"/>
      <line x1="190" y1="50" x2="190" y2="90"/>
      <line x1="230" y1="50" x2="310" y2="90"/>
    </g>

    <!-- fc1 leaf -->
    <rect class="box-p" x="10" y="90" width="120" height="50"/>
    <text x="70" y="108" text-anchor="middle" class="mono-b" fill="#A8324B">fc1</text>
    <text x="70" y="124" text-anchor="middle" class="mono" fill="#A8324B">weight [256,784]</text>
    <text x="70" y="138" text-anchor="middle" class="mono" fill="#A8324B">bias [256]</text>

    <!-- scale leaf -->
    <rect class="box-p" x="150" y="90" width="90" height="50"/>
    <text x="195" y="108" text-anchor="middle" class="mono-b" fill="#A8324B">scale</text>
    <text x="195" y="124" text-anchor="middle" class="mono" fill="#A8324B">Parameter</text>
    <text x="195" y="138" text-anchor="middle" class="mono" fill="#A8324B">[1]</text>

    <!-- bn submodule -->
    <rect class="box-c" x="260" y="90" width="110" height="50"/>
    <text x="315" y="108" text-anchor="middle" class="mono-b" fill="#7B9E89">bn (BN)</text>
    <text x="315" y="124" text-anchor="middle" class="mono" fill="#7B9E89">weight, bias</text>
    <text x="315" y="138" text-anchor="middle" class="mono" fill="#7B9E89">+ buffers</text>

    <!-- buffer on the side -->
    <rect class="box-b" x="30" y="170" width="330" height="40"/>
    <text x="195" y="188" text-anchor="middle" class="mono-b" fill="#C9A961">_buffers: {'mean': tensor[784]}</text>
    <text x="195" y="202" text-anchor="middle" class="mut" fill="#C9A961">moves with .to() but has no .requires_grad</text>
  </g>

  <!-- Bottom: what you get for free -->
  <g transform="translate(30, 305)">
    <rect x="0" y="0" width="880" height="80" fill="#F0EEE5" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">WHAT nn.Module GIVES YOU</text>

    <g transform="translate(14, 40)">
      <text class="mono-b" fill="#A8324B">model.parameters()</text>
      <text x="180" y="0" class="mut">→ iterable of all learnable tensors, for optimizer</text>
    </g>
    <g transform="translate(14, 58)">
      <text class="mono-b" fill="#D97757">model.state_dict()</text>
      <text x="180" y="0" class="mut">→ serializable ordered-dict of all params + buffers (for save/load)</text>
    </g>
    <g transform="translate(480, 40)">
      <text class="mono-b" fill="#7B9E89">model.to('cuda')</text>
      <text x="160" y="0" class="mut">→ move params + buffers (not buffers stored by you)</text>
    </g>
    <g transform="translate(480, 58)">
      <text class="mono-b" fill="#4A6670">model.train() / .eval()</text>
      <text x="180" y="0" class="mut">→ toggle BatchNorm, Dropout behaviour</text>
    </g>
  </g>
</svg>
