<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box   { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.2; rx:4; ry:4; }
      .box-a { fill:#EAD3C5; stroke:#D97757; stroke-width:1.2; rx:4; ry:4; }
      .leaf  { fill:#EAE7DC; stroke:#6B6A65; stroke-width:1; rx:18; ry:18; }
      .ink   { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .mut   { stroke:#6B6A65; fill:none; stroke-width:1; stroke-dasharray:4 3; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .acc   { fill:#D97757; font-family:'JetBrains Mono', monospace; font-size:11px; }
      .slate { fill:#4A6670; font-family:'JetBrains Mono', monospace; font-size:11px; }
      .lbl   { fill:#1F1F1E; font-size:13px; }
      .mutx  { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="at1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
    <marker id="at2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#D97757"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">PyTorch autograd — every tensor op silently records how to undo itself</text>

  <!-- Code block left -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="340" height="240" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">PYTHON</text>
    <g class="mono" font-size="12">
      <text x="14" y="48">x = torch.tensor(2.0, requires_grad=True)</text>
      <text x="14" y="72">w = torch.tensor(3.0, requires_grad=True)</text>
      <text x="14" y="96">b = torch.tensor(1.0, requires_grad=True)</text>
      <text x="14" y="126" fill="#4A6670">z = w * x          # MulBackward</text>
      <text x="14" y="150" fill="#4A6670">h = z + b          # AddBackward</text>
      <text x="14" y="174" fill="#4A6670">L = h ** 2         # PowBackward</text>
      <text x="14" y="210" fill="#D97757">L.backward()</text>
      <text x="14" y="230" fill="#6B6A65" font-style="italic">#  → w.grad = 28, x.grad = 42, b.grad = 14</text>
    </g>
  </g>

  <!-- DAG right -->
  <g transform="translate(430, 80)">
    <text x="240" y="-10" text-anchor="middle" class="tag">AUTOGRAD TAPE (DAG)</text>
    <!-- leaves -->
    <rect class="leaf" x="0"   y="30"  width="60" height="30"/>
    <text x="30" y="50" text-anchor="middle" class="mono" font-weight="600">x=2</text>
    <rect class="leaf" x="0"   y="80"  width="60" height="30"/>
    <text x="30" y="100" text-anchor="middle" class="mono" font-weight="600">w=3</text>
    <rect class="leaf" x="0"   y="170" width="60" height="30"/>
    <text x="30" y="190" text-anchor="middle" class="mono" font-weight="600">b=1</text>

    <!-- mul -->
    <rect class="box" x="110" y="55" width="80" height="36"/>
    <text x="150" y="73" text-anchor="middle" class="slate">×</text>
    <text x="150" y="88" text-anchor="middle" class="mono">z=6</text>

    <!-- add -->
    <rect class="box" x="230" y="95" width="80" height="36"/>
    <text x="270" y="113" text-anchor="middle" class="slate">+</text>
    <text x="270" y="128" text-anchor="middle" class="mono">h=7</text>

    <!-- pow -->
    <rect class="box-a" x="350" y="95" width="100" height="36"/>
    <text x="400" y="113" text-anchor="middle" class="acc">(·)²</text>
    <text x="400" y="128" text-anchor="middle" class="mono">L=49</text>

    <!-- edges -->
    <g class="ink" marker-end="url(#at1)">
      <line x1="60" y1="45"  x2="110" y2="68"/>
      <line x1="60" y1="95"  x2="110" y2="80"/>
      <line x1="190" y1="73" x2="230" y2="108"/>
      <line x1="60" y1="185" x2="230" y2="123"/>
      <line x1="310" y1="113" x2="350" y2="113"/>
    </g>

    <!-- backward dashes (rust) -->
    <g class="mut" stroke="#D97757" stroke-dasharray="5 3" stroke-width="1.4">
      <path d="M 340 155 Q 330 155 310 140" marker-end="url(#at2)"/>
      <path d="M 220 160 Q 210 160 195 100" marker-end="url(#at2)"/>
      <path d="M 220 160 Q 120 160 80 105"  marker-end="url(#at2)"/>
      <path d="M 100 65 Q 80 70 60 55"       marker-end="url(#at2)"/>
      <path d="M 220 163 Q 140 200 60 190"   marker-end="url(#at2)"/>
    </g>

    <text x="300" y="220" class="mutx" font-style="italic">
      The tape is built <tspan font-weight="600" fill="#1F1F1E">at runtime</tspan> (dynamic graph)
    </text>
    <text x="300" y="238" class="mutx">Each node stores <tspan font-family="'JetBrains Mono'">grad_fn</tspan> pointing to the backward op.</text>

    <!-- sub-callout: no_grad -->
    <rect x="0" y="260" width="450" height="80" fill="#F6F0DF" stroke="#C9A961"/>
    <text x="14" y="280" class="tag" fill="#C9A961">WATCH</text>
    <text x="14" y="300" class="mutx">
      Wrap eval / inference in <tspan font-family="'JetBrains Mono'" fill="#1F1F1E">with torch.no_grad():</tspan> —
    </text>
    <text x="14" y="318" class="mutx">
      skips tape construction → faster, less memory, no accidental leaks.
    </text>
  </g>
</svg>
