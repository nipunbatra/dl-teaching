<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box   { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:4; ry:4; }
      .box-o { fill:#F6F0DF; stroke:#C9A961; stroke-width:1.3; rx:4; ry:4; }
      .box-g { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.3; rx:4; ry:4; }
      .bar   { fill:#4A6670; }
      .bar-o { fill:#D97757; }
      .bar-g { fill:#7B9E89; }
      .ink   { stroke:#1F1F1E; fill:none; stroke-width:1.2; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .hdr   { fill:#1F1F1E; font-size:13px; font-weight:600; }
    </style>
    <marker id="ca-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Ceiling analysis — swap each stage for ground truth, measure what you'd gain</text>

  <!-- Top: pipeline -->
  <g transform="translate(40, 70)">
    <text x="0" y="-8" class="tag">YOUR PIPELINE</text>

    <rect class="box" x="0"   y="10" width="80" height="48"/>
    <text x="40" y="30" text-anchor="middle" class="mono">input</text>
    <text x="40" y="48" text-anchor="middle" class="mut">image</text>

    <rect class="box" x="120" y="10" width="130" height="48"/>
    <text x="185" y="30" text-anchor="middle" class="mono" font-weight="600">stage 1</text>
    <text x="185" y="48" text-anchor="middle" class="mut">text detector</text>

    <rect class="box" x="290" y="10" width="130" height="48"/>
    <text x="355" y="30" text-anchor="middle" class="mono" font-weight="600">stage 2</text>
    <text x="355" y="48" text-anchor="middle" class="mut">char classifier</text>

    <rect class="box" x="460" y="10" width="130" height="48"/>
    <text x="525" y="30" text-anchor="middle" class="mono" font-weight="600">stage 3</text>
    <text x="525" y="48" text-anchor="middle" class="mut">spell-correct</text>

    <rect class="box" x="630" y="10" width="80" height="48"/>
    <text x="670" y="30" text-anchor="middle" class="mono">output</text>
    <text x="670" y="48" text-anchor="middle" class="mut">"cat"</text>

    <g class="ink" marker-end="url(#ca-a)">
      <line x1="80"  y1="34" x2="120" y2="34"/>
      <line x1="250" y1="34" x2="290" y2="34"/>
      <line x1="420" y1="34" x2="460" y2="34"/>
      <line x1="590" y1="34" x2="630" y2="34"/>
    </g>

    <!-- end-to-end accuracy -->
    <rect x="740" y="10" width="170" height="48" fill="#F6D4CC" stroke="#A8324B"/>
    <text x="825" y="32" text-anchor="middle" class="hdr" fill="#A8324B">current · 82%</text>
    <text x="825" y="48" text-anchor="middle" class="mut" fill="#A8324B">baseline accuracy</text>
  </g>

  <!-- Bar chart of ceiling gains -->
  <g transform="translate(40, 170)">
    <text x="0" y="-8" class="tag">REPLACE EACH STAGE WITH GROUND TRUTH · RE-MEASURE</text>
    <rect x="0" y="0" width="870" height="170" fill="#F0EEE5" stroke="#C9C4B5"/>

    <!-- baseline line -->
    <line x1="220" y1="30" x2="220" y2="160" stroke="#A8324B" stroke-dasharray="4 3"/>
    <text x="220" y="22" class="mono" fill="#A8324B" text-anchor="middle">82% baseline</text>

    <!-- Row 1: perfect stage 1 -->
    <g transform="translate(20, 40)">
      <text x="0" y="14" class="mono">+ perfect stage 1 (detector)</text>
      <rect class="bar" x="200" y="3" width="200" height="18"/>
      <rect class="bar-o" x="400" y="3" width="10" height="18"/>
      <text x="420" y="16" class="mono" fill="#D97757" font-weight="600">83%   (+1)</text>
    </g>

    <!-- Row 2: perfect stage 2 -->
    <g transform="translate(20, 70)">
      <text x="0" y="14" class="mono">+ perfect stage 2 (classifier)</text>
      <rect class="bar" x="200" y="3" width="200" height="18"/>
      <rect class="bar-g" x="400" y="3" width="90" height="18"/>
      <text x="500" y="16" class="mono" fill="#7B9E89" font-weight="600">91%   (+9)  ← invest here</text>
    </g>

    <!-- Row 3: perfect stage 3 -->
    <g transform="translate(20, 100)">
      <text x="0" y="14" class="mono">+ perfect stage 3 (spell-correct)</text>
      <rect class="bar" x="200" y="3" width="200" height="18"/>
      <rect class="bar-o" x="400" y="3" width="10" height="18"/>
      <text x="420" y="16" class="mono" fill="#D97757" font-weight="600">83%   (+1)</text>
    </g>

    <!-- Row 4: full oracle -->
    <g transform="translate(20, 130)">
      <text x="0" y="14" class="mono">+ perfect everything (oracle)</text>
      <rect class="bar" x="200" y="3" width="200" height="18"/>
      <rect class="bar-g" x="400" y="3" width="100" height="18"/>
      <text x="510" y="16" class="mono" fill="#1F1F1E">100%</text>
    </g>
  </g>

  <g transform="translate(40, 355)">
    <text x="435" y="0" text-anchor="middle" class="mut" font-style="italic">
      Decision · the <tspan fill="#7B9E89" font-weight="600">char classifier</tspan> is your biggest lever.
      Do not spend a month on the detector that costs you only +1%.
    </text>
  </g>
</svg>
