<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box    { fill:#F0EEE5; stroke:#C9C4B5; stroke-width:1; }
      .real   { fill:#7B9E89; fill-opacity:0.35; stroke:#7B9E89; stroke-width:1.2; }
      .fake   { fill:#D97757; fill-opacity:0.75; }
      .fake-c { fill:#A8324B; fill-opacity:0.9; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Mode collapse — generator produces few distinct outputs, ignores most of the data</text>

  <!-- Healthy GAN (left) -->
  <g transform="translate(40, 80)">
    <text x="180" y="-10" text-anchor="middle" class="tag" fill="#7B9E89">HEALTHY GAN</text>
    <rect class="box" x="0" y="0" width="360" height="240"/>

    <!-- Real data: 8 Gaussian blobs in a ring -->
    <g>
      <circle class="real" cx="180" cy="60"  r="22"/>
      <circle class="real" cx="270" cy="85"  r="22"/>
      <circle class="real" cx="300" cy="150" r="22"/>
      <circle class="real" cx="270" cy="215" r="22"/>
      <circle class="real" cx="180" cy="240" r="22"/>
      <circle class="real" cx="90"  cy="215" r="22"/>
      <circle class="real" cx="60"  cy="150" r="22"/>
      <circle class="real" cx="90"  cy="85"  r="22"/>
    </g>

    <!-- Fake samples scattered inside each mode -->
    <g>
      <circle class="fake" cx="175" cy="55"  r="2.5"/>
      <circle class="fake" cx="185" cy="65"  r="2.5"/>
      <circle class="fake" cx="183" cy="58"  r="2.5"/>
      <circle class="fake" cx="265" cy="80"  r="2.5"/>
      <circle class="fake" cx="275" cy="90"  r="2.5"/>
      <circle class="fake" cx="270" cy="95"  r="2.5"/>
      <circle class="fake" cx="295" cy="145" r="2.5"/>
      <circle class="fake" cx="305" cy="155" r="2.5"/>
      <circle class="fake" cx="302" cy="148" r="2.5"/>
      <circle class="fake" cx="265" cy="210" r="2.5"/>
      <circle class="fake" cx="275" cy="220" r="2.5"/>
      <circle class="fake" cx="272" cy="218" r="2.5"/>
      <circle class="fake" cx="175" cy="235" r="2.5"/>
      <circle class="fake" cx="185" cy="245" r="2.5"/>
      <circle class="fake" cx="183" cy="242" r="2.5"/>
      <circle class="fake" cx="85"  cy="210" r="2.5"/>
      <circle class="fake" cx="95"  cy="220" r="2.5"/>
      <circle class="fake" cx="92"  cy="218" r="2.5"/>
      <circle class="fake" cx="55"  cy="145" r="2.5"/>
      <circle class="fake" cx="65"  cy="155" r="2.5"/>
      <circle class="fake" cx="62"  cy="148" r="2.5"/>
      <circle class="fake" cx="85"  cy="80"  r="2.5"/>
      <circle class="fake" cx="95"  cy="90"  r="2.5"/>
      <circle class="fake" cx="92"  cy="85"  r="2.5"/>
    </g>

    <text x="180" y="270" text-anchor="middle" class="mut">generator covers all 8 modes</text>
  </g>

  <!-- Mode collapse (right) -->
  <g transform="translate(540, 80)">
    <text x="180" y="-10" text-anchor="middle" class="tag" fill="#A8324B">MODE COLLAPSE</text>
    <rect class="box" x="0" y="0" width="360" height="240"/>

    <!-- Same real modes -->
    <g>
      <circle class="real" cx="180" cy="60"  r="22"/>
      <circle class="real" cx="270" cy="85"  r="22"/>
      <circle class="real" cx="300" cy="150" r="22"/>
      <circle class="real" cx="270" cy="215" r="22"/>
      <circle class="real" cx="180" cy="240" r="22"/>
      <circle class="real" cx="90"  cy="215" r="22"/>
      <circle class="real" cx="60"  cy="150" r="22"/>
      <circle class="real" cx="90"  cy="85"  r="22"/>
    </g>

    <!-- But fakes cluster on only one or two modes -->
    <g>
      <circle class="fake-c" cx="300" cy="145" r="4"/>
      <circle class="fake-c" cx="298" cy="150" r="4"/>
      <circle class="fake-c" cx="302" cy="155" r="4"/>
      <circle class="fake-c" cx="305" cy="148" r="4"/>
      <circle class="fake-c" cx="296" cy="152" r="4"/>
      <circle class="fake-c" cx="304" cy="150" r="4"/>
      <circle class="fake-c" cx="299" cy="155" r="4"/>
      <circle class="fake-c" cx="306" cy="145" r="4"/>
      <circle class="fake-c" cx="301" cy="148" r="4"/>
      <circle class="fake-c" cx="297" cy="146" r="4"/>

      <circle class="fake-c" cx="62"  cy="150" r="4"/>
      <circle class="fake-c" cx="58"  cy="148" r="4"/>
      <circle class="fake-c" cx="60"  cy="152" r="4"/>
      <circle class="fake-c" cx="64"  cy="145" r="4"/>
      <circle class="fake-c" cx="56"  cy="155" r="4"/>
    </g>

    <text x="180" y="270" text-anchor="middle" class="mut" fill="#A8324B">only 2 modes covered · ignores 6</text>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 345)">
    <text x="420" y="0" text-anchor="middle" class="mut" font-style="italic">
      The generator found a local optimum: <tspan fill="#A8324B" font-weight="600">a few outputs the discriminator can't reliably reject</tspan>. Ignores the rest of the data distribution.
    </text>
  </g>
</svg>
