<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Work Sans, system-ui, sans-serif">
  <style>
    .bg { fill: #F0EEE5; }
    .ink { fill: #1F1F1E; }
    .muted { fill: #6B6B69; }
    .rust { fill: #D97757; stroke: #D97757; }
    .sage { fill: #7B9E89; stroke: #7B9E89; }
    .slate { fill: #4A6670; stroke: #4A6670; }
    .title { font-size: 17px; font-weight: 600; }
    .subtitle { font-size: 13px; font-weight: 500; }
    .body { font-size: 12px; }
    .caption { font-size: 11px; fill: #6B6B69; }
    .box { fill: white; stroke: #4A6670; stroke-width: 1.3; }
    .rustbox { fill: #FFF3EE; stroke: #D97757; stroke-width: 1.5; }
    .sagebox { fill: #F0F5EF; stroke: #7B9E89; stroke-width: 1.5; }
    .arrow { stroke: #1F1F1E; stroke-width: 1.5; fill: none; }
  </style>
  <rect class="bg" width="960" height="400"/>

  <text x="480" y="32" class="ink title" text-anchor="middle">GAN training · two networks playing a zero-sum game</text>

  <!-- Generator box -->
  <rect class="rustbox" x="50" y="80" width="200" height="120" rx="8"/>
  <text x="150" y="110" class="ink subtitle" text-anchor="middle">Generator G</text>
  <text x="150" y="135" class="body" text-anchor="middle">z ~ N(0,I)  →  fake image</text>
  <text x="150" y="160" class="caption" text-anchor="middle">goal · fool D</text>
  <text x="150" y="180" class="caption" text-anchor="middle">maximize log D(G(z))</text>

  <!-- Discriminator box -->
  <rect class="sagebox" x="710" y="80" width="200" height="120" rx="8"/>
  <text x="810" y="110" class="ink subtitle" text-anchor="middle">Discriminator D</text>
  <text x="810" y="135" class="body" text-anchor="middle">image  →  real or fake?</text>
  <text x="810" y="160" class="caption" text-anchor="middle">goal · catch G</text>
  <text x="810" y="180" class="caption" text-anchor="middle">maximize log D(x) + log(1−D(G(z)))</text>

  <!-- Middle arena -->
  <rect class="box" x="300" y="75" width="360" height="130" rx="8" fill="white" opacity="0.95"/>
  <text x="480" y="105" class="ink subtitle" text-anchor="middle">Game arena</text>
  <text x="480" y="130" class="body" text-anchor="middle" fill="#4A6670">D sees batch of {real, fake}</text>
  <text x="480" y="150" class="body" text-anchor="middle" fill="#4A6670">assigns probabilities</text>
  <text x="480" y="180" class="body" text-anchor="middle" font-style="italic" fill="#1F1F1E">
    min<tspan baseline-shift="sub" font-size="9">G</tspan> max<tspan baseline-shift="sub" font-size="9">D</tspan>  V(G, D)
  </text>

  <!-- Arrow G → arena -->
  <path class="arrow" d="M 250 140 L 300 140" marker-end="url(#arr)"/>
  <text x="275" y="132" class="caption" text-anchor="middle">fakes</text>

  <!-- Arrow real data → arena -->
  <path class="arrow" d="M 480 40 L 480 75" marker-end="url(#arr)"/>
  <text x="540" y="52" class="caption">real batch x</text>

  <!-- Arrow arena → D -->
  <path class="arrow" d="M 660 140 L 710 140" marker-end="url(#arr)"/>

  <!-- Update arrows: D → G backprop gradient -->
  <path d="M 810 200 Q 810 260 660 270" stroke="#A8324B" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#wine)"/>
  <path d="M 300 270 Q 150 270 150 200" stroke="#A8324B" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#wine)"/>
  <text x="480" y="285" class="caption" text-anchor="middle" fill="#A8324B">D's gradient teaches G what to fix</text>

  <!-- Outcome -->
  <rect class="box" x="140" y="320" width="680" height="55" rx="6" fill="white"/>
  <text x="480" y="342" class="ink subtitle" text-anchor="middle">Nash equilibrium · p_G = p_data · D outputs 1/2 everywhere</text>
  <text x="480" y="360" class="caption" text-anchor="middle">in practice · never reached exactly; training oscillates indefinitely</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#1F1F1E"/>
    </marker>
    <marker id="wine" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#A8324B"/>
    </marker>
  </defs>
</svg>
