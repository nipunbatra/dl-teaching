<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Work Sans, system-ui, sans-serif">
  <style>
    .bg { fill: #F0EEE5; }
    .title { font-size: 17px; font-weight: 600; fill: #1F1F1E; }
    .head { font-size: 13px; font-weight: 600; fill: #1F1F1E; }
    .body { font-size: 12px; fill: #1F1F1E; }
    .caption { font-size: 11px; fill: #6B6B69; }
    .contour { fill: none; stroke: #CFCBBE; stroke-width: 0.9; }
    .sgd { stroke: #A8324B; stroke-width: 2; fill: none; }
    .mom { stroke: #7B9E89; stroke-width: 2; fill: none; }
    .star { fill: #1F1F1E; }
  </style>
  <rect class="bg" width="960" height="400"/>
  <text x="480" y="30" class="title" text-anchor="middle">Ravine · SGD zig-zags · momentum glides</text>

  <!-- Left: SGD -->
  <g transform="translate(40, 60)">
    <text x="200" y="0" class="head" text-anchor="middle">Vanilla SGD · 80 steps</text>
    <rect x="0" y="20" width="400" height="300" fill="white" stroke="#4A6670" stroke-width="1"/>
    <!-- Contours · elongated ellipses -->
    <g class="contour">
      <ellipse cx="200" cy="170" rx="180" ry="40"/>
      <ellipse cx="200" cy="170" rx="150" ry="32"/>
      <ellipse cx="200" cy="170" rx="120" ry="25"/>
      <ellipse cx="200" cy="170" rx="90" ry="18"/>
      <ellipse cx="200" cy="170" rx="60" ry="12"/>
      <ellipse cx="200" cy="170" rx="30" ry="6"/>
    </g>
    <!-- SGD zig-zag trajectory -->
    <path class="sgd" d="M 30 70 L 55 260 L 75 75 L 95 255 L 115 80 L 130 250 L 145 85 L 158 245 L 170 90 L 180 240 L 188 100 L 195 230 L 200 170"/>
    <circle cx="30" cy="70" r="5" class="star"/>
    <path d="M 200 163 l -6 14 l 12 0 z" class="star"/>
    <text x="200" y="340" class="caption" text-anchor="middle">oscillates across ravine · slow progress along it</text>
  </g>

  <!-- Right: Momentum -->
  <g transform="translate(520, 60)">
    <text x="200" y="0" class="head" text-anchor="middle">SGD + momentum · 20 steps</text>
    <rect x="0" y="20" width="400" height="300" fill="white" stroke="#4A6670" stroke-width="1"/>
    <g class="contour">
      <ellipse cx="200" cy="170" rx="180" ry="40"/>
      <ellipse cx="200" cy="170" rx="150" ry="32"/>
      <ellipse cx="200" cy="170" rx="120" ry="25"/>
      <ellipse cx="200" cy="170" rx="90" ry="18"/>
      <ellipse cx="200" cy="170" rx="60" ry="12"/>
      <ellipse cx="200" cy="170" rx="30" ry="6"/>
    </g>
    <!-- Smooth damped trajectory -->
    <path class="mom" d="M 30 70 Q 50 200 90 185 T 150 175 T 200 170"/>
    <circle cx="30" cy="70" r="5" class="star"/>
    <path d="M 200 163 l -6 14 l 12 0 z" class="star"/>
    <text x="200" y="340" class="caption" text-anchor="middle">damped · cancels back-and-forth, reinforces consistent direction</text>
  </g>

  <!-- Footer insight -->
  <rect x="40" y="355" width="880" height="35" fill="#FFF3EE" stroke="#D97757" stroke-width="1" rx="6"/>
  <text x="480" y="377" class="body" text-anchor="middle"><tspan font-weight="600">Why</tspan> · EMA of gradients averages out oscillation, preserves consistent signal. Free 4× speedup on ill-conditioned problems.</text>
</svg>
