<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .axis  { stroke:#1F1F1E; stroke-width:1.1; fill:none; }
      .grid  { stroke:#C9C4B5; stroke-width:0.5; opacity:0.6; }
      .con   { stroke:#6B6A65; stroke-width:1; fill:none; opacity:0.6; }
      .sgd   { stroke:#A8324B; stroke-width:2.2; fill:none; }
      .mom   { stroke:#D97757; stroke-width:2.2; fill:none; }
      .dot   { fill:#1F1F1E; }
      .star  { fill:#7B9E89; stroke:#1F1F1E; stroke-width:1; }
      .lbl   { fill:#1F1F1E; font-size:12px; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">The ravine — why vanilla SGD oscillates (and momentum doesn't)</text>

  <!-- LEFT panel: SGD -->
  <g transform="translate(60, 70)">
    <text x="180" y="-10" text-anchor="middle" class="tag" fill="#A8324B">SGD · vanilla</text>
    <rect x="0" y="0" width="360" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>

    <!-- Elongated ellipse contours -->
    <g class="con">
      <ellipse cx="180" cy="120" rx="150" ry="20"/>
      <ellipse cx="180" cy="120" rx="120" ry="16"/>
      <ellipse cx="180" cy="120" rx="90"  ry="12"/>
      <ellipse cx="180" cy="120" rx="60"  ry="9"/>
      <ellipse cx="180" cy="120" rx="30"  ry="6"/>
    </g>

    <!-- star at minimum -->
    <circle cx="180" cy="120" r="5" class="star"/>
    <text x="190" y="118" class="mut" fill="#7B9E89">min</text>

    <!-- oscillating path from left -->
    <polyline class="sgd" points="30,90 55,155 85,85 115,160 145,85 170,155 195,90 215,150 235,95 250,145 262,102 270,140 275,108 278,132 180,120"/>
    <circle cx="30" cy="90" r="4" class="dot"/>
    <text x="20" y="80" class="mut">start</text>

    <text x="180" y="230" text-anchor="middle" class="mut" font-style="italic">zig-zags across the narrow direction, crawls along the long one</text>
  </g>

  <!-- RIGHT panel: Momentum -->
  <g transform="translate(540, 70)">
    <text x="180" y="-10" text-anchor="middle" class="tag" fill="#D97757">SGD + momentum</text>
    <rect x="0" y="0" width="360" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>

    <g class="con">
      <ellipse cx="180" cy="120" rx="150" ry="20"/>
      <ellipse cx="180" cy="120" rx="120" ry="16"/>
      <ellipse cx="180" cy="120" rx="90"  ry="12"/>
      <ellipse cx="180" cy="120" rx="60"  ry="9"/>
      <ellipse cx="180" cy="120" rx="30"  ry="6"/>
    </g>

    <circle cx="180" cy="120" r="5" class="star"/>
    <text x="190" y="118" class="mut" fill="#7B9E89">min</text>

    <!-- smoother curve, small oscillation decaying -->
    <path class="mom" d="M 30 90 Q 80 135 135 115 Q 170 122 180 120"/>
    <circle cx="30" cy="90" r="4" class="dot"/>
    <text x="20" y="80" class="mut">start</text>

    <text x="180" y="230" text-anchor="middle" class="mut" font-style="italic">EMA cancels the back-and-forth, momentum builds along the long axis</text>
  </g>

  <text x="480" y="345" text-anchor="middle" class="mut">
    Hessian condition number κ = λ_max / λ_min sets how much worse this gets — vanilla SGD scales with √κ, momentum with <tspan fill="#D97757" font-weight="600">just κ^(1/4)</tspan>.
  </text>
</svg>
