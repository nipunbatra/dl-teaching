<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Work Sans, system-ui, sans-serif">
  <style>
    .bg { fill: #F0EEE5; }
    .title { font-size: 17px; font-weight: 600; fill: #1F1F1E; }
    .head { font-size: 13px; font-weight: 600; fill: #1F1F1E; }
    .body { font-size: 12px; fill: #1F1F1E; }
    .mono { font-family: "IBM Plex Mono", monospace; font-size: 11px; }
    .caption { font-size: 11px; fill: #6B6B69; }
    .box { fill: white; stroke: #4A6670; stroke-width: 1; rx: 4; }
    .query { fill: #FFF3EE; stroke: #D97757; stroke-width: 1.3; rx: 4; }
    .key { fill: #F0F5EF; stroke: #7B9E89; stroke-width: 1.1; rx: 4; }
    .value { fill: #E8EDEF; stroke: #4A6670; stroke-width: 1.1; rx: 4; }
    .out { fill: #FDF2F6; stroke: #A8324B; stroke-width: 1.3; rx: 4; }
    .arrow { stroke: #1F1F1E; stroke-width: 1.3; fill: none; }
    .soft-arrow { stroke-dasharray: 3 2; opacity: 0.7; }
  </style>
  <rect class="bg" width="960" height="400"/>
  <text x="480" y="30" class="title" text-anchor="middle">Soft retrieval · attention as differentiable dict lookup</text>

  <!-- Hard dict (left) -->
  <g transform="translate(30,70)">
    <text x="180" y="0" class="head" text-anchor="middle">Hard dict · db[query]</text>
    <rect class="box" x="0" y="18" width="360" height="240"/>
    <!-- query -->
    <rect class="query" x="130" y="40" width="100" height="28"/>
    <text x="180" y="59" class="body" text-anchor="middle">query = "cat"</text>
    <!-- arrow down -->
    <path class="arrow" d="M180 68 L180 88" marker-end="url(#arr)"/>
    <!-- dict entries -->
    <g transform="translate(20,95)">
      <rect class="key" x="0" y="0" width="70" height="26"/>
      <text x="35" y="18" class="body" text-anchor="middle">"cat"</text>
      <rect class="value" x="80" y="0" width="70" height="26"/>
      <text x="115" y="18" class="body" text-anchor="middle">"meow"</text>
      <rect class="key" x="160" y="0" width="70" height="26"/>
      <text x="195" y="18" class="body" text-anchor="middle">"dog"</text>
      <rect class="value" x="240" y="0" width="70" height="26"/>
      <text x="275" y="18" class="body" text-anchor="middle">"bark"</text>
    </g>
    <g transform="translate(20,131)">
      <rect class="key" x="0" y="0" width="70" height="26"/>
      <text x="35" y="18" class="body" text-anchor="middle">"bird"</text>
      <rect class="value" x="80" y="0" width="70" height="26"/>
      <text x="115" y="18" class="body" text-anchor="middle">"tweet"</text>
      <rect class="key" x="160" y="0" width="70" height="26"/>
      <text x="195" y="18" class="body" text-anchor="middle">"cow"</text>
      <rect class="value" x="240" y="0" width="70" height="26"/>
      <text x="275" y="18" class="body" text-anchor="middle">"moo"</text>
    </g>
    <!-- exact match indicator -->
    <rect x="20" y="95" width="70" height="26" fill="none" stroke="#D97757" stroke-width="2" rx="3"/>
    <text x="180" y="190" class="caption" text-anchor="middle">exact-match "cat" returns "meow"</text>
    <!-- output -->
    <rect class="out" x="130" y="210" width="100" height="28"/>
    <text x="180" y="229" class="body" text-anchor="middle">"meow"</text>
  </g>

  <!-- Soft attention (right) -->
  <g transform="translate(430,70)">
    <text x="260" y="0" class="head" text-anchor="middle">Soft attention · softmax(Q·Kᵀ) · V</text>
    <rect class="box" x="0" y="18" width="520" height="240"/>
    <!-- query -->
    <rect class="query" x="220" y="40" width="120" height="28"/>
    <text x="280" y="59" class="body" text-anchor="middle">query vector q</text>
    <!-- dash arrows to each key -->
    <path class="arrow soft-arrow" d="M280 68 L70 105"/>
    <path class="arrow soft-arrow" d="M280 68 L205 105"/>
    <path class="arrow soft-arrow" d="M280 68 L340 105"/>
    <path class="arrow soft-arrow" d="M280 68 L475 105"/>
    <!-- keys row -->
    <g transform="translate(20,95)">
      <rect class="key" x="0" y="0" width="100" height="24"/>
      <text x="50" y="17" class="body" text-anchor="middle">k₁ "cat"</text>
      <text x="50" y="40" class="mono" text-anchor="middle">sim = 0.9</text>
      <rect class="key" x="115" y="0" width="100" height="24"/>
      <text x="165" y="17" class="body" text-anchor="middle">k₂ "dog"</text>
      <text x="165" y="40" class="mono" text-anchor="middle">sim = 0.3</text>
      <rect class="key" x="230" y="0" width="100" height="24"/>
      <text x="280" y="17" class="body" text-anchor="middle">k₃ "bird"</text>
      <text x="280" y="40" class="mono" text-anchor="middle">sim = 0.1</text>
      <rect class="key" x="345" y="0" width="100" height="24"/>
      <text x="395" y="17" class="body" text-anchor="middle">k₄ "cow"</text>
      <text x="395" y="40" class="mono" text-anchor="middle">sim = 0.05</text>
    </g>
    <!-- softmax -->
    <text x="280" y="168" class="mono" text-anchor="middle">softmax → [0.55, 0.21, 0.15, 0.09]</text>
    <!-- values row -->
    <g transform="translate(20,180)">
      <rect class="value" x="0" y="0" width="100" height="24"/>
      <text x="50" y="17" class="body" text-anchor="middle">v₁ meow-vec</text>
      <rect class="value" x="115" y="0" width="100" height="24"/>
      <text x="165" y="17" class="body" text-anchor="middle">v₂ bark-vec</text>
      <rect class="value" x="230" y="0" width="100" height="24"/>
      <text x="280" y="17" class="body" text-anchor="middle">v₃ tweet-vec</text>
      <rect class="value" x="345" y="0" width="100" height="24"/>
      <text x="395" y="17" class="body" text-anchor="middle">v₄ moo-vec</text>
    </g>
    <!-- weighted sum arrows -->
    <path class="arrow" d="M50 204 L260 232"/>
    <path class="arrow" d="M165 204 L270 232"/>
    <path class="arrow" d="M280 204 L280 232"/>
    <path class="arrow" d="M395 204 L300 232"/>
    <!-- output -->
    <rect class="out" x="200" y="232" width="160" height="24"/>
    <text x="280" y="248" class="body" text-anchor="middle">weighted blend of v₁…v₄</text>
  </g>

  <!-- footer -->
  <rect x="40" y="335" width="880" height="50" fill="#FFF3EE" stroke="#D97757" stroke-width="1" rx="6"/>
  <text x="480" y="356" class="body" text-anchor="middle"><tspan font-weight="600">Key insight</tspan> · attention = softmax over similarities · weighted sum of values · fully differentiable.</text>
  <text x="480" y="372" class="caption" text-anchor="middle">Hard-match becomes soft; values blend rather than snap to the nearest. Gradient flows through every key and value.</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#1F1F1E"/>
    </marker>
  </defs>
</svg>
