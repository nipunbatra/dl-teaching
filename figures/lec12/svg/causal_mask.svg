<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="EB Garamond, Georgia, serif">
  <style>
    .bg { fill: #F7F3E9; }
    .title { font-size: 17px; font-weight: 600; fill: #161513; }
    .head { font-size: 13px; font-weight: 600; fill: #161513; }
    .body { font-size: 12px; fill: #161513; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #161513; }
    .caption { font-size: 11px; fill: #5F5C54; font-style: italic; }
    .allowed { fill: #5F8573; opacity: 0.55; stroke: #5F8573; stroke-width: 1; }
    .blocked { fill: #161513; opacity: 0.85; stroke: #161513; stroke-width: 1; }
    .cell { stroke: #B5AE9B; stroke-width: 0.4; fill: none; }
  </style>
  <rect class="bg" width="960" height="360"/>
  <text x="480" y="28" class="title" text-anchor="middle">Causal mask · "no peeking forward" in 5×5</text>

  <!-- 5x5 grid -->
  <g transform="translate(180, 65)">
    <!-- Row labels (queries) -->
    <text x="-15" y="35" class="caption" text-anchor="end">q₁</text>
    <text x="-15" y="85" class="caption" text-anchor="end">q₂</text>
    <text x="-15" y="135" class="caption" text-anchor="end">q₃</text>
    <text x="-15" y="185" class="caption" text-anchor="end">q₄</text>
    <text x="-15" y="235" class="caption" text-anchor="end">q₅</text>
    <!-- Col labels (keys) -->
    <text x="25" y="-15" class="caption" text-anchor="middle">k₁</text>
    <text x="75" y="-15" class="caption" text-anchor="middle">k₂</text>
    <text x="125" y="-15" class="caption" text-anchor="middle">k₃</text>
    <text x="175" y="-15" class="caption" text-anchor="middle">k₄</text>
    <text x="225" y="-15" class="caption" text-anchor="middle">k₅</text>

    <!-- Row 1 -->
    <rect class="allowed" x="0" y="20" width="48" height="48"/>
    <rect class="blocked" x="50" y="20" width="48" height="48"/>
    <rect class="blocked" x="100" y="20" width="48" height="48"/>
    <rect class="blocked" x="150" y="20" width="48" height="48"/>
    <rect class="blocked" x="200" y="20" width="48" height="48"/>
    <!-- Row 2 -->
    <rect class="allowed" x="0" y="70" width="48" height="48"/>
    <rect class="allowed" x="50" y="70" width="48" height="48"/>
    <rect class="blocked" x="100" y="70" width="48" height="48"/>
    <rect class="blocked" x="150" y="70" width="48" height="48"/>
    <rect class="blocked" x="200" y="70" width="48" height="48"/>
    <!-- Row 3 -->
    <rect class="allowed" x="0" y="120" width="48" height="48"/>
    <rect class="allowed" x="50" y="120" width="48" height="48"/>
    <rect class="allowed" x="100" y="120" width="48" height="48"/>
    <rect class="blocked" x="150" y="120" width="48" height="48"/>
    <rect class="blocked" x="200" y="120" width="48" height="48"/>
    <!-- Row 4 -->
    <rect class="allowed" x="0" y="170" width="48" height="48"/>
    <rect class="allowed" x="50" y="170" width="48" height="48"/>
    <rect class="allowed" x="100" y="170" width="48" height="48"/>
    <rect class="allowed" x="150" y="170" width="48" height="48"/>
    <rect class="blocked" x="200" y="170" width="48" height="48"/>
    <!-- Row 5 -->
    <rect class="allowed" x="0" y="220" width="48" height="48"/>
    <rect class="allowed" x="50" y="220" width="48" height="48"/>
    <rect class="allowed" x="100" y="220" width="48" height="48"/>
    <rect class="allowed" x="150" y="220" width="48" height="48"/>
    <rect class="allowed" x="200" y="220" width="48" height="48"/>
  </g>

  <!-- Right side · explanation -->
  <g transform="translate(550, 70)">
    <text x="0" y="0" class="head">In code · two lines</text>
    <text x="0" y="22" class="mono">scores = Q @ K.T / sqrt(d_k)</text>
    <text x="0" y="42" class="mono">mask = torch.triu(ones, diag=1)</text>
    <text x="0" y="62" class="mono">scores.masked_fill_(mask, -inf)</text>
    <text x="0" y="82" class="mono">attn = scores.softmax(-1)</text>

    <g transform="translate(0, 110)">
      <rect class="allowed" x="0" y="0" width="20" height="20"/>
      <text x="28" y="14" class="body">past + self · attend</text>
      <rect class="blocked" x="0" y="28" width="20" height="20"/>
      <text x="28" y="42" class="body">future · score = −∞ → softmax = 0</text>
    </g>

    <g transform="translate(0, 180)">
      <text x="0" y="0" class="head">Why "−∞" not 0?</text>
      <text x="0" y="20" class="caption">Because softmax is applied AFTER the mask · we</text>
      <text x="0" y="36" class="caption">need scores to vanish in the *exp* domain.</text>
      <text x="0" y="52" class="caption">exp(−∞) = 0 · post-softmax weight is 0.</text>
    </g>
  </g>
</svg>
