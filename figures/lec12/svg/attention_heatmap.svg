<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .cell   { stroke:#6B6A65; stroke-width:0.5; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Attention heatmap — each target word picks which source words to "focus on"</text>

  <!-- English source (top, rotated) -->
  <g transform="translate(180, 80)">
    <g transform="rotate(-45)">
      <text x="0"   y="0" class="mono">The</text>
      <text x="50"  y="0" class="mono">animal</text>
      <text x="110" y="0" class="mono">didn't</text>
      <text x="170" y="0" class="mono">cross</text>
      <text x="210" y="0" class="mono">the</text>
      <text x="255" y="0" class="mono">street</text>
      <text x="320" y="0" class="mono">because</text>
      <text x="385" y="0" class="mono">it</text>
      <text x="410" y="0" class="mono">was</text>
      <text x="450" y="0" class="mono">tired</text>
    </g>
  </g>

  <!-- French target (left) -->
  <g transform="translate(100, 120)">
    <text x="-16" y="22"  text-anchor="end" class="mono">L'animal</text>
    <text x="-16" y="52"  text-anchor="end" class="mono">n'a</text>
    <text x="-16" y="82"  text-anchor="end" class="mono">pas</text>
    <text x="-16" y="112" text-anchor="end" class="mono">traversé</text>
    <text x="-16" y="142" text-anchor="end" class="mono">la</text>
    <text x="-16" y="172" text-anchor="end" class="mono">rue</text>
    <text x="-16" y="202" text-anchor="end" class="mono">parce</text>
    <text x="-16" y="232" text-anchor="end" class="mono">qu'il</text>
    <text x="-16" y="262" text-anchor="end" class="mono">était</text>
    <text x="-16" y="292" text-anchor="end" class="mono">fatigué</text>
  </g>

  <!-- Heatmap grid: 10 rows (target) × 10 cols (source) -->
  <!-- Each cell has opacity proportional to attention weight -->
  <!-- Simulate a roughly diagonal alignment with some cross-terms -->
  <!-- Rows: tgt_index; Cols: src_index -->
  <g transform="translate(100, 110)">
    <!-- Helper: 30px per cell -->
    <!-- Row 0: L'animal (attends to "The" + "animal") -->
    <rect class="cell" x="0"   y="0"  width="30" height="30" fill="#d97757" fill-opacity="0.6"/>
    <rect class="cell" x="30"  y="0"  width="30" height="30" fill="#d97757" fill-opacity="0.9"/>
    <rect class="cell" x="60"  y="0"  width="30" height="30" fill="#d97757" fill-opacity="0.1"/>
    <rect class="cell" x="90"  y="0"  width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="120" y="0"  width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="150" y="0"  width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="180" y="0"  width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="210" y="0"  width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="240" y="0"  width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="270" y="0"  width="30" height="30" fill="#d97757" fill-opacity="0.05"/>

    <!-- Row 1: n'a (attends to didn't) -->
    <rect class="cell" x="0"   y="30" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="30"  y="30" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="60"  y="30" width="30" height="30" fill="#d97757" fill-opacity="0.85"/>
    <rect class="cell" x="90"  y="30" width="30" height="30" fill="#d97757" fill-opacity="0.1"/>
    <rect class="cell" x="120" y="30" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="150" y="30" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="180" y="30" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="210" y="30" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="240" y="30" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="270" y="30" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>

    <!-- Row 2: pas (attends to didn't) -->
    <rect class="cell" x="0"   y="60" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="30"  y="60" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="60"  y="60" width="30" height="30" fill="#d97757" fill-opacity="0.75"/>
    <rect class="cell" x="90"  y="60" width="30" height="30" fill="#d97757" fill-opacity="0.15"/>
    <rect class="cell" x="120" y="60" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="150" y="60" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="180" y="60" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="210" y="60" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="240" y="60" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="270" y="60" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>

    <!-- Row 3: traversé (attends to cross) -->
    <rect class="cell" x="0"   y="90" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="30"  y="90" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="60"  y="90" width="30" height="30" fill="#d97757" fill-opacity="0.1"/>
    <rect class="cell" x="90"  y="90" width="30" height="30" fill="#d97757" fill-opacity="0.9"/>
    <rect class="cell" x="120" y="90" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="150" y="90" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="180" y="90" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="210" y="90" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="240" y="90" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="270" y="90" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>

    <!-- Row 4: la (attends to the) -->
    <rect class="cell" x="0"   y="120" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="30"  y="120" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="60"  y="120" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="90"  y="120" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="120" y="120" width="30" height="30" fill="#d97757" fill-opacity="0.85"/>
    <rect class="cell" x="150" y="120" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="180" y="120" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="210" y="120" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="240" y="120" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="270" y="120" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>

    <!-- Row 5: rue (attends to street) -->
    <rect class="cell" x="0"   y="150" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="30"  y="150" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="60"  y="150" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="90"  y="150" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="120" y="150" width="30" height="30" fill="#d97757" fill-opacity="0.1"/>
    <rect class="cell" x="150" y="150" width="30" height="30" fill="#d97757" fill-opacity="0.9"/>
    <rect class="cell" x="180" y="150" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="210" y="150" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="240" y="150" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="270" y="150" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>

    <!-- Row 6: parce (because) -->
    <rect class="cell" x="0"   y="180" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="30"  y="180" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="60"  y="180" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="90"  y="180" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="120" y="180" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="150" y="180" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="180" y="180" width="30" height="30" fill="#d97757" fill-opacity="0.9"/>
    <rect class="cell" x="210" y="180" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="240" y="180" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="270" y="180" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>

    <!-- Row 7: qu'il attends to "it" BUT also to "animal" (coreference!) -->
    <rect class="cell" x="0"   y="210" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="30"  y="210" width="30" height="30" fill="#d97757" fill-opacity="0.55"/>
    <rect class="cell" x="60"  y="210" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="90"  y="210" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="120" y="210" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="150" y="210" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="180" y="210" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="210" y="210" width="30" height="30" fill="#d97757" fill-opacity="0.7"/>
    <rect class="cell" x="240" y="210" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="270" y="210" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>

    <!-- Row 8: était (was) -->
    <rect class="cell" x="0"   y="240" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="30"  y="240" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="60"  y="240" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="90"  y="240" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="120" y="240" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="150" y="240" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="180" y="240" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="210" y="240" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="240" y="240" width="30" height="30" fill="#d97757" fill-opacity="0.85"/>
    <rect class="cell" x="270" y="240" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>

    <!-- Row 9: fatigué (tired) -->
    <rect class="cell" x="0"   y="270" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="30"  y="270" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="60"  y="270" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="90"  y="270" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="120" y="270" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="150" y="270" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="180" y="270" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="210" y="270" width="30" height="30" fill="#d97757" fill-opacity="0.05"/>
    <rect class="cell" x="240" y="270" width="30" height="30" fill="#d97757" fill-opacity="0.1"/>
    <rect class="cell" x="270" y="270" width="30" height="30" fill="#d97757" fill-opacity="0.9"/>
  </g>

  <!-- Caption -->
  <g transform="translate(60, 430)">
    <rect x="0" y="0" width="840" height="40" fill="#F6F0DF" stroke="#C9A961"/>
    <text x="14" y="20" class="mut" fill="#C9A961">Notice the <tspan fill="#1F1F1E" font-weight="600">off-diagonal entry</tspan> · "qu'il" attends to BOTH "it" AND "animal"</text>
    <text x="14" y="34" class="mut" fill="#C9A961" font-style="italic">— the model learned to resolve coreference on its own.</text>
  </g>
</svg>
