<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box-q  { fill:#F6D4CC; stroke:#A8324B; stroke-width:1.3; rx:3; ry:3; }
      .box-k  { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:3; ry:3; }
      .box-v  { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.3; rx:3; ry:3; }
      .box    { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:3; ry:3; }
      .ink    { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:12px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="qa-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Scaled dot-product attention — queries, keys, values · three projections of one input</text>

  <!-- Input sequence (left) -->
  <g transform="translate(30, 80)">
    <text x="0" y="-10" class="tag">INPUT</text>
    <rect class="box" x="0" y="0" width="80" height="30"/>
    <text x="40" y="20" text-anchor="middle" class="mono">x₁</text>
    <rect class="box" x="0" y="40" width="80" height="30"/>
    <text x="40" y="60" text-anchor="middle" class="mono">x₂</text>
    <rect class="box" x="0" y="80" width="80" height="30"/>
    <text x="40" y="100" text-anchor="middle" class="mono">x₃</text>
    <text x="40" y="128" text-anchor="middle" class="mono">...</text>
    <rect class="box" x="0" y="140" width="80" height="30"/>
    <text x="40" y="160" text-anchor="middle" class="mono">x_N</text>
  </g>

  <!-- Linear projections: W_Q, W_K, W_V -->
  <g transform="translate(170, 80)">
    <rect class="box-q" x="0" y="0"   width="90" height="30"/>
    <text x="45" y="20" text-anchor="middle" class="mono" fill="#A8324B">× W_Q</text>
    <rect class="box-k" x="0" y="60"  width="90" height="30"/>
    <text x="45" y="80" text-anchor="middle" class="mono" fill="#D97757">× W_K</text>
    <rect class="box-v" x="0" y="120" width="90" height="30"/>
    <text x="45" y="140" text-anchor="middle" class="mono" fill="#7B9E89">× W_V</text>
  </g>
  <g class="ink" marker-end="url(#qa-a)">
    <line x1="110" y1="95" x2="170" y2="15"/>
    <line x1="110" y1="95" x2="170" y2="75"/>
    <line x1="110" y1="95" x2="170" y2="135"/>
  </g>

  <!-- Q, K, V matrices -->
  <g transform="translate(300, 80)">
    <rect class="box-q" x="0" y="0"   width="50" height="30"/>
    <text x="25" y="20" text-anchor="middle" class="mono" fill="#A8324B" font-weight="600">Q</text>
    <rect class="box-k" x="0" y="60"  width="50" height="30"/>
    <text x="25" y="80" text-anchor="middle" class="mono" fill="#D97757" font-weight="600">K</text>
    <rect class="box-v" x="0" y="120" width="50" height="30"/>
    <text x="25" y="140" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">V</text>
  </g>
  <g class="ink" marker-end="url(#qa-a)">
    <line x1="260" y1="15" x2="300" y2="15"/>
    <line x1="260" y1="75" x2="300" y2="75"/>
    <line x1="260" y1="135" x2="300" y2="135"/>
  </g>

  <!-- Q K^T : compute similarity -->
  <g transform="translate(400, 80)">
    <rect x="0" y="0" width="100" height="50" fill="#F6D4CC" stroke="#A8324B"/>
    <text x="50" y="20" text-anchor="middle" class="mono" fill="#A8324B">Q K^T</text>
    <text x="50" y="38" text-anchor="middle" class="mut" fill="#A8324B">similarity</text>
  </g>
  <g class="ink" marker-end="url(#qa-a)">
    <line x1="350" y1="15" x2="400" y2="100"/>
    <line x1="350" y1="75" x2="400" y2="105"/>
  </g>

  <!-- Divide by sqrt(d_k) -->
  <g transform="translate(400, 160)">
    <rect x="0" y="0" width="100" height="30" fill="#F6F0DF" stroke="#C9A961"/>
    <text x="50" y="20" text-anchor="middle" class="mono" fill="#C9A961">÷ √d_k</text>
  </g>
  <line x1="450" y1="130" x2="450" y2="160" class="ink" marker-end="url(#qa-a)"/>

  <!-- Softmax -->
  <g transform="translate(400, 220)">
    <rect x="0" y="0" width="100" height="30" fill="#F6F0DF" stroke="#C9A961"/>
    <text x="50" y="20" text-anchor="middle" class="mono" fill="#C9A961">softmax</text>
  </g>
  <line x1="450" y1="190" x2="450" y2="220" class="ink" marker-end="url(#qa-a)"/>

  <!-- Attention weights -->
  <g transform="translate(400, 280)">
    <rect x="0" y="0" width="100" height="40" fill="#D8E3DE" stroke="#7B9E89"/>
    <text x="50" y="24" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">weights</text>
  </g>
  <line x1="450" y1="250" x2="450" y2="280" class="ink" marker-end="url(#qa-a)"/>

  <!-- Multiply by V -->
  <g transform="translate(580, 280)">
    <rect x="0" y="0" width="100" height="40" fill="#F0EEE5" stroke="#1F1F1E"/>
    <text x="50" y="24" text-anchor="middle" class="mono">× V</text>
  </g>
  <line x1="500" y1="300" x2="580" y2="300" class="ink" marker-end="url(#qa-a)"/>
  <!-- V feeds in -->
  <path d="M 350 135 Q 560 135 630 280" class="ink" fill="none" stroke="#7B9E89" marker-end="url(#qa-a)"/>

  <!-- Output -->
  <g transform="translate(730, 280)">
    <rect class="box" x="0" y="0" width="90" height="40"/>
    <text x="45" y="24" text-anchor="middle" class="mono" font-weight="600">Attn(Q,K,V)</text>
  </g>
  <line x1="680" y1="300" x2="730" y2="300" class="ink" marker-end="url(#qa-a)"/>

  <!-- Full formula -->
  <g transform="translate(60, 370)">
    <rect x="0" y="0" width="840" height="60" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="420" y="32" text-anchor="middle" class="mono" font-size="16">
      Attention(Q, K, V)  =  softmax(<tspan fill="#A8324B" font-weight="600">Q K^T</tspan> / <tspan fill="#C9A961">√d_k</tspan>) · <tspan fill="#7B9E89" font-weight="600">V</tspan>
    </text>
    <text x="420" y="50" text-anchor="middle" class="mut" font-style="italic">database retrieval · Q asks, K answers, V pays</text>
  </g>
</svg>
