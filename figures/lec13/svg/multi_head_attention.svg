<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box     { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:4; ry:4; }
      .head    { fill:#EAD3C5; stroke:#D97757; stroke-width:1.2; rx:3; ry:3; }
      .proj    { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.2; rx:3; ry:3; }
      .concat  { fill:#F6F0DF; stroke:#C9A961; stroke-width:1.4; rx:4; ry:4; }
      .ink     { stroke:#1F1F1E; fill:none; stroke-width:1.2; }
      .mono    { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut     { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl     { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag     { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="mh-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Multi-head attention — h parallel heads attend to different subspaces</text>

  <!-- Input -->
  <rect class="box" x="420" y="60" width="120" height="30"/>
  <text x="480" y="80" text-anchor="middle" class="mono">x ∈ ℝ^{N×d}</text>

  <!-- Split into h heads (shown as h QKV projections) -->
  <g transform="translate(80, 130)">
    <text x="400" y="-10" text-anchor="middle" class="tag">h = 8 HEADS · each with its own W_Q, W_K, W_V</text>

    <!-- Head 1 -->
    <g transform="translate(0, 0)">
      <rect class="head" x="0" y="0" width="70" height="50"/>
      <text x="35" y="20" text-anchor="middle" class="mono">head 1</text>
      <text x="35" y="36" text-anchor="middle" class="mono" font-size="10">d_k = 64</text>
    </g>
    <!-- Head 2 -->
    <g transform="translate(90, 0)">
      <rect class="head" x="0" y="0" width="70" height="50"/>
      <text x="35" y="20" text-anchor="middle" class="mono">head 2</text>
      <text x="35" y="36" text-anchor="middle" class="mono" font-size="10">d_k = 64</text>
    </g>
    <!-- Head 3 -->
    <g transform="translate(180, 0)">
      <rect class="head" x="0" y="0" width="70" height="50"/>
      <text x="35" y="20" text-anchor="middle" class="mono">head 3</text>
      <text x="35" y="36" text-anchor="middle" class="mono" font-size="10">d_k = 64</text>
    </g>
    <!-- ellipsis -->
    <text x="305" y="28" text-anchor="middle" class="mono">· · ·</text>
    <!-- Head h -->
    <g transform="translate(360, 0)">
      <rect class="head" x="0" y="0" width="70" height="50"/>
      <text x="35" y="20" text-anchor="middle" class="mono">head 8</text>
      <text x="35" y="36" text-anchor="middle" class="mono" font-size="10">d_k = 64</text>
    </g>

    <!-- Each head runs scaled dot-product attention -->
    <g transform="translate(0, 80)">
      <text x="400" y="-2" text-anchor="middle" class="tag" fill="#D97757">run scaled dot-product attention in each head</text>
    </g>

    <!-- Per-head outputs -->
    <g transform="translate(0, 100)">
      <rect class="head" x="0" y="0" width="70" height="30"/>
      <text x="35" y="20" text-anchor="middle" class="mono">head₁^out</text>
      <rect class="head" x="90" y="0" width="70" height="30"/>
      <text x="125" y="20" text-anchor="middle" class="mono">head₂^out</text>
      <rect class="head" x="180" y="0" width="70" height="30"/>
      <text x="215" y="20" text-anchor="middle" class="mono">head₃^out</text>
      <text x="305" y="20" text-anchor="middle" class="mono">· · ·</text>
      <rect class="head" x="360" y="0" width="70" height="30"/>
      <text x="395" y="20" text-anchor="middle" class="mono">head₈^out</text>
    </g>
  </g>

  <!-- Arrows input -> heads -->
  <g class="ink" marker-end="url(#mh-a)">
    <line x1="480" y1="90"  x2="115" y2="128"/>
    <line x1="480" y1="90"  x2="205" y2="128"/>
    <line x1="480" y1="90"  x2="295" y2="128"/>
    <line x1="480" y1="90"  x2="475" y2="128"/>
  </g>

  <!-- Concat -->
  <g transform="translate(240, 290)">
    <rect class="concat" x="0" y="0" width="480" height="34"/>
    <text x="240" y="22" text-anchor="middle" class="mono" fill="#C9A961" font-weight="600">concat(head₁, ..., head₈) · dim = h · d_k = 512</text>
  </g>
  <g class="ink" marker-end="url(#mh-a)">
    <line x1="115" y1="265" x2="320" y2="290"/>
    <line x1="205" y1="265" x2="400" y2="290"/>
    <line x1="295" y1="265" x2="480" y2="290"/>
    <line x1="475" y1="265" x2="600" y2="290"/>
  </g>

  <!-- Output projection -->
  <g transform="translate(380, 350)">
    <rect class="proj" x="0" y="0" width="200" height="36"/>
    <text x="100" y="22" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">W_O · output projection</text>
  </g>
  <line x1="480" y1="324" x2="480" y2="350" class="ink" marker-end="url(#mh-a)"/>

  <!-- Output -->
  <g transform="translate(800, 355)">
    <rect class="box" x="0" y="0" width="80" height="30"/>
    <text x="40" y="20" text-anchor="middle" class="mono">y</text>
  </g>
  <line x1="580" y1="370" x2="800" y2="370" class="ink" marker-end="url(#mh-a)"/>

  <!-- Formula bar -->
  <g transform="translate(30, 395)">
    <text x="465" y="0" text-anchor="middle" class="mono" font-size="13">
      MultiHead(x) = Concat(head₁, ..., head_h) · W_O       where head_i = Attn(x W_Q^i, x W_K^i, x W_V^i)
    </text>
  </g>
</svg>
