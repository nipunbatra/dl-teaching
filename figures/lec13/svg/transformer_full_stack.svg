<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="Work Sans, system-ui, sans-serif">
  <style>
    .bg { fill: #F0EEE5; }
    .title { font-size: 17px; font-weight: 600; fill: #1F1F1E; }
    .head { font-size: 13px; font-weight: 600; fill: #1F1F1E; }
    .body { font-size: 11px; fill: #1F1F1E; }
    .caption { font-size: 10px; fill: #6B6B69; }
    .block { fill: #FFF3EE; stroke: #D97757; stroke-width: 1.2; rx: 6; }
    .norm { fill: #F0F5EF; stroke: #7B9E89; stroke-width: 1; rx: 3; }
    .attn { fill: #FDF2F6; stroke: #A8324B; stroke-width: 1.2; rx: 4; }
    .ffn { fill: #E8EDEF; stroke: #4A6670; stroke-width: 1.2; rx: 4; }
    .embed { fill: #F7EED6; stroke: #C9A961; stroke-width: 1.2; rx: 4; }
    .arrow { stroke: #1F1F1E; stroke-width: 1.3; fill: none; }
    .residual { stroke: #A8324B; stroke-width: 1.4; fill: none; stroke-dasharray: 4 3; }
  </style>
  <rect class="bg" width="960" height="500"/>
  <text x="480" y="30" class="title" text-anchor="middle">Transformer · full decoder-only stack (GPT-style)</text>

  <!-- Tokens at bottom -->
  <g transform="translate(0, 450)">
    <text x="60"  y="8" class="body" text-anchor="middle">The</text>
    <text x="160" y="8" class="body" text-anchor="middle">cat</text>
    <text x="260" y="8" class="body" text-anchor="middle">sat</text>
    <text x="360" y="8" class="body" text-anchor="middle">on</text>
    <text x="460" y="8" class="body" text-anchor="middle">the</text>
    <text x="560" y="8" class="body" text-anchor="middle">mat</text>
  </g>

  <!-- Embedding + positional -->
  <g transform="translate(40, 380)">
    <rect class="embed" x="0" y="0" width="550" height="50"/>
    <text x="275" y="22" class="head" text-anchor="middle">Token embedding + Positional encoding</text>
    <text x="275" y="40" class="caption" text-anchor="middle">int → d-dim vector · add sinusoidal (or RoPE) position info</text>
  </g>

  <!-- Arrows to N blocks -->
  <path class="arrow" d="M315 380 L315 360" marker-end="url(#arr)"/>

  <!-- Transformer blocks (stacked N=6 representation) -->
  <g transform="translate(40, 150)">
    <rect class="block" x="0" y="0" width="550" height="210"/>
    <text x="20" y="20" class="head">N × Transformer block (e.g., N=12 for GPT-1)</text>

    <!-- One block internals -->
    <g transform="translate(40, 35)">
      <!-- norm1 -->
      <rect class="norm" x="0" y="0" width="470" height="20"/>
      <text x="235" y="14" class="body" text-anchor="middle">LayerNorm</text>
      <!-- attn -->
      <rect class="attn" x="0" y="26" width="470" height="48"/>
      <text x="235" y="45" class="body" text-anchor="middle" font-weight="600">Multi-head causal self-attention</text>
      <text x="235" y="63" class="caption" text-anchor="middle">Q, K, V = x·W · scores/√d_k · softmax · weighted V</text>
      <!-- + residual -->
      <circle cx="500" cy="50" r="10" fill="white" stroke="#1F1F1E"/>
      <text x="500" y="54" class="body" text-anchor="middle">+</text>
      <path class="residual" d="M-10 50 L-10 -20 L510 -20 L510 40"/>
      <path class="arrow" d="M470 50 L490 50" marker-end="url(#arr)"/>
      <text x="-40" y="50" class="caption" text-anchor="middle">residual</text>

      <!-- norm2 -->
      <rect class="norm" x="0" y="95" width="470" height="20"/>
      <text x="235" y="109" class="body" text-anchor="middle">LayerNorm</text>
      <!-- ffn -->
      <rect class="ffn" x="0" y="121" width="470" height="48"/>
      <text x="235" y="140" class="body" text-anchor="middle" font-weight="600">Feed-forward (2-layer MLP, 4× wider)</text>
      <text x="235" y="158" class="caption" text-anchor="middle">x → Linear(d, 4d) → GELU → Linear(4d, d)</text>
      <!-- + residual -->
      <circle cx="500" cy="145" r="10" fill="white" stroke="#1F1F1E"/>
      <text x="500" y="149" class="body" text-anchor="middle">+</text>
      <path class="residual" d="M-10 145 L-10 80 L510 80 L510 135"/>
      <path class="arrow" d="M470 145 L490 145" marker-end="url(#arr)"/>
    </g>
  </g>

  <!-- final norm -->
  <g transform="translate(40, 100)">
    <rect class="norm" x="0" y="0" width="550" height="30"/>
    <text x="275" y="20" class="body" text-anchor="middle">Final LayerNorm</text>
  </g>

  <!-- LM head -->
  <g transform="translate(40, 55)">
    <rect class="embed" x="0" y="0" width="550" height="30"/>
    <text x="275" y="19" class="body" text-anchor="middle" font-weight="600">Linear head → softmax over vocabulary</text>
  </g>

  <!-- output -->
  <text x="315" y="48" class="caption" text-anchor="middle">predicted distribution over next token</text>

  <path class="arrow" d="M315 150 L315 130" marker-end="url(#arr)"/>
  <path class="arrow" d="M315 100 L315 85" marker-end="url(#arr)"/>

  <!-- Side note · info -->
  <g transform="translate(620, 150)">
    <rect x="0" y="0" width="300" height="210" fill="white" stroke="#4A6670" stroke-width="1" rx="6"/>
    <text x="15" y="22" class="head">What each piece does</text>
    <text x="15" y="45" class="body" font-weight="600">Attention</text>
    <text x="15" y="62" class="caption">mixes information between tokens</text>
    <text x="15" y="85" class="body" font-weight="600">FFN</text>
    <text x="15" y="102" class="caption">transforms each token in isolation · stores facts</text>
    <text x="15" y="125" class="body" font-weight="600">LayerNorm</text>
    <text x="15" y="142" class="caption">keeps activations well-scaled</text>
    <text x="15" y="165" class="body" font-weight="600">Residual</text>
    <text x="15" y="182" class="caption">gradient highway · lets ALL layers contribute</text>
    <text x="15" y="200" class="caption">pre-norm preferred for depth &gt; 12</text>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#1F1F1E"/>
    </marker>
  </defs>
</svg>
