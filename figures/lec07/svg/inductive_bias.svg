<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box   { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:4; ry:4; }
      .box-a { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:4; ry:4; }
      .line  { stroke:#6B6A65; fill:none; stroke-width:0.8; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .lbl   { fill:#1F1F1E; font-size:13px; font-weight:600; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">CNN inductive biases — the three assumptions baked into convolution</text>

  <!-- Three panels -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="280" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>
    <text x="140" y="22" text-anchor="middle" class="tag" fill="#D97757">1 · SPARSE CONNECTIVITY</text>

    <!-- show dense MLP connections (all-to-all) vs CNN (local) -->
    <g transform="translate(50, 50)">
      <text x="90" y="0" text-anchor="middle" class="mono">Dense (MLP)</text>
      <g>
        <circle cx="20"  cy="15" r="6" fill="#F0EEE5" stroke="#1F1F1E"/>
        <circle cx="60"  cy="15" r="6" fill="#F0EEE5" stroke="#1F1F1E"/>
        <circle cx="100" cy="15" r="6" fill="#F0EEE5" stroke="#1F1F1E"/>
        <circle cx="140" cy="15" r="6" fill="#F0EEE5" stroke="#1F1F1E"/>
        <circle cx="180" cy="15" r="6" fill="#F0EEE5" stroke="#1F1F1E"/>

        <circle cx="40"  cy="70" r="6" fill="#EAD3C5" stroke="#D97757"/>
        <circle cx="100" cy="70" r="6" fill="#EAD3C5" stroke="#D97757"/>
        <circle cx="160" cy="70" r="6" fill="#EAD3C5" stroke="#D97757"/>

        <g class="line" opacity="0.4">
          <line x1="20" y1="21" x2="40" y2="64"/>
          <line x1="60" y1="21" x2="40" y2="64"/>
          <line x1="100" y1="21" x2="40" y2="64"/>
          <line x1="140" y1="21" x2="40" y2="64"/>
          <line x1="180" y1="21" x2="40" y2="64"/>
          <line x1="20" y1="21" x2="100" y2="64"/>
          <line x1="60" y1="21" x2="100" y2="64"/>
          <line x1="100" y1="21" x2="100" y2="64"/>
          <line x1="140" y1="21" x2="100" y2="64"/>
          <line x1="180" y1="21" x2="100" y2="64"/>
          <line x1="20" y1="21" x2="160" y2="64"/>
          <line x1="60" y1="21" x2="160" y2="64"/>
          <line x1="100" y1="21" x2="160" y2="64"/>
          <line x1="140" y1="21" x2="160" y2="64"/>
          <line x1="180" y1="21" x2="160" y2="64"/>
        </g>
      </g>
    </g>

    <g transform="translate(50, 140)">
      <text x="90" y="0" text-anchor="middle" class="mono" fill="#D97757">Local (CNN)</text>
      <g>
        <circle cx="20"  cy="15" r="6" fill="#F0EEE5" stroke="#1F1F1E"/>
        <circle cx="60"  cy="15" r="6" fill="#F0EEE5" stroke="#1F1F1E"/>
        <circle cx="100" cy="15" r="6" fill="#F0EEE5" stroke="#1F1F1E"/>
        <circle cx="140" cy="15" r="6" fill="#F0EEE5" stroke="#1F1F1E"/>
        <circle cx="180" cy="15" r="6" fill="#F0EEE5" stroke="#1F1F1E"/>

        <circle cx="40"  cy="70" r="6" fill="#EAD3C5" stroke="#D97757"/>
        <circle cx="100" cy="70" r="6" fill="#EAD3C5" stroke="#D97757"/>
        <circle cx="160" cy="70" r="6" fill="#EAD3C5" stroke="#D97757"/>

        <g stroke="#D97757" stroke-width="1.5" fill="none">
          <line x1="20" y1="21" x2="40" y2="64"/>
          <line x1="60" y1="21" x2="40" y2="64"/>
          <line x1="60" y1="21" x2="100" y2="64"/>
          <line x1="100" y1="21" x2="100" y2="64"/>
          <line x1="140" y1="21" x2="100" y2="64"/>
          <line x1="140" y1="21" x2="160" y2="64"/>
          <line x1="180" y1="21" x2="160" y2="64"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Panel 2: weight sharing -->
  <g transform="translate(340, 80)">
    <rect x="0" y="0" width="280" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>
    <text x="140" y="22" text-anchor="middle" class="tag" fill="#7B9E89">2 · WEIGHT SHARING</text>

    <g transform="translate(30, 60)">
      <!-- Same 3x3 kernel applied at multiple positions -->
      <rect x="0" y="0" width="60" height="60" fill="#D8E3DE" stroke="#7B9E89" stroke-width="1.4"/>
      <text x="30" y="30" text-anchor="middle" class="mono" fill="#7B9E89">w</text>
      <text x="30" y="76" text-anchor="middle" class="mut" font-size="10">position 1</text>

      <rect x="80" y="0" width="60" height="60" fill="#D8E3DE" stroke="#7B9E89" stroke-width="1.4"/>
      <text x="110" y="30" text-anchor="middle" class="mono" fill="#7B9E89">w</text>
      <text x="110" y="76" text-anchor="middle" class="mut" font-size="10">position 2</text>

      <rect x="160" y="0" width="60" height="60" fill="#D8E3DE" stroke="#7B9E89" stroke-width="1.4"/>
      <text x="190" y="30" text-anchor="middle" class="mono" fill="#7B9E89">w</text>
      <text x="190" y="76" text-anchor="middle" class="mut" font-size="10">position 3</text>

      <text x="110" y="110" text-anchor="middle" class="mono">same 9 weights</text>
      <text x="110" y="130" text-anchor="middle" class="mut">reused across the image</text>
      <text x="110" y="155" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">a feature detector</text>
      <text x="110" y="170" text-anchor="middle" class="mono" fill="#7B9E89" font-weight="600">works everywhere</text>
    </g>
  </g>

  <!-- Panel 3: translation equivariance -->
  <g transform="translate(640, 80)">
    <rect x="0" y="0" width="280" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>
    <text x="140" y="22" text-anchor="middle" class="tag" fill="#4A6670">3 · TRANSLATION EQUIVARIANCE</text>

    <!-- Two input grids with a shape, shifted -->
    <g transform="translate(40, 50)">
      <rect x="0" y="0" width="80" height="80" fill="#F0EEE5" stroke="#6B6A65"/>
      <rect x="20" y="20" width="20" height="20" fill="#D97757"/>
      <text x="40" y="100" text-anchor="middle" class="mut">input</text>
    </g>

    <text x="200" y="90" text-anchor="middle" class="mono" font-size="14">+k</text>

    <g transform="translate(160, 50)">
      <rect x="0" y="0" width="80" height="80" fill="#F0EEE5" stroke="#6B6A65"/>
      <rect x="40" y="40" width="20" height="20" fill="#D97757"/>
      <text x="40" y="100" text-anchor="middle" class="mut">shifted</text>
    </g>

    <text x="140" y="170" text-anchor="middle" class="mono">output feature map</text>
    <text x="140" y="186" text-anchor="middle" class="mono" fill="#4A6670" font-weight="600">shifts by the same amount</text>
    <text x="140" y="210" text-anchor="middle" class="mut" font-style="italic">(not the same as invariance — that's pooling)</text>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 345)">
    <text x="420" y="0" text-anchor="middle" class="mut">
      These three assumptions reduce an <tspan fill="#A8324B">MLP's 150k weights per neuron</tspan> to a <tspan fill="#7B9E89" font-weight="600">CNN's 9 weights</tspan>.
      Fewer params · better inductive bias · works from tiny datasets.
    </text>
  </g>
</svg>
