<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box   { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:4; ry:4; }
      .box-a { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:4; ry:4; }
      .box-s { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.3; rx:4; ry:4; }
      .box-b { fill:#F6F0DF; stroke:#C9A961; stroke-width:1.3; rx:4; ry:4; }
      .ink   { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:12px; fill:#1F1F1E; }
      .lbl   { fill:#1F1F1E; font-size:13px; font-weight:600; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="bn-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">BatchNorm has two modes — toggle with `model.train()` / `model.eval()`</text>

  <!-- TRAIN MODE -->
  <g transform="translate(40, 70)">
    <text x="200" y="-10" text-anchor="middle" class="tag" fill="#D97757">TRAIN MODE  ·  model.train()</text>
    <rect x="0" y="0" width="400" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>

    <!-- input batch -->
    <rect class="box" x="20" y="20" width="120" height="50"/>
    <text x="80" y="42" text-anchor="middle" class="mono">batch x</text>
    <text x="80" y="58" text-anchor="middle" class="mut">N samples</text>

    <!-- Compute batch stats -->
    <rect class="box-a" x="170" y="10" width="200" height="70"/>
    <text x="270" y="30" text-anchor="middle" class="tag" fill="#D97757">COMPUTE LIVE</text>
    <text x="270" y="50" text-anchor="middle" class="mono">μ_batch = mean(x)</text>
    <text x="270" y="68" text-anchor="middle" class="mono">σ²_batch = var(x)</text>

    <line x1="140" y1="45" x2="170" y2="45" class="ink" marker-end="url(#bn-a)"/>

    <!-- Update running stats -->
    <rect class="box-b" x="170" y="100" width="200" height="60"/>
    <text x="270" y="120" text-anchor="middle" class="tag" fill="#C9A961">UPDATE RUNNING AVG</text>
    <text x="270" y="140" text-anchor="middle" class="mono">running_μ ← (1−m)·old + m·μ</text>
    <text x="270" y="156" text-anchor="middle" class="mut">momentum m = 0.1</text>

    <line x1="270" y1="80" x2="270" y2="100" class="ink" marker-end="url(#bn-a)"/>

    <!-- Normalize -->
    <rect class="box" x="80" y="180" width="240" height="50"/>
    <text x="200" y="202" text-anchor="middle" class="mono">x̂ = (x − μ_batch) / √(σ² + ε)</text>
    <text x="200" y="218" text-anchor="middle" class="mut">use BATCH stats</text>

    <line x1="270" y1="160" x2="200" y2="180" class="ink" marker-end="url(#bn-a)"/>
  </g>

  <!-- EVAL MODE -->
  <g transform="translate(520, 70)">
    <text x="200" y="-10" text-anchor="middle" class="tag" fill="#7B9E89">EVAL MODE  ·  model.eval()</text>
    <rect x="0" y="0" width="400" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>

    <rect class="box" x="20" y="20" width="120" height="50"/>
    <text x="80" y="42" text-anchor="middle" class="mono">input x</text>
    <text x="80" y="58" text-anchor="middle" class="mut">even batch size = 1</text>

    <!-- Use running stats -->
    <rect class="box-s" x="170" y="30" width="200" height="60"/>
    <text x="270" y="50" text-anchor="middle" class="tag" fill="#7B9E89">USE FROZEN</text>
    <text x="270" y="70" text-anchor="middle" class="mono">running_μ, running_σ²</text>
    <text x="270" y="86" text-anchor="middle" class="mut">from training</text>

    <line x1="140" y1="45" x2="170" y2="60" class="ink" marker-end="url(#bn-a)"/>

    <!-- Normalize -->
    <rect class="box" x="80" y="180" width="240" height="50"/>
    <text x="200" y="202" text-anchor="middle" class="mono">x̂ = (x − running_μ) / √(...)</text>
    <text x="200" y="218" text-anchor="middle" class="mut" fill="#7B9E89">use RUNNING stats (no update)</text>

    <line x1="270" y1="90" x2="200" y2="180" class="ink" marker-end="url(#bn-a)"/>
  </g>

  <!-- Bottom warning -->
  <g transform="translate(40, 330)">
    <rect x="0" y="0" width="880" height="40" fill="#F6D4CC" stroke="#A8324B"/>
    <text x="14" y="18" class="tag" fill="#A8324B">COMMON BUG</text>
    <text x="14" y="36" class="mut">
      Forgot <tspan font-family="'JetBrains Mono'" fill="#1F1F1E">model.eval()</tspan> at inference? BN uses batch-of-1 statistics → predictions unstable and often wrong.
    </text>
  </g>
</svg>
