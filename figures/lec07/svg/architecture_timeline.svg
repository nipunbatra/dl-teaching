<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box    { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:4; ry:4; }
      .box-a  { fill:#EAD3C5; stroke:#D97757; stroke-width:1.4; rx:4; ry:4; }
      .box-s  { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.4; rx:4; ry:4; }
      .box-b  { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.4; rx:4; ry:4; }
      .axis   { stroke:#1F1F1E; stroke-width:1.5; fill:none; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .lbl    { fill:#1F1F1E; font-size:12px; font-weight:600; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">CNN architectures 1998 → 2019 · depth goes up, receptive field grows, width specializes</text>

  <!-- Horizontal timeline -->
  <line x1="60" y1="330" x2="900" y2="330" class="axis"/>

  <!-- Year ticks -->
  <g class="mono" fill="#6B6A65" font-size="11">
    <line x1="90"  y1="326" x2="90"  y2="336" stroke="#6B6A65"/>
    <text x="90"  y="355" text-anchor="middle">1998</text>
    <line x1="260" y1="326" x2="260" y2="336" stroke="#6B6A65"/>
    <text x="260" y="355" text-anchor="middle">2012</text>
    <line x1="400" y1="326" x2="400" y2="336" stroke="#6B6A65"/>
    <text x="400" y="355" text-anchor="middle">2014</text>
    <line x1="520" y1="326" x2="520" y2="336" stroke="#6B6A65"/>
    <text x="520" y="355" text-anchor="middle">2014</text>
    <line x1="650" y1="326" x2="650" y2="336" stroke="#6B6A65"/>
    <text x="650" y="355" text-anchor="middle">2015</text>
    <line x1="770" y1="326" x2="770" y2="336" stroke="#6B6A65"/>
    <text x="770" y="355" text-anchor="middle">2017</text>
    <line x1="870" y1="326" x2="870" y2="336" stroke="#6B6A65"/>
    <text x="870" y="355" text-anchor="middle">2019</text>
  </g>

  <!-- LeNet -->
  <g transform="translate(50, 280)">
    <line x1="40" y1="0" x2="40" y2="50" stroke="#6B6A65"/>
    <rect class="box" x="0" y="-60" width="80" height="60"/>
    <text x="40" y="-42" text-anchor="middle" class="lbl">LeNet-5</text>
    <text x="40" y="-26" text-anchor="middle" class="mono">5 layers</text>
    <text x="40" y="-12" text-anchor="middle" class="mut">60k params</text>
  </g>

  <!-- AlexNet -->
  <g transform="translate(220, 260)">
    <line x1="40" y1="0" x2="40" y2="70" stroke="#6B6A65"/>
    <rect class="box-a" x="0" y="-80" width="80" height="80"/>
    <text x="40" y="-62" text-anchor="middle" class="lbl" fill="#D97757">AlexNet</text>
    <text x="40" y="-46" text-anchor="middle" class="mono">8 layers</text>
    <text x="40" y="-32" text-anchor="middle" class="mut">60M params</text>
    <text x="40" y="-14" text-anchor="middle" class="mut" fill="#D97757">GPU · ReLU · dropout</text>
  </g>

  <!-- VGG -->
  <g transform="translate(360, 220)">
    <line x1="40" y1="0" x2="40" y2="110" stroke="#6B6A65"/>
    <rect class="box" x="0" y="-120" width="80" height="120"/>
    <text x="40" y="-100" text-anchor="middle" class="lbl">VGG-19</text>
    <text x="40" y="-84" text-anchor="middle" class="mono">19 layers</text>
    <text x="40" y="-70" text-anchor="middle" class="mut">138M params</text>
    <text x="40" y="-52" text-anchor="middle" class="mut">stacked</text>
    <text x="40" y="-36" text-anchor="middle" class="mut">3×3 convs</text>
    <text x="40" y="-18" text-anchor="middle" class="mut" font-style="italic">"deeper is better"</text>
  </g>

  <!-- GoogLeNet -->
  <g transform="translate(480, 200)">
    <line x1="40" y1="0" x2="40" y2="130" stroke="#6B6A65"/>
    <rect class="box-s" x="0" y="-140" width="80" height="140"/>
    <text x="40" y="-120" text-anchor="middle" class="lbl" fill="#7B9E89">GoogLeNet</text>
    <text x="40" y="-104" text-anchor="middle" class="mono">22 layers</text>
    <text x="40" y="-90" text-anchor="middle" class="mut">7M params</text>
    <text x="40" y="-72" text-anchor="middle" class="mut">Inception</text>
    <text x="40" y="-56" text-anchor="middle" class="mut">1×1 convs</text>
    <text x="40" y="-40" text-anchor="middle" class="mut">parallel</text>
    <text x="40" y="-22" text-anchor="middle" class="mut" fill="#7B9E89">efficient</text>
  </g>

  <!-- ResNet -->
  <g transform="translate(610, 140)">
    <line x1="40" y1="0" x2="40" y2="190" stroke="#6B6A65"/>
    <rect class="box-a" x="0" y="-200" width="80" height="200"/>
    <text x="40" y="-180" text-anchor="middle" class="lbl" fill="#D97757">ResNet-152</text>
    <text x="40" y="-164" text-anchor="middle" class="mono">152 layers</text>
    <text x="40" y="-150" text-anchor="middle" class="mut">60M params</text>
    <text x="40" y="-130" text-anchor="middle" class="mut">skip</text>
    <text x="40" y="-114" text-anchor="middle" class="mut">connections</text>
    <text x="40" y="-94" text-anchor="middle" class="mut">bottleneck</text>
    <text x="40" y="-78" text-anchor="middle" class="mut">blocks</text>
    <text x="40" y="-60" text-anchor="middle" class="mut" fill="#D97757">depth solved</text>
    <text x="40" y="-40" text-anchor="middle" class="mono">3.6% top-5</text>
    <text x="40" y="-20" text-anchor="middle" class="mut" font-style="italic">sub-human</text>
  </g>

  <!-- MobileNet -->
  <g transform="translate(730, 260)">
    <line x1="40" y1="0" x2="40" y2="70" stroke="#6B6A65"/>
    <rect class="box-b" x="0" y="-80" width="80" height="80"/>
    <text x="40" y="-62" text-anchor="middle" class="lbl" fill="#4A6670">MobileNet</text>
    <text x="40" y="-46" text-anchor="middle" class="mono">28 layers</text>
    <text x="40" y="-32" text-anchor="middle" class="mut">4M params</text>
    <text x="40" y="-14" text-anchor="middle" class="mut" fill="#4A6670">depthwise conv</text>
  </g>

  <!-- EfficientNet -->
  <g transform="translate(830, 240)">
    <line x1="40" y1="0" x2="40" y2="90" stroke="#6B6A65"/>
    <rect class="box-s" x="0" y="-100" width="80" height="100"/>
    <text x="40" y="-82" text-anchor="middle" class="lbl" fill="#7B9E89">EfficientNet</text>
    <text x="40" y="-66" text-anchor="middle" class="mono">B0 – B7</text>
    <text x="40" y="-52" text-anchor="middle" class="mut">5M – 66M</text>
    <text x="40" y="-32" text-anchor="middle" class="mut">compound</text>
    <text x="40" y="-16" text-anchor="middle" class="mut">scaling</text>
  </g>

  <!-- Horizontal caption strip -->
  <g transform="translate(60, 380)">
    <text x="420" y="0" text-anchor="middle" class="mut" font-style="italic">
      Depth increased <tspan fill="#D97757" font-weight="600">20×</tspan>;
      params roughly constant after 2014;
      efficiency became the new axis after ResNet solved depth.
    </text>
  </g>
</svg>
