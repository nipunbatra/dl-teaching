<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .cell   { fill:#F0EEE5; stroke:#6B6A65; stroke-width:0.6; }
      .l1     { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.2; }
      .l2     { fill:#EAD3C5; stroke:#D97757; stroke-width:1.5; }
      .l3     { fill:#F6D4CC; stroke:#A8324B; stroke-width:2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Receptive field — how much of the input a deeper feature "sees"</text>

  <!-- Input grid 9x9 with highlighted 5x5 / 3x3 / 1x1 regions -->
  <g transform="translate(60, 70)">
    <text x="180" y="-10" text-anchor="middle" class="tag">INPUT · stacking 3×3 convs grows RF</text>
    <!-- 9x9 grid of 40px cells -->
    <g>
      <!-- Row-major generation of 9x9 grid -->
      <g id="grid">
        <rect class="cell" x="0"    y="0"   width="40" height="40"/>
        <rect class="cell" x="40"   y="0"   width="40" height="40"/>
        <rect class="cell" x="80"   y="0"   width="40" height="40"/>
        <rect class="cell" x="120"  y="0"   width="40" height="40"/>
        <rect class="cell" x="160"  y="0"   width="40" height="40"/>
        <rect class="cell" x="200"  y="0"   width="40" height="40"/>
        <rect class="cell" x="240"  y="0"   width="40" height="40"/>
        <rect class="cell" x="280"  y="0"   width="40" height="40"/>
        <rect class="cell" x="320"  y="0"   width="40" height="40"/>

        <rect class="cell" x="0"    y="40"  width="40" height="40"/>
        <rect class="cell" x="40"   y="40"  width="40" height="40"/>
        <rect class="cell" x="80"   y="40"  width="40" height="40"/>
        <rect class="cell" x="120"  y="40"  width="40" height="40"/>
        <rect class="cell" x="160"  y="40"  width="40" height="40"/>
        <rect class="cell" x="200"  y="40"  width="40" height="40"/>
        <rect class="cell" x="240"  y="40"  width="40" height="40"/>
        <rect class="cell" x="280"  y="40"  width="40" height="40"/>
        <rect class="cell" x="320"  y="40"  width="40" height="40"/>

        <rect class="cell" x="0"    y="80"  width="40" height="40"/>
        <rect class="cell" x="40"   y="80"  width="40" height="40"/>
        <rect class="cell" x="80"   y="80"  width="40" height="40"/>
        <rect class="cell" x="120"  y="80"  width="40" height="40"/>
        <rect class="cell" x="160"  y="80"  width="40" height="40"/>
        <rect class="cell" x="200"  y="80"  width="40" height="40"/>
        <rect class="cell" x="240"  y="80"  width="40" height="40"/>
        <rect class="cell" x="280"  y="80"  width="40" height="40"/>
        <rect class="cell" x="320"  y="80"  width="40" height="40"/>

        <rect class="cell" x="0"    y="120" width="40" height="40"/>
        <rect class="cell" x="40"   y="120" width="40" height="40"/>
        <rect class="cell" x="80"   y="120" width="40" height="40"/>
        <rect class="cell" x="120"  y="120" width="40" height="40"/>
        <rect class="cell" x="160"  y="120" width="40" height="40"/>
        <rect class="cell" x="200"  y="120" width="40" height="40"/>
        <rect class="cell" x="240"  y="120" width="40" height="40"/>
        <rect class="cell" x="280"  y="120" width="40" height="40"/>
        <rect class="cell" x="320"  y="120" width="40" height="40"/>

        <rect class="cell" x="0"    y="160" width="40" height="40"/>
        <rect class="cell" x="40"   y="160" width="40" height="40"/>
        <rect class="cell" x="80"   y="160" width="40" height="40"/>
        <rect class="cell" x="120"  y="160" width="40" height="40"/>
        <rect class="cell" x="160"  y="160" width="40" height="40"/>
        <rect class="cell" x="200"  y="160" width="40" height="40"/>
        <rect class="cell" x="240"  y="160" width="40" height="40"/>
        <rect class="cell" x="280"  y="160" width="40" height="40"/>
        <rect class="cell" x="320"  y="160" width="40" height="40"/>

        <rect class="cell" x="0"    y="200" width="40" height="40"/>
        <rect class="cell" x="40"   y="200" width="40" height="40"/>
        <rect class="cell" x="80"   y="200" width="40" height="40"/>
        <rect class="cell" x="120"  y="200" width="40" height="40"/>
        <rect class="cell" x="160"  y="200" width="40" height="40"/>
        <rect class="cell" x="200"  y="200" width="40" height="40"/>
        <rect class="cell" x="240"  y="200" width="40" height="40"/>
        <rect class="cell" x="280"  y="200" width="40" height="40"/>
        <rect class="cell" x="320"  y="200" width="40" height="40"/>

        <rect class="cell" x="0"    y="240" width="40" height="40"/>
        <rect class="cell" x="40"   y="240" width="40" height="40"/>
        <rect class="cell" x="80"   y="240" width="40" height="40"/>
        <rect class="cell" x="120"  y="240" width="40" height="40"/>
        <rect class="cell" x="160"  y="240" width="40" height="40"/>
        <rect class="cell" x="200"  y="240" width="40" height="40"/>
        <rect class="cell" x="240"  y="240" width="40" height="40"/>
        <rect class="cell" x="280"  y="240" width="40" height="40"/>
        <rect class="cell" x="320"  y="240" width="40" height="40"/>
      </g>

      <!-- center-out highlight: 1 cell (depth-3 view), 3x3 (depth-2), 5x5 (depth-1) -->
      <rect x="80"  y="80"  width="200" height="200" class="l1" fill-opacity="0.25"/>
      <rect x="120" y="120" width="120" height="120" class="l2" fill-opacity="0.45"/>
      <rect x="160" y="160" width="40"  height="40"  class="l3"/>

      <!-- annotations -->
      <text x="180" y="150" text-anchor="middle" class="mono" fill="#1F1F1E">center</text>
      <text x="180" y="165" text-anchor="middle" class="mono" fill="#1F1F1E" font-weight="600">feature</text>
    </g>
  </g>

  <!-- RIGHT: explanation + table -->
  <g transform="translate(480, 80)">
    <text x="0" y="-10" class="tag">RECEPTIVE FIELD GROWTH</text>
    <rect x="0" y="0" width="420" height="130" fill="#F0EEE5" stroke="#C9C4B5"/>

    <g transform="translate(14, 22)">
      <rect class="l3" x="0" y="0" width="18" height="18"/>
      <text x="30" y="14" class="mono">after depth 3 (via 3× 3×3 conv)</text>
      <text x="260" y="14" class="mono" fill="#A8324B" font-weight="600">RF = 1</text>

      <rect class="l2" x="0" y="26" width="18" height="18"/>
      <text x="30" y="40" class="mono">after depth 2</text>
      <text x="260" y="40" class="mono" fill="#D97757" font-weight="600">RF = 3</text>

      <rect class="l1" x="0" y="52" width="18" height="18"/>
      <text x="30" y="66" class="mono">after depth 1</text>
      <text x="260" y="66" class="mono" fill="#7B9E89" font-weight="600">RF = 5</text>

      <text x="0" y="92" class="mono">input  (no conv yet)</text>
      <text x="260" y="92" class="mono">RF = 7</text>
    </g>
  </g>

  <!-- Formula -->
  <g transform="translate(480, 230)">
    <rect x="0" y="0" width="420" height="90" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">FORMULA</text>
    <text x="14" y="44" class="mono" font-size="13">RF_ℓ = RF_{ℓ−1} + (K_ℓ − 1) · Π S_i</text>
    <text x="14" y="66" class="mut">so three stacked 3×3 convs ≈ one 7×7 conv but with</text>
    <text x="14" y="82" class="mut">fewer parameters and more non-linearities (VGG idea).</text>
  </g>

  <!-- Footer -->
  <text x="480" y="360" text-anchor="middle" class="mut" font-style="italic">
    Depth buys you reach — a single deep feature sees a large input region indirectly.
  </text>
</svg>
