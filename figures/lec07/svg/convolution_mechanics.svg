<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .cell    { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:0.8; }
      .cell-h  { fill:#EAD3C5; stroke:#D97757; stroke-width:1.5; }
      .kernel  { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1; }
      .out-h   { fill:#F6F0DF; stroke:#C9A961; stroke-width:1.5; }
      .out     { fill:#F0EEE5; stroke:#C9A961; stroke-width:0.8; }
      .mono    { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut     { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl     { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag     { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="cv-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Convolution — slide a kernel, take dot products, build a feature map</text>

  <!-- INPUT 6x6 -->
  <g transform="translate(40, 80)">
    <text x="120" y="-10" text-anchor="middle" class="tag">INPUT  6 × 6</text>
    <!-- grid 6x6 of 30x30 cells -->
    <g>
      <rect class="cell" x="0"   y="0"   width="30" height="30"/>
      <rect class="cell" x="30"  y="0"   width="30" height="30"/>
      <rect class="cell" x="60"  y="0"   width="30" height="30"/>
      <rect class="cell" x="90"  y="0"   width="30" height="30"/>
      <rect class="cell" x="120" y="0"   width="30" height="30"/>
      <rect class="cell" x="150" y="0"   width="30" height="30"/>
      <rect class="cell" x="0"   y="30"  width="30" height="30"/>
      <rect class="cell-h" x="30"  y="30" width="30" height="30"/>
      <rect class="cell-h" x="60"  y="30" width="30" height="30"/>
      <rect class="cell-h" x="90"  y="30" width="30" height="30"/>
      <rect class="cell" x="120" y="30"  width="30" height="30"/>
      <rect class="cell" x="150" y="30"  width="30" height="30"/>
      <rect class="cell" x="0"   y="60"  width="30" height="30"/>
      <rect class="cell-h" x="30"  y="60" width="30" height="30"/>
      <rect class="cell-h" x="60"  y="60" width="30" height="30"/>
      <rect class="cell-h" x="90"  y="60" width="30" height="30"/>
      <rect class="cell" x="120" y="60"  width="30" height="30"/>
      <rect class="cell" x="150" y="60"  width="30" height="30"/>
      <rect class="cell" x="0"   y="90"  width="30" height="30"/>
      <rect class="cell-h" x="30"  y="90" width="30" height="30"/>
      <rect class="cell-h" x="60"  y="90" width="30" height="30"/>
      <rect class="cell-h" x="90"  y="90" width="30" height="30"/>
      <rect class="cell" x="120" y="90"  width="30" height="30"/>
      <rect class="cell" x="150" y="90"  width="30" height="30"/>
      <rect class="cell" x="0"   y="120" width="30" height="30"/>
      <rect class="cell" x="30"  y="120" width="30" height="30"/>
      <rect class="cell" x="60"  y="120" width="30" height="30"/>
      <rect class="cell" x="90"  y="120" width="30" height="30"/>
      <rect class="cell" x="120" y="120" width="30" height="30"/>
      <rect class="cell" x="150" y="120" width="30" height="30"/>
      <rect class="cell" x="0"   y="150" width="30" height="30"/>
      <rect class="cell" x="30"  y="150" width="30" height="30"/>
      <rect class="cell" x="60"  y="150" width="30" height="30"/>
      <rect class="cell" x="90"  y="150" width="30" height="30"/>
      <rect class="cell" x="120" y="150" width="30" height="30"/>
      <rect class="cell" x="150" y="150" width="30" height="30"/>
    </g>
    <!-- bracket for highlighted 3x3 window -->
    <rect x="30" y="30" width="90" height="90" fill="none" stroke="#D97757" stroke-width="2.5"/>
    <text x="95" y="16" class="mono" fill="#D97757" text-anchor="middle">window</text>
  </g>

  <!-- Kernel 3x3 -->
  <g transform="translate(320, 130)">
    <text x="45" y="-10" text-anchor="middle" class="tag" fill="#7B9E89">KERNEL  3 × 3</text>
    <rect class="kernel" x="0"  y="0"  width="30" height="30"/>
    <text x="15" y="20" text-anchor="middle" class="mono">w₁₁</text>
    <rect class="kernel" x="30" y="0"  width="30" height="30"/>
    <text x="45" y="20" text-anchor="middle" class="mono">w₁₂</text>
    <rect class="kernel" x="60" y="0"  width="30" height="30"/>
    <text x="75" y="20" text-anchor="middle" class="mono">w₁₃</text>
    <rect class="kernel" x="0"  y="30" width="30" height="30"/>
    <text x="15" y="50" text-anchor="middle" class="mono">w₂₁</text>
    <rect class="kernel" x="30" y="30" width="30" height="30"/>
    <text x="45" y="50" text-anchor="middle" class="mono">w₂₂</text>
    <rect class="kernel" x="60" y="30" width="30" height="30"/>
    <text x="75" y="50" text-anchor="middle" class="mono">w₂₃</text>
    <rect class="kernel" x="0"  y="60" width="30" height="30"/>
    <text x="15" y="80" text-anchor="middle" class="mono">w₃₁</text>
    <rect class="kernel" x="30" y="60" width="30" height="30"/>
    <text x="45" y="80" text-anchor="middle" class="mono">w₃₂</text>
    <rect class="kernel" x="60" y="60" width="30" height="30"/>
    <text x="75" y="80" text-anchor="middle" class="mono">w₃₃</text>

    <text x="45" y="115" text-anchor="middle" class="mut">9 shared weights</text>
    <text x="45" y="130" text-anchor="middle" class="mut">(+ 1 bias)</text>
  </g>

  <!-- OUTPUT 4x4 -->
  <g transform="translate(480, 100)">
    <text x="80" y="-10" text-anchor="middle" class="tag" fill="#C9A961">OUTPUT  4 × 4</text>
    <g>
      <rect class="out-h" x="0"   y="0"  width="35" height="35"/>
      <text x="17" y="22" text-anchor="middle" class="mono" fill="#C9A961">y₁₁</text>
      <rect class="out" x="35"  y="0"  width="35" height="35"/>
      <rect class="out" x="70"  y="0"  width="35" height="35"/>
      <rect class="out" x="105" y="0"  width="35" height="35"/>

      <rect class="out" x="0"   y="35" width="35" height="35"/>
      <rect class="out" x="35"  y="35" width="35" height="35"/>
      <rect class="out" x="70"  y="35" width="35" height="35"/>
      <rect class="out" x="105" y="35" width="35" height="35"/>

      <rect class="out" x="0"   y="70" width="35" height="35"/>
      <rect class="out" x="35"  y="70" width="35" height="35"/>
      <rect class="out" x="70"  y="70" width="35" height="35"/>
      <rect class="out" x="105" y="70" width="35" height="35"/>

      <rect class="out" x="0"   y="105" width="35" height="35"/>
      <rect class="out" x="35"  y="105" width="35" height="35"/>
      <rect class="out" x="70"  y="105" width="35" height="35"/>
      <rect class="out" x="105" y="105" width="35" height="35"/>
    </g>
  </g>

  <!-- Arrow from window → output cell with formula -->
  <g class="mono" stroke="#1F1F1E" fill="none">
    <line x1="215" y1="200" x2="285" y2="200" stroke-width="1.2" marker-end="url(#cv-a)"/>
    <line x1="385" y1="200" x2="478" y2="117" stroke-width="1.2" marker-end="url(#cv-a)"/>
  </g>

  <!-- Formula -->
  <g transform="translate(650, 80)">
    <rect x="0" y="0" width="260" height="150" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="24" class="tag">FORMULA</text>
    <text x="14" y="48" class="mono" font-size="13">y₁₁ = Σ w_{ij} · x_{ij}  + b</text>
    <text x="14" y="72" class="mut">(sum over 3 × 3 window)</text>
    <text x="14" y="102" class="tag">OUTPUT SIZE</text>
    <text x="14" y="122" class="mono">O = (W − K + 2P) / S + 1</text>
    <text x="14" y="140" class="mut">here · (6 − 3 + 0) / 1 + 1 = 4</text>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 370)">
    <rect x="0" y="0" width="840" height="36" fill="#F0EEE5" stroke="#C9C4B5"/>
    <text x="14" y="22" class="mut" font-style="italic">
      Convolution slides the SAME 9-weight kernel across the whole image —
      <tspan fill="#D97757" font-weight="600">parameter sharing</tspan> + <tspan fill="#D97757" font-weight="600">sparse connectivity</tspan> + <tspan fill="#D97757" font-weight="600">translation equivariance</tspan>.
    </text>
  </g>
</svg>
