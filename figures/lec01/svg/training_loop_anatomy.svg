<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box   { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:4; ry:4; }
      .box-a { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:4; ry:4; }
      .box-s { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.3; rx:4; ry:4; }
      .ink   { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .acc   { stroke:#D97757; fill:none; stroke-width:1.6; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:12px; fill:#1F1F1E; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
    </style>
    <marker id="arr-l" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/>
    </marker>
    <marker id="arr-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97757"/>
    </marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">The five lines you will write every day this semester</text>

  <!-- forward row -->
  <g transform="translate(40, 80)">
    <rect class="box"   x="0"   y="0" width="140" height="60"/>
    <text x="70" y="26" text-anchor="middle" class="mono" font-weight="600">model(x)</text>
    <text x="70" y="44" text-anchor="middle" class="mut">forward pass</text>

    <rect class="box"   x="180" y="0" width="160" height="60"/>
    <text x="260" y="26" text-anchor="middle" class="mono" font-weight="600">loss = criterion(...)</text>
    <text x="260" y="44" text-anchor="middle" class="mut">scalar error</text>

    <rect class="box-s" x="370" y="0" width="160" height="60"/>
    <text x="450" y="26" text-anchor="middle" class="mono" font-weight="600">zero_grad()</text>
    <text x="450" y="44" text-anchor="middle" class="mut">clear stale ∇</text>

    <rect class="box-a" x="560" y="0" width="160" height="60"/>
    <text x="640" y="26" text-anchor="middle" class="mono" font-weight="600">loss.backward()</text>
    <text x="640" y="44" text-anchor="middle" class="mut">chain rule → fills .grad</text>

    <rect class="box"   x="750" y="0" width="160" height="60"/>
    <text x="830" y="26" text-anchor="middle" class="mono" font-weight="600">optimizer.step()</text>
    <text x="830" y="44" text-anchor="middle" class="mut">θ ← θ − η∇</text>

    <!-- arrows -->
    <g class="ink" marker-end="url(#arr-l)">
      <line x1="140" y1="30" x2="180" y2="30"/>
      <line x1="340" y1="30" x2="370" y2="30"/>
      <line x1="530" y1="30" x2="560" y2="30"/>
      <line x1="720" y1="30" x2="750" y2="30"/>
    </g>
  </g>

  <!-- loop back arrow -->
  <path class="acc" stroke-dasharray="5 3" d="M 870 140 Q 870 200 450 200 Q 40 200 40 140" marker-end="url(#arr-acc)"/>
  <text x="455" y="195" text-anchor="middle" class="tag" fill="#D97757">repeat for each minibatch · for each epoch</text>

  <!-- common gotchas -->
  <g transform="translate(60, 235)">
    <text x="0" y="0" class="tag">COMMON GOTCHAS</text>

    <rect x="0" y="12" width="270" height="78" fill="#F6F0DF" stroke="#C9A961" stroke-width="1"/>
    <text x="14" y="32" class="mut" font-weight="600" fill="#1F1F1E">Forgot zero_grad()?</text>
    <text x="14" y="52" class="mut">PyTorch <tspan font-style="italic">accumulates</tspan> gradients.</text>
    <text x="14" y="70" class="mut">Updates explode silently.</text>

    <rect x="290" y="12" width="270" height="78" fill="#F6F0DF" stroke="#C9A961" stroke-width="1"/>
    <text x="304" y="32" class="mut" font-weight="600" fill="#1F1F1E">Applied softmax AND CrossEntropyLoss?</text>
    <text x="304" y="52" class="mut">CE already takes raw logits.</text>
    <text x="304" y="70" class="mut">Double-softmax → frozen loss.</text>

    <rect x="580" y="12" width="270" height="78" fill="#F6F0DF" stroke="#C9A961" stroke-width="1"/>
    <text x="594" y="32" class="mut" font-weight="600" fill="#1F1F1E">model.eval() / torch.no_grad()?</text>
    <text x="594" y="52" class="mut">BatchNorm/Dropout misbehave.</text>
    <text x="594" y="70" class="mut">Graph is built needlessly.</text>
  </g>
</svg>
