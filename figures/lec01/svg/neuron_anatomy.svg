<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .ink   { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .mut   { stroke:#6B6A65; fill:none; stroke-width:1; }
      .leaf  { fill:#EAE7DC; stroke:#6B6A65; stroke-width:1; }
      .sum   { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.6; }
      .act   { fill:#EAD3C5; stroke:#D97757; stroke-width:1.6; }
      .out   { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.4; }
      .lbl   { fill:#1F1F1E; font-size:13px; }
      .mono  { font-family:'JetBrains Mono', monospace; fill:#1F1F1E; font-size:13px; }
      .wlbl  { fill:#A8324B; font-family:'JetBrains Mono', monospace; font-size:12px; }
      .mut-t { fill:#6B6A65; font-size:12px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:16px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="na-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/>
    </marker>
    <marker id="na-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97757"/>
    </marker>
  </defs>

  <text x="480" y="30" text-anchor="middle" class="ttl">Anatomy of a single neuron — two stages, one output</text>
  <text x="480" y="52" text-anchor="middle" class="tag">STAGE 1 · weighted sum       STAGE 2 · non-linearity</text>

  <!-- Inputs on the left -->
  <g transform="translate(80, 100)">
    <text x="0" y="-8" class="tag">INPUTS</text>

    <circle cx="20" cy="30"  r="18" class="leaf"/>
    <text  x="20" y="35" text-anchor="middle" class="mono">x₁</text>

    <circle cx="20" cy="90"  r="18" class="leaf"/>
    <text  x="20" y="95" text-anchor="middle" class="mono">x₂</text>

    <circle cx="20" cy="150" r="18" class="leaf"/>
    <text  x="20" y="155" text-anchor="middle" class="mono">x₃</text>

    <text  x="20" y="195" text-anchor="middle" class="mut-t">⋮</text>

    <circle cx="20" cy="240" r="18" class="leaf"/>
    <text  x="20" y="245" text-anchor="middle" class="mono">x_d</text>
  </g>

  <!-- Summation node Σ -->
  <g transform="translate(330, 230)">
    <circle cx="0" cy="0" r="44" class="sum"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Fraunces" font-size="42" fill="#1F1F1E">Σ</text>
    <text x="0" y="20" text-anchor="middle" class="mono" font-size="11">z = Σwᵢxᵢ + b</text>
    <text x="0" y="-50" text-anchor="middle" class="tag">1 · SUM</text>
    <text x="0" y="64" text-anchor="middle" class="mut-t">"pre-activation" z</text>
  </g>

  <!-- Bias node -->
  <g transform="translate(250, 80)">
    <circle cx="0" cy="0" r="18" class="leaf" fill="#F6F0DF" stroke="#C9A961"/>
    <text x="0" y="5" text-anchor="middle" class="mono" fill="#C9A961">b</text>
    <text x="0" y="-26" text-anchor="middle" class="mut-t" fill="#C9A961">bias (always on)</text>
  </g>

  <!-- Edges: inputs -> sum, with weights -->
  <g class="mut" marker-end="url(#na-a)">
    <line x1="120" y1="130" x2="290" y2="215"/>
    <line x1="120" y1="190" x2="290" y2="225"/>
    <line x1="120" y1="250" x2="290" y2="235"/>
    <line x1="120" y1="340" x2="290" y2="260"/>
    <line x1="250" y1="96"  x2="314" y2="195"/>
  </g>

  <!-- Weight labels on edges -->
  <text x="205" y="165" class="wlbl">w₁</text>
  <text x="200" y="215" class="wlbl">w₂</text>
  <text x="200" y="255" class="wlbl">w₃</text>
  <text x="200" y="310" class="wlbl">w_d</text>

  <!-- Activation box σ -->
  <g transform="translate(550, 230)">
    <circle cx="0" cy="0" r="44" class="act"/>
    <text x="0" y="6" text-anchor="middle" font-family="Fraunces" font-size="36" fill="#D97757">σ</text>
    <text x="0" y="-50" text-anchor="middle" class="tag" fill="#D97757">2 · SQUASH</text>
    <text x="0" y="64" text-anchor="middle" class="mut-t">"activation" σ(z)</text>
  </g>

  <!-- Mini plot of sigmoid inside the σ node — subtle hint -->
  <g transform="translate(550, 230)" opacity="0.3">
    <path d="M -20 10 C -10 10 0 -10 20 -10" stroke="#D97757" fill="none" stroke-width="1.2"/>
  </g>

  <!-- Arrow sum -> activation -->
  <g>
    <line x1="374" y1="230" x2="506" y2="230" class="ink" marker-end="url(#na-acc)" stroke="#D97757" stroke-width="1.8"/>
    <text x="440" y="220" text-anchor="middle" class="mono" fill="#D97757">z</text>
  </g>

  <!-- Output -->
  <g transform="translate(760, 230)">
    <rect x="-32" y="-24" width="64" height="48" class="out" rx="6"/>
    <text x="0" y="6" text-anchor="middle" class="mono" fill="#7B9E89">y</text>
    <text x="0" y="-40" text-anchor="middle" class="tag" fill="#7B9E89">OUTPUT</text>
    <text x="0" y="48" text-anchor="middle" class="mut-t">to next layer</text>
  </g>
  <line x1="594" y1="230" x2="724" y2="230" class="ink" marker-end="url(#na-a)"/>

  <!-- Formula strip -->
  <g transform="translate(480, 380)">
    <text x="0" y="0" text-anchor="middle" class="mono" font-size="15">
      y  =  <tspan fill="#D97757">σ</tspan>
            (<tspan fill="#6B6A65">Σ</tspan>
            <tspan fill="#A8324B">wᵢ</tspan> xᵢ
            +
            <tspan fill="#C9A961">b</tspan>)
    </text>
  </g>
</svg>
