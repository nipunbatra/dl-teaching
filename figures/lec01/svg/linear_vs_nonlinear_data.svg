<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="EB Garamond, Georgia, serif">
  <style>
    .bg { fill: #F7F3E9; }
    .title { font-size: 17px; font-weight: 600; fill: #161513; }
    .head { font-size: 13px; font-weight: 600; fill: #161513; }
    .body { font-size: 12px; fill: #161513; }
    .caption { font-size: 11px; fill: #5F5C54; font-style: italic; }
    .axis { stroke: #161513; stroke-width: 1; fill: none; }
    .grid { stroke: #B5AE9B; stroke-width: 0.4; opacity: 0.5; fill: none; }
    .blue { fill: #37535F; }
    .red { fill: #B85A3E; }
    .line { stroke: #161513; stroke-width: 2; fill: none; }
    .curve { stroke: #5F8573; stroke-width: 2.4; fill: none; stroke-dasharray: 5 3; }
  </style>
  <rect class="bg" width="960" height="380"/>
  <text x="480" y="28" class="title" text-anchor="middle">A linear classifier can split linearly-separable data · not arbitrary patterns</text>

  <!-- Panel 1 · linearly separable -->
  <g transform="translate(60, 70)">
    <text x="180" y="0" class="head" text-anchor="middle">Linearly separable</text>
    <rect x="0" y="20" width="360" height="240" fill="white" stroke="#161513" stroke-width="1"/>
    <g class="grid">
      <line x1="0" y1="80" x2="360" y2="80"/>
      <line x1="0" y1="140" x2="360" y2="140"/>
      <line x1="0" y1="200" x2="360" y2="200"/>
      <line x1="90" y1="20" x2="90" y2="260"/>
      <line x1="180" y1="20" x2="180" y2="260"/>
      <line x1="270" y1="20" x2="270" y2="260"/>
    </g>
    <!-- Blue cluster bottom-left -->
    <circle class="blue" cx="60" cy="200" r="6"/>
    <circle class="blue" cx="80" cy="220" r="6"/>
    <circle class="blue" cx="100" cy="180" r="6"/>
    <circle class="blue" cx="50" cy="170" r="6"/>
    <circle class="blue" cx="120" cy="210" r="6"/>
    <circle class="blue" cx="90" cy="195" r="6"/>
    <!-- Red cluster top-right -->
    <circle class="red" cx="280" cy="60" r="6"/>
    <circle class="red" cx="260" cy="80" r="6"/>
    <circle class="red" cx="300" cy="100" r="6"/>
    <circle class="red" cx="240" cy="50" r="6"/>
    <circle class="red" cx="320" cy="70" r="6"/>
    <circle class="red" cx="280" cy="120" r="6"/>
    <!-- Linear separator -->
    <line class="line" x1="40" y1="40" x2="320" y2="240"/>
    <text x="180" y="290" class="caption" text-anchor="middle">A line separates the two classes · linear classifier ✓</text>
  </g>

  <!-- Panel 2 · circle inside a circle -->
  <g transform="translate(540, 70)">
    <text x="180" y="0" class="head" text-anchor="middle">Non-linearly separable</text>
    <rect x="0" y="20" width="360" height="240" fill="white" stroke="#161513" stroke-width="1"/>
    <g class="grid">
      <line x1="0" y1="80" x2="360" y2="80"/>
      <line x1="0" y1="140" x2="360" y2="140"/>
      <line x1="0" y1="200" x2="360" y2="200"/>
      <line x1="90" y1="20" x2="90" y2="260"/>
      <line x1="180" y1="20" x2="180" y2="260"/>
      <line x1="270" y1="20" x2="270" y2="260"/>
    </g>
    <!-- Blue inner circle -->
    <g class="blue">
      <circle cx="180" cy="140" r="6"/>
      <circle cx="195" cy="125" r="6"/>
      <circle cx="165" cy="155" r="6"/>
      <circle cx="200" cy="150" r="6"/>
      <circle cx="160" cy="130" r="6"/>
      <circle cx="185" cy="160" r="6"/>
    </g>
    <!-- Red outer ring -->
    <g class="red">
      <circle cx="100" cy="140" r="6"/>
      <circle cx="260" cy="140" r="6"/>
      <circle cx="180" cy="60" r="6"/>
      <circle cx="180" cy="220" r="6"/>
      <circle cx="120" cy="80" r="6"/>
      <circle cx="240" cy="80" r="6"/>
      <circle cx="120" cy="200" r="6"/>
      <circle cx="240" cy="200" r="6"/>
    </g>
    <!-- Wavy nonlinear boundary -->
    <ellipse class="curve" cx="180" cy="140" rx="55" ry="40"/>
    <text x="180" y="290" class="caption" text-anchor="middle">No straight line works · we need a curved boundary · non-linear net</text>
  </g>

  <text x="480" y="365" class="body" text-anchor="middle">Real images live in 150,000-dimensional space and look like the right panel · we need depth + nonlinearities.</text>
</svg>
