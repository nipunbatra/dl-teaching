<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box   { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.2; }
      .box-a { fill:#EAD3C5; stroke:#D97757; stroke-width:1.2; }
      .ink   { stroke:#1F1F1E; fill:none; stroke-width:1.2; }
      .mut   { fill:#6B6A65; font-size:12px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .accent{ fill:#D97757; }
    </style>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B6A65"/>
    </marker>
  </defs>

  <text x="480" y="30" text-anchor="middle" class="ttl">Deep networks learn a hierarchy of features</text>
  <text x="480" y="50" text-anchor="middle" class="tag">RAW INPUT → EDGES → TEXTURES → PARTS → OBJECTS</text>

  <!-- Stage 1: pixels (grid) -->
  <g transform="translate(40,100)">
    <text x="60" y="-14" text-anchor="middle" class="tag">LAYER 1</text>
    <rect x="0" y="0" width="120" height="120" class="box"/>
    <g stroke="#6B6A65" stroke-width="0.6" opacity="0.4">
      <line x1="20" y1="0"  x2="20" y2="120"/>
      <line x1="40" y1="0"  x2="40" y2="120"/>
      <line x1="60" y1="0"  x2="60" y2="120"/>
      <line x1="80" y1="0"  x2="80" y2="120"/>
      <line x1="100" y1="0" x2="100" y2="120"/>
      <line x1="0" y1="20" x2="120" y2="20"/>
      <line x1="0" y1="40" x2="120" y2="40"/>
      <line x1="0" y1="60" x2="120" y2="60"/>
      <line x1="0" y1="80" x2="120" y2="80"/>
      <line x1="0" y1="100" x2="120" y2="100"/>
    </g>
    <!-- some dark pixels -->
    <rect x="40" y="20" width="20" height="20" fill="#1F1F1E" opacity="0.7"/>
    <rect x="60" y="40" width="20" height="20" fill="#1F1F1E" opacity="0.5"/>
    <rect x="80" y="60" width="20" height="20" fill="#1F1F1E" opacity="0.85"/>
    <rect x="40" y="80" width="20" height="20" fill="#1F1F1E" opacity="0.4"/>
    <text x="60" y="145" text-anchor="middle" class="mut">Pixels</text>
    <text x="60" y="162" text-anchor="middle" class="mut" opacity="0.7">(raw input)</text>
  </g>

  <!-- Stage 2: edges -->
  <g transform="translate(240,100)">
    <text x="60" y="-14" text-anchor="middle" class="tag">LAYER 2</text>
    <rect x="0" y="0" width="120" height="120" class="box"/>
    <g stroke="#1F1F1E" stroke-width="1.6" fill="none">
      <line x1="15" y1="15" x2="45" y2="45"/>
      <line x1="75" y1="15" x2="105" y2="45"/>
      <line x1="15" y1="65" x2="45" y2="65"/>
      <line x1="75" y1="65" x2="105" y2="95"/>
      <line x1="15" y1="95" x2="55" y2="95"/>
      <line x1="70" y1="80" x2="100" y2="110"/>
    </g>
    <text x="60" y="145" text-anchor="middle" class="mut">Oriented edges</text>
    <text x="60" y="162" text-anchor="middle" class="mut" opacity="0.7">(Gabor-like)</text>
  </g>

  <!-- Stage 3: textures -->
  <g transform="translate(440,100)">
    <text x="60" y="-14" text-anchor="middle" class="tag">LAYER 3</text>
    <rect x="0" y="0" width="120" height="120" class="box"/>
    <g stroke="#1F1F1E" stroke-width="1.2" fill="none">
      <path d="M 10 30 Q 20 10 30 30 T 50 30 T 70 30 T 90 30 T 110 30"/>
      <path d="M 10 55 Q 20 35 30 55 T 50 55 T 70 55 T 90 55 T 110 55"/>
      <path d="M 10 80 Q 20 60 30 80 T 50 80 T 70 80 T 90 80 T 110 80"/>
      <circle cx="35" cy="105" r="3"/>
      <circle cx="55" cy="105" r="3"/>
      <circle cx="75" cy="105" r="3"/>
      <circle cx="95" cy="105" r="3"/>
    </g>
    <text x="60" y="145" text-anchor="middle" class="mut">Textures · patterns</text>
    <text x="60" y="162" text-anchor="middle" class="mut" opacity="0.7">(fur, grid, dots)</text>
  </g>

  <!-- Stage 4: parts -->
  <g transform="translate(640,100)">
    <text x="60" y="-14" text-anchor="middle" class="tag">LAYER 4</text>
    <rect x="0" y="0" width="120" height="120" class="box"/>
    <!-- stylized "eye" + "nose" -->
    <ellipse cx="40" cy="40" rx="18" ry="10" class="ink"/>
    <circle cx="40" cy="40" r="4" fill="#1F1F1E"/>
    <ellipse cx="85" cy="40" rx="18" ry="10" class="ink"/>
    <circle cx="85" cy="40" r="4" fill="#1F1F1E"/>
    <path d="M 55 75 Q 62 95 70 75" class="ink"/>
    <text x="60" y="145" text-anchor="middle" class="mut">Parts</text>
    <text x="60" y="162" text-anchor="middle" class="mut" opacity="0.7">(eyes, nose, wheel)</text>
  </g>

  <!-- Stage 5: object -->
  <g transform="translate(820,100)">
    <text x="60" y="-14" text-anchor="middle" class="tag">OUTPUT</text>
    <rect x="0" y="0" width="120" height="120" class="box-a"/>
    <!-- stylized cat head -->
    <path d="M 60 20 L 75 45 L 100 40 L 95 70 L 90 95 L 60 105 L 30 95 L 25 70 L 20 40 L 45 45 Z" fill="#D97757" stroke="#A8324B" stroke-width="1.2"/>
    <circle cx="47" cy="65" r="3" fill="#F0EEE5"/>
    <circle cx="73" cy="65" r="3" fill="#F0EEE5"/>
    <path d="M 55 80 Q 60 85 65 80" stroke="#F0EEE5" fill="none" stroke-width="1.2"/>
    <text x="60" y="145" text-anchor="middle" class="mut">"Cat"</text>
    <text x="60" y="162" text-anchor="middle" class="mut" opacity="0.7">(class label)</text>
  </g>

  <!-- arrows -->
  <g class="ink" marker-end="url(#arr2)" opacity="0.6">
    <line x1="165" y1="160" x2="235" y2="160"/>
    <line x1="365" y1="160" x2="435" y2="160"/>
    <line x1="565" y1="160" x2="635" y2="160"/>
    <line x1="765" y1="160" x2="815" y2="160"/>
  </g>

  <!-- annotations -->
  <text x="480" y="310" text-anchor="middle" class="mut">
    <tspan class="accent" font-weight="600">Each layer composes the previous.</tspan>
    No human hand-crafts edges, textures, or parts — the network discovers them from data.
  </text>
  <text x="480" y="340" text-anchor="middle" class="tag">Zeiler &amp; Fergus 2014 · Olah et al. 2017</text>
</svg>
