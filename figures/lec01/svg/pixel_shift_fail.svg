<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box   { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; }
      .cat   { fill:#D97757; }
      .ear   { fill:#A8324B; }
      .eye   { fill:#1F1F1E; }
      .mono  { font-family:'JetBrains Mono', monospace; fill:#1F1F1E; font-size:12px; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .big   { fill:#A8324B; font-size:24px; font-family:Fraunces; font-weight:600; }
    </style>
  </defs>

  <text x="480" y="30" text-anchor="middle" class="ttl">Why a linear classifier over raw pixels fails</text>
  <text x="480" y="50" text-anchor="middle" class="tag">A 1-PIXEL SHIFT LOOKS LIKE A COMPLETELY DIFFERENT INPUT</text>

  <!-- Panel 1: cat at position A -->
  <g transform="translate(80, 80)">
    <text x="100" y="-8" text-anchor="middle" class="tag">IMAGE A</text>
    <rect class="box" x="0" y="0" width="200" height="200"/>

    <!-- grid faint -->
    <g stroke="#C9C4B5" stroke-width="0.3" opacity="0.5">
      <line x1="20"  y1="0" x2="20"  y2="200"/>
      <line x1="40"  y1="0" x2="40"  y2="200"/>
      <line x1="60"  y1="0" x2="60"  y2="200"/>
      <line x1="80"  y1="0" x2="80"  y2="200"/>
      <line x1="100" y1="0" x2="100" y2="200"/>
      <line x1="120" y1="0" x2="120" y2="200"/>
      <line x1="140" y1="0" x2="140" y2="200"/>
      <line x1="160" y1="0" x2="160" y2="200"/>
      <line x1="180" y1="0" x2="180" y2="200"/>
      <line x1="0" y1="20"  x2="200" y2="20"/>
      <line x1="0" y1="40"  x2="200" y2="40"/>
      <line x1="0" y1="60"  x2="200" y2="60"/>
      <line x1="0" y1="80"  x2="200" y2="80"/>
      <line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="0" y1="120" x2="200" y2="120"/>
      <line x1="0" y1="140" x2="200" y2="140"/>
      <line x1="0" y1="160" x2="200" y2="160"/>
      <line x1="0" y1="180" x2="200" y2="180"/>
    </g>

    <!-- cat blob at x=60..140, y=70..150 -->
    <path class="cat" d="M 60 130 L 70 80 L 85 70 L 95 85 L 105 85 L 115 70 L 130 80 L 140 130 L 130 150 L 70 150 Z"/>
    <circle class="eye" cx="85" cy="100" r="3"/>
    <circle class="eye" cx="115" cy="100" r="3"/>
    <path d="M 95 115 Q 100 120 105 115" stroke="#1F1F1E" fill="none" stroke-width="1.5"/>

    <text x="100" y="225" text-anchor="middle" class="mono">x_A ∈ ℝ^40000</text>
  </g>

  <!-- Panel 2: same cat shifted 1 pixel right -->
  <g transform="translate(340, 80)">
    <text x="100" y="-8" text-anchor="middle" class="tag">IMAGE B  ·  SAME CAT, SHIFTED 1 PIXEL</text>
    <rect class="box" x="0" y="0" width="200" height="200"/>

    <g stroke="#C9C4B5" stroke-width="0.3" opacity="0.5">
      <line x1="20"  y1="0" x2="20"  y2="200"/>
      <line x1="40"  y1="0" x2="40"  y2="200"/>
      <line x1="60"  y1="0" x2="60"  y2="200"/>
      <line x1="80"  y1="0" x2="80"  y2="200"/>
      <line x1="100" y1="0" x2="100" y2="200"/>
      <line x1="120" y1="0" x2="120" y2="200"/>
      <line x1="140" y1="0" x2="140" y2="200"/>
      <line x1="160" y1="0" x2="160" y2="200"/>
      <line x1="180" y1="0" x2="180" y2="200"/>
      <line x1="0" y1="20"  x2="200" y2="20"/>
      <line x1="0" y1="40"  x2="200" y2="40"/>
      <line x1="0" y1="60"  x2="200" y2="60"/>
      <line x1="0" y1="80"  x2="200" y2="80"/>
      <line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="0" y1="120" x2="200" y2="120"/>
      <line x1="0" y1="140" x2="200" y2="140"/>
      <line x1="0" y1="160" x2="200" y2="160"/>
      <line x1="0" y1="180" x2="200" y2="180"/>
    </g>

    <!-- same cat shifted x+20 -->
    <path class="cat" d="M 80 130 L 90 80 L 105 70 L 115 85 L 125 85 L 135 70 L 150 80 L 160 130 L 150 150 L 90 150 Z"/>
    <circle class="eye" cx="105" cy="100" r="3"/>
    <circle class="eye" cx="135" cy="100" r="3"/>
    <path d="M 115 115 Q 120 120 125 115" stroke="#1F1F1E" fill="none" stroke-width="1.5"/>

    <text x="100" y="225" text-anchor="middle" class="mono">x_B ∈ ℝ^40000</text>
  </g>

  <!-- Distance panel -->
  <g transform="translate(610, 80)">
    <text x="160" y="-8" text-anchor="middle" class="tag" fill="#A8324B">LINEAR CLASSIFIER SEES</text>
    <rect class="box" x="0" y="0" width="320" height="200" fill="#F6D4CC"/>

    <text x="160" y="30" text-anchor="middle" class="mono" font-size="13">‖x_A − x_B‖ ≈ LARGE</text>

    <!-- visualization of pixel-wise difference -->
    <g transform="translate(100, 60)">
      <rect x="0" y="0" width="120" height="100" fill="#F0EEE5" stroke="#A8324B"/>
      <!-- Show shifted regions that don't cancel: one stripe of +cat, adjacent stripe of -cat -->
      <rect x="10" y="20" width="10" height="40" fill="#D97757" opacity="0.8"/>
      <rect x="20" y="20" width="10" height="40" fill="#4A6670" opacity="0.5"/>
      <rect x="80" y="20" width="10" height="40" fill="#D97757" opacity="0.8"/>
      <rect x="90" y="20" width="10" height="40" fill="#4A6670" opacity="0.5"/>
      <text x="60" y="85" text-anchor="middle" class="mut" font-size="9">pixel-wise diff</text>
    </g>

    <text x="160" y="185" text-anchor="middle" class="mut" font-style="italic">a linear SVM treats them as unrelated inputs</text>
  </g>

  <!-- Bottom takeaway -->
  <g transform="translate(80, 300)">
    <rect x="0" y="0" width="800" height="40" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="400" y="25" text-anchor="middle" class="mut" font-size="13" font-style="italic">
      A classifier over raw pixels has <tspan fill="#A8324B" font-weight="600">no spatial prior</tspan> — it must relearn translation from scratch for every class.
    </text>
  </g>
</svg>
