<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .ink   { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .mut   { stroke:#6B6A65; fill:none; stroke-width:1.1; }
      .acc   { stroke:#D97757; fill:none; stroke-width:1.8; }
      .box   { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.3; rx:6; ry:6; }
      .box-a { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:6; ry:6; }
      .leaf  { fill:#EAE7DC; stroke:#6B6A65; stroke-width:1; rx:18; ry:18; }
      .loss  { fill:#A8324B; }
      .lbl   { fill:#1F1F1E; font-size:13px; }
      .mono  { font-family:'JetBrains Mono', ui-monospace, monospace; fill:#1F1F1E; font-size:12px; }
      .op    { font-family:'JetBrains Mono', ui-monospace, monospace; fill:#4A6670; font-size:11px; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .grad  { fill:#D97757; font-size:11px; font-style:italic; font-family:'JetBrains Mono', monospace; }
    </style>
    <marker id="arr-i" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/>
    </marker>
    <marker id="arr-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97757"/>
    </marker>
  </defs>

  <!-- forward / backward labels -->
  <text x="80"  y="28" class="tag">FORWARD →</text>
  <text x="880" y="28" class="tag" text-anchor="end">← BACKWARD</text>

  <!-- leaves: x, W, b, y -->
  <rect class="leaf" x="30"  y="70"  width="60" height="36"/>
  <text x="60"  y="92" class="mono" text-anchor="middle">x</text>

  <rect class="leaf" x="30"  y="140" width="60" height="36"/>
  <text x="60"  y="162" class="mono" text-anchor="middle">W</text>

  <rect class="leaf" x="30"  y="210" width="60" height="36"/>
  <text x="60"  y="232" class="mono" text-anchor="middle">b</text>

  <rect class="leaf" x="30"  y="280" width="60" height="36"/>
  <text x="60"  y="302" class="mono" text-anchor="middle">y</text>

  <!-- z = Wx -->
  <rect class="box" x="180" y="100" width="80" height="50"/>
  <text x="220" y="122" class="mono" text-anchor="middle">matmul</text>
  <text x="220" y="138" class="op"  text-anchor="middle">z = Wx</text>

  <!-- z' = z + b -->
  <rect class="box" x="320" y="125" width="80" height="50"/>
  <text x="360" y="147" class="mono" text-anchor="middle">add</text>
  <text x="360" y="163" class="op"  text-anchor="middle">+ b</text>

  <!-- h = σ(z') -->
  <rect class="box-a" x="460" y="125" width="90" height="50"/>
  <text x="505" y="147" class="mono" text-anchor="middle">σ(·)</text>
  <text x="505" y="163" class="op"  text-anchor="middle" fill="#D97757">ReLU</text>

  <!-- ŷ = ... (output / logits) -->
  <rect class="box" x="610" y="125" width="90" height="50"/>
  <text x="655" y="147" class="mono" text-anchor="middle">softmax</text>
  <text x="655" y="163" class="op"  text-anchor="middle">ŷ</text>

  <!-- loss -->
  <circle cx="800" cy="150" r="28" fill="#A8324B"/>
  <text x="800" y="146" text-anchor="middle" fill="#F0EEE5" font-size="13" font-family="Fraunces, Georgia, serif" font-style="italic">ℒ</text>
  <text x="800" y="162" text-anchor="middle" fill="#F0EEE5" font-size="10" font-family="Inter, sans-serif">CE</text>

  <!-- forward edges -->
  <g class="ink" marker-end="url(#arr-i)">
    <line x1="90"  y1="88"  x2="180" y2="115"/>
    <line x1="90"  y1="158" x2="180" y2="135"/>
    <line x1="260" y1="125" x2="320" y2="145"/>
    <line x1="90"  y1="228" x2="320" y2="160"/>
    <line x1="400" y1="150" x2="460" y2="150"/>
    <line x1="550" y1="150" x2="610" y2="150"/>
    <line x1="700" y1="150" x2="770" y2="150"/>
    <line x1="90"  y1="298" x2="770" y2="155"/>
  </g>

  <!-- backward edges (accent arrows above the forward path) -->
  <g class="acc" marker-end="url(#arr-a)" stroke-dasharray="5 3" opacity="0.85">
    <path d="M 770 245 Q 650 245 605 210"/>
    <path d="M 605 215 Q 530 215 505 185"/>
    <path d="M 460 200 Q 400 200 360 185"/>
    <path d="M 320 215 Q 230 215 220 160"/>
    <path d="M 180 148 Q 120 148 90 150"/>
  </g>

  <!-- backward labels -->
  <text x="760" y="240" class="grad">∂ℒ/∂ŷ = ŷ − y</text>
  <text x="500" y="215" class="grad">∂ℒ/∂h</text>
  <text x="355" y="220" class="grad">∂ℒ/∂z = δ</text>
  <text x="155" y="175" class="grad">∂ℒ/∂W = δx⊤</text>
  <text x="110" y="280" class="grad" fill="#6B6A65">(propagate)</text>

  <!-- baseline caption -->
  <text x="480" y="360" class="tag" text-anchor="middle" fill="#6B6A65">
    Every node = differentiable op. Chain rule runs the dashed path right→left.
  </text>
</svg>
