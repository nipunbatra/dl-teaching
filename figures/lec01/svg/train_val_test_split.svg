<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .bar-train { fill:#EAD3C5; stroke:#D97757; stroke-width:1.2; }
      .bar-val   { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.2; }
      .bar-test  { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.2; }
      .lbl       { fill:#1F1F1E; font-size:14px; font-weight:600; }
      .mut       { fill:#6B6A65; font-size:12px; font-family:Inter, sans-serif; }
      .ttl       { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag       { fill:#6B6A65; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .ink       { stroke:#1F1F1E; fill:none; stroke-width:1.2; }
    </style>
  </defs>

  <text x="450" y="32" text-anchor="middle" class="ttl">How to split your data — and what each split is for</text>

  <!-- big dataset bar -->
  <g transform="translate(60, 70)">
    <text x="0" y="-10" class="tag">ALL AVAILABLE DATA · e.g. 70,000 MNIST images</text>
    <rect class="bar-train" x="0"   y="0" width="540" height="60"/>
    <rect class="bar-val"   x="540" y="0" width="120" height="60"/>
    <rect class="bar-test"  x="660" y="0" width="120" height="60"/>

    <text x="270" y="38" text-anchor="middle" class="lbl">TRAIN (70%)</text>
    <text x="600" y="38" text-anchor="middle" class="lbl" fill="#7B9E89">VAL (15%)</text>
    <text x="720" y="38" text-anchor="middle" class="lbl" fill="#4A6670">TEST (15%)</text>

    <text x="270" y="80" text-anchor="middle" class="mut">49,000 samples</text>
    <text x="600" y="80" text-anchor="middle" class="mut">10,500</text>
    <text x="720" y="80" text-anchor="middle" class="mut">10,500</text>
  </g>

  <!-- role descriptions -->
  <g transform="translate(60, 180)">
    <!-- train -->
    <rect x="0" y="0" width="250" height="110" fill="#F0EEE5" stroke="#D97757" stroke-width="1.2"/>
    <text x="14" y="24" class="tag" fill="#D97757">TRAIN · UPDATE θ</text>
    <text x="14" y="48" class="mut">• computes <tspan font-weight="600" fill="#1F1F1E">∇ loss</tspan> → updates weights</text>
    <text x="14" y="68" class="mut">• seen every epoch</text>
    <text x="14" y="88" class="mut">• loss always ↓ with capacity</text>

    <!-- val -->
    <rect x="275" y="0" width="250" height="110" fill="#F0EEE5" stroke="#7B9E89" stroke-width="1.2"/>
    <text x="289" y="24" class="tag" fill="#7B9E89">VAL · TUNE HYPERPARAMS</text>
    <text x="289" y="48" class="mut">• LR, width, depth, dropout</text>
    <text x="289" y="68" class="mut">• early-stopping signal</text>
    <text x="289" y="88" class="mut">• never touches optimizer</text>

    <!-- test -->
    <rect x="550" y="0" width="250" height="110" fill="#F0EEE5" stroke="#4A6670" stroke-width="1.2"/>
    <text x="564" y="24" class="tag" fill="#4A6670">TEST · REPORT ONCE</text>
    <text x="564" y="48" class="mut">• final honest estimate</text>
    <text x="564" y="68" class="mut">• locked until submission</text>
    <text x="564" y="88" class="mut" font-style="italic" fill="#A8324B">peek twice → leakage</text>
  </g>

  <text x="450" y="310" text-anchor="middle" class="mut">
    Rule of thumb: validation is your <tspan font-style="italic" fill="#D97757">practice exam</tspan>; test is the <tspan font-style="italic" fill="#4A6670">final</tspan> you take once.
  </text>
</svg>
