<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .axis  { stroke:#1F1F1E; stroke-width:1; }
      .bar-p { fill:#D97757; }
      .bar-t { fill:#7B9E89; }
      .bar-g-pos { fill:#A8324B; }
      .bar-g-neg { fill:#4A6670; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .big   { fill:#1F1F1E; font-size:30px; font-family:Fraunces; font-weight:600; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">The cross-entropy gradient is literally "prediction minus target"</text>

  <!-- ŷ (prediction) -->
  <g transform="translate(40, 80)">
    <text x="130" y="-6" text-anchor="middle" class="tag" fill="#D97757">PREDICTION  ŷ</text>
    <rect x="0" y="0" width="260" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0" y1="190" x2="260" y2="190" class="axis"/>

    <!-- 4 classes: cat 0.78, dog 0.17, car 0.04, bird 0.01 -->
    <rect class="bar-p" x="20"  y="50"  width="40" height="140"/>
    <text x="40"  y="42" text-anchor="middle" class="mono">0.78</text>
    <text x="40"  y="210" text-anchor="middle" class="mut">cat</text>

    <rect class="bar-p" x="80"  y="159" width="40" height="31"/>
    <text x="100" y="151" text-anchor="middle" class="mono">0.17</text>
    <text x="100" y="210" text-anchor="middle" class="mut">dog</text>

    <rect class="bar-p" x="140" y="183" width="40" height="7"/>
    <text x="160" y="175" text-anchor="middle" class="mono">0.04</text>
    <text x="160" y="210" text-anchor="middle" class="mut">car</text>

    <rect class="bar-p" x="200" y="187" width="40" height="3"/>
    <text x="220" y="180" text-anchor="middle" class="mono">0.01</text>
    <text x="220" y="210" text-anchor="middle" class="mut">bird</text>
  </g>

  <!-- minus sign -->
  <text x="325" y="195" text-anchor="middle" class="big">−</text>

  <!-- y (one-hot target, correct class = cat) -->
  <g transform="translate(350, 80)">
    <text x="130" y="-6" text-anchor="middle" class="tag" fill="#7B9E89">TARGET  y  (one-hot)</text>
    <rect x="0" y="0" width="260" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0" y1="190" x2="260" y2="190" class="axis"/>

    <rect class="bar-t" x="20"  y="10" width="40" height="180"/>
    <text x="40"  y="5" text-anchor="middle" class="mono">1.00</text>
    <text x="40"  y="210" text-anchor="middle" class="mut">cat ←</text>

    <rect class="bar-t" x="80"  y="190" width="40" height="0"/>
    <text x="100" y="185" text-anchor="middle" class="mono">0</text>
    <text x="100" y="210" text-anchor="middle" class="mut">dog</text>

    <rect class="bar-t" x="140" y="190" width="40" height="0"/>
    <text x="160" y="185" text-anchor="middle" class="mono">0</text>
    <text x="160" y="210" text-anchor="middle" class="mut">car</text>

    <rect class="bar-t" x="200" y="190" width="40" height="0"/>
    <text x="220" y="185" text-anchor="middle" class="mono">0</text>
    <text x="220" y="210" text-anchor="middle" class="mut">bird</text>
  </g>

  <!-- equals sign -->
  <text x="635" y="195" text-anchor="middle" class="big">=</text>

  <!-- gradient ŷ - y -->
  <g transform="translate(660, 80)">
    <text x="130" y="-6" text-anchor="middle" class="tag" fill="#A8324B">GRADIENT  ∂L/∂z = ŷ − y</text>
    <rect x="0" y="0" width="260" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0" y1="110" x2="260" y2="110" class="axis"/>
    <text x="5" y="107" class="mono" fill="#6B6A65" font-size="10">0</text>

    <!-- cat: 0.78 - 1 = -0.22  → bar goes DOWN (push up) -->
    <rect class="bar-g-neg" x="20" y="110" width="40" height="40"/>
    <text x="40"  y="165" text-anchor="middle" class="mono" fill="#4A6670">−0.22</text>
    <text x="40"  y="195" text-anchor="middle" class="mut">cat</text>

    <!-- dog: 0.17 → bar goes UP (push down) -->
    <rect class="bar-g-pos" x="80" y="79" width="40" height="31"/>
    <text x="100" y="72" text-anchor="middle" class="mono" fill="#A8324B">+0.17</text>
    <text x="100" y="195" text-anchor="middle" class="mut">dog</text>

    <!-- car: 0.04 → tiny bar up -->
    <rect class="bar-g-pos" x="140" y="103" width="40" height="7"/>
    <text x="160" y="97" text-anchor="middle" class="mono" fill="#A8324B">+0.04</text>
    <text x="160" y="195" text-anchor="middle" class="mut">car</text>

    <!-- bird: 0.01 → tiny bar up -->
    <rect class="bar-g-pos" x="200" y="107" width="40" height="3"/>
    <text x="220" y="100" text-anchor="middle" class="mono" fill="#A8324B">+0.01</text>
    <text x="220" y="195" text-anchor="middle" class="mut">bird</text>
  </g>

  <!-- bottom explanation -->
  <g transform="translate(40, 310)">
    <rect x="0" y="0" width="880" height="50" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="440" y="22" text-anchor="middle" class="mono" font-size="13">
      <tspan fill="#4A6670">negative gradient at correct class →  push logit UP</tspan>
      &nbsp;&nbsp;·&nbsp;&nbsp;
      <tspan fill="#A8324B">positive gradient at wrong classes → push logits DOWN</tspan>
    </text>
    <text x="440" y="42" text-anchor="middle" class="mut" font-style="italic">
      SGD reads ŷ − y and literally nudges each logit toward the right answer.
    </text>
  </g>
</svg>
