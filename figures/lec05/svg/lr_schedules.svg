<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .axis  { stroke:#1F1F1E; stroke-width:1.1; fill:none; }
      .grid  { stroke:#C9C4B5; stroke-width:0.5; }
      .step  { stroke:#4A6670; stroke-width:2.2; fill:none; }
      .exp   { stroke:#A8324B; stroke-width:2.2; fill:none; }
      .cos   { stroke:#D97757; stroke-width:2.4; fill:none; }
      .cw    { stroke:#C9A961; stroke-width:2.4; fill:none; }
      .lbl   { fill:#1F1F1E; font-size:12px; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Four learning-rate schedules — and when to use each</text>

  <!-- Panel 1: Step decay -->
  <g transform="translate(60, 70)">
    <text x="160" y="-10" text-anchor="middle" class="tag" fill="#4A6670">STEP DECAY</text>
    <rect x="0" y="0" width="320" height="120" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0" y1="120" x2="320" y2="120" class="axis"/>
    <line x1="0" y1="0"   x2="0"   y2="120" class="axis"/>
    <polyline class="step" points="0,15 120,15 120,55 220,55 220,85 320,85"/>
    <text x="160" y="138" text-anchor="middle" class="mut">epoch  →  ÷10 at milestones</text>
  </g>

  <!-- Panel 2: Exponential -->
  <g transform="translate(410, 70)">
    <text x="160" y="-10" text-anchor="middle" class="tag" fill="#A8324B">EXPONENTIAL</text>
    <rect x="0" y="0" width="320" height="120" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0" y1="120" x2="320" y2="120" class="axis"/>
    <line x1="0" y1="0"   x2="0"   y2="120" class="axis"/>
    <path class="exp" d="M 0 15 Q 80 30 160 60 Q 240 95 320 110"/>
    <text x="160" y="138" text-anchor="middle" class="mut">η_t = η₀ · γ^t</text>
  </g>

  <!-- Panel 3: Cosine annealing -->
  <g transform="translate(60, 230)">
    <text x="160" y="-10" text-anchor="middle" class="tag" fill="#D97757">COSINE ANNEALING</text>
    <rect x="0" y="0" width="320" height="120" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0" y1="120" x2="320" y2="120" class="axis"/>
    <line x1="0" y1="0"   x2="0"   y2="120" class="axis"/>
    <path class="cos" d="M 0 15 C 120 20 120 115 320 115"/>
    <text x="160" y="138" text-anchor="middle" class="mut">η_t = η_min + ½(η_max − η_min)(1 + cos(πt/T))</text>
  </g>

  <!-- Panel 4: Warmup + cosine (most used in 2026) -->
  <g transform="translate(410, 230)">
    <text x="160" y="-10" text-anchor="middle" class="tag" fill="#C9A961">WARMUP + COSINE (most common 2026)</text>
    <rect x="0" y="0" width="320" height="120" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0" y1="120" x2="320" y2="120" class="axis"/>
    <line x1="0" y1="0"   x2="0"   y2="120" class="axis"/>
    <path class="cw" d="M 0 115 L 50 15 C 150 20 150 115 320 115"/>
    <line x1="50" y1="0" x2="50" y2="120" stroke="#6B6A65" stroke-dasharray="3 2" stroke-width="0.8"/>
    <text x="50" y="12" text-anchor="middle" class="mono" fill="#6B6A65">warmup</text>
    <text x="160" y="138" text-anchor="middle" class="mut">linear warmup then cosine decay — Transformers need it</text>
  </g>

  <text x="480" y="370" text-anchor="middle" class="mut">
    Default for new Transformer code · 3 – 10% warmup + cosine to 10% of peak LR.
  </text>
</svg>
