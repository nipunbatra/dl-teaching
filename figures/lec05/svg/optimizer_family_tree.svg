<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .box   { fill:#F0EEE5; stroke:#1F1F1E; stroke-width:1.2; rx:4; ry:4; }
      .box-a { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:4; ry:4; }
      .box-s { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.2; rx:4; ry:4; }
      .box-b { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.2; rx:4; ry:4; }
      .ink   { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:12px; fill:#1F1F1E; }
      .lbl   { fill:#1F1F1E; font-size:13px; font-weight:600; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="arrT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B6A65"/>
    </marker>
  </defs>

  <text x="480" y="30" text-anchor="middle" class="ttl">Optimizer family tree — how Adam is assembled from its parents</text>

  <!-- Root: SGD -->
  <g transform="translate(60, 90)">
    <rect class="box" x="0" y="0" width="170" height="80"/>
    <text x="85" y="22" text-anchor="middle" class="lbl">SGD</text>
    <text x="85" y="44" text-anchor="middle" class="mono">θ ← θ − η · g_t</text>
    <text x="85" y="64" text-anchor="middle" class="mut">raw gradient step</text>
  </g>

  <!-- Left branch: momentum -->
  <g transform="translate(60, 220)">
    <rect class="box-b" x="0" y="0" width="220" height="90"/>
    <text x="110" y="22" text-anchor="middle" class="lbl" fill="#4A6670">SGD + Momentum</text>
    <text x="110" y="44" text-anchor="middle" class="mono">m_t = β₁ m_{t−1} + (1−β₁)g_t</text>
    <text x="110" y="62" text-anchor="middle" class="mono">θ ← θ − η · m_t</text>
    <text x="110" y="80" text-anchor="middle" class="mut">1st moment (EMA of gradient)</text>
  </g>

  <!-- Middle: AdaGrad -->
  <g transform="translate(380, 220)">
    <rect class="box" x="0" y="0" width="200" height="90"/>
    <text x="100" y="22" text-anchor="middle" class="lbl">AdaGrad</text>
    <text x="100" y="44" text-anchor="middle" class="mono">G_t = G_{t−1} + g_t²</text>
    <text x="100" y="62" text-anchor="middle" class="mono">θ ← θ − η · g_t / √G_t</text>
    <text x="100" y="80" text-anchor="middle" class="mut">per-param LR · decays to 0</text>
  </g>

  <!-- Right: RMSProp -->
  <g transform="translate(670, 220)">
    <rect class="box-s" x="0" y="0" width="230" height="90"/>
    <text x="115" y="22" text-anchor="middle" class="lbl" fill="#7B9E89">RMSProp</text>
    <text x="115" y="44" text-anchor="middle" class="mono">v_t = β₂ v_{t−1} + (1−β₂)g_t²</text>
    <text x="115" y="62" text-anchor="middle" class="mono">θ ← θ − η · g_t / √v_t</text>
    <text x="115" y="80" text-anchor="middle" class="mut">2nd moment (leaky EMA of g²)</text>
  </g>

  <!-- Edges from SGD to children -->
  <g class="ink" marker-end="url(#arrT)">
    <path d="M 100 170 L 120 220"/>
    <path d="M 145 170 L 450 220"/>
    <path d="M 175 170 L 770 220"/>
  </g>

  <!-- Child edge annotations -->
  <text x="100" y="200" class="mut">add EMA of g</text>
  <text x="300" y="200" class="mut">add per-param LR (sum of g²)</text>
  <text x="580" y="200" class="mut">add leaky EMA of g² (fixes AdaGrad decay)</text>

  <!-- Bottom center: Adam -->
  <g transform="translate(350, 325)">
    <rect class="box-a" x="0" y="0" width="260" height="50"/>
    <text x="130" y="22" text-anchor="middle" class="lbl" fill="#D97757">Adam  =  Momentum + RMSProp</text>
    <text x="130" y="42" text-anchor="middle" class="mono" fill="#D97757">θ ← θ − η · m̂_t / (√v̂_t + ε)</text>
  </g>

  <!-- Lines converging to Adam -->
  <g class="ink" marker-end="url(#arrT)">
    <path d="M 170 310 L 410 325" stroke="#D97757"/>
    <path d="M 780 310 L 560 325" stroke="#D97757"/>
  </g>
</svg>
