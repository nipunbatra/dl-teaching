<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .axis  { stroke:#1F1F1E; stroke-width:1.1; fill:none; }
      .grid  { stroke:#C9C4B5; stroke-width:0.5; }
      .raw   { stroke:#A8324B; stroke-width:2.4; fill:none; stroke-dasharray:5 3; }
      .cor   { stroke:#D97757; stroke-width:2.4; fill:none; }
      .tgt   { stroke:#7B9E89; stroke-width:2; fill:none; stroke-dasharray:2 3; }
      .lbl   { fill:#1F1F1E; font-size:12px; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Why Adam needs bias correction · the first few steps are not unbiased</text>

  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="800" height="200" fill="#F0EEE5" stroke="#C9C4B5"/>

    <g class="grid">
      <line x1="0"   y1="50"  x2="800" y2="50"/>
      <line x1="0"   y1="100" x2="800" y2="100"/>
      <line x1="0"   y1="150" x2="800" y2="150"/>
      <line x1="100" y1="0" x2="100" y2="200"/>
      <line x1="200" y1="0" x2="200" y2="200"/>
      <line x1="300" y1="0" x2="300" y2="200"/>
      <line x1="400" y1="0" x2="400" y2="200"/>
      <line x1="500" y1="0" x2="500" y2="200"/>
      <line x1="600" y1="0" x2="600" y2="200"/>
      <line x1="700" y1="0" x2="700" y2="200"/>
    </g>

    <line x1="0" y1="200" x2="800" y2="200" class="axis"/>
    <line x1="0" y1="0"   x2="0"   y2="200" class="axis"/>

    <!-- target (true gradient EMA if started at its value) -->
    <line x1="0" y1="40" x2="800" y2="40" class="tgt"/>
    <text x="790" y="35" text-anchor="end" class="mut" fill="#7B9E89">true EMA  = 1.0</text>

    <!-- raw m_t: starts at 0, approaches 1 slowly -->
    <!-- m_t = 1 - β₁^t where β₁ = 0.9, t = 1..40 -->
    <path class="raw" d="
      M 0 200
      L 20 184
      L 40 170.4
      L 60 158.4
      L 80 147.6
      L 100 137.9
      L 120 129.1
      L 140 121.2
      L 160 114.1
      L 180 107.7
      L 200 101.9
      L 220 96.7
      L 240 92
      L 260 87.8
      L 280 84
      L 300 80.6
      L 320 77.5
      L 340 74.8
      L 360 72.3
      L 400 68
      L 440 64.6
      L 480 61.9
      L 520 59.7
      L 560 57.9
      L 600 56.5
      L 640 55.4
      L 700 53.9
      L 800 52
    "/>
    <text x="260" y="95" class="mono" fill="#A8324B">raw m_t  (biased low early)</text>

    <!-- corrected: m_t / (1 - β₁^t) ≈ 1 -->
    <path class="cor" d="
      M 0 40
      L 100 40
      L 200 40
      L 400 40
      L 800 40
    "/>
    <text x="160" y="32" class="mono" fill="#D97757">m̂_t  = m_t / (1 − β₁^t)</text>

    <text x="400" y="220" text-anchor="middle" class="mut">optimizer step t  →</text>
    <text x="-10" y="100" transform="rotate(-90 -10 100)" text-anchor="middle" class="mut">expected magnitude →</text>
  </g>

  <text x="480" y="315" text-anchor="middle" class="mut" font-style="italic">
    Because moments are initialized at zero, the raw EMA is <tspan fill="#A8324B">biased low for small t</tspan>.
    The fix — divide by <tspan class="mono" fill="#D97757">(1 − β^t)</tspan> — is Adam's bias correction.
  </text>
</svg>
