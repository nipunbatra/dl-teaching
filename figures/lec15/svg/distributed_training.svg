<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .gpu    { fill:#DCE3E6; stroke:#4A6670; stroke-width:1.3; rx:4; ry:4; }
      .model  { fill:#EAD3C5; stroke:#D97757; stroke-width:1.2; rx:2; ry:2; }
      .data   { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.2; rx:2; ry:2; }
      .shard  { fill:#F6F0DF; stroke:#C9A961; stroke-width:1.1; rx:2; ry:2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Distributed training · three parallelism strategies (often combined)</text>

  <!-- Data parallel (DP) -->
  <g transform="translate(40, 70)">
    <text x="140" y="-10" text-anchor="middle" class="tag" fill="#7B9E89">DATA PARALLEL</text>

    <g>
      <rect class="gpu" x="0" y="0" width="60" height="80"/>
      <rect class="model" x="5" y="10" width="50" height="40"/>
      <text x="30" y="34" text-anchor="middle" class="mono" fill="#D97757">full M</text>
      <rect class="data" x="5" y="55" width="50" height="20"/>
      <text x="30" y="69" text-anchor="middle" class="mono" fill="#7B9E89">batch 1</text>

      <rect class="gpu" x="70" y="0" width="60" height="80"/>
      <rect class="model" x="75" y="10" width="50" height="40"/>
      <text x="100" y="34" text-anchor="middle" class="mono" fill="#D97757">full M</text>
      <rect class="data" x="75" y="55" width="50" height="20"/>
      <text x="100" y="69" text-anchor="middle" class="mono" fill="#7B9E89">batch 2</text>

      <rect class="gpu" x="140" y="0" width="60" height="80"/>
      <rect class="model" x="145" y="10" width="50" height="40"/>
      <text x="170" y="34" text-anchor="middle" class="mono" fill="#D97757">full M</text>
      <rect class="data" x="145" y="55" width="50" height="20"/>
      <text x="170" y="69" text-anchor="middle" class="mono" fill="#7B9E89">batch 3</text>

      <rect class="gpu" x="210" y="0" width="60" height="80"/>
      <rect class="model" x="215" y="10" width="50" height="40"/>
      <text x="240" y="34" text-anchor="middle" class="mono" fill="#D97757">full M</text>
      <rect class="data" x="215" y="55" width="50" height="20"/>
      <text x="240" y="69" text-anchor="middle" class="mono" fill="#7B9E89">batch 4</text>
    </g>

    <text x="140" y="110" text-anchor="middle" class="mut">every GPU has a full model copy</text>
    <text x="140" y="126" text-anchor="middle" class="mut">gradients all-reduced every step</text>
    <text x="140" y="148" text-anchor="middle" class="mono">breaks at ~13B params (OOM)</text>
  </g>

  <!-- Tensor parallel (TP) -->
  <g transform="translate(370, 70)">
    <text x="140" y="-10" text-anchor="middle" class="tag" fill="#D97757">TENSOR PARALLEL</text>

    <g>
      <rect class="gpu" x="0" y="0" width="60" height="80"/>
      <rect class="shard" x="5" y="10" width="50" height="12"/>
      <text x="30" y="20" text-anchor="middle" class="mono" font-size="8" fill="#C9A961">W[0:1]</text>
      <rect class="shard" x="5" y="24" width="50" height="12"/>
      <text x="30" y="34" text-anchor="middle" class="mono" font-size="8" fill="#C9A961">W[2:3]</text>
      <rect class="shard" x="5" y="38" width="50" height="12"/>
      <text x="30" y="48" text-anchor="middle" class="mono" font-size="8" fill="#C9A961">W[4:5]</text>
      <rect class="shard" x="5" y="52" width="50" height="12"/>
      <text x="30" y="62" text-anchor="middle" class="mono" font-size="8" fill="#C9A961">W[6:7]</text>

      <rect class="gpu" x="70" y="0" width="60" height="80"/>
      <rect class="shard" x="75" y="10" width="50" height="12"/>
      <rect class="shard" x="75" y="24" width="50" height="12"/>
      <rect class="shard" x="75" y="38" width="50" height="12"/>
      <rect class="shard" x="75" y="52" width="50" height="12"/>

      <rect class="gpu" x="140" y="0" width="60" height="80"/>
      <rect class="shard" x="145" y="10" width="50" height="12"/>
      <rect class="shard" x="145" y="24" width="50" height="12"/>
      <rect class="shard" x="145" y="38" width="50" height="12"/>
      <rect class="shard" x="145" y="52" width="50" height="12"/>

      <rect class="gpu" x="210" y="0" width="60" height="80"/>
      <rect class="shard" x="215" y="10" width="50" height="12"/>
      <rect class="shard" x="215" y="24" width="50" height="12"/>
      <rect class="shard" x="215" y="38" width="50" height="12"/>
      <rect class="shard" x="215" y="52" width="50" height="12"/>
    </g>

    <text x="140" y="110" text-anchor="middle" class="mut">each matmul W split across GPUs</text>
    <text x="140" y="126" text-anchor="middle" class="mut">all-reduce per layer · bandwidth-heavy</text>
    <text x="140" y="148" text-anchor="middle" class="mono">Megatron-LM · needed at &gt;10B</text>
  </g>

  <!-- Pipeline parallel (PP) -->
  <g transform="translate(700, 70)">
    <text x="110" y="-10" text-anchor="middle" class="tag" fill="#A8324B">PIPELINE PARALLEL</text>

    <g>
      <rect class="gpu" x="0" y="0" width="60" height="80"/>
      <rect class="model" x="5" y="10" width="50" height="60"/>
      <text x="30" y="32" text-anchor="middle" class="mono" fill="#D97757">layers</text>
      <text x="30" y="46" text-anchor="middle" class="mono" fill="#D97757">1–20</text>

      <rect class="gpu" x="70" y="0" width="60" height="80"/>
      <rect class="model" x="75" y="10" width="50" height="60"/>
      <text x="100" y="32" text-anchor="middle" class="mono" fill="#D97757">layers</text>
      <text x="100" y="46" text-anchor="middle" class="mono" fill="#D97757">21–40</text>

      <rect class="gpu" x="140" y="0" width="60" height="80"/>
      <rect class="model" x="145" y="10" width="50" height="60"/>
      <text x="170" y="32" text-anchor="middle" class="mono" fill="#D97757">layers</text>
      <text x="170" y="46" text-anchor="middle" class="mono" fill="#D97757">41–60</text>
    </g>

    <text x="110" y="110" text-anchor="middle" class="mut">different layers on different GPUs</text>
    <text x="110" y="126" text-anchor="middle" class="mut">micro-batching to fill the pipeline</text>
    <text x="110" y="148" text-anchor="middle" class="mono">bubble inefficiency unless staged</text>
  </g>

  <!-- Bottom: 3D parallelism combines all + ZeRO -->
  <g transform="translate(40, 270)">
    <rect x="0" y="0" width="880" height="120" fill="#F6F0DF" stroke="#C9A961"/>
    <text x="14" y="22" class="tag" fill="#C9A961">3D PARALLELISM · combine all three, plus ZeRO optimizer sharding</text>

    <text x="14" y="46" class="mut"><tspan fill="#1F1F1E" font-weight="600">ZeRO</tspan> · shard optimizer states (Adam's m, v) across DP replicas → fits 70B on a single node</text>
    <text x="14" y="64" class="mut"><tspan fill="#1F1F1E" font-weight="600">ZeRO-3</tspan> · additionally shard gradients + parameters → fits 175B+ on 8 GPUs</text>
    <text x="14" y="82" class="mut"><tspan fill="#1F1F1E" font-weight="600">FSDP</tspan> · PyTorch's Fully-Sharded Data Parallel, built on ZeRO ideas</text>
    <text x="14" y="104" class="mut" font-style="italic">Training a 70B model · typical setup = 4-way TP · 8-way PP · 32-way DP · ZeRO-2 = 1024 GPUs</text>
  </g>
</svg>
