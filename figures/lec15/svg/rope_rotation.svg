<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .axis   { stroke:#1F1F1E; stroke-width:1; fill:none; }
      .vec-q  { stroke:#D97757; fill:none; stroke-width:2.5; }
      .vec-k  { stroke:#7B9E89; fill:none; stroke-width:2.5; }
      .arc    { stroke:#C9A961; fill:none; stroke-width:1.4; stroke-dasharray:3 2; }
      .mono   { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut    { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl    { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag    { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="rr-q" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#D97757"/></marker>
    <marker id="rr-k" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7B9E89"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">RoPE · rotate Q and K by an angle proportional to position</text>

  <!-- Three panels showing Q rotating by different position angles -->
  <g transform="translate(40, 80)">
    <text x="130" y="-8" text-anchor="middle" class="tag">POSITION m = 0</text>
    <rect x="0" y="0" width="260" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0" y1="120" x2="260" y2="120" class="axis"/>
    <line x1="130" y1="0" x2="130" y2="240" class="axis"/>
    <!-- Q vector at angle 0 -->
    <line x1="130" y1="120" x2="220" y2="80" class="vec-q" marker-end="url(#rr-q)"/>
    <text x="230" y="80" class="mono" fill="#D97757">q</text>
    <!-- K vector at angle 0 -->
    <line x1="130" y1="120" x2="200" y2="170" class="vec-k" marker-end="url(#rr-k)"/>
    <text x="208" y="178" class="mono" fill="#7B9E89">k</text>
    <text x="130" y="260" text-anchor="middle" class="mono">R·q at θ = 0</text>
  </g>

  <g transform="translate(340, 80)">
    <text x="130" y="-8" text-anchor="middle" class="tag">POSITION m = 3</text>
    <rect x="0" y="0" width="260" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0" y1="120" x2="260" y2="120" class="axis"/>
    <line x1="130" y1="0" x2="130" y2="240" class="axis"/>
    <!-- Q rotated by θ_3 -->
    <line x1="130" y1="120" x2="90" y2="40" class="vec-q" marker-end="url(#rr-q)"/>
    <text x="95" y="32" class="mono" fill="#D97757">R_3 q</text>
    <!-- Arc showing rotation -->
    <path class="arc" d="M 220 120 A 90 90 0 0 0 90 40"/>
    <text x="200" y="50" class="mono" fill="#C9A961">θ_3</text>
    <!-- K (could be at any position, keep at 0 for reference) -->
    <line x1="130" y1="120" x2="220" y2="80" class="vec-k" stroke-dasharray="3 2" opacity="0.5" marker-end="url(#rr-k)"/>
    <text x="230" y="80" class="mut">k (original)</text>
    <text x="130" y="260" text-anchor="middle" class="mono">R·q at θ = 3 · θ_freq</text>
  </g>

  <g transform="translate(640, 80)">
    <text x="130" y="-8" text-anchor="middle" class="tag">POSITION m = 8</text>
    <rect x="0" y="0" width="260" height="240" fill="#F0EEE5" stroke="#C9C4B5"/>
    <line x1="0" y1="120" x2="260" y2="120" class="axis"/>
    <line x1="130" y1="0" x2="130" y2="240" class="axis"/>
    <!-- Q rotated by θ_8 -->
    <line x1="130" y1="120" x2="50" y2="170" class="vec-q" marker-end="url(#rr-q)"/>
    <text x="30" y="180" class="mono" fill="#D97757">R_8 q</text>
    <path class="arc" d="M 220 120 A 90 90 0 0 0 50 170"/>
    <text x="180" y="175" class="mono" fill="#C9A961">θ_8</text>
    <text x="130" y="260" text-anchor="middle" class="mono">R·q at θ = 8 · θ_freq</text>
  </g>

  <!-- Bottom caption with formula -->
  <g transform="translate(40, 340)">
    <rect x="0" y="0" width="880" height="50" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="440" y="22" text-anchor="middle" class="mono" font-size="14">
      ⟨R_m q, R_n k⟩ = f(q, k, <tspan fill="#D97757" font-weight="600">m − n</tspan>) · only the <tspan fill="#D97757" font-weight="600">relative position</tspan> affects attention
    </text>
    <text x="440" y="42" text-anchor="middle" class="mut" font-style="italic">
      Different dimensions rotate at different frequencies · multi-scale position encoding baked directly into Q, K.
    </text>
  </g>
</svg>
