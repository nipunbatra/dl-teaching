<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .axis  { stroke:#1F1F1E; stroke-width:1.2; fill:none; }
      .grid  { stroke:#C9C4B5; stroke-width:0.5; opacity:0.5; }
      .iso   { stroke:#4A6670; stroke-width:1.4; fill:none; stroke-dasharray:3 3; }
      .opt   { stroke:#D97757; stroke-width:2.8; fill:none; }
      .model { fill:#D97757; stroke:#1F1F1E; }
      .mono  { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut   { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl   { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag   { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">Chinchilla scaling — for compute budget C, train ~20 tokens per parameter</text>

  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="620" height="260" fill="#F0EEE5" stroke="#C9C4B5"/>

    <!-- Grid -->
    <g class="grid">
      <line x1="0" y1="65"  x2="620" y2="65"/>
      <line x1="0" y1="130" x2="620" y2="130"/>
      <line x1="0" y1="195" x2="620" y2="195"/>
      <line x1="155" y1="0" x2="155" y2="260"/>
      <line x1="310" y1="0" x2="310" y2="260"/>
      <line x1="465" y1="0" x2="465" y2="260"/>
    </g>
    <line x1="0" y1="260" x2="620" y2="260" class="axis"/>
    <line x1="0" y1="0"   x2="0"   y2="260" class="axis"/>

    <!-- Iso-FLOP curves (log params on x-axis, loss on y-axis, one curve per FLOP budget) -->
    <!-- Each curve is U-shaped: too few params → underfit; too many → undertrained -->

    <!-- Small FLOPs -->
    <path class="iso" d="M 30 20 Q 100 60 155 80 Q 200 110 260 150 Q 320 200 400 235"/>
    <text x="420" y="235" class="mono" fill="#4A6670">1e20 FLOPs</text>

    <!-- Medium FLOPs -->
    <path class="iso" d="M 80 30 Q 160 60 240 85 Q 310 120 380 165 Q 460 210 540 240"/>
    <text x="550" y="238" class="mono" fill="#4A6670">1e22 FLOPs</text>

    <!-- Large FLOPs -->
    <path class="iso" d="M 140 40 Q 220 60 310 90 Q 400 120 480 155 Q 560 200 620 230"/>
    <text x="560" y="205" class="mono" fill="#4A6670">1e24 FLOPs</text>

    <!-- Optimal compute-frontier (connects the minima of each iso-FLOP curve) -->
    <path class="opt" d="M 90 115 Q 200 130 310 145 Q 420 160 560 175"/>
    <text x="100" y="108" class="mono" fill="#D97757" font-weight="600">compute-optimal frontier</text>

    <!-- Points at minima -->
    <circle class="model" cx="200" cy="125" r="5"/>
    <text x="200" y="145" text-anchor="middle" class="mono" fill="#D97757">Chinchilla</text>
    <text x="200" y="158" text-anchor="middle" class="mut" fill="#D97757">70B · 1.4T tokens</text>

    <circle cx="95" cy="75" r="5" fill="#A8324B" stroke="#1F1F1E"/>
    <text x="95" y="67" text-anchor="middle" class="mono" fill="#A8324B">GPT-3</text>
    <text x="95" y="55" text-anchor="middle" class="mut" fill="#A8324B">175B · 300B tokens · "oversized"</text>

    <circle cx="520" cy="195" r="5" fill="#7B9E89" stroke="#1F1F1E"/>
    <text x="530" y="193" class="mono" fill="#7B9E89">Llama 3 · 8B · 15T</text>
    <text x="530" y="205" class="mut" fill="#7B9E89">"overtrained" by Chinchilla</text>

    <!-- Axis labels -->
    <text x="310" y="282" text-anchor="middle" class="mut">log model parameters (N) →</text>
    <text x="-10" y="130" transform="rotate(-90 -10 130)" text-anchor="middle" class="mut">training loss →</text>
  </g>

  <!-- Right-side key formula -->
  <g transform="translate(720, 80)">
    <rect x="0" y="0" width="200" height="240" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="14" y="22" class="tag">CHINCHILLA RULE</text>
    <text x="14" y="48" class="mono" font-size="13">C ≈ 6 · N · D</text>
    <text x="14" y="72" class="mut">C = FLOPs</text>
    <text x="14" y="88" class="mut">N = #params</text>
    <text x="14" y="104" class="mut">D = #tokens</text>

    <text x="14" y="140" class="tag">OPTIMAL RATIO</text>
    <text x="14" y="162" class="mono" fill="#D97757">D / N ≈ 20</text>
    <text x="14" y="180" class="mut">(Chinchilla, 2022)</text>

    <text x="14" y="216" class="mut" font-style="italic" font-size="10">Llama 3 deliberately</text>
    <text x="14" y="230" class="mut" font-style="italic" font-size="10">overtrains — better</text>
    <text x="14" y="244" class="mut" font-style="italic" font-size="10">for inference cost.</text>
  </g>
</svg>
