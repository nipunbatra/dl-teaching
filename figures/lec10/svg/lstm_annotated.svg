<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Work Sans, system-ui, sans-serif">
  <style>
    .bg { fill: #F0EEE5; }
    .title { font-size: 17px; font-weight: 600; fill: #1F1F1E; }
    .head { font-size: 13px; font-weight: 600; fill: #1F1F1E; }
    .body { font-size: 12px; fill: #1F1F1E; }
    .mono { font-family: "IBM Plex Mono", monospace; font-size: 11px; }
    .caption { font-size: 11px; fill: #6B6B69; }
    .cell { fill: white; stroke: #4A6670; stroke-width: 1.2; rx: 6; }
    .gate { fill: #F0F5EF; stroke: #7B9E89; stroke-width: 1.3; rx: 4; }
    .candidate { fill: #FFF3EE; stroke: #D97757; stroke-width: 1.3; rx: 4; }
    .state { fill: #FDF2F6; stroke: #A8324B; stroke-width: 1.4; rx: 4; }
    .op { fill: white; stroke: #1F1F1E; stroke-width: 1.2; }
    .arrow { stroke: #1F1F1E; stroke-width: 1.2; fill: none; }
    .cflow { stroke: #A8324B; stroke-width: 2; fill: none; }
    .hflow { stroke: #4A6670; stroke-width: 1.5; fill: none; }
  </style>
  <rect class="bg" width="960" height="440"/>
  <text x="480" y="28" class="title" text-anchor="middle">LSTM cell · cell state c_t is the "conveyor belt" · gates protect it</text>

  <!-- Main cell body -->
  <rect class="cell" x="120" y="80" width="700" height="280"/>
  <text x="470" y="72" class="head" text-anchor="middle">LSTM cell</text>

  <!-- c_{t-1} input from left -->
  <text x="80" y="135" class="mono" text-anchor="end">c_{t-1}</text>
  <path class="cflow" d="M90 130 L800 130" marker-end="url(#wine)"/>
  <text x="840" y="135" class="mono">c_t</text>

  <!-- h_{t-1} input -->
  <text x="80" y="335" class="mono" text-anchor="end">h_{t-1}</text>
  <path class="hflow" d="M90 330 L200 330" marker-end="url(#slate)"/>

  <!-- x_t input from bottom -->
  <text x="300" y="405" class="mono" text-anchor="middle">x_t</text>
  <path class="arrow" d="M300 395 L300 380" marker-end="url(#arr)"/>

  <!-- Forget gate -->
  <rect class="gate" x="200" y="260" width="100" height="40"/>
  <text x="250" y="278" class="body" text-anchor="middle" font-weight="600">forget gate f_t</text>
  <text x="250" y="293" class="caption" text-anchor="middle">σ(W_f [h,x])</text>
  <!-- ⊙ with c stream -->
  <circle class="op" cx="250" cy="130" r="12"/>
  <text x="250" y="135" class="body" text-anchor="middle">⊙</text>
  <path class="arrow" d="M250 260 L250 142" marker-end="url(#arr)"/>

  <!-- Input gate -->
  <rect class="gate" x="320" y="260" width="100" height="40"/>
  <text x="370" y="278" class="body" text-anchor="middle" font-weight="600">input gate i_t</text>
  <text x="370" y="293" class="caption" text-anchor="middle">σ(W_i [h,x])</text>

  <!-- Candidate -->
  <rect class="candidate" x="440" y="260" width="110" height="40"/>
  <text x="495" y="278" class="body" text-anchor="middle" font-weight="600">candidate c̃_t</text>
  <text x="495" y="293" class="caption" text-anchor="middle">tanh(W_c [h,x])</text>

  <!-- ⊙ combining i and c̃ -->
  <circle class="op" cx="430" cy="200" r="12"/>
  <text x="430" y="205" class="body" text-anchor="middle">⊙</text>
  <path class="arrow" d="M370 260 L425 212" marker-end="url(#arr)"/>
  <path class="arrow" d="M495 260 L437 212" marker-end="url(#arr)"/>

  <!-- ⊕ adding to c stream -->
  <circle class="op" cx="430" cy="130" r="12"/>
  <text x="430" y="135" class="body" text-anchor="middle">+</text>
  <path class="arrow" d="M430 188 L430 142" marker-end="url(#arr)"/>

  <!-- Output gate -->
  <rect class="gate" x="570" y="260" width="100" height="40"/>
  <text x="620" y="278" class="body" text-anchor="middle" font-weight="600">output gate o_t</text>
  <text x="620" y="293" class="caption" text-anchor="middle">σ(W_o [h,x])</text>

  <!-- tanh of c_t -->
  <rect class="candidate" x="690" y="160" width="80" height="40"/>
  <text x="730" y="185" class="body" text-anchor="middle">tanh(c_t)</text>
  <path class="arrow" d="M730 130 L730 158" marker-end="url(#arr)"/>

  <!-- ⊙ combining o and tanh(c_t) -->
  <circle class="op" cx="730" cy="240" r="12"/>
  <text x="730" y="245" class="body" text-anchor="middle">⊙</text>
  <path class="arrow" d="M620 260 L725 252" marker-end="url(#arr)"/>
  <path class="arrow" d="M730 200 L730 228" marker-end="url(#arr)"/>

  <!-- h_t output up -->
  <path class="hflow" d="M730 240 L730 60" marker-end="url(#slate)"/>
  <text x="740" y="55" class="mono">h_t</text>

  <!-- x_t and h_{t-1} feeds to gates -->
  <path class="arrow" d="M300 380 L250 300" marker-end="url(#arr)" stroke-dasharray="3 2"/>
  <path class="arrow" d="M300 380 L370 300" marker-end="url(#arr)" stroke-dasharray="3 2"/>
  <path class="arrow" d="M300 380 L495 300" marker-end="url(#arr)" stroke-dasharray="3 2"/>
  <path class="arrow" d="M300 380 L620 300" marker-end="url(#arr)" stroke-dasharray="3 2"/>
  <path class="arrow" d="M200 330 L250 300" stroke-dasharray="3 2"/>
  <path class="arrow" d="M200 330 L495 300" stroke-dasharray="3 2"/>

  <!-- Legend -->
  <g transform="translate(30, 60)">
    <rect fill="#FDF2F6" stroke="#A8324B" stroke-width="1.2" x="0" y="0" width="12" height="12"/>
    <text x="18" y="11" class="caption">cell state path (gradient highway)</text>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#1F1F1E"/>
    </marker>
    <marker id="wine" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#A8324B"/>
    </marker>
    <marker id="slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#4A6670"/>
    </marker>
  </defs>
</svg>
