<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .cell    { fill:#EAD3C5; stroke:#D97757; stroke-width:1.3; rx:3; ry:3; }
      .ink     { stroke:#1F1F1E; fill:none; stroke-width:1.2; }
      .grad    { stroke:#A8324B; fill:none; stroke-width:2.4; stroke-dasharray:5 3; }
      .mono    { font-family:'JetBrains Mono', monospace; font-size:11px; fill:#1F1F1E; }
      .mut     { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl     { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag     { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
      .bar     { fill:#A8324B; }
    </style>
    <marker id="bpt-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
    <marker id="bpt-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#A8324B"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">BPTT — gradient travels back through every timestep, multiplied every step</text>

  <!-- Forward row (top) -->
  <g transform="translate(60, 70)">
    <text x="0" y="-10" class="tag">FORWARD (time →)</text>

    <g>
      <rect class="cell" x="0"   y="0" width="80" height="40"/>
      <text x="40"  y="24" text-anchor="middle" class="mono">h₁</text>
      <rect class="cell" x="120" y="0" width="80" height="40"/>
      <text x="160" y="24" text-anchor="middle" class="mono">h₂</text>
      <rect class="cell" x="240" y="0" width="80" height="40"/>
      <text x="280" y="24" text-anchor="middle" class="mono">h₃</text>
      <text x="360" y="24" text-anchor="middle" class="mono">...</text>
      <rect class="cell" x="420" y="0" width="80" height="40"/>
      <text x="460" y="24" text-anchor="middle" class="mono">h_{T-1}</text>
      <rect class="cell" x="540" y="0" width="80" height="40"/>
      <text x="580" y="24" text-anchor="middle" class="mono">h_T</text>
    </g>

    <g class="ink" marker-end="url(#bpt-a)">
      <line x1="80"  y1="20" x2="120" y2="20"/>
      <line x1="200" y1="20" x2="240" y2="20"/>
      <line x1="320" y1="20" x2="340" y2="20"/>
      <line x1="380" y1="20" x2="420" y2="20"/>
      <line x1="500" y1="20" x2="540" y2="20"/>
    </g>

    <!-- Loss at T -->
    <circle cx="680" cy="20" r="18" fill="#A8324B"/>
    <text x="680" y="24" text-anchor="middle" class="mono" fill="#F0EEE5" font-weight="600">ℒ_T</text>
    <line x1="620" y1="20" x2="660" y2="20" class="ink" marker-end="url(#bpt-a)"/>
  </g>

  <!-- Backward gradient row -->
  <g transform="translate(60, 150)">
    <text x="0" y="-10" class="tag" fill="#A8324B">BACKWARD · ∂ℒ/∂h_t multiplied by W^⊤ every step</text>

    <g class="grad" marker-end="url(#bpt-g)">
      <line x1="620" y1="20" x2="540" y2="20"/>
      <line x1="500" y1="20" x2="420" y2="20"/>
      <line x1="380" y1="20" x2="340" y2="20"/>
      <line x1="320" y1="20" x2="240" y2="20"/>
      <line x1="200" y1="20" x2="120" y2="20"/>
      <line x1="80"  y1="20" x2="0"   y2="20"/>
    </g>

    <!-- Gradient magnitude annotations -->
    <text x="580" y="14" class="mono" fill="#A8324B">1.0</text>
    <text x="460" y="14" class="mono" fill="#A8324B">0.6</text>
    <text x="280" y="14" class="mono" fill="#A8324B">0.3</text>
    <text x="160" y="14" class="mono" fill="#A8324B">0.1</text>
    <text x="40"  y="14" class="mono" fill="#A8324B" font-weight="600">&lt; 0.01</text>
  </g>

  <!-- Math expression -->
  <g transform="translate(60, 220)">
    <rect x="0" y="0" width="840" height="80" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="420" y="28" text-anchor="middle" class="mono" font-size="14">
      ∂ℒ/∂h₁  =  ∏ (∂h_t/∂h_{t-1})  ·  ∂ℒ/∂h_T  =  ∏ W^⊤ · diag(tanh'(·))  ·  ∂ℒ/∂h_T
    </text>
    <text x="420" y="52" text-anchor="middle" class="mut">if largest eigenvalue of W^⊤ is</text>
    <text x="420" y="70" text-anchor="middle" class="mono" font-size="12">
      <tspan fill="#A8324B">&lt; 1 → product → 0 (vanishing)</tspan>    ·    <tspan fill="#D97757">&gt; 1 → product → ∞ (exploding)</tspan>
    </text>
  </g>

  <g transform="translate(60, 320)">
    <text x="420" y="0" text-anchor="middle" class="mut" font-style="italic">
      Long-range dependencies (&gt; 20 steps) are the pain point vanilla RNNs cannot handle. This is what LSTM gates fix.
    </text>
  </g>
</svg>
