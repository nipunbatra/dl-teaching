<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      .cell    { fill:#EAD3C5; stroke:#D97757; stroke-width:1.4; rx:4; ry:4; }
      .inp     { fill:#EAE7DC; stroke:#6B6A65; stroke-width:1; rx:18; ry:18; }
      .out     { fill:#D8E3DE; stroke:#7B9E89; stroke-width:1.2; rx:18; ry:18; }
      .ink     { stroke:#1F1F1E; fill:none; stroke-width:1.3; }
      .mono    { font-family:'JetBrains Mono', monospace; font-size:12px; fill:#1F1F1E; }
      .mut     { fill:#6B6A65; font-size:11px; font-family:Inter, sans-serif; }
      .ttl     { fill:#1F1F1E; font-size:15px; font-weight:600; font-style:italic; }
      .tag     { fill:#6B6A65; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-family:Inter, sans-serif; }
    </style>
    <marker id="ru-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F1F1E"/></marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" class="ttl">RNN unrolled in time — same cell, same weights, different timestep</text>

  <!-- Rolled view (left) -->
  <g transform="translate(40, 80)">
    <text x="80" y="-8" text-anchor="middle" class="tag">ROLLED</text>
    <rect class="cell" x="40" y="40" width="80" height="60"/>
    <text x="80" y="70" text-anchor="middle" class="mono">RNN</text>
    <text x="80" y="86" text-anchor="middle" class="mono">cell</text>

    <!-- self-loop -->
    <path d="M 120 50 Q 170 30 170 70 Q 170 110 120 90" fill="none" stroke="#D97757" stroke-width="1.6" marker-end="url(#ru-a)"/>
    <text x="180" y="70" class="mono" fill="#D97757">h</text>

    <!-- input and output arrows -->
    <circle class="inp" cx="20" cy="70" r="18"/>
    <text x="20" y="74" text-anchor="middle" class="mono">x</text>
    <line x1="38" y1="70" x2="40" y2="70" class="ink" marker-end="url(#ru-a)"/>

    <circle class="out" cx="140" cy="170" r="18"/>
    <text x="140" y="174" text-anchor="middle" class="mono">y</text>
    <line x1="80" y1="100" x2="140" y2="150" class="ink" marker-end="url(#ru-a)"/>
  </g>

  <!-- arrow to unrolled -->
  <text x="270" y="150" class="mono" font-size="20" fill="#D97757">→</text>
  <text x="270" y="168" class="mut" text-anchor="middle">unroll</text>

  <!-- Unrolled view (right) -->
  <g transform="translate(320, 80)">
    <text x="260" y="-8" text-anchor="middle" class="tag">UNROLLED</text>

    <!-- Timesteps: t=1..4 -->
    <g>
      <!-- t=1 -->
      <circle class="inp" cx="20" cy="150" r="16"/>
      <text x="20" y="154" text-anchor="middle" class="mono">x₁</text>
      <rect class="cell" x="50" y="120" width="70" height="60"/>
      <text x="85" y="145" text-anchor="middle" class="mono">RNN</text>
      <text x="85" y="166" text-anchor="middle" class="mono">W, U, b</text>
      <circle class="out" cx="85" cy="50" r="14"/>
      <text x="85" y="54" text-anchor="middle" class="mono">y₁</text>

      <!-- t=2 -->
      <circle class="inp" cx="170" cy="150" r="16"/>
      <text x="170" y="154" text-anchor="middle" class="mono">x₂</text>
      <rect class="cell" x="200" y="120" width="70" height="60"/>
      <text x="235" y="145" text-anchor="middle" class="mono">RNN</text>
      <text x="235" y="166" text-anchor="middle" class="mono">W, U, b</text>
      <circle class="out" cx="235" cy="50" r="14"/>
      <text x="235" y="54" text-anchor="middle" class="mono">y₂</text>

      <!-- t=3 -->
      <circle class="inp" cx="320" cy="150" r="16"/>
      <text x="320" y="154" text-anchor="middle" class="mono">x₃</text>
      <rect class="cell" x="350" y="120" width="70" height="60"/>
      <text x="385" y="145" text-anchor="middle" class="mono">RNN</text>
      <text x="385" y="166" text-anchor="middle" class="mono">W, U, b</text>
      <circle class="out" cx="385" cy="50" r="14"/>
      <text x="385" y="54" text-anchor="middle" class="mono">y₃</text>

      <!-- t=4 -->
      <circle class="inp" cx="470" cy="150" r="16"/>
      <text x="470" y="154" text-anchor="middle" class="mono">x₄</text>
      <rect class="cell" x="500" y="120" width="70" height="60"/>
      <text x="535" y="145" text-anchor="middle" class="mono">RNN</text>
      <text x="535" y="166" text-anchor="middle" class="mono">W, U, b</text>
      <circle class="out" cx="535" cy="50" r="14"/>
      <text x="535" y="54" text-anchor="middle" class="mono">y₄</text>
    </g>

    <!-- Input arrows -->
    <g class="ink" marker-end="url(#ru-a)">
      <line x1="36"  y1="150" x2="50"  y2="150"/>
      <line x1="186" y1="150" x2="200" y2="150"/>
      <line x1="336" y1="150" x2="350" y2="150"/>
      <line x1="486" y1="150" x2="500" y2="150"/>
    </g>
    <!-- Output arrows -->
    <g class="ink" marker-end="url(#ru-a)">
      <line x1="85"  y1="120" x2="85"  y2="68"/>
      <line x1="235" y1="120" x2="235" y2="68"/>
      <line x1="385" y1="120" x2="385" y2="68"/>
      <line x1="535" y1="120" x2="535" y2="68"/>
    </g>
    <!-- Hidden-state arrows (horizontal, orange) -->
    <g stroke="#D97757" stroke-width="1.8" fill="none" marker-end="url(#ru-a)">
      <line x1="120" y1="150" x2="200" y2="150"/>
      <line x1="270" y1="150" x2="350" y2="150"/>
      <line x1="420" y1="150" x2="500" y2="150"/>
    </g>
    <!-- h labels -->
    <text x="160" y="142" class="mono" fill="#D97757">h₁</text>
    <text x="310" y="142" class="mono" fill="#D97757">h₂</text>
    <text x="460" y="142" class="mono" fill="#D97757">h₃</text>
  </g>

  <!-- Formula strip -->
  <g transform="translate(60, 310)">
    <rect x="0" y="0" width="840" height="52" fill="#EEEBDF" stroke="#C9C4B5"/>
    <text x="420" y="22" text-anchor="middle" class="mono" font-size="13">
      h_t = tanh(W · x_t + U · h_{t-1} + b)       ·       y_t = V · h_t
    </text>
    <text x="420" y="42" text-anchor="middle" class="mut" font-style="italic">
      Same W, U, b at every t — parameter sharing across time is the RNN inductive bias.
    </text>
  </g>
</svg>
