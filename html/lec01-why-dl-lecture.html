<h1 id="a-question">A Question</h1>
<p>You have built classifiers in your ML course — SVMs, decision trees, logistic regression.</p>
<p>They work well on tabular data with hand-crafted features.</p>
<p><strong>Q.</strong> What happens when you try to classify raw images (say 224×224 pixels)?</p>
</section>

<h1 id="a-question-2">A Question</h1>
<p><strong>Q.</strong> Why do raw pixels fail for traditional ML?</p>
<ul>
<li>Pixels are not meaningful features</li>
<li>A 1-pixel shift changes <em>every</em> feature value</li>
<li>No notion of locality, edges, or shapes</li>
<li>The <strong>representation</strong> is wrong</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="6" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="the-core-idea-of-deep-learning">The Core Idea of Deep Learning</h1>
<div class="keypoint">
<p><strong>Deep Learning</strong> = Representation Learning</p>
<p>Instead of hand-crafting features, learn them from data.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="7" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="machine-learning-vs-deep-learning">Machine Learning vs Deep Learning</h1>
<div class="columns">
<div>
<h3 id="ml-what-you-know">ML (what you know)</h3>
<ul>
<li><strong>You</strong> design features</li>
<li>Shallow models (SVM, trees)</li>
<li>Structured / tabular data</li>
<li>Representation is fixed</li>
</ul>
</div>

</ul>
</div>

<h1 id="imagenet-the-turning-point-2012">ImageNet: The Turning Point (2012)</h1>
<table>
<thead>
<tr>
<th>Year</th>
<th>Winner</th>
<th>Top-5 Error</th>
<th>Method</th>
</tr>
</thead>
<tbody>
<tr>
<td>2010</td>
<td>NEC-UIUC</td>

<tr>
<td>2011</td>

<td><strong>2012</strong></td>
<td><strong>AlexNet</strong></td>

<td><strong>CNN (deep learning!)</strong></td>

<tr>

<h1 id="why-now-three-ingredients">Why Now? Three Ingredients</h1>
<div class="columns3">
<div>
<h3 id="data">Data</h3>
<ul>
<li>ImageNet (14M images)</li>
<li>Common Crawl (PBs of text)</li>
<li>YouTube, Wikipedia</li>
<li>Synthetic data</li>
</ul>
</div>
<div>
<h3 id="compute">Compute</h3>
<ul>
<li>GPUs (NVIDIA, 2007+)</li>
<li>TPUs (Google, 2016+)</li>
<li>Cloud computing</li>
<li>Training: days → hours</li>
</ul>
</div>
<div>
<h3 id="algorithms">Algorithms</h3>
<ul>
<li>Better activations (ReLU)</li>
<li>Better optimizers (Adam)</li>
<li>Better architectures (ResNet, Transformer)</li>
<li>Better regularization</li>
</ul>
</div>
</div>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="21" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="mlp-in-pytorch">MLP in PyTorch</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> torch.nn <span class="hljs-keyword">as</span> nn

<span class="hljs-keyword">class</span> <span class="hljs-title class_">MLP</span>(nn.Module):
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, input_dim, hidden_dim, output_dim</span>):
        <span class="hljs-built_in">super</span>().__init__()
        <span class="hljs-variable language_">self</span>.net = nn.Sequential(
            nn.Linear(input_dim, hidden_dim),
            nn.ReLU(),
            nn.Linear(hidden_dim, hidden_dim),
            nn.ReLU(),
            nn.Linear(hidden_dim, output_dim),
        )

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">forward</span>(<span class="hljs-params">self, x</span>):
        <span class="hljs-keyword">return</span> <span class="hljs-variable language_">self</span>.net(x)
</code></pre>
<p><strong>Q.</strong> How many <code>nn.Linear</code> layers does this have? How many activation functions?</p>

<h1 id="mlp-in-pytorch-1">MLP in PyTorch</h1>
<p><strong>Q.</strong> How many <code>nn.Linear</code> layers? <strong>3</strong>. How many activations? <strong>2</strong>.</p>
<p>Note: No activation after the last layer.</p>
<p><strong>Q.</strong> Why no activation after the final layer?</p>
</section>

<h1 id="part-3-why-go-deep">Part 3: Why Go Deep?</h1>
<p>Depth as a computational resource</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="25" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="the-central-question">The Central Question</h1>
<p>We know shallow networks (1 hidden layer) work.</p>
<p><strong>Q.</strong> Why would we ever want <em>more</em> layers?</p>
<p>Let us think about this carefully.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="26" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="can-a-single-layer-learn-anything">Can a Single Layer Learn Anything?</h1>
<div class="popquiz">
<p><strong>Pop Quiz</strong>: Can a single hidden layer MLP approximate <em>any</em> continuous function?</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="27" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="universal-approximation-theorem">Universal Approximation Theorem</h1>
<p><strong>Yes.</strong> (Cybenko 1989, Hornik 1991)</p>
<div class="math-box">
<p><strong>Theorem (informal)</strong>: A feedforward network with a single hidden layer containing a finite number of neurons can approximate any continuous function on a compact subset of <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="2.781ex" height="1.545ex" role="img" focusable="false" viewBox="0 -683 1229.3 683"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msup"><g data-mml-node="TeXAtom" data-mjx-texclass="ORD"><g data-mml-node="mi"><path data-c="211D" d="M17 665Q17 672 28 683H221Q415 681 439 677Q461 673 481 667T516 654T544 639T566 623T584 607T597 592T607 578T614 565T618 554L621 548Q626 530 626 497Q626 447 613 419Q578 348 473 326L455 321Q462 310 473 292T517 226T578 141T637 72T686 35Q705 30 705 16Q705 7 693 -1H510Q503 6 404 159L306 310H268V183Q270 67 271 59Q274 42 291 38Q295 37 319 35Q344 35 353 28Q362 17 353 3L346 -1H28Q16 5 16 16Q16 35 55 35Q96 38 101 52Q106 60 106 341T101 632Q95 645 55 648Q17 648 17 665ZM241 35Q238 42 237 45T235 78T233 163T233 337V621L237 635L244 648H133Q136 641 137 638T139 603T141 517T141 341Q141 131 140 89T134 37Q133 36 133 35H241ZM457 496Q457 540 449 570T425 615T400 634T377 643Q374 643 339 648Q300 648 281 635Q271 628 270 610T268 481V346H284Q327 346 375 352Q421 364 439 392T457 496ZM492 537T492 496T488 427T478 389T469 371T464 361Q464 360 465 360Q469 360 497 370Q593 400 593 495Q593 592 477 630L457 637L461 626Q474 611 488 561Q492 537 492 496ZM464 243Q411 317 410 317Q404 317 401 315Q384 315 370 312H346L526 35H619L606 50Q553 109 464 243Z"></path></g></g><g data-mml-node="mi" transform="translate(755,363) scale(0.707)"><path data-c="1D45B" d="M21 287Q22 293 24 303T36 341T56 388T89 425T135 442Q171 442 195 424T225 390T231 369Q231 367 232 367L243 378Q304 442 382 442Q436 442 469 415T503 336T465 179T427 52Q427 26 444 26Q450 26 453 27Q482 32 505 65T540 145Q542 153 560 153Q580 153 580 145Q580 144 576 130Q568 101 554 73T508 17T439 -10Q392 -10 371 17T350 73Q350 92 386 193T423 345Q423 404 379 404H374Q288 404 229 303L222 291L189 157Q156 26 151 16Q138 -11 108 -11Q95 -11 87 -5T76 7T74 17Q74 30 112 180T152 343Q153 348 153 366Q153 405 129 405Q91 405 66 305Q60 285 60 284Q58 278 41 278H27Q21 284 21 287Z"></path></g></g></g></g></svg></mjx-container>, to arbitrary accuracy.</p>

<p>So... problem solved? Just use 1 hidden layer?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="28" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="the-catch">The Catch</h1>
<p>The UAT guarantees <strong>existence</strong>, not <strong>efficiency</strong>.</p>
<p>A single hidden layer <em>can</em> approximate any function, but it may require <strong>exponentially many neurons</strong>.</p>
<p><strong>Q.</strong> Can you think of a function that is easy to represent with depth, but hard with width?</p>
</section>

<h1 id="depth-enables-hierarchical-features">Depth Enables Hierarchical Features</h1>
<p><img src="figures/lec01/feature_hierarchy.png" alt="" style="width:950px;" /></p>
<p>Deep networks learn a <strong>hierarchy</strong> of representations:</p>
<p>Pixels → Edges → Textures → Parts → Objects</p>

<h1 id="aside-how-the-visual-cortex-works">Aside: How the Visual Cortex Works</h1>
<p>The brain processes visual information hierarchically too:</p>
<table>
<thead>
<tr>
<th>Brain Region</th>
<th>Roughly Corresponds To</th>
<th>Detects</th>
</tr>
</thead>
<tbody>
<tr>
<td>V1</td>
<td>Layer 1</td>
<td>Oriented edges, bars</td>
</tr>
<tr>
<td>V2</td>
<td>Layer 2</td>
<td>Textures, simple shapes</td>
</tr>
<tr>
<td>V4</td>
<td>Layer 3</td>
<td>Complex shapes, parts</td>
</tr>
<tr>
<td>IT</td>
<td>Layer 4+</td>
<td>Objects, faces</td>
</tr>
</tbody>
</table>
<div class="insight">
<p>Hubel &amp; Wiesel (Nobel Prize, 1981) showed this hierarchical processing in cat visual cortex — inspiring neural network architectures decades later.</p>

<h1 id="relu-variants-1">ReLU Variants</h1>
<p><strong>Q.</strong> What does Leaky ReLU fix?</p>
<p><strong>Dead neurons.</strong> If a ReLU neuron's input is always negative, its gradient is always 0 — it can never recover. Leaky ReLU ensures a small gradient even for negative inputs.</p>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="44" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="solution-2-weight-initialization-1">Solution 2: Weight Initialization</h1>
<p><strong>Q.</strong> What happens if all weights are zero?</p>
<p>All neurons compute the same output → same gradient → same update.</p>
<p><strong>Symmetry is never broken.</strong> The network effectively has 1 neuron per layer.</p>
</section>

<h1 id="weight-initialization-the-goal">Weight Initialization: The Goal</h1>
<p>We want activations to maintain roughly <strong>constant variance</strong> across layers.</p>
<p>If variance grows per layer → exploding activations<br />
If variance shrinks per layer → vanishing activations</p>

<h1 id="the-loss-surface">The Loss Surface</h1>
<div class="columns">
<div>
<p><img src="figures/lec01/loss_surface_3d.png" alt="" style="width:480px;" /></p>
</div>
<div>
<p>Neural network optimization is <strong>non-convex</strong>:</p>
<ul>
<li>Multiple local minima</li>
<li>Saddle points (common in high-D)</li>
<li>Plateaus and ravines</li>
</ul>
<p><strong>But</strong>: most local minima are <em>good enough</em> in practice.</p>
</div>
</div>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-class="code-heavy" data-theme="dl-theme" lang="en-IN" class="code-heavy" data-marpit-pagination="50" style="--paginate:true;--class:code-heavy;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="the-pytorch-training-loop">The PyTorch Training Loop</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> torch.nn <span class="hljs-keyword">as</span> nn
<span class="hljs-keyword">from</span> torch.utils.data <span class="hljs-keyword">import</span> DataLoader
<span class="hljs-keyword">from</span> torchvision <span class="hljs-keyword">import</span> datasets, transforms

<span class="hljs-comment"># 1. Data</span>
transform = transforms.Compose([transforms.ToTensor(),
                                 transforms.Normalize((<span class="hljs-number">0.1307</span>,), (<span class="hljs-number">0.3081</span>,))])
train_data = datasets.MNIST(<span class="hljs-string">&#x27;./data&#x27;</span>, train=<span class="hljs-literal">True</span>, download=<span class="hljs-literal">True</span>, transform=transform)
train_loader = DataLoader(train_data, batch_size=<span class="hljs-number">64</span>, shuffle=<span class="hljs-literal">True</span>)

<span class="hljs-comment"># 2. Model + Loss + Optimizer</span>
model = MLP(<span class="hljs-number">784</span>, <span class="hljs-number">256</span>, <span class="hljs-number">10</span>)
criterion = nn.CrossEntropyLoss()
optimizer = torch.optim.SGD(model.parameters(), lr=<span class="hljs-number">0.01</span>)

<span class="hljs-comment"># 3. Training loop</span>
<span class="hljs-keyword">for</span> epoch <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">10</span>):
    <span class="hljs-keyword">for</span> batch_x, batch_y <span class="hljs-keyword">in</span> train_loader:
        batch_x = batch_x.view(-<span class="hljs-number">1</span>, <span class="hljs-number">784</span>)    <span class="hljs-comment"># Flatten</span>
        logits = model(batch_x)             <span class="hljs-comment"># Forward</span>
        loss = criterion(logits, batch_y)   <span class="hljs-comment"># Loss</span>
        optimizer.zero_grad()               <span class="hljs-comment"># Zero gradients</span>
        loss.backward()                     <span class="hljs-comment"># Backward</span>
        optimizer.step()                    <span class="hljs-comment"># Update</span>
</code></pre>
</section>

<h1 id="a-common-bug">A Common Bug</h1>
<p><strong>Q.</strong> What happens if you forget <code>optimizer.zero_grad()</code>?</p>
<p>PyTorch <strong>accumulates</strong> gradients by default.</p>
<p>Without zeroing, each <code>.backward()</code> <em>adds</em> to existing gradients.</p>
<p>After <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.179ex" height="1.595ex" role="img" focusable="false" viewBox="0 -694 521 705"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D458" d="M121 647Q121 657 125 670T137 683Q138 683 209 688T282 694Q294 694 294 686Q294 679 244 477Q194 279 194 272Q213 282 223 291Q247 309 292 354T362 415Q402 442 438 442Q468 442 485 423T503 369Q503 344 496 327T477 302T456 291T438 288Q418 288 406 299T394 328Q394 353 410 369T442 390L458 393Q446 405 434 405H430Q398 402 367 380T294 316T228 255Q230 254 243 252T267 246T293 238T320 224T342 206T359 180T365 147Q365 130 360 106T354 66Q354 26 381 26Q429 26 459 145Q461 153 479 153H483Q499 153 499 144Q499 139 496 130Q455 -11 378 -11Q333 -11 305 15T277 90Q277 108 280 121T283 145Q283 167 269 183T234 206T200 217T182 220H180Q168 178 159 139T145 81T136 44T129 20T122 7T111 -2Q98 -11 83 -11Q66 -11 57 -1T48 16Q48 26 85 176T158 471L195 616Q196 629 188 632T149 637H144Q134 637 131 637T124 640T121 647Z"></path></g></g></g></svg></mjx-container> batches: effective gradient <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.777ex;" xmlns="http://www.w3.org/2000/svg" width="13.063ex" height="2.966ex" role="img" focusable="false" viewBox="0 -967.8 5773.7 1311.1"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="3D" d="M56 347Q56 360 70 367H707Q722 359 722 347Q722 336 708 328L390 327H72Q56 332 56 347ZM56 153Q56 168 72 173H708Q722 163 722 153Q722 140 707 133H70Q56 140 56 153Z"></path></g><g data-mml-node="munderover" transform="translate(1055.8,0)"><g data-mml-node="mo"><path data-c="2211" d="M61 748Q64 750 489 750H913L954 640Q965 609 976 579T993 533T999 516H979L959 517Q936 579 886 621T777 682Q724 700 655 705T436 710H319Q183 710 1 nsform="translate(723,-150) scale(0.707)"><path data-c="1D456" d="M184 600Q184 624 203 642T247 661Q265 661 277 649T290 619Q290 596 270 577T226 557Q211 557 198 567T184 600ZM21 287Q21 295 30 318T54 369T98 420T158 442Q197 442 223 419T250 357Q250 340 236 301T196 196T154 83Q149 61 149 51Q149 26 166 26Q175 26 185 29T208 43T235 78T260 137Q263 149 265 151T282 153Q302 153 302 143Q302 135 293 112T268 61T223 11T161 -11Q129 -11 102 10T74 74Q74 91 79 106T122 220Q160 321 166 341T173 380Q173 404 156 404H154Q124 404 99 371T61 287Q60 286 59 284T58 281T56 279T53 278T49 278T41 278H27Q21 284 21 287Z"></path></g></g></g></g></svg></mjx-container></p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="54" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="train--validation--test-1">Train / Validation / Test</h1>
<p><strong>Q.</strong> Training loss is decreasing every epoch. Is the model getting better?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="55" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="train--validation--test-2">Train / Validation / Test</h1>
<p><strong>Q.</strong> Training loss decreasing = better model?</p>
<p><strong>Not necessarily.</strong> Training loss <em>always</em> decreases (given enough capacity).</p>
<p>What matters is <strong>validation loss</strong>:</p>
<p><img src="figures/lec01/training_curves.png" alt="" style="width:900px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="56" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="overfitting-the-gap">Overfitting: The Gap</h1>
<div class="columns">
<div>
<ul>
<li>Training loss ↓ always</li>
<li>Validation loss ↓ then ↑</li>
<li>The gap = <strong>overfitting</strong></li>
</ul>
<p><strong>Use validation to decide:</strong></p>
<ul>
<li>When to stop (early stopping)</li>
<li>Which hyperparameters are best</li>
<li>Whether model is too complex</li>
</ul>
</div>
<div>
<div class="warning">
<p><strong>Never</strong> tune hyperparameters on the test set.</p>
<p>Test set = final exam you take <strong>once</strong>.</p>
<p>Validation set = practice exams you can take many times.</p>
</div>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="57" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="evaluation-in-pytorch">Evaluation in PyTorch</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">model.<span class="hljs-built_in">eval</span>()                          <span class="hljs-comment"># Switch to eval mode (disables dropout, etc.)</span>
<span class="hljs-keyword">with</span> torch.no_grad():                 <span class="hljs-comment"># No gradient computation needed</span>
    correct = <span class="hljs-number">0</span>
    total = <span class="hljs-number">0</span>
    <span class="hljs-keyword">for</span> batch_x, batch_y <span class="hljs-keyword">in</span> val_loader:
        batch_x = batch_x.view(-<span class="hljs-number">1</span>, <span class="hljs-number">784</span>)
        logits = model(batch_x)
        preds = logits.argmax(dim=<span class="hljs-number">1</span>)  <span class="hljs-comment"># Predicted class</span>
        correct += (preds == batch_y).<span class="hljs-built_in">sum</span>().item()
        total += batch_y.size(<span class="hljs-number">0</span>)

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Validation accuracy: <span class="hljs-subst">{correct/total:<span class="hljs-number">.4</span>f}</span>&quot;</span>)
model.train()                         <span class="hljs-comment"># Switch back to train mode</span>
</code></pre>
<p><strong>Q.</strong> Why do we use <code>torch.no_grad()</code>? Why not just skip <code>loss.backward()</code>?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="58" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="62">
<h1 id="evaluation-in-pytorch-1">Evaluation in PyTorch</h1>
<p><strong>Q.</strong> Why <code>torch.no_grad()</code>?</p>
<p>Even without calling <code>.backward()</code>, PyTorch still <strong>builds the computation graph</strong> during the forward pass (allocating memory for potential gradients).</p>
<p><code>torch.no_grad()</code> skips graph construction entirely → faster + less memory.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-class="section-divider" data-theme="dl-theme" lang="en-IN" class="section-divider" data-marpit-pagination="59" style="--paginate:true;--class:section-divider;--theme:dl-theme;" data-marpit-pagination-total="62">

<ul>
<li><strong>Deep Learning</strong> = learn representations, not hand-craft them</li>
<li><strong>Why now</strong>: data (ImageNet) + compute (GPUs) + algorithms (ReLU, Adam, ResNet)</li>

<li><strong>Validation</strong> detects overfitting; test set used <strong>once</strong></li>
