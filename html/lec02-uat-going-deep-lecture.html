</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="12" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="three-things-uat-does-not-tell-you">Three Things UAT Does NOT Tell You</h1>
<ol>
<li>
<p><strong>How to find the weights.</strong></p>
<p>UAT says good weights <em>exist</em>. It doesn't say gradient descent will find them.</p>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="13" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="three-things-uat-does-not-tell-you-1">Three Things UAT Does NOT Tell You</h1>
<ol start="2">
<li>
<p><strong>How many neurons you need.</strong></p>
<p>Could be astronomically many. The theorem gives existence, not a bound.</p>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="14" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="three-things-uat-does-not-tell-you-2">Three Things UAT Does NOT Tell You</h1>
<ol start="3">
<li>
<p><strong>Anything about generalization.</strong></p>
<p>A network that perfectly memorizes <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.357ex" height="1.025ex" role="img" focusable="false" viewBox="0 -442 600 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D45B" d="M21 287Q22 293 24 303T36 341T56 388T89 425T135 442Q171 442 195 424T225 390T231 369Q231 367 232 367L243 378Q304 442 382 442Q436 442 469 415T503 336T465 179T427 52Q427 26 444 26Q450 26 453 27Q482 32 505 65T540 145Q542 153 560 153Q580 153 580 145Q580 144 576 130Q568 101 554 73T508 17T439 -10Q392 -10 371 17T350 73Q350 92 386 193T423 345Q423 404 379 404H374Q288 404 229 303L222 291L189 157Q156 26 151 16Q138 -11 108 -11Q95 -11 87 -5T76 7T74 17Q74 30 112 180T152 343Q153 348 153 366Q153 405 129 405Q91 405 66 305Q60 285 60 284Q58 278 41 278H27Q21 284 21 287Z"></path></g></g></g></svg></mjx-container> training points also satisfies UAT. But it may fail completely on new data.</p>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="15" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<div class="popquiz">
<p><strong>Pop Quiz</strong>: True or False?</p>
<p><em>&quot;The Universal Approximation Theorem guarantees that a 1-hidden-layer network will perform well if given enough data and enough neurons.&quot;</em></p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="16" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="pop-quiz-answer">Pop Quiz Answer</h1>
<p><strong>False.</strong></p>
<ul>
<li>UAT guarantees <em>approximation ability</em>, not <em>learnability via gradient descent</em></li>
<li>More neurons doesn't mean gradient descent will find good weights</li>
<li>&quot;Enough data&quot; is not part of the UAT statement at all</li>
<li>In practice, <strong>depth is far more efficient than width</strong> (Part 2)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-class="section-divider" data-theme="dl-theme" lang="en-IN" class="section-divider" data-marpit-pagination="17" style="--paginate:true;--class:section-divider;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="part-2-depth-vs-width">Part 2: Depth vs Width</h1>
<p>Why deeper is (usually) better</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="18" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="the-depth-advantage">The Depth Advantage</h1>
<p>UAT says: width alone suffices (in theory).</p>
<p><strong>Q.</strong> Then why would we ever want more layers?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="19" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="compositionality">Compositionality</h1>
<div class="insight">
<p><strong>Key idea</strong>: Many real-world functions have <strong>hierarchical structure</strong>. Deep networks exploit this; shallow networks cannot.</p>
</div>
<p>Consider recognizing &quot;a dog sitting&quot; in an image:</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="20" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="compositionality-shallow-vs-deep">Compositionality: Shallow vs Deep</h1>
<p><img src="figures/lec02/depth_compositionality.png" alt="" style="width:950px;" /></p>
<p>Deep: learn 11 reusable parts. Shallow: learn 9 separate detectors.</p>
<p>Now add &quot;cat flying&quot; — deep network reuses existing parts; shallow needs a brand new detector.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="21" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="counting-parameters">Counting Parameters</h1>
<p><strong>Q.</strong> Which has more parameters: 1 layer of 512 neurons, or 8 layers of 64 neurons?</p>
<p>(Input: 784, Output: 10)</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="22" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="counting-parameters-1">Counting Parameters</h1>
<p><img src="figures/lec02/param_count_depth_width.png" alt="" style="width:800px;" /></p>
<p>The shallow-wide network has <strong>far more</strong> parameters, yet deep-narrow networks often perform better. Parameters alone don't determine quality.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="23" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="depth-separation-a-formal-result">Depth Separation: A Formal Result</h1>
<div class="math-box">

<p>Intuition: deeper = more parameters = more capacity = better. Right?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="32" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="the-surprise">The Surprise</h1>
<p><img src="figures/lec02/resnet_vs_plain.png" alt="" style="width:900px;" /></p>
<p><strong>Both training and test error increase</strong> for the deeper plain network.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="33" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="why-this-is-surprising">Why This Is Surprising</h1>
<div class="warning">
<p>If it were overfitting, we'd see:</p>
<ul>
<li>Training error: lower (deeper has more capacity)</li>
<li>Test error: higher (memorizes training data)</li>
</ul>
<p>But training error <strong>also goes up</strong>. The deeper network can't even fit the training data as well!</p>
</div>
<p>This is <strong>not</strong> a capacity problem. It's an <strong>optimization</strong> problem.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="34" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="a-thought-experiment">A Thought Experiment</h1>
<p><strong>Q.</strong> A 20-layer network achieves 5% error. We add 36 identity layers on top (total: 56 layers). What should happen?</p>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="43" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="resnet-in-pytorch">ResNet in PyTorch</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">ResidualBlock</span>(nn.Module):
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, dim</span>):
        <span class="hljs-built_in">super</span>().__init__()
        <span class="hljs-variable language_">self</span>.block = nn.Sequential(
            nn.Linear(dim, dim),
            nn.BatchNorm1d(dim),
            nn.ReLU(),
            nn.Linear(dim, dim),
            nn.BatchNorm1d(dim),
        )
        <span class="hljs-variable language_">self</span>.relu = nn.ReLU()

    <span class="hljs-keyword">def</span> <span class="hljs-title function_">forward</span>(<span class="hljs-params">self, x</span>):
        <span class="hljs-keyword">return</span> <span class="hljs-variable language_">self</span>.relu(<span class="hljs-variable language_">self</span>.block(x) + x)  <span class="hljs-comment"># &lt;-- skip connection</span>
</code></pre>
<p><strong>Q.</strong> What constraint does the skip connection <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.186ex;" xmlns="http://www.w3.org/2000/svg" width="3.133ex" height="1.505ex" role="img" focusable="false" viewBox="0 -583 1385 665"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2B" d="M56 237T56 250T70 270H369V420L370 570Q380 583 389 583Q402 583 409 568V270H707Q722 262 722 250T707 230H409V-68Q401 -82 391 -82H389H387Q375 -82 369 -68V230H70Q56 237 56 250Z"></path></g><g data-mml-node="TeXAtom" data-mjx-texclass="ORD" transform="translate(778,0)"><g data-mml-node="mi"><path data-c="1D431" d="M227 0Q212 3 121 3Q40 3 28 0H21V62H117L245 213L109 382H26V444H34Q49 441 143 441Q247 441 265 444H274V382H246L281 339Q315 297 316 297Q320 297 354 341L389 382H352V444H360Q375 441 466 441Q547 441 559 444H566V382H471L355 246L504 63L545 62H586V0H578Q563 3 469 3Q365 3 347 0H338V62H366Q366 63 326 112T285 163L198 63L217 62H235V0H227Z"></path></g></g></g></g></svg></mjx-container> impose on the layer dimensions?</p>

<p><strong>Q.</strong> What constraint does <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.186ex;" xmlns="http://www.w3.org/2000/svg" width="3.133ex" height="1.505ex" role="img" focusable="false" viewBox="0 -583 1385 665"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2B" d="M56 237T56 250T70 270H369V420L370 570Q380 583 389 583Q402 583 409 568V270H707Q722 262 722 250T707 230H409V-68Q401 -82 391 -82H389H387Q375 -82 369 -68V230H70Q56 237 56 250Z"></path></g><g data-mml-node="TeXAtom" data-mjx-texclass="ORD" transform="translate(778,0)"><g data-mml-node="mi"><path data-c="1D431" d="M227 0Q212 3 121 3Q40 3 28 0H21V62H117L245 213L109 382H26V444H34Q49 441 143 441Q247 441 265 444H274V382H246L281 339Q315 297 316 297Q320 297 354 341L389 382H352V444H360Q375 441 466 441Q547 441 559 444H566V382H471L355 246L504 63L545 62H586V0H578Q563 3 469 3Q365 3 347 0H338V62H366Q366 63 326 112T285 163L198 63L217 62H235V0H227Z"></path></g></g></g></g></svg></mjx-container> impose?</p>

<div class="popquiz">
<p><strong>Pop Quiz</strong>: You're training a 50-layer plain MLP and the loss barely decreases. What do you try first?</p>
<p>(a) Use sigmoid instead of ReLU<br />
(b) Add skip connections<br />
(c) Use a smaller learning rate<br />
(d) Add more layers</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="48" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="pop-quiz-answer-1">Pop Quiz Answer</h1>
<p><strong>(b) Add skip connections.</strong></p>
<ul>
<li>(a) Makes it worse — sigmoid has max gradient 0.25</li>
<li>(b) Correct — provides gradient highway to early layers</li>
<li>(c) Might help stability, but doesn't fix vanishing gradients</li>
<li>(d) Makes the degradation problem worse</li>
</ul>
</section>

<h1 id="the-effect-of-initialization">The Effect of Initialization</h1>
<p><img src="figures/lec01/weight_init_activations.png" alt="" style="width:950px;" /></p>
<p>Too small → collapse. Too large → explode. Xavier/He → stable across layers.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="56" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="initialization-in-pytorch">Initialization in PyTorch</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># PyTorch default for nn.Linear: Kaiming uniform (good for ReLU!)</span>
model = nn.Linear(<span class="hljs-number">784</span>, <span class="hljs-number">256</span>)  <span class="hljs-comment"># Already sensible</span>

<span class="hljs-comment"># Explicit He init:</span>
nn.init.kaiming_normal_(model.weight, mode=<span class="hljs-string">&#x27;fan_in&#x27;</span>, nonlinearity=<span class="hljs-string">&#x27;relu&#x27;</span>)
nn.init.zeros_(model.bias)

<span class="hljs-comment"># Xavier (for sigmoid/tanh):</span>
nn.init.xavier_normal_(model.weight)
</code></pre>
<div class="insight">
<p>Rule of thumb: <strong>ReLU → He, Sigmoid/Tanh → Xavier</strong>. In practice, PyTorch defaults work well. But knowing <em>why</em> helps you debug when things go wrong.</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="57" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<div class="popquiz">
<p><strong>Pop Quiz</strong>: You build a 10-layer MLP with Tanh and <strong>He</strong> initialization. Loss oscillates wildly. What's wrong?</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="dl-theme" lang="en-IN" data-marpit-pagination="58" style="--paginate:true;--theme:dl-theme;" data-marpit-pagination-total="61">
<h1 id="pop-quiz-answer-2">Pop Quiz Answer</h1>
<p>He init assumes ReLU (compensates for 50% zeroed outputs). Tanh doesn't zero any outputs — He gives <strong>too large</strong> a variance → activations saturate.</p>
<p><strong>Fix</strong>: Use Xavier initialization.</p>
<table>
<thead>
<tr>
<th>Activation</th>
<th>Init</th>
<th>Why</th>
</tr>
</thead>
<tbody>

<h1 id="lecture-2-summary">Lecture 2: Summary</h1>
<ul>
<li><strong>UAT</strong>: existence result only — says nothing about learnability, efficiency, or generalization</li>
<li><strong>Depth wins</strong>: compositionality gives exponential savings; deep = reusable hierarchical features</li>
<li><strong>Degradation problem</strong>: deeper plain networks optimize <em>worse</em> — adding layers hurts training error</li>
<li><strong>ResNets</strong>: skip connections → gradient highway (<mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.312ex;" xmlns="http://www.w3.org/2000/svg" width="5.888ex" height="1.864ex" role="img" focusable="false" viewBox="0 -686 2602.6 824"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="2207" d="M46 676Q46 679 51 683H781Q786 679 786 676Q786 674 617 326T444 -26Q439 -33 416 -33T388 -26Q385 -22 216 326T46 676ZM697 596Q697 597 445 597T193 596Q195 591 319 336T445 80L697 596Z"></path></g><g data-mml-node="mo" transform="translate(1110.8,0)"><path data-c="2265" d="M83 616Q83 624 89 630T99 636Q107 636 253 568T543 431T687 361Q694 356 694 346T687 331Q685 329 395 192L107 56H101Q83 58 83 76Q83 77 83 79Q82 86 98 95Q117 105 248 167Q326 204 378 228L626 346L360 472Q291 505 200 548Q112 589 98 597T83 616ZM84 -118Q84 -108 99 -98H678Q694 -104 694 -118Q694 -130 679 -138H98Q84 -131 84 -118Z"></path></g><g data-mml-node="TeXAtom" data-mjx-texclass="ORD" transform="translate(2166.6,0)"><g data-mml-node="mi"><path data-c="1D408" d="M397 0Q370 3 218 3Q65 3 38 0H25V62H139V624H25V686H38Q65 683 218 683Q370 683 397 686H410V624H296V62H410V0H397Z"></path></g></g></g></g></svg></mjx-container>) → smooth loss landscape</li>
<li><strong>Initialization</strong>: Xavier for sigmoid/tanh, He for ReLU — derived from variance preservation across layers</li>
</ul>
